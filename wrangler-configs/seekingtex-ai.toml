name = "seekingtex-ai"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]
main = "@astrojs/cloudflare/entrypoints/server"

[assets]
directory = "./dist/client"
binding = "ASSETS"

# ----------------------------------------------------------------
# AI Worker - handles AI endpoints (/api/ai/*, /api/ask, /api/chat, /api/embed)
# ----------------------------------------------------------------

[ai]
binding = "AI"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "seekingtex-assets"

[vars]
NODE_VERSION = "22"
NODE_ENV = "production"
WORKER_ROLE = "ai"