name = "seekingtex-seo"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]
main = "@astrojs/cloudflare/entrypoints/server"

[assets]
directory = "./dist/client"
binding = "ASSETS"

# ----------------------------------------------------------------
# SEO Worker - handles SEO endpoints (/api/seo/*, /api/geo/*, /api/site-audit)
# ----------------------------------------------------------------

[ai]
binding = "AI"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "seekingtex-assets"

[vars]
NODE_VERSION = "22"
NODE_ENV = "production"
WORKER_ROLE = "seo"