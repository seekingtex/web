name: CI/CD - Build & Deploy to Cloudflare Workers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  check-astro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn run check:astro

  build-and-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check-astro]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable

      - name: Build
        run: yarn run build

      - name: Inject bindings into wrangler.ci.json
        run: |
          cd dist/server
          node -e "
            const c = require('./wrangler.json');
            delete c.configPath; delete c.userConfigPath;
            c.ai = { binding: 'AI' };
            // VECTORIZE binding removed: index ai-index needs to be created first
            // Uncomment below once the index exists:
            // c.vectorize = [{ binding: 'VECTORIZE', index_name: 'ai-index' }];
            require('fs').writeFileSync('wrangler.ci.json', JSON.stringify(c, null, 2));
            console.log('✅ Injected VECTORIZE + AI bindings');
          "

      - name: Ensure Vectorize index exists (skipped - add back when index ready)
        run: echo "Vectorize creation skipped. Uncomment when index exists."

      - name: Deploy to Cloudflare Workers
        run: |
          cd dist/server
          yarn wrangler deploy --config wrangler.ci.json --name seekingtex 2>&1 | tee /tmp/deploy.log; exit ${PIPESTATUS[0]}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Disable Cloudflare Pages auto-build
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/multi" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "build_config": {
                "build_command": "echo \"Deployment managed by GitHub Actions - skip Pages build\"; exit 0",
                "destination_dir": "",
                "root_dir": ""
              }
            }' | node -e "
              let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
                const r=JSON.parse(d);
                if(r.success) console.log('✓ Pages auto-build disabled');
                else console.error('✗ Failed to disable Pages build: '+JSON.stringify(r.errors));
              })
            "
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload deploy log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log
          path: /tmp/deploy.log

      - name: Set SESSION_SECRET on Worker
        run: |
          cd dist/server && \
          echo "${{ secrets.SESSION_SECRET }}" | \
            yarn wrangler secret put SESSION_SECRET \
              --config wrangler.ci.json \
              --name seekingtex 2>&1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Note: All locale URLs use path-based format: /de/, /fr/, etc.
      # No subdomain routing is needed.
