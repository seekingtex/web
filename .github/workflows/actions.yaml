name: CI/CD - Build & Deploy to Cloudflare Workers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      setup_r2:
        description: 'Run R2 infrastructure setup (bucket + custom domain + DNS)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  check-astro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn run check:astro

  setup-r2-infra:
    if: github.event_name == 'workflow_dispatch' && inputs.setup_r2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable
      - name: Setup R2 infrastructure
        run: node scripts/setup-r2-infra.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check-astro]
    runs-on: ubuntu-latest
    outputs:
      build_dir: ${{ steps.build.outputs.build_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable

      - name: Build
        id: build
        run: |
          yarn run build
          echo "build_dir=dist/server" >> $GITHUB_OUTPUT

      - name: Sync product images to R2
        run: |
          npx wrangler r2 bucket create seekingtex-assets 2>/dev/null || echo "Bucket already exists"
          cd public/products/images
          for f in *; do
            echo "Uploading $f..."
            npx wrangler r2 object put seekingtex-assets/images/"$f" --file="$f"
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Prepare worker configs
        run: |
          cd dist/server
          # Create individual wrangler configs for each worker
          node -e "
            const fs = require('fs');
            const base = JSON.parse(fs.readFileSync('wrangler.json', 'utf8'));
            delete base.configPath; delete base.userConfigPath;
            
            // Common bindings for all workers
            base.ai = { binding: 'AI' };
            base.vars = base.vars || {};
            base.vars.NODE_VERSION = '22';
            base.vars.NODE_ENV = 'production';
            
            // R2 bucket binding
            base.r2_buckets = base.r2_buckets || [];
            if (!base.r2_buckets.find(b => b.bucket_name === 'seekingtex-assets')) {
              base.r2_buckets.push({ binding: 'ASSETS_BUCKET', bucket_name: 'seekingtex-assets' });
            }
            
            // Worker configs
            const workers = [
              { name: 'seekingtex', role: 'site', config: { ...base } },
              { name: 'seekingtex-ai', role: 'ai', config: { ...base, vars: { ...base.vars, WORKER_ROLE: 'ai' } } },
              { name: 'seekingtex-seo', role: 'seo', config: { ...base, vars: { ...base.vars, WORKER_ROLE: 'seo' } } },
              { name: 'seekingtex-admin', role: 'admin', config: { ...base, vars: { ...base.vars, WORKER_ROLE: 'admin' } } },
              { name: 'seekingtex-contact', role: 'contact', config: { ...base, vars: { ...base.vars, WORKER_ROLE: 'contact' } } },
            ];
            
            workers.forEach(w => {
              fs.writeFileSync(\`wrangler-\${w.name}.json\`, JSON.stringify(w.config, null, 2));
              console.log(\`✅ Created wrangler-\${w.name}.json\`);
            });
          "
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-server
          path: dist/server/
          retention-days: 1

  deploy-workers:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-server
          path: dist/server
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy all workers
        run: |
          cd dist/server
          
          WORKERS="seekingtex seekingtex-ai seekingtex-seo seekingtex-admin seekingtex-contact"
          
          for w in $WORKERS; do
            echo "🚀 Deploying $w..."
            npx wrangler deploy --config wrangler-$w.json --name $w 2>&1 | tee /tmp/deploy-$w.log
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "❌ Failed to deploy $w"
              exit 1
            fi
            echo "✅ $w deployed successfully"
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set SESSION_SECRET on all workers
        run: |
          cd dist/server
          WORKERS="seekingtex seekingtex-ai seekingtex-seo seekingtex-admin seekingtex-contact"
          
          for w in $WORKERS; do
            echo "🔐 Setting SESSION_SECRET on $w..."
            echo "${{ secrets.SESSION_SECRET }}" | \
              npx wrangler secret put SESSION_SECRET \
                --config wrangler-$w.json \
                --name $w 2>&1
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Disable Cloudflare Pages auto-build
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/multi" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "build_config": {
                "build_command": "echo \"Deployment managed by GitHub Actions - skip Pages build\"; exit 0",
                "destination_dir": "",
                "root_dir": ""
              }
            }' | node -e "
              let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
                const r=JSON.parse(d);
                if(r.success) console.log('✓ Pages auto-build disabled');
                else console.error('✗ Failed to disable Pages build: '+JSON.stringify(r.errors));
              })
            "
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}