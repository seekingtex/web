site:
  name: Seekingtex
  site: 'https://seekingtex.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Seekingtex | Fabricant de tissus fonctionnels — Protection solaire, imperméable & textiles performants
    template: '%s — Seekingtex'
  description: 'Seekingtex est un fabricant leader de tissus fonctionnels, spécialisé dans la protection solaire (UPF 50+), les tissus imperméables, à séchage rapide, antibactériens et performants pour les vêtements de sport, les vêtements d\'extérieur et les équipements tactiles. Services OEM/ODM disponibles.'
  keywords:
    - Seekingtex
    - fabricant de tissus fonctionnels
    - tissu protection solaire
    - tissu UPF 50+
    - tissu imperméable
    - tissu à séchage rapide
    - tissu performant
    - tissu sportswear
  author: Seekingtex
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Seekingtex
    images:
      - url: '~/assets/images/default.webp'
        width: 1200
        height: 628
    type: website
    locale: fr_FR
  twitter:
    handle: '@Seekingtex'
    site: '@Seekingtex'
    cardType: summary_large_image

i18n:
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news' # News main path
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category' # /category/<slug>
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag' # /tag/<slug>
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"

