- slug: upf-50-sun-protection-guide
  category: guide
  type: safety
  title: 'UPF 50+ Sun Protection Fabric: UV Safety and Fabric Selection'
  description: 'Essential UPF sun protection guide for fabric buyers. How UPF rating works, UV protection standards, fabric construction factors, and selecting sun-protective textiles.'
  definition: 'UPF (Ultraviolet Protection Factor) measures how much UV radiation penetrates a fabric. UPF 50 blocks 98% of UV rays. UPF 50+ blocks 98%+. AS/NZS 4399 is the primary standard.'
  tldr: 'UPF 50+ provides excellent protection. Key factors affecting UPF: fiber type (polyester best), construction (tight weave), color (darker better), weight (heavier better), stretch (reduces UPF when stretched), wetness (reduces UPF 20-50%). Certification: test per AS/NZS 4399 or AATCC 183. Always request test reports. UPF (not SPF) is the correct measure for fabric.'
  problem: 'You order fabric labeled UPF 50+, but when tested it fails to meet the rating after washing or when stretched. Without understanding UPF testing conditions, protection claims may not reflect real-world use.'
  explanation: 'UPF is tested on new fabric in dry, unstretched condition. Real-world factors reduce UPF: stretching (garment fit), wetness (sweat, water), wear (abrasion over time), and laundering (some detergents contain UV absorbers that help). Polyester has inherent UV absorption. Cotton requires UV absorbers for UPF. Dark colors absorb more UV than light colors. Tight weaves/knits block more UV than loose constructions.'
  solution: 'Request UPF test reports per AS/NZS 4399. Specify UPF 50+ minimum (UPF 50 offers 98% blockage). Choose polyester for best inherent UV protection. Avoid overly stretchy constructions that lose UPF when stretched. Test after 20 washes to verify durability.'
  recommendation: 'Seekingtex UPF 50+ Sun Protection Fabric provides verified UPF 50+ per AS/NZS 4399. Testing performed by ISO 17025 lab. UPF maintained after 50 washes.'
  faq:
    - q: What is the difference between UPF and SPF?
      a: 'UPF measures UV transmission through fabric. SPF measures sunscreen protection on skin. UPF is always used for fabric.'
    - q: Does UPF wash out?
      a: 'UPF from fiber-embedded absorbers is permanent. Coated UV protection washes out. Always ask: how is UPF achieved?'
    - q: Does stretch reduce UPF?
      a: 'Yes — stretching fabric opens gaps between yarns, reducing UV blockage. Test UPF at 100% and 200% stretch.'
