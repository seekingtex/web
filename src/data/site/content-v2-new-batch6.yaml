- slug: fabric-coating-lamination-guide
  category: guide
  type: tutorial
  title: 'Fabric Coating and Lamination: Waterproofing Technologies Explained'
  description: 'Complete guide to fabric coating and lamination — PU coating, TPU lamination, acrylic coating, PVC coating. Applications, performance, cost, and selection criteria.'
  definition: 'Fabric coating applies a liquid polymer to the fabric surface and dries to form a film. Fabric lamination bonds a pre-formed membrane to the fabric using adhesive. Both methods add waterproofing and other barrier properties.'
  tldr: 'PU coating: cost-effective waterproofing (1-10K mm HH), good flexibility, moderate breathability (with microporous variants). TPU lamination: higher waterproofing (5-20K mm HH), excellent flexibility, better breathability. Acrylic coating: lowest cost, limited waterproofing (1-3K mm HH), stiff. PVC coating: heavy-duty waterproofing (10-50K mm HH), not breathable. Lamination costs more but performs better.'
  problem: 'Your fabric needs waterproofing but you are not sure whether coating or lamination suits your application. Coating fails after a season. Lamination costs more.'
  explanation: 'Coating: liquid PU dissolved in solvent or water, applied by knife-over-roll or kiss-roll, dried and cured. Coating penetrates the fabric surface for adhesion. Lamination: pre-manufactured PU or TPU membrane bonded to fabric with adhesive. Lamination provides more consistent barrier properties and does not fill the fabric interstices (better breathability). TPU (thermoplastic polyurethane) is more flexible and durable than standard PU.'
  solution: 'Choose PU coating for: value outerwear, umbrellas, bags where cost is primary. Choose TPU lamination for: technical outerwear, camping gear, and any application requiring durability and breathability. Choose PVC coating for: truck covers, industrial, and extreme waterproofing where breathability is not needed.'
  recommendation: 'Seekingtex offers both PU coating (standard, 2K-5K mm HH) and TPU lamination (premium, 5K-10K mm HH). Our technical advisors help you choose the right waterproofing technology.'
  faq:
    - q: Is coating or lamination more durable?
      a: 'Lamination is generally more durable. The pre-made membrane has consistent thickness. Coating can be scratched or abraded.'
    - q: Can coated fabric be breathable?
      a: 'Microporous PU coatings provide moderate breathability. TPU laminations designed for breathability perform better.'
    - q: What is the cost difference?
      a: 'PU coating: $0.30-0.60/yard. TPU lamination: $0.60-1.20/yard. PVC coating: $0.20-0.40/yard.'
