- slug: fabric-roll-cutting-guide
  category: guide
  type: tutorial
  title: 'Fabric Roll Handling: Cutting, Measuring, and Preparing Fabric'
  description: 'Proper fabric roll handling techniques — unrolling, measuring, cutting, and preparing fabric for garment cutting. Avoid common pitfalls like off-grain cutting and measurement errors.'
  definition: 'Fabric roll handling covers receiving inspection, measuring yardage, identifying grain direction, laying/cutting, and managing remnants. Proper handling ensures maximum yield and quality.'
  tldr: 'Receiving: inspect roll for damage, measure yardage (verify against packing list), check for shade banding. Cutting: verify grain line is straight, cut perpendicular to selvage, one layer at a time for critical garments. Laying: match stripes/patterns across layers. Remnant management: record yardage, store flat. Always cut from the same end for consistency.'
  problem: 'You receive a roll of fabric, unroll it, and start cutting without checking grain, shade, or measurement. Halfway through, you discover off-grain cutting, shade variation across the roll, or insufficient yardage.'
  explanation: 'Fabric rolls should be stored flat or on spindle racks, never hung (gravity stretches fabric). Always verify yardage against packing list. Check grain by pulling a thread — it should be perpendicular to the selvage. Cut fabric along the grain line. Off-grain cutting creates twisted, uneven garments. Check for shade banding by draping a length across a table under consistent lighting.'
  solution: 'Inspect roll upon receipt: check for damage, measure yardage, note roll number and lot number. Identify face side and direction. Before cutting: pull a thread to verify grain, mark grain direction clearly. Cut perpendicular to selvage. For pattern matching, cut one layer at a time. Record cut yardage and remnant yardage.'
  recommendation: 'Seekingtex fabric rolls are packed with grain direction clearly marked. Rolls are 99%+ of stated yardage. Our fabric is preshrunk and grain-set for consistent cutting.'
  faq:
    - q: How do I identify fabric grain?
      a: 'Pull a few warp threads near the cut edge — the grain runs parallel to warp (lengthwise) threads.'
    - q: Can I cut across the grain?
      a: 'Cutting off-grain causes twisted, uneven garments. Always cut perpendicular to the grain.'
    - q: How do I match stripes/patterns across layers?
      a: 'Align pattern repeats by matching reference marks. Cut one layer at a time for precision.'
