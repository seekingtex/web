- slug: waterproof-breathable-fabric-guide
  category: guide
  type: buying-guide
  title: "Waterproof Breathable Fabric Guide: Technology and Selection"
  description: "Complete guide to waterproof breathable fabric technology — PU vs PTFE vs ePTFE membranes, hydrostatic head ratings, breathability ratings, and choosing for your application."
  definition: "Waterproof breathable fabric uses a membrane that blocks liquid water (hydrostatic head) while allowing water vapor (moisture vapor transmission rate) to pass through."
  tldr: "Three membrane technologies: PU (polyurethane) — cost-effective, 5-10K mm HH, 5-10K MVTR. ePTFE (expanded PTFE, Gore-Tex type) — premium, 20-30K mm HH, 15-25K MVTR. AES (air-permeable) — direct airflow, limited waterproofing. Hydrostatic head measures water column pressure (mm). MVTR measures vapor transmission in g/m²/24h. Higher numbers = better protection."
  problem: "You need outer fabric that keeps water out without trapping sweat inside. Without understanding membranes and ratings, you either overpay or buy fabric that fails in rain."
  explanation: "Hydrostatic head (HH) measures the water column pressure the fabric withstands before leaking. 5K mm = light rain. 10K mm = moderate rain. 20K+ mm = heavy/extreme conditions. MVTR measures moisture vapor that passes through in 24 hours. 5K MVTR = low activity. 10K MVTR = moderate activity. 15K+ MVTR = high activity. The challenge: higher waterproofing typically reduces breathability. Modern membranes balance both."
  solution: "Choose PU membrane for value rainwear, moderate activity. Choose ePTFE for premium outerwear, high-activity use. Match rating to application: urban rainwear: 5-10K/5-10K. Hiking: 10-15K/10-15K. Ski/mountaineering: 20K+/15K+. DWR finish is essential — it prevents wet-out that blocks breathability."
  recommendation: "Seekingtex Waterproof Breathable Fabric (10K/8K PU membrane) is ideal for mid-market rainwear. For technical outerwear, our 3-Layer Hardshell (20K/15K ePTFE) delivers premium performance at a competitive price."
  faq:
    - q: What hydrostatic head do I need?
      a: "5K mm for light rain. 10K mm for moderate rain. 20K+ for heavy rain or snow. Always better to have more than needed."
    - q: What is good MVTR?
      a: "5K for low activity. 10K for moderate. 15K+ for high-output activities. Higher MVTR means less clammy feel during exertion."
    - q: Does DWR affect breathability?
      a: "DWR prevents the face fabric from wetting out. Saturated face fabric blocks breathability. DWR is essential, not optional."
