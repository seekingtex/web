- slug: fabric-defect-resolution-guide
  category: guide
  type: safety
  title: "Fabric Defect Resolution: Handling Quality Issues with Suppliers"
  description: "Complete guide to fabric defect resolution — identifying common defects, communicating with suppliers, claim procedures, 4-point inspection appeals, and preventing recurrence."
  definition: "Fabric defect resolution involves identifying the type, severity, and cause of defects, properly documenting them, communicating with the supplier, and negotiating claim or replacement."
  tldr: "Common defects: shade variation (between rolls/within roll), holes/slubs, weft bars, crease marks, pin holes (coated fabric), off-tolerance width/weight, and bowing/skewing. Document: photograph defects with ruler, note roll number and yardage location. Use 4-point system for quantification. Contact supplier within 7 days of receiving inspection. Allow them to inspect before cutting."
  problem: "You receive fabric with defects and need to resolve it with the supplier. Without proper documentation and protocol, you lose leverage and may end up paying for defective material."
  explanation: "First-quality fabric has under 40 points per 100 square yards. Defects exceeding this threshold qualify for claim. Document with clear photos showing the defect and a ruler for scale. Note the roll number and yardage position. Contact the supplier immediately. Reputable suppliers will: review photos and notes, offer replacement or discount, investigate root cause. Always allow supplier inspection before cutting the fabric."
  solution: "Upon receiving: inspect 100% of rolls. Document defects with 4-point system. If defect rate exceeds 40 points/100 sq yd, stop cutting. Contact supplier with: roll numbers, photos, point total, and yardage affected. Request replacement or credit. For recurring issues, request root cause analysis from supplier."
  recommendation: "Seekingtex fabric consistently scores under 15 points per 100 square yards. If defects exceed our acceptable rate, we offer immediate replacement or credit. Our QC team provides full root cause analysis for any quality issue."
  faq:
    - q: What is an acceptable defect rate?
      a: "Under 40 points per 100 square yards per 4-point system. Premium mills achieve under 20 points."
    - q: How long do I have to report defects?
      a: "Typically 7-14 days from receipt. Read your purchase contract. Delayed reporting may void claim rights."
    - q: Can I cut fabric before inspection?
      a: "No — cutting without full inspection may void claim rights for defects that would have been detected pre-cut."
