- slug: textile-quality-control-guide
  category: guide
  type: safety
  title: "Textile Quality Control: Standards and Inspection Protocols"
  description: "Complete textile QC guide covering 4-point inspection system, physical testing standards (ASTM, ISO), color assessment, and defect classification for performance fabrics."
  definition: "Textile quality control encompasses incoming raw material inspection, in-process monitoring, final fabric inspection (4-point system per 100 square yards), and laboratory testing of physical properties."
  tldr: "The 4-point inspection system assigns demerit points per defect. Acceptable level: under 40 points per 100 square yards. Key tests: tensile strength (ASTM D5034), tear strength (ASTM D2261), color fastness (AATCC 61), dimensional stability (AATCC 135), UV protection (AS/NZS 4399), hydrostatic head (AATCC 127). Always request test reports with every shipment."
  problem: "Fabric quality varies between production lots. Without systematic QC, you receive fabric with defects, inconsistent color, or inadequate performance that causes garment rejection."
  explanation: "The 4-point system assigns 1-4 demerit points per defect based on length/diameter. Total points are calculated per 100 square yards. Under 40 points = first quality. 40-60 points = seconds. Over 60 = reject. Physical tests are performed per ASTM or AATCC standards in a conditioned laboratory (21C, 65% RH). Color is assessed under D65 daylight with a 4.5 minimum grey scale rating."
  solution: "Specify QC requirements in your purchase contract: 4-point inspection at 100% of rolls, AATCC/ASTM test methods, acceptable points threshold (usually 40), and test report submission before shipment. Request third-party inspection for critical orders."
  recommendation: "Seekingtex performs 4-point inspection on 100% of production with points typically under 15 per 100 square yards. Full test reports accompany every shipment. Third-party inspection welcome at buyer's request."
  faq:
    - q: What is the 4-point inspection system?
      a: A fabric defect grading system that assigns 1-4 points per defect based on size/length. Total points per 100 square yards determines fabric grade.
    - q: What is an acceptable defect level?
      a: First quality = under 40 points per 100 square yards. Premium mills achieve under 20 points.
    - q: How is color consistency measured?
      a: "Grey scale rating under D65 daylight. Acceptable: minimum 4.0 for solid shades, 3.5 for patterns."
