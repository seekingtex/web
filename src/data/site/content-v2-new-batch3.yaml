- slug: fabric-weight-gsm-guide
  category: guide
  type: technical
  title: "Understanding Fabric Weight (GSM): A Practical Guide"
  description: "How fabric GSM (grams per square meter) affects performance, drape, durability, and application. Reading spec sheets, understanding weight categories, and choosing the right GSM for your product."
  definition: "GSM (grams per square meter) is the standard unit for fabric weight. Also known as fabric weight or grammage. GSM directly correlates to thickness, durability, and opacity."
  tldr: "GSM ranges: lightweight (60-150 GSM) for shirts, linings, scarves. Mid-weight (150-300 GSM) for t-shirts, dresses, pants. Heavyweight (300-500 GSM) for jackets, workwear, upholstery. Super-heavy (500+ GSM) for industrial and outdoor gear. Higher GSM generally means more durable, less drape, more warmth, and higher cost. Always specify GSM in your fabric specification."
  problem: "You order fabric without specifying GSM and receive something too light for your application (sheer, flimsy) or too heavy (stiff, expensive). Without understanding GSM, you cannot communicate effectively with suppliers."
  explanation: "GSM is calculated by weighing a fabric sample of known area (typically a 100 cm² circle) and converting to grams per square meter. Fabric weight affects: drape (light fabrics flow, heavy fabrics drape stiff), durability (heavier fabrics resist abrasion longer), warmth (heavier fabrics trap more air), opacity (light fabrics may require lining), and cost (heavier fabrics use more material)."
  solution: "Determine the appropriate GSM range for your application: lightweight (60-100 GSM) for summer shirts and linings. Light-mid (100-200 GSM) for t-shirts, blouses, dresses. Mid-weight (200-300 GSM) for pants, work shirts, lightweight jackets. Heavy (300-500 GSM) for outerwear, workwear, upholstery. Request a GSM range (e.g., 180-200 GSM) rather than a single value."
  recommendation: "Seekingtex provides precise GSM specification on every fabric. Our standard range spans 120-300 GSM with custom weights available. Request our GSM sample card to feel the difference."
  faq:
    - q: What GSM is best for t-shirts?
      a: 140-180 GSM for standard t-shirts. 180-220 GSM for premium heavyweight t-shirts.
    - q: Does higher GSM always mean better quality?
      a: Not necessarily — the right GSM depends on application. 80 GSM may be perfect for a summer scarf but terrible for work pants.
    - q: How is GSM tested?
      a: A fabric sample of known area (100 cm²) is weighed on a calibrated scale. Result is multiplied by 100 for GSM.
