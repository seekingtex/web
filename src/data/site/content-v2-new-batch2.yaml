- slug: down-proof-fabric-guide
  category: guide
  type: buying-guide
  title: 'Down-Proof Fabric: Shell Fabrics for Insulated Garments'
  description: 'Down-proof fabric technology — tight weave construction, down leakage prevention, and shell fabric selection for puffer jackets and sleeping bags.'
  definition: 'Down-proof fabric has a construction tight enough to prevent down feathers and fine fibers from escaping while maintaining breathability and drape.'
  tldr: 'Down-proof requires high thread count with tight yarn spacing. Nylon down-proof (20D-40D) for lightweight jackets. Polyester down-proof (30D-70D) for value. Key features: calendered or coated surface, tear resistance, DWR for weather protection. Test method: shake test with down for 5 minutes — zero leakage.'
  problem: 'Your down jacket or sleeping bag leaks feathers through the fabric. The shell must prevent down migration while being lightweight and breathable.'
  explanation: 'Down-proof fabrics achieve leak resistance through tight construction: high thread count (300-400+ TC), tightly twisted yarns, calendered (flattened) surface treatment, and sometimes a thin coating. The construction must prevent down migration of fine filaments. Calendering presses the fabric surface flat, closing gaps between yarns. Down-proof performance is confirmed by the shake test — filling a fabric tube with down and shaking mechanically.'
  solution: 'Specify down-proof fabric with confirmed shake test results. Minimum: 300 thread count, calendered finish. For lightweight jackets: 20D-30D nylon ripstop down-proof. For sleeping bags: 30D-40D nylon. For heavy-duty: 50D-70D polyester. Add DWR finish for weather protection.'
  recommendation: 'Seekingtex Down-Proof Shell Fabric provides reliable down retention with a 40D Nylon construction, calendered finish, and DWR treatment. Ideal for puffer jackets, vests, and sleeping bags.'
  faq:
    - q: What is the shake test for down-proof?
      a: 'A fabric tube (approx 12" long) is filled with down, sealed, and shaken mechanically. Zero down leakage after 5 minutes = down-proof.'
    - q: Is down-proof fabric waterproof?
      a: 'Down-proof alone is not waterproof. DWR treatment provides water resistance. For waterproof, use a laminated down-proof shell.'
    - q: What denier is best for down jackets?
      a: '20D-30D for ultralight, 40D for standard, 50D-70D for heavy-duty durability. Higher denier is more durable but heavier.'
