- slug: fleece-fabric-guide
  category: guide
  type: buying-guide
  title: 'Fleece Fabric: Thermal Lining and Mid-Layer Technology'
  description: 'Fleece fabric guide — polyester fleece types (micro, mid, heavy), thermal performance, anti-pilling, and applications for mid-layers and lining.'
  definition: 'Fleece is a knitted polyester fabric with a brushed surface that traps air for thermal insulation. Weights range from 100 GSM (micro) to 400+ GSM (heavy expedition).'
  tldr: 'Micro fleece (100-200 GSM): lightweight, next-to-skin soft, minimal insulation. Mid-weight fleece (200-300 GSM): balanced warmth and weight, most versatile. Heavy fleece (300-400+ GSM): maximum warmth for cold conditions. Anti-pilling treatment is essential for fleece longevity. Recycled polyester fleece available.'
  problem: 'Your garment needs thermal insulation but synthetic fleece pills, pills can make it look worn, and you need to choose the right weight for the application.'
  explanation: 'Fleece works by trapping dead air in the brushed fiber surface for insulation. Micro fleece has a fine, dense brush for minimal bulk. Mid-weight uses longer fibers for medium warmth. Heavy fleece has deep, dense pile for maximum insulation. Anti-pilling fleece uses fiber engineering (lower denier per filament) and chemical treatment to reduce pill formation. Recycled polyester fleece matches virgin fleece performance.'
  solution: 'Choose fleece weight based on garment position: micro (100-150 GSM) for linings. Mid-weight (200-280 GSM) for mid-layers. Heavy (300-400 GSM) for standalone jackets. Specify anti-pilling treatment for all fleece. Consider recycled polyester fleece for sustainability.'
  recommendation: 'Seekingtex Fleece Thermal Lining is available in micro to heavy weights with anti-pilling treatment. Recycled polyester fleece options available for sustainable lines.'
  faq:
    - q: Is fleece breathable?
      a: 'Yes — fleece is highly breathable, making it ideal for active mid-layer use. Air moves freely through the knit structure.'
    - q: Does fleece absorb water?
      a: 'Polyester fleece absorbs very little water (0.4% of weight). It dries quickly and provides insulation even when damp.'
    - q: How do I prevent fleece pilling?
      a: 'Choose anti-pilling treated fleece. Wash inside out, use mild detergent, avoid fabric softener. Air dry or low heat.'
