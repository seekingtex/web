case_studies:
  - id: european-outdoor-brand
    client: European Outdoor Brand
    product: Custom UPF 50+ Woven Fabric
    industry: Outdoor Apparel
    challenge: Leading European outdoor brand needed a lightweight UPF 50+ woven fabric with DWR finish for their summer hiking collection 鈥?OEKO-TEX certified, delivered in 60 days.
    solution: Developed a 110 g/m虏 plain-weave recycled polyester fabric, applied nano-DWR finish, and coordinated third-party UPF and hydrostatic head testing. Completed lab dip to bulk in 52 days.
    result: 52 days from signed PO to FOB Shanghai. 12,000 meters across 3 colors. Repeat order received before first container arrived.
    image: /images/seekingtex/products/fabric-rolls.webp
    tags: [OEM, Outdoor, UPF, Recycled]
    outcome_metrics:
      - label: Lead Time
        value: 52 days
      - label: Quantity
        value: 12,000m
      - label: Colors
        value: "3"

  - id: workwear-uniform-program
    client: ASEAN Uniform Manufacturer
    product: Flame-Retardant Workwear Fabric
    industry: Workwear / Corporate
    challenge: ASEAN uniform manufacturer needed a FR-treated poly-cotton twill fabric for a government workwear tender 鈥?with EN ISO 11612 certification and antimicrobial finish.
    solution: Engineered a 65/35 poly-cotton twill with Proban FR treatment, added antibacterial finish, and provided full EN ISO 11612 and OEKO-TEX certification documentation.
    result: Tender awarded for 50,000 sets. 98% first-pass yield during garment cutting. Repeat order confirmed for 30,000 additional sets.
    image: /images/seekingtex/products/fabric-rolls.webp
    tags: [OEM, Workwear, FR, Antibacterial]
    outcome_metrics:
      - label: Garment Sets
        value: 50,000
      - label: First-Pass Yield
        value: 98%
      - label: Certification
        value: EN ISO 11612

  - id: us-activewear-startup
    client: US Activewear Startup
    product: Moisture-Wicking Recycled Knit
    industry: Startup / Sportswear
    challenge: US activewear startup needed a recycled polyester knit fabric with moisture-wicking finish, quick-dry performance, and GRS certification for their eco-friendly yoga line.
    solution: Sourced GRS-certified recycled polyester yarn, developed a 160 g/m虏 single jersey knit, applied moisture-wicking finish, and provided full GRS certification chain-of-custody documentation.
    result: Launched in 30+ US boutique retailers. 15,000+ units sold in first 6 months with 95% sell-through rate. Featured in two sustainability-focused publications.
