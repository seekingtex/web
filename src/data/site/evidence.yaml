certifications:
  - name: OEKO-TEX Standard 100
    body: OEKO-TEX Association
    desc: All products certified under OEKO-TEX Standard 100 for harmful substances 鈥?Class I (baby) through Class IV (furnishing). Annual audits and random sampling ensure ongoing compliance.
  - name: ISO 9001:2015
    body: SGS
    desc: Quality management system certified for design, manufacturing, and distribution of functional textile products. Covers weaving, dyeing, coating, and finishing operations.
  - name: ISO 14001:2015
    body: SGS
    desc: Environmental management system certification demonstrating commitment to sustainable production, waste reduction, and pollution prevention across all factory operations.
  - name: BSCI
    body: amfori
    desc: Social compliance certification demonstrating ethical manufacturing, fair labour practices, and workplace safety across our entire supply chain.
  - name: REACH
    body: European Chemicals Agency
    desc: All materials comply with REACH regulations (EC 1907/2006) for chemical safety. SVHC screening reports provided with every shipment.
  - name: GRS (Global Recycled Standard)
    body: Textile Exchange
    desc: Chain-of-custody certification for recycled content claims. Available on our recycled polyester and recycled nylon fabric lines.

