- slug: textile-quality-assurance
  category: guide
  type: buying-guide
  title: "Textile Quality Assurance: Standards, Testing, and Inspection"
  description: "Complete guide to textile QA — AATCC and ASTM testing standards, 4-point fabric inspection, dimensional stability, color fastness, and supplier quality evaluation."
  definition: "Textile quality assurance encompasses standards-based testing (AATCC, ASTM, ISO), inline production inspection (4-point system), and final lot verification of physical properties, color, and dimensional stability."
  tldr: "Key textile quality tests: tensile strength (ASTM D5034), tear strength (ASTM D2261), color fastness to wash (AATCC 61), light (AATCC 16), crocking (AATCC 8), perspiration (AATCC 15), dimensional stability (AATCC 135), and pilling (ASTM D4970). The 4-point inspection system assigns penalty points per 100 yards. Acceptable quality level (AQL): 2.5 for apparel fabrics."
  problem: Your fabric order arrives and the color is off, the width is wrong, or the fabric shrinks after the first wash. Without proper QA specifications, you have no recourse with the supplier.
  explanation: "Textile QA starts with clear specifications agreed between buyer and supplier before production. Key specs: fiber content, construction, weight (finished GSM), width, color tolerance (ΔE value), shrinkage tolerance (%), and performance properties (UPF, HH, MVTR). The 4-point system inspects defects: points assigned per defect based on size and severity. AQL 2.5 means fewer than 2.5 defects per 100 yards. Testing should follow AATCC or ASTM standards for reproducible results."
  solution: "Write detailed QA specifications into your purchase contract. Specify test methods (AATCC, ASTM, ISO) and acceptable limits. Require pre-shipment inspection with 4-point grading and AQL 2.5. Request test reports for all applicable properties. Retain pre-production samples for comparison."
  recommendation: "Seekingtex provides full QA documentation with every shipment: 4-point inspection report, physical test results, color fastness reports, and dimensional stability data. Our in-house lab tests per AATCC/ASTM standards."
  faq:
    - q: What is the 4-point fabric inspection system?
      a: "A standardized defect grading system. Points are assigned based on defect size: 1 point for up to 3 inches, 2 points for 3-6 inches, 3 points for 6-9 inches, 4 points for over 9 inches. Maximum 40 points per 100 yards."
    - q: What is AQL in textile inspection?
      a: Acceptable Quality Level. AQL 2.5 means the lot is acceptable if defects are 2.5 per 100 yards or fewer. This is standard for apparel fabrics.
    - q: How much fabric shrinkage is acceptable?
      a: 3% maximum in both length and width for most apparel fabrics. Some constructions (knits) may have 5% tolerance.
    - q: What color tolerance is standard?
      a: ΔE ≤ 1.0 for critical color matching (solid colors), ΔE ≤ 1.5 for non-critical. Measured by spectrophotometer under D65 light.
