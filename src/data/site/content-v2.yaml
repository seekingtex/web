- slug: fabric-weight-gsm-guide
  category: problem
  type: buying-guide
  title: "GSM Guide: What Most Buyers Get Wrong About Fabric Weight"
  description: Stop ordering fabric that feels wrong. The real difference between lightweight, mid-weight, and heavy-weight fabrics — GSM ranges by application, construction considerations, and what actually works for your product.
  definition: GSM (grams per square meter) is the standard unit for fabric weight. Lightweight (60-150 GSM) suits linings and summer wear. Mid-weight (150-250 GSM) suits most apparel. Heavy-weight (250-400+ GSM) suits outerwear, workwear, and winter garments.
  tldr: Fabric weight (GSM) directly determines drape, durability, and application. Use 60-120 GSM for quick-dry sportswear, 120-200 GSM for UPF sun protection, 150-250 GSM for stretch activewear, 200-350 GSM for waterproof shells, and 300-400+ GSM for workwear. Always check weight after finishing — coatings add 20-50 GSM.
  problem: You ordered fabric based on a sample but the bulk fabric feels different. The weight is wrong, the drape is off, or the fabric is too stiff. Understanding GSM, fabric construction, and finishing effects prevents costly mistakes.
  explanation: GSM measures weight, which correlates to thickness, durability, and opacity but does not directly determine hand feel. A 200 GSM woven feels different from a 200 GSM knit. Finishing treatments (coating, lamination, brushing) add weight. Coatings can add 20-50 GSM. Always specify target GSM after finishing, and request physical samples for hand feel approval.
  solution: Specify target GSM range (e.g., 180-200 GSM) in your technical spec. Request strike-off samples and confirm weight after finishing. Compare hand feel of the finished sample against your reference. For critical applications, set a tolerance of ±5% on GSM.
  recommendation: Use Seekingtex's standard fabric weight guide to match GSM to your application. Request swatch sets for each weight category. Always approve a physical pre-production sample before production.
  faq:
    - q: What GSM do I need for a summer t-shirt?
      a: 140-180 GSM for lightweight summer tees. Single jersey knit construction with moisture-wicking finish.
    - q: What GSM is best for a rain jacket?
      a: 200-300 GSM depending on the construction. Lighter 2-layer shells can be 150-200 GSM; heavier 3-layer hardshells are 250-350 GSM including lining.
    - q: Does higher GSM mean better quality?
      a: Not necessarily. Higher GSM means heavier and more durable, but may be too stiff for the intended use. Match GSM to application, not quality perception.
    - q: How does coating affect GSM?
      a: PU coating adds 20-40 GSM. TPU lamination adds 30-50 GSM. DWR treatment adds negligible weight. Always specify GSM after finishing.
