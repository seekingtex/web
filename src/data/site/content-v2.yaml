- slug: dwr-vs-waterproof-fabric
  category: comparison
  type: buying-guide
  title: "DWR vs Waterproof Fabric: What Actually Works in Rain"
  description: "The difference between DWR (durable water repellent) finish and waterproof membranes. When each is sufficient, when you need both, and what to choose for your product."
  definition: "DWR is a hydrophobic coating on the fabric surface that makes water bead up and roll off. Waterproof fabric uses a membrane or coating that physically blocks water penetration under hydrostatic pressure."
  tldr: "DWR alone makes fabric water-resistant (not waterproof) — it beads light rain but soaks through in sustained rain. Waterproof membranes (PU, TPU, ePTFE) block water under pressure. Most high-performance rainwear uses both: DWR on the face fabric to prevent wetting out, plus a waterproof membrane underneath."
  problem: You need fabric that keeps the wearer dry in rain. DWR-treated fabrics look waterproof when new but fail in sustained rain. True waterproof fabrics are more expensive and less breathable.
  explanation: "DWR creates a surface tension that causes water to bead and roll off. It is effective for light drizzle and brief exposure but fails when water pressure builds (sustained rain, pressure from sitting, backpack straps). Once the face fabric wets out, DWR stops working. Waterproof membranes physically block liquid water at the molecular level. Micropores allow vapor to pass but are too small for liquid water. The hydrostatic head (HH) rating measures pressure resistance."
  solution: "For light rain and occasional use: DWR-treated fabric is sufficient (e.g., windbreakers, light jackets). For sustained rain and outdoor activities: combine DWR on face fabric with a waterproof membrane (at least 5,000mm HH). The DWR keeps the outer fabric dry, allowing the membrane to function properly."
  recommendation: Seekingtex offers DWR-only treated fabrics for light rain protection and full waterproof laminate fabrics (with DWR face) for reliable rain protection. Specify the conditions your garment will face.
  faq:
    - q: How long does DWR last?
      a: 5-10 washes for standard DWR, 20-30 washes for premium DWR. Reapply with spray or wash-in DWR treatment.
    - q: Can DWR be reapplied?
      a: Yes — spray-on and wash-in DWR treatments are available from Nikwax, Grangers, and other brands.
    - q: Is DWR environmentally harmful?
      a: Traditional C8-based DWR has environmental concerns. C6 and C0 (PFC-free) DWR options are available. Seekingtex offers PFC-free DWR.
    - q: Do I need both DWR and a membrane?
      a: For serious rain protection, yes. Without DWR, the face fabric wets out and the membrane cannot breathe effectively.
