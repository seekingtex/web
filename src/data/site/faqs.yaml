faqs:
  - q: Does Seekingtex provide OEM/ODM services for custom performance fabrics?
    a: >-
      Yes. Kunshan Seeking Tex&Tech Co., Ltd offers full-scale OEM and ODM
      customization — from yarn selection and fabric construction to finishing
      treatments and bulk production. We handle private labeling, custom
      packaging, and compliance documentation for OEKO-TEX, Bluesign, and other
      certifications.
  - q: What certifications does Seekingtex hold for fabric manufacturing?
    a: >-
      Seekingtex's facility is OEKO-TEX Standard 100 certified and follows
      Bluesign system principles. We hold BSCI social compliance certification
      and can provide REACH, RoHS, and CA Prop 65 compliance documentation on
      request. Our lab conducts ISO-standard testing for tensile strength, color
      fastness, and UV protection.
  - q: What is the minimum order quantity (MOQ) for custom fabrics?
    a: >-
      MOQ starts at 500 meters per color for standard performance fabric
      constructions. Custom yarn-dye or specialty finishing projects typically
      require 1,000–3,000 meters depending on complexity. We offer sample
      yardage (50–100 m) for prototyping and lab testing before bulk commitment.
  - q: What types of performance fabrics does Seekingtex manufacture?
    a: >-
      We specialize in UPF 50+ sun-protection fabrics, waterproof and
      water-repellent textiles, quick-dry moisture-wicking knits and wovens,
      antibacterial and antimicrobial fabrics, 4-way stretch performance
      textiles, breathable membrane laminates, and eco-friendly recycled
      polyester and nylon fabrics. Custom blends available on request.
  - q: Can Seekingtex handle large-volume wholesale orders for international buyers?
    a: >-
      Yes. Our facility produces over 5 million meters of fabric annually with a
      dedicated team of 200+ skilled workers. We export to 40+ countries and
      manage logistics including FOB Shanghai, CIF major ports, and door-to-door
      delivery through our freight partners.
  - q: What is the lead time for OEM fabric production?
    a: >-
      Standard production lead time is 30–45 days from sample approval. Custom
      development projects (new constructions, custom finishes) typically take
      60–90 days including lab dips, strike-offs, and pilot production. Rush
      orders available for established partners with confirmed yarn stock.
  - q: Does Seekingtex offer eco-friendly / sustainable fabric options?
    a: >-
      Yes. Sustainability is core to our process. We offer GRS-certified
      recycled polyester and nylon, organic cotton blends, low-impact dyeing
      processes, and waterless finishing technologies. Our manufacturing
      facility uses solar energy and closed-loop water treatment systems.
  - q: How does Seekingtex ensure fabric quality and consistency?
    a: >-
      Every production lot undergoes AATCC/ASTM-standard testing for color
      fastness, dimensional stability, tensile and tear strength, pilling
      resistance, and UV protection factor (UPF). We use 4-point fabric
      inspection system and maintain full traceability from yarn lot to finished
      roll.
  - q: Can Seekingtex help with custom branding and packaging?
    a: >-
      Yes. We offer turnkey private-label services: custom-branded selvage,
      hang tags, care labels, fabric swatch cards, and roll packaging with your
      brand artwork. Our in-house design team can develop full packaging
      identity for new brand launches.
  - q: Does Seekingtex accept factory audits from international buyers?
    a: >-
      Absolutely. We welcome on-site and third-party factory audits including
      BSCI, SMETA, and customer-specific social compliance inspections. Our
      facility is audit-ready with documented QC processes, material
      traceability, and worker health & safety records. Virtual factory tours
      are available for initial qualification.
  - q: What is UPF 50+ fabric and how is it tested?
    a: >-
      UPF (Ultraviolet Protection Factor) measures how much UV radiation
      penetrates a fabric. UPF 50+ blocks 98% of UVA and UVB rays. Our fabrics
      are tested per AS/NZS 4399 and AATCC 183 standards using
      spectrophotometric analysis. The rating applies to the fabric in its
      finished state — including after 40 washes.
  - q: Are Seekingtex fabrics suitable for outdoor apparel?
    a: >-
      Absolutely. Our performance fabrics are engineered specifically for
      outdoor, activewear, workwear, and lifestyle apparel brands. Options
      include waterproof breathable laminates, wind-resistant shells,
      quick-dry linings, and stretch wovens — all available with UPF 50+
      protection.
  - q: What is the difference between water-repellent and waterproof fabric?
    a: >-
      Water-repellent (DWR) fabrics resist light moisture and drizzle through a
      hydrophobic coating on the face yarn. Waterproof fabrics use a membrane or
      coating (e.g., PU, TPU, or ePTFE) that prevents water penetration under
      hydrostatic pressure. Seekingtex offers both, with waterproof ratings
      tested to JIS L1092 and AATCC 127 standards.
  - q: Can I get custom color matching for my brand?
    a: >-
      Yes. Our lab can match any Pantone or brand-specific color. We provide
      digital lab dips for approval within 3–5 business days, followed by
      physical strike-offs in your chosen fabric construction. Minimum for
      custom color is 500 m per color.
  - q: Does Seekingtex offer antibacterial or antimicrobial fabric treatments?
    a: >-
      Yes. We offer silver-ion and zinc-based antimicrobial finishes that are
      durable to 50+ home launderings (tested per AATCC 100 and ISO 20743).
      These treatments are skin-safe and compliant with global biocidal product
      regulations.
  - q: What is the care process for Seekingtex performance fabrics?
    a: >-
      Most Seekingtex fabrics are machine-washable. We recommend cold water
      wash, mild detergent, no bleach, and tumble dry low or line dry. Specific
      care instructions vary by finish — waterproof laminates require
      specialized detergents to maintain DWR performance. Full care labels are
      provided with every fabric roll.
