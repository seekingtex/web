hero:
  tagline: แบรนด์
  title: แบรนด์ Seekingtex
  subtitle: คุณภาพ นวัตกรรม และความน่าเชื่อถือ — นี่คือ Seekingtex
story:
  tagline: เรื่องราวของเรา
  title: สร้างความไว้วางใจตั้งแต่ 2012
  body: |
    Seekingtex ก่อตั้งขึ้นด้วยวิสัยทัศน์ที่ชัดเจน — เพื่อผลิตผ้าฟังก์ชันระดับพรีเมียมและอุปกรณ์อุตสาหกรรมสิ่งทอที่ทนทานต่อสภาพจริง ในกว่าทศวรรษ เราเติบโตจากโรงงานเล็ก ๆ สู่ผู้ผลิตที่ได้รับการยอมรับระดับโลก
mission:
  tagline: ภารกิจ
  title: ภารกิจของเรา
  body: มอบผลิตภัณฑ์อุตสาหกรรมสิ่งทอคุณภาพสูง นวัตกรรม และราคาเข้าถึงได้ ที่ทำให้กิจกรรมทางน้ำเข้าถึงได้สำหรับทุกคน
