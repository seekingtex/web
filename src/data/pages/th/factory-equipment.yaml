hero:
  tagline: "อุปกรณ์"
  title: "เครื่องจักรและอุปกรณ์การผลิต"
  subtitle: "อุปกรณ์เกรดอุตสาหกรรมสำหรับการตัด การเชื่อม การพิมพ์ และการประกอบ"
  back_label: "กลับไปที่โรงงาน"
  back_link: /factory

categories:
  - title: "การตัดและการเตรียมวัสดุ"
    items:
      - name: "เครื่องตัด PVC อัตโนมัติ"
        spec: "ควบคุมด้วย CNC, 6.5 m × 2.5 m, ความแม่นยำ 0.1 mm"
        desc: "เครื่องตัดอัตโนมัติควบคุมด้วยคอมพิวเตอร์สำหรับผ้า PVC, Hypalon และ drop-stitch ซอฟต์แวร์จัดวางเพิ่มประสิทธิภาพการใช้วัสดุให้เหลือเศษไม่เกิน 5%"
      - name: "เครื่องคลี่ผ้า"
        spec: "ความกว้างสูงสุด 3 m, การป้อนควบคุมแรงดึง"
        desc: "วางผ้าเป็นชั้นเดียวหรือหลายชั้นด้วยแรงดึงที่ควบคุมเพื่อป้องกันการบิดก่อนตัด"
  - title: "การเชื่อมท่อและการประกอบ"
    items:
      - name: "เครื่องซีลความร้อน"
        spec: "การเชื่อมอากาศร้อน, ปรับได้ 200–600 °C, 0.5–5 m/min"
        desc: "เครื่องซีลความร้อนด้วยอากาศร้อนสำหรับประกอบและเชื่อมตะเข็บท่อ PVC และ Hypalon ใช้สำหรับยึด อัดแน่น และหลอมรวมห้องท่อและข้อต่อลอย"
      - name: "เครื่องอัด RF ไดอิเล็กตริก"
        spec: "15 kW, แผ่น 2000 × 600 mm"
        desc: "เครื่องอัดเชื่อมความถี่วิทยุสำหรับตะเข็บตามยาวหลัก ข้อต่อท้ายเรือถึงท่อ และการผลิตห้องขนาดใหญ่"
      - name: "เครื่องเชื่อม RF ควบคุมด้วย CNC"
        spec: "8 kW, โต๊ะ XY 2500 × 1200 mm"
        desc: "การเชื่อมตะเข็บโค้งที่ตั้งโปรแกรมได้สำหรับรูปทรงซับซ้อน การปั๊มโลโก้ และการอุดรอยแบบแม่นยำ"
  - title: "การผลิตโครงตัวถัง ผาเทคนค"
    items:
      - name: "แม่พิมพ์ไฟเบอร์กลาสฉาบมือ"
        spec: "แม่พิมพ์หลายชิ้นสำหรับโครงตัวถัง ผาเทคนค ถึง 6 m LOA"
        desc: "การฉาบไฟเบอร์กลาสแบบดั้งเดิมด้วยมือด้วยระบบเรซินโพลีเอสเตอร์และไวนิลเอสเตอร์ แต่ละชั้นถูกรอลด้วยมือและดูดสุญญากาศเพื่อคุณภาพและความแข็งแรงของชั้นวัสดุที่สม่ำเสมอ"
      - name: "ห้องพ่นเจลโคท"
        spec: "ควบคุมอุณหภูมิ, การระบายอากาศผ่านตัวกรอง"
        desc: "การเคลือบเจลโคทบนโครงตัวถัง ผาเทคนค ให้ผิวมันวาว ทนทานต่อ UV ด้วยการควบคุมความหนาอย่างแม่นยำ"
      - name: "เครื่องกัด CNC (5 แกน)"
        spec: "พื้นที่ 3 m × 2 m × 1 m, เพลาคูลังน้ำ"
        desc: "การกลึงตัดชิ้นส่วนโครงตัวถัง แม่พิมพ์คอนโซล ฐานเบาะ และที่ยึดแบบกำหนดเอง"
  - title: "การพิมพ์และตกแต่ง SUP"
    items:
      - name: "เครื่องพิมพ์ดิจิทัล"
        spec: "อิงค์เจ็ทความละเอียดสูง, ความกว้างพิมพ์ถึง 2 m"
        desc: "การพิมพ์ดิจิทัลลงบนผ้าโดยตรงสำหรับกราฟิกบนพื้น SUP สีเต็ม พิมพ์ลวดลายตามสั่ง การไล่ระดับ และภาพคุณภาพถ่ายด้วยหมึกฐานน้ำทนทานต่อ UV"
      - name: "เครื่องพิมพ์สกรีน"
        spec: "แบบแมนนวลและกึ่งอัตโนมัติ, การลงทะเบียนหลายสี"
        desc: "การพิมพ์สกรีนสำหรับโลโก้กระดาน SUP เครื่องหมายแบรนด์ และลวดลายที่ทำซ้ำ ให้งานพิมพ์ที่ทนทาน ทึบแสง ด้วยความอิ่มตัวของสีที่สดใส"
  - title: "การประกอบและการติดตั้งอุปกรณ์"
    items:
      - name: "เครื่องยกเครื่องยนต์"
        spec: "ความจุ 500 kg, แท่งกระจายปรับได้"
        desc: "การติดตั้งเครื่องยนต์เรือหางแรมอย่างปลอดภัยจาก 2.5 ถึง 60 แรงม้า"
      - name: "โครงจำลองคอนโซล"
        spec: "ปรับความสูงและมุมได้"
        desc: "การเดินสายล่วงหน้าของพวงมาลัย คันเร่ง และแผงเครื่องมือก่อนติดตั้ง"
      - name: "เครื่องอัดสลักสายไฮดรอลิก"
        spec: "ถึง 1\" ID, มาตรวัดความดันดิจิทัล"
        desc: "ชุดสายพวงมาลัยไฮดรอลิกความยาวตามสั่งพร้อมข้อต่อที่อัด"
      - name: "แผงเดินสายไฟฟ้า"
        spec: "3 m × 1.5 m, แผนผังการเดินสายที่พิมพ์ล่วงหน้า"
        desc: "การประกอบและทดสอบชุดสายไฟฟ้าแบบเต็มภายนอกเรือ"
  - title: "การทดสอบและการควบคุมคุณภาพ"
    items:
      - name: "เครื่องทดสอบแรงดึงสากล"
        spec: "50 kN, ASTM D751"
        desc: "การทดสอบแรงดึงจนขาด การยืดเมื่อขาด และการแพร่ของการฉีกขาดสำหรับล็อตผ้า"
      - name: "แท่นทดสอบการเก็บอากาศ"
        spec: "ตั้งโปรแกรมได้, ความดันคงที่ 30 นาที"
        desc: "การทดสอบคงความดันอัตโนมัติสำหรับทุกห้องท่อก่อนประกอบ"
      - name: "เครื่องทดสอบการลอกตะเข็บ"
        spec: "การลอกแบบมอเตอร์ 180° ที่ 100 mm/min"
        desc: "การทดสอบความแข็งแรงในการลอกตะเข็บที่เชื่อมและติดกาวตาม ISO 6185"
      - name: "ห้องจำลองสภาพอากาศด้วยอาร์กซีนอน"
        spec: "2000 h การสัมผัส"
        desc: "การทดสอบความทนทานต่อ UV สำหรับการเปลี่ยนสีและการรักษาความแข็งแรง"

cta:
  title: "สนใจเยี่ยมชมโรงงานไหม?"
  desc: "เรายินดีต้อนรับผู้เยี่ยมชมที่โรงงานของเราในชิงเต่า ชมอุปกรณ์และกระบวนการของเราด้วยตนเอง"
  label: "จองการเยี่ยมชม →"
  link: /contact
