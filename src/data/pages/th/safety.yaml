hero:
  tagline: ความปลอดภัย
  title: มาตรฐานความปลอดภัยและการรับรอง
  subtitle: สินค้า Seekingtex ทั้งหมดผ่านการทดสอบอย่างเข้มงวดและปฏิบัติตามมาตรฐานความปลอดภัยสากล
certifications:
  - title: การรับรอง CE
    description: อุปกรณ์ความปลอดภัย Seekingtex ทั้งหมดปฏิบัติตามข้อกำหนดการติดฉลาก CE ภายใต้ระเบียบว่าด้วยอุปกรณ์ป้องกันส่วนบุคคลของสหภาพยุโรป (EU) 2016/425
  - title: 'ISO 6185'
    description: เสื้อชูชีพปฏิบัติตามมาตรฐานการลอยตัว 
  - title: การปฏิบัติตาม SOLAS
    description: เสื้อชูชีพ Pro ปฏิบัติตามกฎระเบียบ SOLAS สำหรับการปฏิบัติการทางทะเลนอกชายฝั่งและเชิงพาณิชย์
