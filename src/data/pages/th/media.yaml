hero:
  tagline: ทรัพยากร
  title: ศูนย์สื่อ
  subtitle: ดาวน์โหลดสื่อแบรนด์ รูปภาพสินค้า แคตตาล็อก และวิดีโอ
sections:
  - id: product-images
    title: รูปภาพสินค้า
    desc: รูปภาพสินค้าความละเอียดสูงสำหรับเว็บ สิ่งพิมพ์ และหน้าร้าน
    items:
      - แกลเลอรีบอร์ด SUP
      - แกลเลอรีเรือ ผาเทคนค
      - แกลเลอรีเรือผ้าเทคนิคเป่าลม
      - อุปกรณ์เสริมและอุปกรณ์ความปลอดภัย
  - id: logo-brand-kit
    title: โลโก้และชุดแบรนด์
    desc: ไฟล์โลโก้ Seekingtex อย่างเป็นทางการ จานสี ตัวอักษร และแนวทางของแบรนด์
    items:
      - โลโก้หลัก (PNG/SVG/EPS)
      - ไอคอน
      - จานสี
      - ข้อมูลจำเพาะตัวอักษร
      - แนวทางแบรนด์ PDF
  - id: catalogs
    title: แคตตาล็อก PDF
    desc: แคตตาล็อกสินค้า เอกสารข้อมูล และเอกสารทางเทคนิคสำหรับดาวน์โหลด
    items:
      - แคตตาล็อกสินค้า 2026
      - ภาพรวมขีดความสามารถ OEM/ODM
      - เอกสารชุด ผาเทคนค
      - ข้อมูลจำเพาะทางเทคนิค
  - id: videos
    title: วิดีโอ
    desc: การสาธิตสินค้า ทัวร์โรงงาน ภาพยนตร์แบรนด์ และคำรับรองลูกค้า
    items:
      - การสาธิตสินค้า
      - ทัวร์โรงงาน
      - ภาพยนตร์แบรนด์
      - เรื่องราวลูกค้า
      - คำแนะนำวิธีใช้
