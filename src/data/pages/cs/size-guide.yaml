how_to_choose:
  title: Jak vybrat správnou velikost
  cards:
    - title: SUP prkna
      description: Zvolte délku podle své hmotnosti a zamýšleného použití. Širší prkna (32"+) nabízejí větší stabilitu. Delší prkna (11-12 stop) lépe kloužou pro výlety. Těžší pádlaři potřebují prkna s vyšším objemem.
    - title: technicke textilie
      description: Jednomístné technicke textilie (9 stop) jsou nejlepší pro sólo cestování a řeky. Dvojmístné technicke textilie (12 stop) pojmou dva pádlaře nebo jednoho dospělého s vybavením. Zkontrolujte nosnost včetně vybavení.
    - title: textilni produkt a technicka textilie
      description: Zvolte délku textilni produkt podle počtu cestujících a zamýšleného použití. Větší technicka textilie (4,5 m+) jsou vhodné pro moře a záchranu. Menší textilni produkt (2,7 m) slouží jako tendry a rybářské platformy.
