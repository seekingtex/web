categories:
  inflatable: Nafukovací SUP a technicke textilie navržené pro přenosnost bez obětování výkonu. Vyberte správnou velikost podle své hmotnosti a stylu pádlování.
  rib: Pevnotrupé nafukovací čluny pro pobřežní navigaci, hlídkování a profesionální námořní operace. Vyberte podle délky a výkonu motoru.
  accessory: Příslušenství a bezpečnostní vybavení doplňující vaše plavidlo. Univerzální velikosti s více možnostmi.

