hero:
  tagline: "Vybavení"
  title: "Výrobní zařízení a stroje"
  subtitle: "Průmyslové vybavení pro řezání, svařování, tisk a montáž"
  back_label: "Zpět do továrny"
  back_link: /factory

categories:
  - title: "Řezání a příprava materiálu"
    items:
      - name: "Automatický řezací stroj PVC"
        spec: "Řízeno CNC, 6.5 m × 2.5 m, přesnost 0.1 mm"
        desc: "Počítačem řízený automatický řezací stroj pro tkaniny PVC, Hypalon a drop-stitch. Nestingový software optimalizuje využití materiálu pod 5 % odpadu."
      - name: "Rozkladač tkaniny"
        spec: "Max. šířka 3 m, podávání s kontrolovaným napětím"
        desc: "Klade tkaninu v jedné nebo více vrstvách s kontrolovaným napětím, aby se zabránilo deformaci před řezáním."
  - title: "Svařování trubek a lepení"
    items:
      - name: "Stroj na horkovzdušné svařování"
        spec: "Horkovzdušné svařování, variabilní 200–600 °C, 0.5–5 m/min"
        desc: "Stroj na horkovzdušné tepelné svařování pro spojování a svařování švů trubek PVC a Hypalon. Používá se pro fixování, utěsňování a slévání komor trubek a plováků."
      - name: "Dielektrický lis RF"
        spec: "15 kW, deska 2000 × 600 mm"
        desc: "Lis svařovaný vysokofrekvenčním svařováním pro hlavní podélné švy, spoje příď–trubka a výrobu velkých komor."
      - name: "RF svařovací stroj řízený CNC"
        spec: "8 kW, stůl XY 2500 × 1200 mm"
        desc: "Programovatelné svařování zakřivených švů pro složité tvary, ražení log a přesné záplaty."
  - title: "Výroba trupů technicka textilie"
    items:
      - name: "Formy pro ruční kladení skelného vlákna"
        spec: "Více forem pro trupy technicka textilie do 6 m LOA"
        desc: "Tradiční ruční kladení skelného vlákna s polyesterovými a vinylesterovými pryskyřicemi. Každá vrstva je ručně válena a vakuově balena pro konzistentní kvalitu a pevnost laminátu."
      - name: "Kabina pro stříkání gelu"
        spec: "Kontrolovaná teplota, filtrované vzduchové větrání"
        desc: "Aplikace gelu na trupy technicka textilie. Poskytuje vysoce lesklý, UV odolný povrch s přesnou kontrolou tloušťky."
      - name: "CNC frézka (5 os)"
        spec: "Prostor 3 m × 2 m × 1 m, vodou chlazený vřeteno"
        desc: "Obrábění vložek trupu, forem konzoly, sedacích základů a vlastních držáků."
  - title: "Tisk a dekorace SUP"
    items:
      - name: "Digitální tiskárna"
        spec: "Inkoustová tiskárna s vysokým rozlišením, šířka tisku do 2 m"
        desc: "Přímý digitální tisk na tkaninu pro plnobarevné grafiky palub SUP. Tiskne vlastní vzory, přechody a fotorealistické obrázky s UV odolnými vodou ředitelnými barvami."
      - name: "Stroj na sítotisk"
        spec: "Ruční a poloautomatický, vícebarevné registrování"
        desc: "Sítotisk pro loga prken SUP, značky a opakující se vzory. Poskytuje odolné, neprůhledné tisky s živým barevným sycením."
  - title: "Montáž a osazování"
    items:
      - name: "Zvedák motoru"
        spec: "Kapacita 500 kg, nastavitelná rozpěrná tyč"
        desc: "Bezpečná montáž závěsných motorů od 2.5 do 60 hp."
      - name: "Rám pro přípravu konzoly"
        spec: "Nastavitelná výška a úhel"
        desc: "Předběžné osazení řízení, plynu a přístrojových panelů před instalací."
      - name: "Hydraulický lis na hadice"
        spec: "Do 1\" ID, digitální tlakoměr"
        desc: "Sestavy hydraulických řídicích hadic na míru s lisovanými fitinkami."
      - name: "Deska elektrických kabeláží"
        spec: "3 m × 1.5 m, předtištěné schémata zapojení"
        desc: "Montáž a testování kompletních elektrických kabeláží mimo člun."
  - title: "Testování a kontrola kvality"
    items:
      - name: "Univerzální trhačka"
        spec: "50 kN, ASTM D751"
        desc: "Testování trhací síly, protažení při přetržení a šíření trhlin pro šarže tkanin."
      - name: "Zkušební stav pro retenci vzduchu"
        spec: "Programovatelné, 30minutové držení tlaku"
        desc: "Automatizovaný test držení tlaku pro každou komoru trubky před montáží."
      - name: "Přístroj na odlupování švů"
        spec: "Motorizované 180° odlupování při 100 mm/min"
        desc: "Testování pevnosti odlupování svařených a lepených švů dle ISO 6185."
      - name: "Komora pro stárnutí s xenonovou výbojkou"
        spec: "2000 h expozice"
        desc: "Testování UV odolnosti pro změnu barvy a zachování pevnosti."

