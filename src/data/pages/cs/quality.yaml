hero:
  tagline: Zajištění kvality
  title: Testování výkonu a kvality
  subtitle: Každý nafukovací člun a SUP prkno Seekingtex prochází přísným testováním výkonu a kvality v našem výzkumném a vývojovém centru před odesláním. Naše komplexní testování poskytuje hmatatelný důkaz vynikající kvality produktu.

stats:
  - value: 100%
    label: Jednotek tlakově testováno
  - value: '8'
  - value: 'ISO 9001'
    label: Certifikace kvality
  - value: 3 roky
    label: Omezená záruka

tests:
  - title: Tlakové testování
    description: Nafukovací komory jsou vystaveny tlaku přesahujícímu doporučené provozní limity po delší dobu. To ověřuje vzduchotěsnost a strukturální integritu materiálu a švů, zajišťující, že produkt vydrží zamýšlené použití a případné přehuštění bez selhání nebo netěsností.
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: Nárazové testování
    description: Produkty jsou vystaveny řízeným nárazům z různých vah a úhlů. To hodnotí odolnost materiálu vůči proražení, roztržení a poškození z kolizí s překážkami ve vodě.
    image: /images/seekingtex/factory/producing department.jpeg
  - title: Testování odolnosti proti UV
    description: Hotové výrobky jsou vystaveny simulovanému slunečnímu záření po delší dobu pro hodnocení odolnosti materiálu vůči degradaci, vyblednutí a oslabení způsobenému dlouhodobým UV zářením —klíčové pro čluny používané v tropických a slunných prostředích.
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: Testování odolnosti proti oděru
    description: Vzorky materiálu jsou třeny o abrazivní povrchy po stanovený počet cyklů pod kontrolovaným tlakem. To měří schopnost materiálu odolávat opotřebení z opakovaného použití, kontaktu s pískem, kameny nebo jinými povrchy.
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: Testování výkonu při nízkých teplotách
    description: Produkty jsou testovány v chladném prostředí pro posouzení funkčnosti a trvanlivosti v různých teplotních podmínkách, zabraňující ztuhnutí nebo praskání ve studenějších vodách.
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: Testování vztlaku a nosnosti
    description: Produkty jsou testovány s různými závažími pro stanovení maximální nosnosti a zajištění bezpečné podpory uživatelů a vybavení.
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: Testování ovladatelnosti
    description: Produkty jsou testovány na jejich reakci na pádlovací nebo motorové vstupy, hodnotí se poloměr otáčení a snadnost ovládání.
    image: /images/seekingtex/factory/sup making.jpeg
  - title: Testování vodotěsnosti
    description: Plně smontované produkty jsou ponořeny nebo vystaveny vodnímu postřiku pro kontrolu netěsností ve švech, ventilech nebo materiálech.
    image: /images/seekingtex/factory/producing department2.jpeg

testing_section:
  tagline: Testovací postupy
  title: Důkladné testování v každé fázi

commitment:
  title: Náš závazek
  body: Prostřednictvím těchto přísných testovacích postupů poskytuje {SITE} zákazníkům jistotu, že naše nafukovací SUP a čluny jsou nejen vysoce výkonné, ale také postavené k vydržení —zajišťující nespočet příjemných a bezpečných dobrodružství na vodě. Naše laboratoř kvality pracuje nezávisle na výrobě a hlásí se přímo vedení.
  cta: Požádat o testovací dokumentaci
  cta_link: /contact
