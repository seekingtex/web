label: 'Záruka'
headline: 'Omezená záruka výrobce Seekingtex'
subtitle: 'Seekingtex stojí za kvalitou každého nafukovacího námořního produktu, který vyrábíme. Tato omezená záruka stanovuje podmínky a rozsah krytí vašeho produktu Seekingtex.'
seo:
  headline: 'Záruka na nafukovací člun Seekingtex — 5letá omezená záruka | Seekingtex'
  description: 'Seekingtex nabízí 5letou omezenou záruku na primární tkaninu hadic, švy a strukturální integritu sklolaminátového trupu. Rovněž kryje nafukovací ventily a továrně instalované příslušenství.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Tato omezená záruka se vztahuje na nové nafukovací námořní produkty značky Seekingtex zakoupené přímo od Seekingtex nebo od autorizovaného prodejce. Účinné datum je ověřitelné datum původního maloobchodního nákupu.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Rozsah záruky a doba trvání</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 let</h3>
        <p class="text-sm text-gray-600 mt-1">Integrita tkaniny hlavních hadic (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 let</h3>
        <p class="text-sm text-gray-600 mt-1">Strukturální integrita sklolaminátového trupu</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 let</h3>
        <p class="text-sm text-gray-600 mt-1">Těsnost švů nafukovacích hadic</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 let</h3>
        <p class="text-sm text-gray-600 mt-1">Funkčnost nafukovacího ventilu</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 rok</h3>
        <p class="text-sm text-gray-600 mt-1">Továrně instalované příslušenství</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 rok*</h3>
        <p class="text-sm text-gray-600 mt-1">Komerční, pronájem nebo flotilové použití</p>
      </div>
    </div>
  </div>

  <h2>Co je kryto</h2>
  <h3>Primární tkanina hadic (5 let)</h3>
  <p>Seekingtex zaručuje hlavní tkaninu hadic proti zhoršení pórovitosti, které by podstatně ohrozilo schopnost produktu udržet provozní nafouknutí.</p>

  <h3>Strukturální integrita sklolaminátového trupu (5 let)</h3>
  <p>U produktů se sklolaminátovým trupem je základní kompozitní struktura zaručena proti strukturálnímu selhání v důsledku vad materiálu nebo zpracování.</p>

  <h3>Těsnost švů nafukovacích hadic (5 let)</h3>
  <p>Švy nafukovacích hadic jsou zaručeny proti výrobním vadám způsobujícím podstatný únik vzduchu.</p>

  <h3>Funkčnost nafukovacího ventilu (5 let)</h3>
  <p>Ventily jsou zaručeny proti výrobním vadám bránícím ventilu v zadržování vzduchu.</p>

  <h2>Co není kryto</h2>
  <ul>
    <li>Kosmetické vady včetně změny barvy, skvrn, vyblednutí</li>
    <li>Proražení, řezné rány, roztržení nebo jiné fyzické poškození</li>
    <li>Poškození UV zářením, povětrnostními vlivy nebo atmosférickými podmínkami</li>
    <li>Poškození zanedbáním, nesprávným použitím nebo běžným opotřebením</li>
    <li>Poškození nárazem, stresem nebo nesprávnou podpěrou</li>
  </ul>

  <h2>Jak uplatnit záruku</h2>
  <p>Kontaktujte Seekingtex nebo autorizovaného prodejce s dokladem o koupi a podrobným popisem problému.</p>
