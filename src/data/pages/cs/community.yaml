stories:
  tagline: 'Příběhy objevitelů'
  title: 'Skutečná dobrodružství od skutečných lidí'
  subtitle: 'Poslechněte si od pádlujících, rodin a profesionálů, kteří používají vybavení Seekingtex na vodě.'
  items:
    - name: 'Sarah & Mike'
      title: 'Majitelé SUP Explorer 11, Kanada'
      content: 'Vzali jsme naše Explorer 11 na týdenní výlet Algonquin Parkem. Zvládly přenášení i přejezdy jezer krásně. Drop-stitch konstrukce nám umožnila nafouknout na 15 PSI a získat výkon pevné desky z balitelného prkna.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Algonquin Park, Kanada'
    - name: 'Carlos R.'
      title: 'Jezdec Cheetah Surge, Španělsko'
      content: 'Cheetah Surge je moje volba pro pobřežní vyjížďky. Živý design přitahuje pozornost na pláži a stabilita mi dodává jistotu v lehkém vlnobití. Skvěle se ovládá, ať už touringuji nebo si jen užívám západ slunce.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Španělsko'
    - name: 'Lina a rodina'
      title: 'Pádlující Flowing Lotus, Švédsko'
      content: 'Víkendová rodinná dobrodružství na souostroví. Flowing Lotus je stabilní natolik, že na něm moje dcera může stát, zatímco já pádluji. Nafoukne se za méně než 10 minut — žádný přívěs, jen čistá rodinná zábava na vodě.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Stockholmské souostroví, Švédsko'
    - name: 'Lt. Cmdr. Andres'
      title: 'Průzkumník Ocean Voyager, Filipíny'
      content: 'Používám svůj Ocean Voyager pro dálkové pobřežní túry kolem Palawanu. Po měsících každodenního používání v tropických podmínkách deska stále funguje jako nová. Touringový tvar prořezává vlny, které by zastavily méně kvalitní desky.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filipíny'
    - name: 'Emma T.'
      title: 'Začátečnice Tropical Breeze, Austrálie'
      content: 'Nikdy předtím jsem nebyla na SUPu. Tropical Breeze je tak stabilní, že jsem se cítila sebejistě hned napoprvé. Teď pádluji každý víkend. Křivka učení je prakticky nulová — a deska vypadá na vodě úžasně.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Austrálie'

