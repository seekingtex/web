features:
  id: features
  tagline: Proč Seekingtex
  title: Co získáte s Seekingtexem
  subtitle: Desetiletí zkušeností s námořním inženýrstvím, destilované do zaměřené produktové řady. Postaveno na tvrdo, testováno na moři, podporováno po celý život.
  columns: 2
  items:
    - title: Námořní materiály
      description: Těžké PVC, Hypalon a hliníkové trupy vybrané pro odolnost proti UV, oděru a slané vodě.
      icon: tabler:shield-check
    - title: Kvalita připravená k výrobě
      description: Každý trup je tlakově testován, každý svar zkontrolován. Posíláme jen to, co bychom sami dali na vodu.
      icon: tabler:certificate
    - title: Modulární design
      description: Přizpůsobte uspořádání hadic, pozici konzoly, kapacitu paliva a příslušenství podle vaší mise.
      icon: tabler:layout-grid
    - title: Upřímné specifikace
      description: Skutečné hodnocení zátěže, skutečné rozměry, skutečná hmotnost. Nikdy žádné marketingové nafukování.
      icon: tabler:ruler-measure
    - title: Rychlé dodání a náhradní díly
      description: Běžné modely odesílány ve dnech. Originální náhradní díly a spotřební materiál skladem po celý rok.
      icon: tabler:truck-delivery
    - title: Doživotní podpora
      description: Přímá linka na náš inženýrský tým pro technické dotazy, opravy a poradenství při úpravách.
      icon: tabler:lifebuoy
featured_products:
  id: featured
  title: Doporučené produkty
  subtitle: Ručně vybrané z našeho aktuálního katalogu — nejoblíbenější modely této sezóny.
  linkText: Zobrazit všechny produkty
  linkUrl: /products
content_workshop:
  isReversed: true
  tagline: Uvnitř dílny
  title: Od výkresu trupu k dodání, každý krok zůstává v režii
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Kvalitu, kterou vidíte, cítíte a měříte</h3>
  items:
    - title: Navrženo námořními architekty
      description: Linie trupu jsou kresleny interně a iterovány pomocí CFD analýzy před prvním prototypem.
    - title: Svařeno a smontováno v našem vlastním zařízení
      description: Svařování hadic, montáž konzol a vybavení probíhá pod jednou střechou, takže kontrolujeme kvalitu v každém kroku.
    - title: Testováno na moři před odesláním
      description: Každý model absolvuje několikahodinovou námořní zkoušku zahrnující klouzání, otáčení, maximální rychlost a manipulaci se zátěží.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Výrobní dílna Seekingtex
steps:
  title: Od specifikace k vodě v pěti krocích
  items:
    - title: 'Krok 1: <span class="font-medium">Nakonfigurujte</span>'
      description: Vyberte model, zvolte možnosti, poptejte nabídku online nebo telefonicky. Náš tým odpoví do jednoho pracovního dne.
      icon: tabler:list-numbers
    - title: 'Krok 2: <span class="font-medium">Potvrďte</span>'
      description: Potvrdíme specifikace, dodací lhůtu a celkové náklady písemně. Žádná překvapení, žádné skryté poplatky.
      icon: tabler:checks
    - title: 'Krok 3: <span class="font-medium">Postavte</span>'
      description: Výroba začíná v naší dílně. Posíláme fotografie průběhu v klíčových fázích.
      icon: tabler:tool
    - title: 'Krok 4: <span class="font-medium">Dodání</span>'
      description: Zabaleno, smrštěno a odesláno po moři nebo letecky. Celní doklady vyřízeny od začátku do konce.
      icon: tabler:truck-loading
    - title: 'Krok 5: <span class="font-medium">Podpora</span>'
      description: Dvouletá záruka na trup plus doživotní technická podpora. Náhradní díly odeslány do 48 hodin.
      icon: tabler:headset
blog_latest:
  title: Z deníku
  information: |
    Články, technické poznámky a případové studie od inženýrského týmu.
    Nové příspěvky přidáváme vždy, když je projekt odeslán, norma aktualizována nebo někdo má příběh, který stojí za vyprávění.
faqs:
  title: Často kladené otázky
  subtitle: Běžné dotazy o nafukovacích člunech Seekingtex, zárukách, dopravě a OEM/ODM partnerstvích. Pokud váš dotaz není uveden, napište nám.
  columns: 2
  items:
    - title: Kde se nachází sklad Seekingtex v USA a jak dlouho trvá dodání?
      description: "Náš sklad v USA se nachází v Montclair, CA. Západní pobřeží: 2–3 dny. Střed USA: 3–4 dny. Východní pobřeží: 4–5 dny. Je také k dispozici mezinárodní doprava — kontaktujte nás pro individuální nabídku."
      icon: tabler:truck-delivery
    - title: Jaká je záruční politika Seekingtex pro nafukovací čluny?
      description: "Nafukovací námořní produkty Seekingtex jsou kryty 5letou omezenou zárukou na integritu tkaniny hadic, těsnost švů, konstrukci sklolaminátového trupu a ventily. Továrně instalované příslušenství je kryto 1 rok. Komerční použití: 1letá omezená záruka. Úplné podmínky jsou k dispozici na naší stránce záruky."
      icon: tabler:shield-check
    - title: Obsahují čluny Seekingtex registrační dokumenty?
      description: Ano, každý nafukovací člun Seekingtex obsahuje potřebné dokumenty pro registraci. Osvědčení o původu od výrobce naleznete na zadní straně uživatelské příručky a kopii ke stažení je k dispozici na vyžádání. Schváleno pobřežní stráží USA pro výrobu.
      icon: tabler:file-text
    - title: Jsou čluny Seekingtex schváleny pobřežní stráží USA?
      description: "Ano, nafukovací čluny Seekingtex jsou schváleny pobřežní stráží Spojených států (USCG) pro výrobu. Naše továrna má také CE certifikaci pro přístup na trh EU a  certifikaci."
      icon: tabler:flag
    - title: Co dělat, když balení produktu dorazí poškozené?
      description: Pokud balení produktu Seekingtex dorazí poškozené, odmítněte dodání a nechte balík vrátit odesílateli. Kontaktujte náš podpůrný tým a my vám neprodleně zašleme náhradu.
      icon: tabler:package
    - title: Co dělat, když produkt nedorazí do odhadovaného data dodání?
      description: Dodací lhůty poskytnuté společností Seekingtex jsou odhady a nelze je zaručit. Po odeslání je převzetí balíku odpovědností zákazníka. Pokud je balík ponechán na určeném místě doručení, vlastnictví přechází při doručení.
      icon: tabler:calendar-clock
