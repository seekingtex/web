brand:
  tagline: Naše značka
  title: Více než výrobce
  body: |
    Seekingtex je více než jen továrna —jsme partneři pro značky, operátory a profesionály, kteří požadují to nejlepší ve vybavení pro vodní sporty. Od návrhu konceptu až po dodání, každý produkt je postaven podle stejných standardů, které bychom požadovali pro vlastní použití.

story:
  tagline: Náš příběh
  title: Od skromných začátků ke globálnímu dosahu
  milestones:
    - year: '2012'
      title: Založení
      description: Seekingtex byl založen v Qingdao s vizí vyrábět vysoce kvalitní nafukovací produkty pro vodní sporty.
      image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
    - year: '2015'
      title: Rozšíření
      description: Rozšířili jsme naše zařízení na 12 000 m² a přidali pokročilé výrobní linky pro SUP prkna a technicka textilie čluny.
      image: /images/seekingtex/factory/producing department.jpeg
    - year: '2018'
      title: Certifikace
      description: Získali jsme  certifikaci a CE značení pro všechny produktové řady, čímž jsme otevřeli evropské trhy.
      image: /images/seekingtex/factory/PVC material.jpeg
    - year: '2020'
      title: Globální expanze
      description: Rozšířili jsme export do více než 50 zemí a otevřeli sklad v USA v Montclair, CA.
      image: /images/seekingtex/factory/producing department2.jpeg
    - year: '2024'
      title: Inovační centrum
      description: Založili jsme specializované výzkumné a vývojové centrum s pokročilými testovacími zařízeními a prototypovou dílnou.
      image: /images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp

team:
  tagline: Náš tým
  title: Lidé za Seekingtexem
  subtitle: Více než 200 kvalifikovaných techniků, inženýrů a specialistů pracuje na tom, aby každý produkt splňoval nejvyšší standardy.
