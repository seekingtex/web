hero:
  tagline: Vlastní řešení
  title: Laboratoř přizpůsobení
  subtitle: Navrhněte si vlastní prkno. Vaše značka, vaše barvy, vaše funkce.
  image: /images/seekingtex/hero/custom-banner.webp
  imageAlt: Vlastní návrh Seekingtex

steps:
  - title: Koncept
    description: Sdílejte svou vizi a požadavky s naším týmem.
    icon: tabler:bulb
  - title: Návrh
    description: Naši inženýři vytvoří technické výkresy a 3D modely.
    icon: tabler:file-text
  - title: Prototyp
    description: Vytvoříme a otestujeme prototyp pro ověření.
    icon: tabler:tool
  - title: Výroba
    description: Po schválení spustíme sériovou výrobu.
    icon: tabler:building-factory
  - title: Dodání
    description: Kvalitně zabaleno a odesláno k vám.
    icon: tabler:truck-delivery

capabilities:
  - icon: tabler:palette
    title: Vlastní barvy
    description: Vyberte si z široké škály barev a povrchových úprav.
  - icon: tabler:typography
    title: Potisk loga
    description: Digitální tisk nebo sítotisk pro vaše logo a grafiku.
  - icon: tabler:package
    title: Vlastní balení
    description: Maloobchodní a velkoobchodní balení s vaší značkou.
  - icon: tabler:settings
    title: Úpravy designu
    description: Upravte rozměry, tvary a funkce podle svých potřeb.

services:
  - title: OEM výroba
    description: Vyrábíme podle vašich specifikací s vaší značkou.
  - title: ODM výroba
    description: Navrhujeme a vyrábíme nové produkty podle vašich potřeb.
  - title: Návrh s vlastní značkou
    description: Kompletní branding od loga po balení.
  - title: Vývoj prototypů
    description: Rychlé prototypování a testování nových návrhů.
  - title: Kontrola kvality
    description: Přísné testování všech vlastních produktů před odesláním.
