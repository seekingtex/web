label: 'Garanti'
headline: 'Seekingtex producentens begrænsede garanti'
subtitle: 'Seekingtex står bag kvaliteten af hvert maritimt produkt, vi fremstiller.'
seo:
  headline: 'Seekingtex garanti for funktionelt\ tekstile — 5 års begrænset garanti | Seekingtex'
  description: 'Seekingtex tilbyder 5 års begrænset garanti på primært slangestof, sømme og glasfiberskrog.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Denne begrænsede garanti gælder for nye Seekingtex mærkede funktionelle\ tekstilprodukter.
  </p>
  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Garantidækning og varighed</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Primært slangestof (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Glasfiberskrog strukturintegritet</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Sømmenes lufttæthed</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Ventilfunktionalitet</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 år</h3>
        <p class="text-sm text-gray-600 mt-1">Fabriksinstalleret tilbehør</p>
      </div>
    </div>
  </div>
