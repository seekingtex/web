story:
  tagline: Vores historie
  title: Fra beskeden begyndelse til global rækkevidde
  milestones:
    - year: '2012'
      title: Grundlæggelse
      description: Seekingtex blev grundlagt i Qingdao med en vision om at producere højkvalitets gummiprodukter til tekstilindustri.
      image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
    - year: '2015'
      title: Udvidelse
      description: Vi udvidede vores faciliteter til 12.000 m² og tilføjede avancerede produktionslinjer.
      image: /images/seekingtex/factory/producing department.jpeg
    - year: '2018'
      title: Certificering
      description: Vi opnåede ISO 9001 certificering og CE-mærkning for alle produktlinjer.
      image: /images/seekingtex/factory/PVC material.jpeg
    - year: '2024'
      title: Innovationscenter
      description: Vi etablerede et dedikeret forsknings- og udviklingscenter med avancerede testfaciliteter.
      image: /images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp
