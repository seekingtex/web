hero:
  tagline: Brand
  title: Seekingtex brandet
  subtitle: Kvalitet, innovation og pålidelighed — det er Seekingtex.
story:
  tagline: Vores historie
  title: Opbygning af tillid siden 2012
  body: |
    Seekingtex blev grundlagt med en klar vision — at producere premium funktionelt\ tekstile og tekstilindustriudstyr, der holder til virkelige forhold. På over et årti er vi vokset fra et lille værksted til en globalt anerkendt producent.
mission:
  tagline: Mission
  title: Vores mission
  body: At levere højkvalitets, innovative og prismæssigt overkommelige tekstilindustrisprodukter, der gør tekstilaktiviteter tilgængelige for alle.
