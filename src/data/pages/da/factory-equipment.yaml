hero:
  tagline: "Udstyr"
  title: "Produktionsudstyr og maskiner"
  subtitle: "Industrielt udstyr til skæring, svejsning, tryk og montering"
  back_label: "Tilbage til fabrikken"
  back_link: /factory

categories:
  - title: "Skæring og materialeforberedelse"
    items:
      - name: "Automatisk PVC-skæremaskine"
        spec: "CNC-styret, 6.5 m × 2.5 m, 0.1 mm nøjagtighed"
        desc: "Computerstyret automatisk skæremaskine til PVC-, Hypalon- og drop-stitch-stoffer. Nesting-software optimerer materialeudnyttelsen til under 5 % spild."
      - name: "Stofudlægger"
        spec: "3 m max. bredde, spændingsstyret tilførsel"
        desc: "Lægger stof i enkelt eller flere lag med kontrolleret spænding for at forhindre forvridning før skæring."
  - title: "Rørsvejsning og binding"
    items:
      - name: "Varmeforseglingsmaskine"
        spec: "Varmluftsvejsning, variabel 200–600 °C, 0.5–5 m/min"
        desc: "Varmluftsvarmeforseglingsmaskine til samling og svejsning af PVC- og Hypalon-rørsømme. Bruges til fastgørelse, forsegling og sammensmeltning af rørkamre og svømmeforbindelser."
      - name: "Dielektrisk RF-presse"
        spec: "15 kW, plade 2000 × 600 mm"
        desc: "Højfrekvent svejsepresse til hovedlængdesømme, agterstykke-til-rør-forbindelser og fremstilling af store kamre."
      - name: "CNC-styret RF-svejser"
        spec: "8 kW, XY-bord 2500 × 1200 mm"
        desc: "Programmerbar krummet-søm-svejsning til komplekse geometrier, logo-prægning og præcist lapning."
  - title: "teknisk stof-skrogproduktion"
    items:
      - name: "Glasfiberforme til håndlægning"
        spec: "Flere forme til teknisk stof-skrog op til 6 m LOA"
        desc: "Traditionel håndlægning af glasfiber med polyester- og vinylester-harpikssystemer. Hvert lag rulles i hånden og vakuumemballeres for ensartet laminatkvalitet og styrke."
      - name: "Gelcoat-sprøjteboks"
        spec: "Temperaturstyret, filtreret luftventilation"
        desc: "Påføring af gelcoat på teknisk stof-skrog. Giver en højglanset, UV-resistent overflade med præcis tykkelseskontrol."
      - name: "CNC-fræser (5-akset)"
        spec: "3 m × 2 m × 1 m arbejdsområde, vandkølet spindel"
        desc: "Bearbejdning af skrogsindsatser, konsolforme, sædebaser og tilpassede beslag."
  - title: "SUP-tryk og dekoration"
    items:
      - name: "Digital printer"
        spec: "Inkjet i høj opløsning, op til 2 m printbredde"
        desc: "Direkte-til-stof digitaltryk til fuldfarvet SUP-dækgrafik. Udskriver tilpassede mønstre, gradienter og fotokvalitetsbilleder med UV-resistente vandbaserede blæk."
      - name: "Silketryksmaskine"
        spec: "Manuel og halvautomatisk, flerfarveregistrering"
        desc: "Silketryk til SUP-brætlogoer, varemærker og gentagne mønstre. Giver holdbare, uigennemsigtige tryk med livfuld farvemætning."
  - title: "Montering og udrustning"
    items:
      - name: "Motorløfter"
        spec: "500 kg kapacitet, justerbar spredestang"
        desc: "Sikker montering af påhængsmotorer fra 2.5 til 60 hk."
      - name: "Konsol-mock-up-ramme"
        spec: "Justerbar højde og vinkel"
        desc: "Forudmontering af styring, gas og instrumentpaneler før installation."
      - name: "Hydraulisk slangekrymper"
        spec: "Op til 1\" ID, digitalt trykmåler"
        desc: "Hydrauliske styreslangesæt i tilpasset længde med krympede fittings."
      - name: "Elektrisk ledningsboard"
        spec: "3 m × 1.5 m, forudtrykte ledningsdiagrammer"
        desc: "Montering og test af komplette elektriske ledningssæt uden for båden."
  - title: "Test og kvalitetskontrol"
    items:
      - name: "Universel træktester"
        spec: "50 kN, ASTM D751"
        desc: "Brudkraft, forlængelse ved brud og rivningsudbredelsestest for stofpartier."
      - name: "Luftretentionsteststativ"
        spec: "Programmerbar, 30 min. trykhold"
        desc: "Automatiseret trykholdtest for hvert rørkammer før montering."
      - name: "Søm-afskalningstester"
        spec: "Motoriseret 180° afskalning ved 100 mm/min"
        desc: "Svejse- og limet-søm afskalningsstyrketest ifølge ISO 6185."
      - name: "Xenon-bue-ældningskammer"
        spec: "2000 h eksponering"
        desc: "UV-resistens test for farveændring og styrkebevarelse."

