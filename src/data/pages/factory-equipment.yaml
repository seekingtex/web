hero:
  tagline: Equipment
  title: Manufacturing Equipment & Machinery
  subtitle: Industrial-grade equipment across cutting, welding, printing, and assembly
  back_label: Back to Factory
  back_link: /factory

categories:
  - title: Cutting & Material Preparation
    items:
      - name: Automatic PVC Cutting Machine
        spec: CNC-controlled, 6.5 m × 2.5 m, 0.1 mm accuracy
        desc: Computer-controlled automatic cutting machine for PVC, Hypalon, and advanced construction fabrics. Nesting software optimises material utilisation to below 5% waste.
      - name: Fabric Spreader
        spec: 3 m max width, tension-controlled feed
        desc: Lays fabric in single or multiple plies with controlled tension to prevent distortion before cutting.

  - title: Tube Welding & Bonding
    items:
      - name: Heat Sealing Machine
        spec: Hot-air welding, variable 200–600 °C, 0.5–5 m/min
        desc: Hot-air heat sealing machine for bonding and welding PVC and Hypalon tube seams. Used for tacking, sealing, and fusing tube chambers and float joints.
      - name: Dielectric RF Press
        spec: 15 kW, platen 2000 × 600 mm
        desc: Radio-frequency welding press for main longitudinal seams, transom-to-tube joints, and large-chamber fabrication.
      - name: CNC-Controlled RF Welder
        spec: 8 kW, XY table 2500 × 1200 mm
        desc: Programmable curved-seam welding for complex geometries, logo embossing, and precision patchwork.

  - title: performance textile Hull Manufacturing
    items:
      - name: Fiberglass Hand-Lay-Up Moulds
        spec: Multiple moulds for performance textile hulls up to 6 m LOA
        desc: Traditional hand-lay-up fiberglass moulding with polyester and vinylester resin systems. Each layer is hand-rolled and vacuum-bagged for consistent laminate quality and strength.
      - name: Gelcoat Spray Booth
        spec: Temperature-controlled, filtered air ventilation
        desc: Gelcoat application for performance textile hulls. Provides a high-gloss, UV-resistant finish with precise thickness control.
      - name: CNC Router (5-axis)
        spec: 3 m × 2 m × 1 m envelope, water-cooled spindle
        desc: Machining of hull inserts, console moulds, seat bases, and custom brackets.

  - title: functional fabric Printing & Decoration
    items:
      - name: Digital Printer
        spec: High-resolution inkjet, up to 2 m print width
        desc: Direct-to-fabric digital printing for full-colour functional fabric deck graphics. Prints custom patterns, gradients, and photo-quality images with UV-resistantwater-based inks.
      - name: Screen Printing Machine
        spec: Manual and semi-automatic, multi-colour registration
        desc: Screen printing for functional fabric board logos, brand marks, and repeating patterns. Provides durable, opaque prints with vibrant colour saturation.

  - title: Assembly & Rigging
    items:
      - name: Engine Hoist
        spec: 500 kg capacity, adjustable spreader bar
        desc: Safe mounting of outboard engines from 2.5 to 60 hp.
      - name: Console Mock-Up Frame
        spec: Adjustable height and angle
        desc: Pre-rigging of steering, throttle, and instrument panels before installation.
      - name: Hydraulic Hose Crimper
        spec: Up to 1" ID, digital pressure gauge
        desc: Custom-length hydraulic steering hose assemblies with swaged fittings.
      - name: Electrical Harness Board
        spec: 3 m × 1.5 m, pre-printed wiring diagrams
        desc: Off-boat assembly and testing of complete electrical harnesses.

  - title: Testing & Quality Control
    items:
      - name: Universal Tensile Tester
        spec: 50 kN,  / ASTM D751
        desc: Breaking force, elongation at break, and tear propagation testing for fabric batches.
      - name: Air Retention Test Rig
        spec: Programmable, 30-min pressure-hold
        desc: Automated pressure-hold test for every tube chamber before assembly.
      - name: Seam Peel Tester
        spec: Motorised 180° peel at 100 mm/min
        desc: Weld and glued-seam peel strength testing per ISO 6185.
      - name: Xenon-Arc Weathering Chamber
        spec: 2000 h exposure
        desc: UV resistance testing for colour change and strength retention.

