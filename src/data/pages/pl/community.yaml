stories:
  tagline: 'Historie odkrywców'
  title: 'Prawdziwe przygody prawdziwych ludzi'
  subtitle: 'Posłuchaj wioślarzy, rodzin i profesjonalistów, którzy używają sprzętu Seekingtex na wodzie.'
  items:
    - name: 'Sarah i Mike'
      title: 'Właściciele SUP Explorer 11, Kanada'
      content: 'Zabraliśmy nasze Explorer 11 na tygodniową wyprawę przez Park Algonquin. Świetnie poradziły sobie z przenoskami i przeprawami przez jeziora. Konstrukcja drop-stitch oznaczała, że mogliśmy napompować do 15 PSI i uzyskać wydajność deski sztywnej z deski składanej.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Park Algonquin, Kanada'
    - name: 'Carlos R.'
      title: 'Jeździec Cheetah Surge, Hiszpania'
      content: 'Cheetah Surge to mój ulubiony sprzęt do rejsów przybrzeżnych. Żywy design przyciąga wzrok na plaży, a stabilność daje mi pewność na lekkich falach. Świetnie się sprawdza zarówno podczas wycieczek, jak i zwykłego podziwiania zachodu słońca.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Hiszpania'
    - name: 'Lina i rodzina'
      title: 'Wioślarze Flowing Lotus, Szwecja'
      content: 'Weekendowe rodzinne przygody na archipelagu. Flowing Lotus jest wystarczająco stabilna, aby moja córka mogła na niej stać, podczas gdy ja wiosłuję. Pompowanie zajmuje mniej niż 10 minut — żadna przyczepa nie jest potrzebna, tylko czysta rodzinna zabawa na wodzie.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Archipelag Sztokholmski, Szwecja'
    - name: 'Kmdr ppor. Andres'
      title: 'Odkrywca Ocean Voyager, Filipiny'
      content: 'Używam mojego Ocean Voyager do długodystansowych rejsów przybrzeżnych wokół Palawanu. Po miesiącach codziennego użytku w tropikalnych warunkach deska wciąż działa jak nowa. Kształt turystyczny przecina fale, które zatrzymałyby gorsze deski.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filipiny'
    - name: 'Emma T.'
      title: 'Debiutantka Tropical Breeze, Australia'
      content: 'Nigdy wcześniej nie byłam na SUP-ie. Tropical Breeze jest tak stabilna, że poczułam pewność już za pierwszym razem. Teraz wiosłuję w każdy weekend. Krzywa uczenia się jest praktycznie zerowa — a deska wygląda niesamowicie na wodzie.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Australia'

