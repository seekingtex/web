hero:
  tagline: Seekingtex Academy
  title: Centrum wiedzy
  subtitle: Przewodniki i tutoriale na każdym poziomie umiejętności — od podstaw SUP po zaawansowane techniki ratownicze

categories:
  - level: Początkujący
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: Podstawy SUP
        desc: Poznaj podstawy wiosłowania na stojąco — postawa, technika wiosłowania i równowaga.
        slug: sup-basics
      - title: Techniki wiosłowania
        desc: Wiosłowanie w przód, wiosłowanie odchylne, wiosłowanie przyciągające i niska podpora — opanuj podstawowe ruchy wiosłem.
        slug: paddle-techniques
      - title: Bezpieczeństwo przede wszystkim
        desc: Podstawowe praktyki bezpieczeństwa, w tym sprawdzanie pogody, używanie PFD, zasady dotyczące smyczy i samoratownictwo.
        slug: safety-first
  - level: Średnio zaawansowany
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Podstawy turystyki kajakowej
        desc: Planowanie wielogodzinnych spływów — nawigacja, nawodnienie, tempo i odczytywanie prognoz wiatru.
        slug: touring-essentials
      - title: Odczytywanie pogody
        desc: Interpretuj prognozy morskie, rozpoznawaj wzory chmur i rozumiej wpływ wiatru na wodę.
        slug: weather-reading
      - title: Podstawy nawigacji
        desc: Czytanie map, używanie kompasu, punkty GPS i planowanie trasy dla pływania przybrzeżnego.
        slug: navigation-basics
      - title: Świadomość pływów
        desc: Zrozumienie cykli pływów, prądów i ich wpływu na czas rozpoczęcia i trasę.
        slug: tidal-awareness
  - level: Zaawansowany
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Planowanie wycieczek wielodniowych
        desc: Logistyka wypraw — wybór sprzętu, planowanie posiłków, protokoły bezpieczeństwa i kontakty alarmowe.
        slug: multi-day-trip-planning
      - title: Techniki ratownicze
        desc: Samoratownictwo, ratownictwo T, ratownictwo eskimoskie dla kajaków i protokoły holowania na otwartej wodzie.
        slug: rescue-techniques
      - title: Nocne wiosłowanie
        desc: Nawigacja po zmroku — wymagania oświetleniowe, pamięć trasy, komunikacja grupowa i świadomość zagrożeń.
        slug: night-paddling
  - level: Konserwacja
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Czyszczenie i pielęgnacja
        desc: Płukanie słodką wodą, ochrona przed UV, zapobieganie pleśni i odpowiednie techniki suszenia po każdej sesji.
        slug: cleaning-and-care
      - title: Przechowywanie
        desc: Najlepsze praktyki przechowywania nadmuchiwanych desek i łodzi — spuszczanie powietrza, składanie, kontrola temperatury i okres przydatności.
        slug: storage-guide
      - title: Podstawy napraw
        desc: Naprawa małych przebić, nieszczelnych szwów i problemów z zaworami za pomocą zestawów naprawczych PVC i technik łatania.
        slug: repair-basics
      - title: Konserwacja zaworów
        desc: Identyfikacja typów zaworów (Halkey-Roberts, Boston, Leafield), czyszczenie zanieczyszczeń i wymiana wadliwych trzpieni.
        slug: valve-maintenance

