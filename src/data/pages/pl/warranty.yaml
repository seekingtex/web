label: 'Gwarancja'
headline: 'Ograniczona gwarancja producenta Seekingtex'
subtitle: 'Firma Seekingtex ręczy za jakość każdego nadmuchiwanego produktu morskiego, który produkujemy. Niniejsza ograniczona gwarancja określa warunki i zakres ochrony Twojego produktu Seekingtex.'
seo:
  headline: 'Gwarancja nadmuchiwanego pontonu Seekingtex — 5-letnia ograniczona gwarancja | Seekingtex'
  description: 'Seekingtex oferuje 5-letnią ograniczoną gwarancję na integralność głównej tkaniny rur, szwów i konstrukcji kadłuba z włókna szklanego. Obejmuje również zawory nadmuchowe i akcesoria montowane fabrycznie. Pełne warunki gwarancji nadmuchiwanego pontonu Seekingtex.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Niniejsza ograniczona gwarancja dotyczy nowych nadmuchiwanych produktów morskich marki Seekingtex zakupionych bezpośrednio od Seekingtex lub od autoryzowanego dealera lub sprzedawcy Seekingtex. Data wejścia w życie to weryfikowalna data pierwotnego zakupu detalicznego.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Zakres i czas trwania gwarancji</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 lat</h3>
        <p class="text-sm text-gray-600 mt-1">Integralność głównej tkaniny rur (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 lat</h3>
        <p class="text-sm text-gray-600 mt-1">Integralność strukturalna kadłuba z włókna szklanego</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 lat</h3>
        <p class="text-sm text-gray-600 mt-1">Szczelność szwów nadmuchiwanych rur</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 lat</h3>
        <p class="text-sm text-gray-600 mt-1">Działanie zaworów nadmuchowych</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 rok</h3>
        <p class="text-sm text-gray-600 mt-1">Akcesoria montowane fabrycznie i okucia pomocnicze</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 rok*</h3>
        <p class="text-sm text-gray-600 mt-1">Użytek komercyjny, wynajem lub flota — wszystkie komponenty</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Użytek komercyjny, rządowy, czarterowy, wynajem lub instruktaż skraca gwarancję do 1 roku. Użycie w wyścigach lub zawodach unieważnia gwarancję w całości.</p>
  </div>

  <h2>Co jest objęte gwarancją</h2>
  <h3>Główna tkanina rur (5 lat)</h3>
  <p>Seekingtex gwarantuje, że główna tkanina rur nie ulegnie pogorszeniu porowatości, które znacząco wpłynie na zdolność produktu do utrzymania roboczego nadmuchania. Dotyczy to tkaniny powlekanej CSM (Hypalon) i wszystkich innych materiałów rur używanych w produkcji.</p>

  <h3>Integralność strukturalna kadłuba z włókna szklanego (5 lat)</h3>
  <p>W przypadku produktów z kadłubem z tworzywa sztucznego wzmocnionego włóknem szklanym (GRP), podstawowa struktura kompozytowa jest gwarantowana przed awarią konstrukcyjną spowodowaną wadami materiałowymi lub wykonawczymi.</p>

  <h3>Szczelność szwów nadmuchiwanych rur (5 lat)</h3>
  <p>Szwy nadmuchiwanych rur są gwarantowane przed wadami produkcyjnymi powodującymi znaczny wyciek powietrza przez szew. Okresowa kontrola i utrzymanie odpowiedniego ciśnienia nadmuchu są warunkami ochrony gwarancyjnej.</p>

  <h3>Działanie zaworów nadmuchowych (5 lat)</h3>
  <p>Zawory nadmuchowe oryginalnie zainstalowane przez Seekingtex są gwarantowane przed wadami materiałowymi lub wykonawczymi, które uniemożliwiają zaworowi utrzymanie powietrza zgodnie z przeznaczeniem.</p>

  <h3>Akcesoria montowane fabrycznie (1 rok)</h3>
  <p>Komponenty i okucia wyprodukowane przez Seekingtex i oryginalnie zamontowane w fabryce są gwarantowane przed wadami materiałowymi i wykonawczymi przez jeden rok. Wyklucza to artykuły osób trzecich, które są objęte wyłącznie gwarancjami odpowiednich producentów.</p>

  <h2>Co nie jest objęte gwarancją</h2>
  <ul>
    <li>Wady kosmetyczne, w tym odbarwienia, plamy, blaknięcie, kredowanie lub jakakolwiek zmiana wyglądu</li>
    <li>Przebicia, przecięcia, rozdarcia lub inne uszkodzenia fizyczne</li>
    <li>Spękania, pęknięcia, przetarcia, otarcia lub pogorszenie spowodowane tarciem lub kontaktem</li>
    <li>Degradacja spowodowana ekspozycją na promieniowanie UV, warunki atmosferyczne</li>
    <li>Uszkodzenia spowodowane kontaktem z paliwami, rozpuszczalnikami, kwasami, zasadami lub chemikaliami</li>
    <li>Uszkodzenia spowodowane zaniedbaniem, niewłaściwym użytkowaniem, nadużyciem, wypadkiem lub normalnym zużyciem</li>
    <li>Problemy z powierzchnią żelkotu lub farby (pęcherze, spękania, odbarwienia, blaknięcie)</li>
    <li>Uszkodzenia spowodowane uderzeniem, przeciążeniem, niewłaściwym podparciem lub transportem na przyczepie</li>
    <li>Uszkodzenia spowodowane nieprawidłowym nadmuchiwaniem/opróżnianiem lub użyciem niezatwierdzonych urządzeń do nadmuchiwania</li>
    <li>Sprzęt, komponenty lub systemy osób trzecich (objęte gwarancjami odpowiednich producentów)</li>
  </ul>

  <h2>Obowiązek producenta i środki zaradcze</h2>
  <p>Jedynym i wyłącznym zobowiązaniem Seekingtex jest naprawa lub wymiana, według uznania Seekingtex, każdego komponentu uznanego za wadliwy pod względem materiałów lub wykonania i objętego niniejszą gwarancją. Naprawy lub wymiany są wykonywane przez Seekingtex lub wyznaczone autoryzowane centrum serwisowe. Naprawione lub wymienione komponenty są gwarantowane tylko przez niewykorzystaną część pierwotnego okresu gwarancji.</p>

  <h2>Warunki gwarancji</h2>
  <ul>
    <li><strong>Rejestracja:</strong> Produkt musi być prawidłowo zarejestrowany zgodnie z wymogami warunków gwarancji.</li>
    <li><strong>Konserwacja:</strong> Produkt musi być konserwowany zgodnie z opublikowanymi wytycznymi Seekingtex, w tym okresowa kontrola i utrzymanie odpowiedniego ciśnienia nadmuchu.</li>
    <li><strong>Współpraca:</strong> Kupujący musi w pełni i niezwłocznie współpracować z Seekingtex we wszystkich sprawach dotyczących roszczeń gwarancyjnych.</li>
    <li><strong>Oryginalny nabywca:</strong> Niniejsza gwarancja jest udzielana wyłącznie oryginalnemu użytkownikowi końcowemu i nie jest przenoszalna.</li>
  </ul>

  <h2>Użytek komercyjny</h2>
  <p>Jeśli produkt jest używany do celów komercyjnych, rządowych, non-profit, czarterowych, wynajmu, instruktażu lub innych niż prywatny użytek rekreacyjny, okres gwarancji dla wszystkich komponentów ulega skróceniu do jednego (1) roku od pierwotnej daty zakupu detalicznego. Użycie w wyścigach, zawodach szybkościowych lub wytrzymałościowych natychmiast i nieodwołalnie unieważnia całą gwarancję.</p>

  <h2>Jak zgłosić roszczenie gwarancyjne</h2>
  <p>Skontaktuj się z Seekingtex lub autoryzowanym dealerem, przedstawiając dowód zakupu i szczegółowy opis problemu. Seekingtex rozpatrzy roszczenie i udzieli instrukcji dotyczących inspekcji i serwisu.</p>
  <p>W przypadku zapytań dotyczących serwisu gwarancyjnego skontaktuj się z nami za pośrednictwem naszej <a href="/contact" class="text-sky-600 underline">strony kontaktowej</a> z numerem zamówienia i szczegółami produktu.</p>

  <h2>Artykuły osób trzecich</h2>
  <p>Sprzęt, komponenty lub systemy wyprodukowane przez osoby trzecie (nawet jeśli zainstalowane przez Seekingtex) są objęte wyłącznie gwarancją oferowaną przez odpowiedniego producenta. Seekingtex wyraźnie wyłącza jakąkolwiek odpowiedzialność gwarancyjną za takie artykuły osób trzecich.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Niniejsze oświadczenie gwarancyjne jest podsumowaniem pełnej ograniczonej gwarancji producenta Seekingtex. Pełny prawny dokument gwarancji reguluje wszystkie warunki gwarancji. Specyfikacje mogą ulec zmianie bez powiadomienia. Seekingtex jest marką Qingdao Vatrad Group.
  </p>
