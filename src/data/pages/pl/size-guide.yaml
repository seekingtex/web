how_to_choose:
  title: Jak wybrać odpowiedni rozmiar
  cards:
    - title: Deski SUP
      description: Wybierz długość na podstawie swojej wagi i przeznaczenia. Szersze deski (32"+) oferują większą stabilność. Dłuższe deski (11-12 stóp) lepiej trzymają kurs podczas turystyki. Ciężsi wioślarze potrzebują desek o większej objętości.
    - title: techniczne tkaniny
      description: Pojedyncze techniczne tkaniny (9 stóp) są najlepsze do podróży solo i rzek. techniczne tkaniny tandemowe (12 stóp) mieszczą dwóch wioślarzy lub jedną osobę dorosłą ze sprzętem. Sprawdź nośność dla całkowitego obciążenia, w tym sprzętu.
    - title: Łodzie i techniczna tkanina
      description: Wybierz długość łodzi według liczby pasażerów i przeznaczenia. Większe techniczna tkanina (4,5 m+) nadają się do offshore i ratownictwa. Mniejsze łodzie (2,7 m) służą jako tender i platformy wędkarskie.
