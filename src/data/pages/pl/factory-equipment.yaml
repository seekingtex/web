hero:
  tagline: "Wyposażenie"
  title: "Wyposażenie i Maszyny Produkcyjne"
  subtitle: "Wyposażenie przemysłowe do cięcia, spawania, druku i montażu"
  back_label: "Powrót do Fabryki"
  back_link: /factory

categories:
  - title: "Cięcie i Przygotowanie Materiałów"
    items:
      - name: "Automatyczna Maszyna do Cięcia PVC"
        spec: "Sterowana CNC, 6.5 m × 2.5 m, dokładność 0.1 mm"
        desc: "Sterowana komputerowo automatyczna maszyna do cięcia tkanin PVC, Hypalon i drop-stitch. Oprogramowanie do układania optymalizuje wykorzystanie materiału poniżej 5% odpadów."
      - name: "Rozkładarka Tkanin"
        spec: "Szerokość max 3 m, podawanie ze sterowanym napięciem"
        desc: "Układa tkaninę w pojedyncze lub wielokrotne warstwy z kontrolowanym napięciem, aby zapobiec odkształceniom przed cięciem."
  - title: "Spawanie i Łączenie Rur"
    items:
      - name: "Maszyna do Zgrzewania Cieplnego"
        spec: "Spawanie gorącym powietrzem, zmienne 200–600 °C, 0.5–5 m/min"
        desc: "Maszyna do zgrzewania cieplnego gorącym powietrzem do łączenia i spawania szwów rur PVC i Hypalon. Używana do mocowania, uszczelniania i zgrzewania komór rur i połączeń pływaków."
      - name: "Prasa RF Dielektryczna"
        spec: "15 kW, płyta 2000 × 600 mm"
        desc: "Prasa do spawania wysoką częstotliwością dla głównych szwów wzdłużnych, połączeń pawęż-rura i produkcji dużych komór."
      - name: "Spawarka RF Sterowana CNC"
        spec: "8 kW, stół XY 2500 × 1200 mm"
        desc: "Programowalne spawanie szwów krzywoliniowych dla złożonych geometrii, tłoczenie logo i precyzyjne łatki."
  - title: "Produkcja Kadłubów techniczna tkanina"
    items:
      - name: "Formy z Włókna Szklanego Metodą Ręczną"
        spec: "Wiele form dla kadłubów techniczna tkanina do 6 m LOA"
        desc: "Tradycyjne ręczne układanie włókna szklanego z systemami żywic poliestrowych i winyloestrowych. Każda warstwa jest ręcznie wałkowana i próżniowana dla spójnej jakości i wytrzymałości laminatu."
      - name: "Kabina do Natrysku Gelcoat"
        spec: "Kontrolowana temperatura, filtrowana wentylacja powietrzem"
        desc: "Nakładanie gelcoat na kadłuby techniczna tkanina. Zapewnia wysoki połysk, odporność na UV, z precyzyjną kontrolą grubości."
      - name: "Frezerka CNC (5-osiowa)"
        spec: "Przestrzeń 3 m × 2 m × 1 m, wrzeciono chłodzone wodą"
        desc: "Obróbka wkładów kadłuba, form konsol, podstaw siedzeń i niestandardowych wsporników."
  - title: "Druk i Dekoracja SUP"
    items:
      - name: "Drukarka Cyfrowa"
        spec: "Atramentowa wysokiej rozdzielczości, szerokość druku do 2 m"
        desc: "Bezpośredni druk cyfrowy na tkaninie dla grafik pokładu SUP w pełnym kolorze. Drukuje niestandardowe wzory, gradienty i obrazy fotograficznej jakości z atramentami wodnymi odpornymi na UV."
      - name: "Maszyna do Sitodruku"
        spec: "Ręczna i półautomatyczna, rejestracja wielokolorowa"
        desc: "Sitodruk dla logo desek SUP, znaków towarowych i powtarzalnych wzorów. Zapewnia trwałe, kryjące wydruki z żywą nasycennością kolorów."
  - title: "Montaż i Olinowanie"
    items:
      - name: "Dźwignik Silnikowy"
        spec: "Udźwig 500 kg, regulowana belka rozpierająca"
        desc: "Bezpieczny montaż silników zaburtowych od 2.5 do 60 KM."
      - name: "Rama Próbna Konsoli"
        spec: "Regulowana wysokość i kąt"
        desc: "Wstępne olinowanie kierownicy, manetki i paneli przyrządów przed instalacją."
      - name: "Zaciskarka do Węży Hydraulicznych"
        spec: "Do 1\" ID, cyfrowy manometr"
        desc: "Zestawy węży sterowania hydraulicznego o niestandardowej długości z tulejowanymi złączkami."
      - name: "Tablica Wiązek Elektrycznych"
        spec: "3 m × 1.5 m, wydrukowane schematy okablowania"
        desc: "Montaż i testowanie kompletnych wiązek elektrycznych poza łodzią."
  - title: "Testy i Kontrola Jakości"
    items:
      - name: "Uniwersalna Maszyna Wytrzymałościowa"
        spec: "50 kN, ASTM D751"
        desc: "Badanie siły zerwania, wydłużenia przy zerwaniu i propagacji pęknięcia dla partii tkanin."
      - name: "Stanowisko do Testu Retencji Powietrza"
        spec: "Programowalne, 30-minutowe utrzymanie ciśnienia"
        desc: "Automatyczny test utrzymania ciśnienia dla każdej komory rury przed montażem."
      - name: "Tester Odrywania Szwów"
        spec: "Zmotoryzowane odrywanie 180° przy 100 mm/min"
        desc: "Badanie wytrzymałości na odrywanie szwów spawanych i klejonych zgodnie z ISO 6185."
      - name: "Komora Starzeniowa z Łukiem Ksenonowym"
        spec: "2000 h ekspozycja"
        desc: "Test odporności na UV pod kątem zmiany koloru i zachowania wytrzymałości."

