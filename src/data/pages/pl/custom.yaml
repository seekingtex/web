hero:
  tagline: Seekingtex Custom Lab
  title: Zaprojektuj własną<br />łodź
  subtitle: Usługi OEM, ODM, private label i niestandardowego brandingu dla firm na całym świecie. Od pojedynczego prototypu do pełnej serii produkcyjnej.
  cta: Rozpocznij projekt
  footer_link: /contact

steps_section:
  tagline: Jak to działa
  title: Od koncepcji do produkcji
  subtitle: Cztery kroki od Twojego pomysłu do gotowej, gotowej do morza łodzi.
  steps:
    - num: '01'
      title: Wybierz deskę
      desc: Wybierz z naszych podstawowych modeli — SUP, techniczne tkaniny, produkt tekstylny lub techniczna tkanina. Wybierz rozmiar, materiał i kolor.
    - num: '02'
      title: Prześlij swój projekt
      desc: Wyślij nam swoje logo, grafikę lub wytyczne marki. Nasz zespół projektowy przygotuje cyfrowy proof.
    - num: '03'
      title: Przegląd AI mockupu
      desc: Zobacz fotorealistyczny mockup wygenerowany przez AI swojej niestandardowej deski przed rozpoczęciem produkcji.
    - num: '04'
      title: Produkcja i dostawa
      desc: Po zatwierdzeniu Twoje zamówienie trafia na naszą certyfikowaną ISO linię produkcyjną. Czas realizacji od 30 dni.

services_section:
  tagline: Usługi
  title: Usługi produkcyjne dla globalnych marek
  subtitle: Elastyczne modele współpracy — od produkcji kontraktowej po kompleksowe budowanie marki.
  items:
    - title: Produkcja OEM
      desc: Produkujemy według Twoich specyfikacji — Twoja własność intelektualna, Twoje rysunki, Twoje standardy jakości. Pełna ochrona NDA.
      icon: ⚙️
    - title: Rozwiązania ODM
      desc: Wybierz z ponad 50 sprawdzonych platform i dostosuj rozmiar, kolor, grafikę i opakowanie.
      icon: '🎨'
    - title: Private Label
      desc: Twoja marka na naszych produktach — logo, opakowanie, metki, instrukcje. Gotowe do sprzedaży prosto z pudełka.
      icon: 🏷️
    - title: Niestandardowy branding
      desc: Nadruk na decku, grafika kadłuba, naklejki na tuby i niestandardowe etykiety — pełna integracja marki.
      icon: ✨

capabilities_section:
  tagline: Możliwości
  title: Możliwości produkcyjne i personalizacji
  subtitle: Wszystko, co musisz wiedzieć przed złożeniem zamówienia.
  capabilities:
    - label: Wolumen zamówienia
      value: MOQ 5–10 szt. (SUP/techniczne tkaniny), 2–5 szt. (techniczna tkanina)
    - label: Czas realizacji
      value: 30–45 dni standardowo; 15–20 dni dla prototypów
    - label: Personalizacja
      value: Rozmiar, kształt, kolor, grafika, opakowanie, osprzęt
    - label: Materiały
      value: PVC, Hypalon, drop-stitch, włókno szklane, aluminium
    - label: Druk
      value: Cyfrowy (CMYK), sitodruk, transfer termiczny, sublimacja
    - label: Certyfikacja
      value: CE, UKCA, FCC (wsparcie dla zgodności globalnej)

why_section:
