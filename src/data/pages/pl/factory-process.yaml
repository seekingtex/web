hero:
  tagline: Proces
  title: Proces produkcyjny
  subtitle: Od surowca do gotowej do morza łodzi — każdy krok pod naszą kontrolą
  back_label: Powrót do fabryki
  back_link: /factory

intro: W przeciwieństwie do marek, które zlecają produkcję fabrykom stron trzecich, Seekingtex posiada i obsługuje cały swój łańcuch produkcyjny. Ta pionowa integracja pozwala nam utrzymać ścisłą kontrolę jakości na każdym etapie, szybko reagować na niestandardowe wymagania i dostarczać stałą jakość produktów partia po partii. Oto jak budowana jest łódź w naszym zakładzie.

steps:
  - step: '01'
    title: Przyjęcie i inspekcja materiałów
    description: Każda przychodząca partia tkaniny PVC, maty z włókna szklanego, żywicy i osprzętu jest sprawdzana zgodnie ze specyfikacją. Próbki tkanin są testowane pod kątem wytrzymałości na rozciąganie, jednorodności grubości i odporności na UV przed dopuszczeniem do produkcji. Materiały niezgodne są kwarantannowane i zwracane.
    duration: 1–2 dni
  - step: '02'
    title: Automatyczne cięcie PVC
    description: Zatwierdzone tkaniny są układane na automatycznej maszynie tnącej CNC i cięte z dokładnością poniżej milimetra. Komputerowo zoptymalizowane układanie rozmieszcza panele w celu minimalizacji odpadów — zazwyczaj poniżej 5%. Cięte panele są oznaczane modelem łodzi i komorą, a następnie pakowane do transferu do warsztatu spawalniczego.
    duration: 2–4 godziny na zestaw łodzi
  - step: '03'
    title: Zgrzewanie rur i spawanie
    description: Panele są sczepiane i łączone za pomocą zgrzewarek  zgrzewających gorącym powietrzem w kontrolowanych temperaturach 200–600 °C. Główne szwy są wzmacniane zgrzewaniem dielektrycznym RF dla szczelnych, wysokowytrzymałych połączeń. Gotowe komory są napompowane do 1,5× ciśnienia roboczego na 30-minutową walidację zatrzymywania powietrza.
    duration: 1–2 dni na łódź
  - step: '04'
    title: Formowanie kadłuba techniczna tkanina z włókna szklanego
    description: Kadłuby łodzi techniczna tkanina są produkowane metodą ręcznego układania włókna szklanego. Warstwy maty z włókna szklanego i tkaniny rowingowej są ręcznie wałkowane z żywicą poliestrową lub winyloestrową w precyzyjnych formach. Każda warstwa jest pakowana próżniowo dla stałej jakości laminatu. Kadłub jest wykańczany gelcoatem dla wysokopołyskowej, odpornej na UV powierzchni morskiej.
    duration: 2–4 dni na kadłub
  - step: '05'
    title: Druk SUP i dekoracja
    description: Grafika decku deski SUP jest nakładana za pomocą druku cyfrowego  dla pełnokolorowych, fotograficznej jakości wzorów oraz sitodruku  dla trwałych logo i powtarzalnych wzorów. Nadruki są utwardzane i uszczelniane dla odporności na UV i ścieranie.
    duration: 1–2 dni
  - step: '06'
    title: Montaż końcowy i wyposażanie
    description: Kadłuby z włókna szklanego i zespoły rur PVC są łączone na linii montażowej. Silnik jest montowany, podłączane są układy kierownicze i sterownicze, instalowany jest układ paliwowy i okablowana jest pełna instalacja elektryczna. Każda łódź przechodzi 100-punktową listę kontrolną montażu z obowiązkowym zatwierdzeniem na każdym etapie.
    duration: 2–3 dni
  - step: '07'
    title: Testy jakości i inspekcja
    description: "Każda ukończona łódź przechodzi obowiązkową bramkę jakości: test zatrzymywania powietrza w komorach, kontrolę funkcjonalną systemów, weryfikację momentu dokręcenia elementów złącznych i inspekcję kosmetyczną. Niestandardowe i prototypowe konstrukcje przechodzą również próby morskie na wodzie obejmujące prędkość, prowadzenie, stabilność i wytrzymałość."
    duration: 1–2 dni
  - step: '08'
    title: Pakowanie i wysyłka
    description: Łodzie są spuszczane z powietrza, składane zgodnie z procedurą, pakowane w wytrzymałe torby z tkaniny lub sklejki i ładowane do wysyłki. Każda paczka jest oznaczona modelem, numerem seryjnym i miejscem przeznaczenia. Koordynujemy z przewoźnikami przesyłki FCL i LCL na całym świecie.
    duration: 1 dzień

