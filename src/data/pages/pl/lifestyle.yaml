hero:
  tagline: Styl życia
  title: Styl życia<br />Seekingtex
  subtitle: Stworzone dla tych, którzy żyją na wodzie — od weekendowych odkrywców po operatorów komercyjnych, którzy polegają na swoim sprzęcie każdego dnia.

values:
  - icon: 🌊
    title: Zrodzeni z wody
    desc: Każdy projekt zaczyna się od zrozumienia, jak zachowuje się woda. Projektujemy od krawędzi warunków do wewnątrz — ponieważ ocean jest naszym nauczycielem, nie miejscem pracy.
  - icon: 🔧
    title: Zbudowane, by służyć
    desc: Najbardziej zrównoważony produkt to ten, którego nie trzeba wymieniać. Materiały klasy morskiej, rdzenie drop-stitch wytrzymujące 15 PSI i szwy, które przetrwają sezon.
  - icon: '🏆'
    title: Dostępne z założenia
    desc: przemysl tekstylny nie powinny być luksusem. Profesjonalna wydajność w cenie, która ma sens dla rodzin, instruktorów i małych operatorów — nie tylko flot komercyjnych.
  - icon: 🌍
    title: Globalna społeczność
    desc: "Od wybrzeża Qingdao po jeziora w Europie, rzeki w Azji Południowo-Wschodniej i zatoki w Amerykach — naszych klientów łączy jedna rzecz: miłość do przebywania na wodzie."
  - icon: ♻️
    title: Odpowiedzialna produkcja
    desc: Zoptymalizowane cięcie CNC redukuje odpady materiałowe poniżej 5%. Trwała konstrukcja zmniejsza cykle wymiany. Budujemy z myślą o długowieczności, bo to najbardziej zrównoważony wybór.
  - icon: 🤝
    title: Wsparcie, które trwa
    desc: Kadłuby sprzed dwudziestu lat wciąż dzwonią do nas po części zamienne. Nasza reakcja gwarancyjna wynosi średnio 24 godziny. Nie znikamy po sprzedaży — jesteśmy tu przez cały okres użytkowania produktu.

