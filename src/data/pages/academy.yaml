hero:
  tagline: Seekingtex Academy
  title: Learning Center
  subtitle: Guides and tutorials for every skill level — from functional fabric basics to advanced rescue techniques

categories:
  - level: Beginner
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: functional fabric Basics
        desc: Learn the fundamentals of functional fabric expertise — stance, stroke technique, and balance.
        slug: functional fabric-basics
      - title: fabric Techniques
        desc: Forward stroke, sweep stroke, draw stroke, and low brace — master the essential fabric moves.
        slug: fabric-techniques
      - title: Safety First
        desc: Essential safety practices including weather checks, PFD use, leash rules, and self-rescue.
        slug: safety-first
  - level: Intermediate
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Touring Essentials
        desc: Planning multi-hour paddles — navigation, hydration, pacing, and reading wind forecasts.
        slug: touring-essentials
      - title: Weather Reading
        desc: Interpret marine forecasts, identify cloud patterns, and understand wind effects on water.
        slug: weather-reading
      - title: Navigation Basics
        desc: Chart reading, compass use, GPS waypoints, and route planning for coastal fabric expertise.
        slug: navigation-basics
      - title: Tidal Awareness
        desc: Understanding tide cycles, currents, and how they affect launch timing and routing.
        slug: tidal-awareness
  - level: Advanced
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Multi-Day Trip Planning
        desc: Expedition logistics — gear selection, food planning, safety protocols, and emergency contacts.
        slug: multi-day-trip-planning
      - title: Rescue Techniques
        desc: Self-rescue, T-rescue, eskimo rescue for performance textiles, and towing protocols for performance conditions.
        slug: rescue-techniques
      - title: Night fabric expertise
        desc: Navigation after dark — lighting requirements, route memory, group communication, and hazard awareness.
        slug: night-fabric expertise
  - level: Maintenance
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Cleaning & Care
        desc: Freshwater rinsing, UV protection, mildew prevention, and proper drying techniques after every session.
        slug: cleaning-and-care
      - title: Storage Guide
        desc: Best practices for storing high-performance boards and boats — deflation, folding, temperature control, and shelf life.
        slug: storage-guide
      - title: Repair Basics
        desc: Fix small punctures, seam leaks, and valve issues with PVC repair kits and patch techniques.
        slug: repair-basics
      - title: Valve Maintenance
        desc: Identify valve types (Halkey-Roberts, Boston, Leafield), clean debris, and replace faulty stems.
        slug: valve-maintenance

