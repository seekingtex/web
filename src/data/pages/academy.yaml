hero:
  tagline: Seekingtex Academy
  title: Learning Center
  subtitle: Guides and tutorials for every skill level — from textile basics to advanced fabric technology.

categories:
  - level: Beginner
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: Fabric Basics
        desc: Learn the fundamentals of textile construction — weaves, knits, yarn types, and fabric weights.
        slug: fabric-basics
      - title: Fiber Types Explained
        desc: Polyester vs nylon vs cotton vs blends — understand fiber properties and how they affect performance.
        slug: fiber-types-guide
      - title: Fabric Finishes 101
        desc: Introduction to functional finishes — DWR, antibacterial, UPF, FR, and how they are applied.
        slug: fabric-finishes-guide
  - level: Intermediate
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Performance Fabric Selection
        desc: How to choose the right fabric for your application — weight, weave, finish, and performance trade-offs.
        slug: fabric-selection-guide
      - title: Understanding Fabric Testing
        desc: Interpret tensile, tear, hydrostatic head, UPF, and colorfastness test results for informed sourcing decisions.
        slug: fabric-testing-guide
      - title: Coating & Lamination Guide
        desc: PU coating vs acrylic vs silicone vs lamination — understand the differences and choose the right option.
        slug: coating-lamination-guide
      - title: Sustainable Textile Basics
        desc: Recycled fibers, bio-based materials, low-impact dyes, and certifications (GRS, GOTS, bluesign).
        slug: sustainable-textile-guide
  - level: Advanced
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Fabric Engineering
        desc: Advanced textile engineering — yarn engineering, weave optimization, and performance finish chemistry.
        slug: fabric-engineering
      - title: Quality Control Systems
        desc: Statistical process control, AQL inspection, and quality management systems in textile manufacturing.
        slug: quality-control-systems
      - title: OEM Development Process
        desc: From specification to shipment — how custom fabric development works for apparel brands and manufacturers.
        slug: oem-development-process
  - level: Maintenance
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Fabric Care Guide
        desc: Best practices for washing, drying, and storing performance fabrics to maintain properties and extend lifespan.
        slug: fabric-care-guide
      - title: Quality Assurance
        desc: Understanding textile quality standards, inspection protocols, and how to verify fabric compliance.
        slug: quality-assurance
      - title: Certification Guide
        desc: OEKO-TEX, REACH, GRS, bluesign — what each certification means and how to verify compliance.
        slug: certification-guide

