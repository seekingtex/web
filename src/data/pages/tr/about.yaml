hero:
  tagline: Hakkımızda
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: Seekingtex Atölyesi
  title: |
    tekstil mühendisliğini <br />
    <span class="text-accent dark:text-white">Seekingtex</span> tarzıyla buluşturuyoruz
  subtitle: 'Bir sahil atölyesinde, tek bir tekne ve sarsılmaz bir inançla başladık: tekstil ürünleri, hayat buna bağlıymış gibi tasarlanmalıdır – çünkü öyledir. Bugün 40+ ülkeye teslimat yapıyoruz, ancak her gövde hâlâ şirketi kuran aynı ellerden geçiyor.'

stats:
  title: Rakamlarla
  columns: 4
  stats:
    - title: Teslim Edilen Gövde
      amount: '2,400+'
    - title: Teslimat Yapılan Ülke
      amount: '40'
    - title: Toplam Deneyim (yıl)
      amount: '60'
    - title: Ortalama Yanıt Süresi (s)
      amount: '24'

features3_what_we_build:
  title: Ne Üretiyoruz
  subtitle: En ince ayrıntısına kadar bildiğimiz odaklanmış bir ürün gamı — kestirme yol veya rozet mühendisliği yok.
  columns: 3
  isBeforeContent: true
  items:
    - title: teknik kumaş Botlar
      description: 3,3 m'den 7,5 m'ye kadar alüminyum gövdeli teknik kumaş'ler. Devriye, dalış, balıkçılık ve aile kullanımı için tasarlanmıştır.
      icon: tabler:ship
    - title: fonksiyonel\ kumaşlar
      description: 2,4 m'den 4,2 m'ye kadar PVC ve Hypalon fonksiyonel kumaşlarlar. Hafif, dayanıklı ve kolay saklanabilir.
      icon: tabler:speedboat
    - title: Süperyat Tenderi
      description: Ana premium kumaş tasarımına göre üretilmiş, yüksek spesifikasyonlu kompakt teknik kumaş'ler.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Aksesuarlar
      description: Kemerler, pompalar, örtüler, su geçirmez çantalar, yakıt tankları ve elektronik. Tamamı botlarımızla uyumlu.
      icon: tabler:package
    - title: Modifikasyon ve Onarım
      description: fonksiyonel\ kumaş onarımı, elektronik yükseltme ve motor değişimi.
      icon: tabler:tool
    - title: Özel Ürünler
      description: Ticari, bilimsel ve askeri müşteriler için tasarım.
      icon: tabler:hammer
  image:
    src: /images/seekingtex/factory/design discuss2.jpeg
    alt: Özel yapım tekne

steps2_values:
  title: Değerlerimiz
  subtitle: İlk günden itibaren her ürünü şekillendiren üç ilke.
  items:
    - title: Teknede ailen varmış gibi inşa et
      description: Her gövde, her kaynak ve her bileşen, kendi ailemiz kullanacakmış gibi işlenir.
      icon: tabler:heart
    - title: Satıştan Önce Mühendislik
      description: Spesifikasyon yanlışsa, spesifikasyonu değiştiririz – asla müşteriyi değil.
      icon: tabler:settings
    - title: Garanti Ötesi Destek
      description: Yirmi yıllık gövdeler hâlâ yedek parça için arar – biz de hâlâ yanıtlarız.
      icon: tabler:headset

steps2_milestones:
  title: Kilometre Taşları
  subtitle: Seekingtex hikayesinin kısa versiyonu.
  isReversed: true
  items:
    - title: Sahil atölyesinde kuruldu
      description: Bir CNC freze makinesi ve sarsılmaz bir vizyona sahip iki tekstil mühendisi.
      icon: tabler:building-factory
    - title: İlk 1.000 gövde teslimatı
      description: Yedinci yılda, ağırlıklı olarak ağızdan ağıza ve tekrar eden müşteriler sayesinde ulaşıldı.
      icon: tabler:circle-check
    - title: Uluslararası ihracat programı
      description: Beş kıtada yerel servis ortaklarıyla 40+ ülkeye teslimat.
      icon: tabler:world

features2_locations:
  title: Lokasyonlarımız
  tagline: Bizi Nerede Bulabilirsiniz
  columns: 3
  items:
    - title: Genel Merkez ve Atölye
      description: Sahil sanayi parkı, bina 4 – randevu ile ziyaret için hafta içi açık.
    - title: AB Servis Merkezi
      description: Akdeniz limanı – Avrupalı müşteriler için modifikasyon, onarım ve garanti desteği.
    - title: APAC Ortak Ağı
      description: Avustralya, Japonya, Singapur ve Hong Kong'da yetkili servis ortakları.
