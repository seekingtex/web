tests:
  - title: Basınç Testi
    description: Hava odaları, önerilen çalışma limitlerinin üzerinde basınca uzun süre maruz bırakılır. Bu, malzeme ve dikişlerin sızdırmazlığını ve yapısal bütünlüğünü doğrular, ürünün amaçlanan kullanıma ve olası aşırı şişirmeye arıza veya sızıntı olmadan dayanmasını sağlar.
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: Darbe Testi
    description: Ürünler, çeşitli ağırlık ve açılarda kontrollü darbelere maruz bırakılır. Sudan engellerle çarpışmalardan kaynaklanan delinme, yırtılma ve hasarlara karşı malzeme direnci değerlendirilir, dayanıklılık ve uzun ömür kanıtlanır.
    image: /images/seekingtex/factory/producing department.jpeg
  - title: UV Direnci Testi
    description: Bitmiş ürünler, uzun süre simüle edilmiş güneş ışığına maruz bırakılarak malzemenin uzun süreli UV maruziyetine bağlı bozulma, solma ve zayıflamaya karşı direnci değerlendirilir —tropikal ve yoğun güneşli ortamlarda kullanılan botlar için kritiktir.
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: Aşınma Direnci Testi
    description: Malzeme numuneleri, kontrollü basınç altında belirli sayıda döngü boyunca aşındırıcı yüzeylere sürtülür. Bu, malzemenin tekrarlı kullanım, kum, kaya veya diğer yüzeylerle temastan kaynaklanan aşınmaya dayanma yeteneğini ölçerek uzun vadeli dayanıklılığı sağlar.
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: Düşük Sıcaklık Performans Testi
    description: Ürünler, soğuk ortamlarda test edilerek farklı sıcaklık koşullarında işlevsellik ve dayanıklılık değerlendirilir, daha soğuk sularda sertleşme veya çatlamayı önler. Kış kullanımı veya yüksek enlemler için tasarlanan botlar için gereklidir.
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: Yüzdürme ve Yük Kapasitesi Testi
    description: Ürünler, maksimum yük kapasitesini belirlemek ve kullanıcılar ile ekipman için güvenli destek sağlamak amacıyla farklı yüklerle test edilir. Her model, satışa sunulmadan önce doğrulanmış bir yük kapasitesine sahiptir.
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: Manevra Kabiliyeti Testi
    description: Ürünler, kürek veya motor kontrolüne tepki açısından test edilir, dönüş yarıçapı ve kullanım kolaylığı değerlendirilir. Suda yapılan denemeler, gerçek kullanımın tasarım şartnamelerine uygun olduğunu onaylar.
    image: /images/seekingtex/factory/sup making.jpeg
  - title: Su Geçirmezlik Testi
    description: Tamamen monte edilmiş ürünler, dikişlerden, vanalardan veya malzemelerden herhangi bir sızıntı olup olmadığını kontrol etmek için suya batırılır veya suya maruz bırakılır. Her kumaş, sevkiyattan önce zorunlu su geçirmezlik kontrolünden geçer.
    image: /images/seekingtex/factory/producing department2.jpeg

