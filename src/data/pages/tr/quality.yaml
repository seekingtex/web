hero:
  tagline: Kalite Güvencesi
  title: Performans ve Kalite Testleri
  subtitle: Her Seekingtex fonksiyonel kumaşlar ve SUP, sevkiyattan önce Ar-Ge Merkezimizde sıkı performans ve kalite testlerinden geçer. Kapsamlı testlerimiz, ürün mükemmelliğinin somut kanıtını sağlar.
  image: /images/seekingtex/factory/Pressure Testing.jpeg

