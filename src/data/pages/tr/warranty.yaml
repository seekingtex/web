label: 'Garanti'
headline: 'Seekingtex Üretici Sınırlı Garantisi'
subtitle: 'Seekingtex, ürettiğimiz her fonksiyonel tekstil ürününün kalitesinin arkasında durur. Bu Sınırlı Garanti, Seekingtex ürününüz için şartları ve kapsamı belirler.'
seo:
  headline: 'Seekingtex Şişme kuma[ss] Garantisi — 5 Yıl Sınırlı Garanti | Seekingtex'
  description: 'Seekingtex, ana tüp kumaşı, dikişler ve fiberglas gövde yapısal bütünlüğü için 5 yıl sınırlı garanti sunar. Ayrıca şişirme valfleri ve fabrikada takılan aksesuarları kapsar. Seekingtex fonksiyonel kumaşlar garantisi için tam şartlar ve koşullar.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Bu Sınırlı Garanti, doğrudan Seekingtex'dan veya yetkili bir Seekingtex bayisinden veya perakendecisinden satın alınan yeni Seekingtex markalı fonksiyonel tekstil ürünleri için geçerlidir. Yürürlük tarihi, orijinal perakende satın alımının doğrulanabilir tarihidir.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Garanti Kapsamı ve Süresi</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Yıl</h3>
        <p class="text-sm text-gray-600 mt-1">Ana tüp kumaşı bütünlüğü (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Yıl</h3>
        <p class="text-sm text-gray-600 mt-1">Fiberglas gövde yapısal bütünlüğü</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Yıl</h3>
        <p class="text-sm text-gray-600 mt-1">fonksiyonel\ kumaş dikiş hava tutma kapasitesi</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Yıl</h3>
        <p class="text-sm text-gray-600 mt-1">Şişirme valfi işlevselliği</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 Yıl</h3>
        <p class="text-sm text-gray-600 mt-1">Fabrikada takılan aksesuarlar ve yardımcı bağlantı parçaları</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 Yıl*</h3>
        <p class="text-sm text-gray-600 mt-1">Ticari, kiralama veya filo kullanımı — tüm bileşenler</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Ticari, devlet, charter, kiralama veya eğitim amaçlı kullanım garantiyi 1 yıla düşürür. Yarış veya rekabet amaçlı kullanım garantiyi tamamen geçersiz kılar.</p>
  </div>

  <h2>Neler Kapsanır</h2>
  <h3>Ana Tüp Kumaşı (5 Yıl)</h3>
  <p>Seekingtex, ana tüp kumaşını, ürünün çalışma şişirme basıncını koruma yeteneğini önemli ölçüde tehlikeye atan gözenek bozulmasına karşı garanti eder. Bu, CSM (Hypalon) kaplı kumaş ve üretimde kullanılan diğer tüm tüp kumaş malzemeleri için geçerlidir.</p>

  <h3>Fiberglas Gövde Yapısal Bütünlüğü (5 Yıl)</h3>
  <p>Fiberglas takviyeli plastik (FRP) gövdeli ürünler için, temel kompozit yapı, malzeme veya işçilik hatalarından kaynaklanan yapısal arızalara karşı garanti edilir.</p>

  <h3>fonksiyonel\ kumaş Dikiş Hava Tutma Kapasitesi (5 Yıl)</h3>
  <p>fonksiyonel\ kumaşlerin üretim sırasında birleştirildiği dikişler, dikiş boyunca önemli hava kaçağına neden olan üretim hatalarına karşı garanti edilir. Periyodik inceleme ve uygun şişirme basınçlarının korunması, kapsamın koşullarıdır.</p>

  <h3>Şişirme Valfi İşlevselliği (5 Yıl)</h3>
  <p>Seekingtex tarafından orijinal olarak takılan hava şişirme valfleri, valfin tasarlandığı gibi hava tutmasını engelleyen malzeme veya işçilik hatalarına karşı garanti edilir.</p>

  <h3>Fabrikada Takılan Aksesuarlar (1 Yıl)</h3>
  <p>Seekingtex tarafından üretilen ve fabrikada orijinal olarak takılan bileşenler ve bağlantı parçaları, bir yıl süreyle malzeme ve işçilik hatalarına karşı garanti edilir. Bu, yalnızca ilgili üretici garantileri kapsamında olan üçüncü taraf öğelerini hariç tutar.</p>

  <h2>Neler Kapsanmaz</h2>
  <ul>
    <li>Renk bozulması, lekelenme, solma, tebeşirleşme veya görünümdeki herhangi bir değişiklik dahil kozmetik kusurlar</li>
    <li>Delinmeler, kesikler, yırtıklar veya diğer fiziksel hasarlar</li>
    <li>Sürtünme veya temastan kaynaklanan çatlama, aşınma, yıpranma</li>
    <li>UV ışığına maruz kalma, hava koşulları veya atmosferik koşullardan kaynaklanan bozulma</li>
    <li>Yakıtlar, çözücüler, asitler, alkaliler veya kimyasallarla temastan kaynaklanan hasar</li>
    <li>İhmal, uygunsuz kullanım, kötüye kullanım, kaza veya normal aşınma ve yıpranmadan kaynaklanan hasar</li>
    <li>Jelkot veya boya yüzey sorunları (kabarcıklanma, çatlama, renk bozulması, solma)</li>
    <li>Darbe, stres, uygun olmayan destek veya römorktan kaynaklanan hasar</li>
    <li>Uygun olmayan şişirme/söndürme veya onaylanmamış şişirme cihazlarının kullanımından kaynaklanan hasar</li>
    <li>Üçüncü taraf ekipman, bileşen veya sistemleri (ilgili üreticileri tarafından kapsanır)</li>
  </ul>

  <h2>Üreticinin Yükümlülüğü ve Çözüm Yolu</h2>
  <p>Seekingtex'ın tek ve münhasır yükümlülüğü, Seekingtex'ın takdirine bağlı olarak, malzeme veya işçilik açısından kusurlu olduğu belirlenen ve bu garanti kapsamındaki herhangi bir bileşenin onarımı veya değiştirilmesidir. Onarımlar veya değiştirmeler, Seekingtex veya belirlenmiş yetkili servis tesisi tarafından gerçekleştirilir. Onarılan veya değiştirilen bileşenler, yalnızca orijinal garanti süresinin dolmamış kısmı için garanti edilir.</p>

  <h2>Garanti Koşulları</h2>
  <ul>
    <li><strong>Kayıt:</strong> Ürün, garanti şartlarında belirtildiği şekilde uygun şekilde kaydedilmelidir.</li>
    <li><strong>Bakım:</strong> Ürün, periyodik inceleme ve uygun şişirme basınçlarının korunması dahil olmak üzere Seekingtex'ın yayınlanmış yönergelerine uygun olarak bakımı yapılmalıdır.</li>
    <li><strong>İşbirliği:</strong> Alıcı, garanti talepleriyle ilgili tüm konularda Seekingtex ile tam ve hızlı bir şekilde işbirliği yapmalıdır.</li>
    <li><strong>Orijinal Alıcı:</strong> Bu garanti, yalnızca orijinal son kullanıcı alıcıya verilir ve devredilemez.</li>
  </ul>

  <h2>Ticari Kullanım</h2>
  <p>Ürün ticari, devlet, kar amacı gütmeyen, charter, kiralama, eğitim veya özel rekreasyonel kullanım dışında herhangi bir amaçla kullanılırsa, tüm bileşenler için garanti süresi orijinal perakende satın alma tarihinden itibaren bir (1) yıla indirilir. Yarış, hız veya dayanıklılık yarışmasında kullanım, garantiyi derhal ve geri dönülemez şekilde geçersiz kılar.</p>

  <h2>Garanti Talebi Nasıl Yapılır</h2>
  <p>Satın alma belgesi ve sorunun ayrıntılı bir açıklamasıyla Seekingtex veya yetkili bayinizle iletişime geçin. Seekingtex, talebi inceleyecek ve inceleme ve servis için talimatlar sağlayacaktır.</p>
  <p>Garanti servisi sorularınız için, sipariş numaranız ve ürün bilgilerinizle birlikte <a href="/contact" class="text-sky-600 underline">iletişim sayfamız</a> üzerinden bize ulaşın.</p>

  <h2>Üçüncü Taraf Öğeleri</h2>
  <p>Üçüncü taraflarca üretilen ekipman, bileşen veya sistemler (Seekingtex tarafından takılmış olsa bile), yalnızca ilgili üreticileri tarafından sunulan herhangi bir garanti kapsamındadır. Seekingtex, bu tür üçüncü taraf öğeleri için herhangi bir garanti sorumluluğunu açıkça reddeder.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Bu garanti beyanı, eksiksiz Seekingtex Üretici Sınırlı Garantisi'nin bir özetidir. Tüm garanti şartları ve koşulları için geçerli olan yasal garanti belgesidir. Özellikler önceden haber verilmeksizin değiştirilebilir. Seekingtex, Qingdao Vatrad Group'un bir markasıdır.
  </p>
