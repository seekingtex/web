hero:
  tagline: Teknoloji
  title: Teknolojimiz
  subtitle: Seekingtex ürünleri, üstün performans, dayanıklılık ve taşınabilirlik sağlamak için gelişmiş malzemeler ve yenilikçi mühendislikle tasarlanmıştır.

features:
  - title: Askeri Sınıf PVC
    description: fonksiyonel\ kumaşlarımız ve SUP'larımız yüksek çekme ve delinme mukavemetine sahip, UV ve aşınmaya dayanıklı PVC kumaş kullanır.
  - title: Drop-Stitch Yapı
    description: Binlerce yüksek yoğunluklu iplik, üst ve alt yüzeyleri birbirine bağlayarak sert, yüksek basınçlı bir güverte oluşturur – fonksiyonel kumaşlar'ların sert tahtalara yakın performans göstermesini sağlar.
  - title: Isıl Kaynak
    description: Bağlantılar yapıştırılmak yerine ısıl olarak kaynaklanır ve kritik gerilim noktalarında kalıcı bağ mukavemeti sağlar.
  - title: Otomatik Şişirme Teknolojisi
    description: Pro can yelekleri, suya daldırıldığında anında devreye giren otomatik şişirme mekanizması kullanarak güvenilir yüzdürme sağlar.
