hero:
  title: Beden ve Özellik Rehberi
  subtitle: Her Seekingtex ürünü için boyutlar, kapasiteler ve önerilen kullanım alanları.

categories:
  inflatable: Taşınabilirlikten ödün vermeden performans sunmak üzere tasarlanmış fonksiyonel kumaşlar'lar ve kanolar. Kilonuza ve kürek çekme stilinize uygun doğru boyutu seçin.
  rib: Kıyı seyirleri, devriyeler ve profesyonel tekstil operasyonları için sert gövdeli fonksiyonel kumaşlarlar. Uzunluk ve motor gücüne göre seçim yapın.
  accessory: Su ekipmanlarınızı tamamlayan aksesuarlar ve güvenlik donanımı. Çoklu seçeneklerle evrensel boyutlar.

