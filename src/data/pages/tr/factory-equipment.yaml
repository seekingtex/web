hero:
  tagline: "Ekipman"
  title: "İmalat Ekipmanları ve Makineleri"
  subtitle: "Kesim, kaynak, baskı ve montaj için endüstriyel sınıf ekipman"
  back_label: "Fabrikaya Geri Dön"
  back_link: /factory

categories:
  - title: "Kesim ve Malzeme Hazırlığı"
    items:
      - name: "Otomatik PVC Kesim Makinesi"
        spec: "CNC kontrollü, 6.5 m × 2.5 m, 0.1 mm hassasiyet"
        desc: "PVC, Hypalon ve drop-stitch kumaşlar için bilgisayar kontrollü otomatik kesim makinesi. Yerleştirme yazılımı malzeme kullanımını %5'in altında israfa optimize eder."
      - name: "Kumaş Serme Makinesi"
        spec: "3 m max. genişlik, gerilim kontrollü besleme"
        desc: "Kesimden önce bozulmayı önlemek için kontrollü gerilimle tek veya çok katmanlı kumaş serer."
  - title: "Tüp Kaynağı ve Birleştirme"
    items:
      - name: "Sıcak Mühürleme Makinesi"
        spec: "Sıcak hava kaynağı, değişken 200–600 °C, 0.5–5 m/min"
        desc: "PVC ve Hypalon tüp dikişlerini birleştirmek ve kaynaklamak için sıcak hava ile sıcak mühürleme makinesi. Tüp odaları ve şamandıra eklerinin tutturma, mühürleme ve eritilmesinde kullanılır."
      - name: "Dielektrik RF Presi"
        spec: "15 kW, plaka 2000 × 600 mm"
        desc: "Ana boyuna dikişler, ayna-tüp eklemeleri ve büyük oda üretimi için yüksek frekanslı kaynak presi."
      - name: "CNC Kontrollü RF Kaynak Makinesi"
        spec: "8 kW, XY tabla 2500 × 1200 mm"
        desc: "Karmaşık geometriler, logo kabartma ve hassas yama için programlanabilir kavisli dikiş kaynağı."
  - title: "teknik kumaş Gövde İmalatı"
    items:
      - name: "Cam Elyafı Elle Yatak Kalıpları"
        spec: "6 m LOA'ya kadar teknik kumaş gövdeler için birden fazla kalıp"
        desc: "Polyester ve vinylester reçine sistemleri ile geleneksel elle yatak cam elyafı kalıplama. Her katman tutarlı laminat kalitesi ve mukavemeti için elle rulo yapılır ve vakumlu torbalanır."
      - name: "Gelcoat Püskürtme Kabini"
        spec: "Sıcaklık kontrollü, filtrelenmiş hava ventillasyonu"
        desc: "teknik kumaş gövdelerine gelcoat uygulaması. Hassas kalınlık kontrolü ile yüksek parıltılı, UV dayanımlı bir kaplama sağlar."
      - name: "CNC Freze (5 eksen)"
        spec: "3 m × 2 m × 1 m çalışma alanı, su soğutmalı mil"
        desc: "Gövde insertleri, konsol kalıpları, koltuk tabanları ve özel braketlerin işlenmesi."
  - title: "SUP Baskı ve Dekorasyon"
    items:
      - name: "Dijital Yazıcı"
        spec: "Yüksek çözünürlüklü inkjet, baskı genişliği 2 m'ye kadar"
        desc: "Tam renkli SUP güverte grafikleri için doğrudan kumaşa dijital baskı. UV dayanımlı su bazlı boyalarla özel desenler, gradyanlar ve fotoğraf kalitesinde görüntüler basar."
      - name: "Serigrafi Makinesi"
        spec: "Manuel ve yarı otomatik, çok renkli kayıt"
        desc: "SUP tahtası logoları, marka işaretleri ve tekrarlayan desenler için serigrafi. Canlı renk doygunluğu ile dayanıklı, opak baskılar sağlar."
  - title: "Montaj ve Donanım"
    items:
      - name: "Motor Kaldıracı"
        spec: "500 kg kapasite, ayarlanabilir yayıcı çubuk"
        desc: "2.5 ile 60 hp arasındaki dıştan takma motorların güvenli montajı."
      - name: "Konsol Maket Çerçevesi"
        spec: "Ayarlanabilir yükseklik ve açı"
        desc: "Kurulumdan önce direksiyon, gaz ve gösterge panellerinin ön donanımı."
      - name: "Hidrolik Hortum Kıvırma Makinesi"
        spec: "1\" ID'ye kadar, dijital basınç göstergesi"
        desc: "Sıkma fittingleri ile özel uzunlukta hidrolik direksiyon hortumu takımları."
      - name: "Elektrik Kablo Tavası"
        spec: "3 m × 1.5 m, önceden basılı kablolama şemaları"
        desc: "Tekne dışında komple elektrik kablo demetlerinin montajı ve testi."
  - title: "Test ve Kalite Kontrol"
    items:
      - name: "Evrensel Çekme Test Cihazı"
        spec: "50 kN, ASTM D751"
        desc: "Kumaş partileri için kopma kuvveti, kopmada uzama ve yırtılma yayılımı testi."
      - name: "Hava Tutma Test Düzeneği"
        spec: "Programlanabilir, 30 dk. basınç tutma"
        desc: "Montajdan önce her tüp odası için otomatik basınç tutma testi."
      - name: "Dikiş Soyulma Test Cihazı"
        spec: "Motorlu 180° soyulma, 100 mm/min"
        desc: "ISO 6185'e göre kaynaklı ve yapışkanlı dikişlerin soyulma mukavemeti testi."
      - name: "Ksenon Ark Yaşlandırma Odası"
        spec: "2000 h maruziyet"
        desc: "Renk değişimi ve mukavemet korunması için UV dayanım testi."

