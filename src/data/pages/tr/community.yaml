stories:
  tagline: 'Kaşif Hikayeleri'
  title: 'Gerçek insanlardan gerçek maceralar'
  subtitle: 'Suda Seekingtex ekipmanı kullanan kürekçilerden, ailelerden ve profesyonellerden dinleyin.'
  items:
    - name: 'Sarah & Mike'
      title: 'SUP Explorer 11 sahipleri, Kanada'
      content: 'Explorer 11''lerimizi Algonquin Park''ta bir haftalık bir geziye çıkardık. Portajları ve göl geçişlerini harika bir şekilde idare ettiler. Drop-stitch yapısı, 15 PSI''a kadar şişirebilmemizi ve paketlenebilir bir boarddan sert board performansı almamızı sağladı.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Algonquin Parkı, Kanada'
    - name: 'Carlos R.'
      title: 'Cheetah Surge sürücüsü, İspanya'
      content: 'Cheetah Surge, kıyı gezintileri için vazgeçilmezim. Canlı tasarımı sahilde dikkat çekiyor ve stabilitesi hafif dalgalarda bana güven veriyor. İster tur yapıyor olayım ister gün batımının tadını çıkarıyor olayım, harika bir şekilde yol alıyor.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, İspanya'
    - name: 'Lina & ailesi'
      title: 'Flowing Lotus kürekçileri, İsveç'
      content: 'Takımadalarda hafta sonu aile maceraları. Flowing Lotus, ben kürek çekerken kızımın üzerinde durması için yeterince stabil. 10 dakikadan kısa sürede şişiyor — römork gerekmez, sadece suda saf aile eğlencesi.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Stockholm Takımadaları, İsveç'
    - name: 'Binbaşı Andres'
      title: 'Ocean Voyager kaşifi, Filipinler'
      content: 'Ocean Voyager''ımı Palawan çevresinde uzun mesafeli kıyı turları için kullanıyorum. Tropikal koşullarda aylık günlük kullanımdan sonra board hala yeni gibi performans gösteriyor. Turing şekli, daha düşük boardları durduracak dalgaları kesiyor.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filipinler'
    - name: 'Emma T.'
      title: 'Tropical Breeze ilk kez kullanan, Avustralya'
      content: 'Daha önce hiç SUP''e binmemiştim. Tropical Breeze o kadar stabil ki ilk denememde kendime güvendim. Artık her hafta sonu kürek çekiyorum. Öğrenme eğrisi neredeyse sıfır — ve board suda harika görünüyor.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Avustralya'

