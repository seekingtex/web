hero:
  tagline: Seekingtex Academy
  title: Kunnskapssenter
  subtitle: Veiledninger og opplæringsprogrammer på alle ferdighetsnivåer — fra SUP-grunnleggende til avanserte redningsteknikker

categories:
  - level: Nybegynner
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: SUP-grunnleggende
        desc: Lær det grunnleggende om stående padling — holdning, padleteknikk og balanse.
        slug: sup-basics
      - title: Padleteknikker
        desc: Fremoverpadling, sveipende padling, dragpadling og lav støtte — mestr de grunnleggende paddelbevegelsene.
        slug: paddle-techniques
      - title: Sikkerhet først
        desc: Grunnleggende sikkerhetspraksis, inkludert værsjekk, bruk av PFD, regler for leash og selvredning.
        slug: safety-first
  - level: Middels
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Kajakktur-grunnleggende
        desc: Planlegging av flertimers turer — navigasjon, væskeinntak, tempo og tolking av vindvarsler.
        slug: touring-essentials
      - title: Værtolking
        desc: Tolk maritime værmeldinger, gjenkjenn skymønstre og forstå vindens påvirkning på vannet.
        slug: weather-reading
      - title: Navigasjonsgrunnleggende
        desc: Kartlesing, kompassbruk, GPS-punkter og ruteplanlegging for kystpadling.
        slug: navigation-basics
      - title: Tidevannsbevissthet
        desc: Forstå tidevannssykluser, strømmer og deres påvirkning på starttidspunkt og rute.
        slug: tidal-awareness
  - level: Avansert
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Planlegging av flerdagers turer
        desc: Ekspedisjonslogistikk — utstyrvalg, måltidsplanlegging, sikkerhetsprotokoller og nødkontakter.
        slug: multi-day-trip-planning
      - title: Redningsteknikker
        desc: Selvredning, T-redning, eskimoredning for tekniske stoffer og taueprotokoller på åpent vann.
        slug: rescue-techniques
      - title: Nattpadling
        desc: Navigasjon i mørket — belysningskrav, ruteminne, gruppekommunikasjon og risikobevissthet.
        slug: night-paddling
  - level: Vedlikehold
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Rengjøring og stell
        desc: Skylling med ferskvann, UV-beskyttelse, muggforebygging og riktige tørketeknikker etter hver økt.
        slug: cleaning-and-care
      - title: Oppbevaring
        desc: Beste praksis for oppbevaring av oppblåsbare brett og båter — tømming, folding, temperaturkontroll og holdbarhet.
        slug: storage-guide
      - title: Reparasjonsgrunnleggende
        desc: Reparasjon av små punkteringer, utette sømmer og ventilproblemer med PVC-reparasjonssett og lappeteknikker.
        slug: repair-basics
      - title: Ventilvedlikehold
        desc: Identifisering av ventiltyper (Halkey-Roberts, Boston, Leafield), rengjøring av smuss og utskifting av defekte ventiler.
        slug: valve-maintenance

