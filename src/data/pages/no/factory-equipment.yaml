hero:
  tagline: "Utstyr"
  title: "Produksjonsutstyr og maskiner"
  subtitle: "Industrielt utstyr for kutting, sveising, trykk og montering"
  back_label: "Tilbake til fabrikk"
  back_link: /factory

categories:
  - title: "Kutting og materialforberedelse"
    items:
      - name: "Automatisk PVC-kuttmaskin"
        spec: "CNC-styrt, 6.5 m × 2.5 m, 0.1 mm nøyaktighet"
        desc: "Datastyrt automatisk kuttmaskin for PVC-, Hypalon- og drop-stitch-stoffer. Nesting-programvare optimerer materialutnyttelsen til under 5 % avfall."
      - name: "Stoffspreder"
        spec: "3 m maks. bredde, spenningsstyrt tilførsel"
        desc: "Legger stoff i enkelt eller flere lag med kontrollert spenning for å forhindre forvridning før kutting."
  - title: "Rørsveising og binding"
    items:
      - name: "Varmeforseglingsmaskin"
        spec: "Varmluftssveising, variabel 200–600 °C, 0.5–5 m/min"
        desc: "Varmluft-varmeforseglingsmaskin for sammenføyning og sveising av PVC- og Hypalon-rørsømmer. Brukes til festing, forsegling og sammensmelting av rørkammer og flyteforbindelser."
      - name: "Dielektrisk RF-presse"
        spec: "15 kW, plate 2000 × 600 mm"
        desc: "Høyfrekvent sveisepresse for hovedlengdesømmer, akterstykke-til-rør-forbindelser og produksjon av store kammer."
      - name: "CNC-styrt RF-sveiser"
        spec: "8 kW, XY-bord 2500 × 1200 mm"
        desc: "Programmerbar krummet-søm-sveising for komplekse geometrier, logo-pregging og presis lapping."
  - title: "teknisk stoff-skrogproduksjon"
    items:
      - name: "Glassfiberformer for håndlegging"
        spec: "Flere former for teknisk stoff-skrog opp til 6 m LOA"
        desc: "Tradisjonell håndlegging av glassfiber med polyester- og vinylesterharpikssystemer. Hvert lag rulles for hånd og vakuumforpakkes for konsistent laminatkvalitet og styrke."
      - name: "Gelcoat-spraybod"
        spec: "Temperaturstyrt, filtrert luftventilasjon"
        desc: "Påføring av gelcoat på teknisk stoff-skrog. Gir en høyglanset, UV-resistent overflate med presis tykkelseskontroll."
      - name: "CNC-fres (5-akset)"
        spec: "3 m × 2 m × 1 m arbeidsområde, vannkjølt spindel"
        desc: "Bearbeiding av skroginnsatser, konsollformer, setebaser og tilpassede braketter."
  - title: "SUP-trykk og dekorasjon"
    items:
      - name: "Digital skriver"
        spec: "Høyoppløselig blekkjet, trykkbredde opp til 2 m"
        desc: "Direkte-på-stoff digitaltrykk for fullfargede SUP-dekkgrafikker. Skriver ut tilpassede mønstre, gradienter og fotokvalitetsbilder med UV-resistente vannbaserte blekk."
      - name: "Silkeskrykkemaskin"
        spec: "Manuell og halvautomatisk, flerfargeregistrering"
        desc: "Silkeskrykk for SUP-brettlogoer, varemerker og gjentakende mønstre. Gir holdbare, ugjennomsiktige trykk med livfull farmetning."
  - title: "Montering og rigging"
    items:
      - name: "Motorløfter"
        spec: "500 kg kapasitet, justerbar sprederstang"
        desc: "Sikker montering av utenbordsmotorer fra 2.5 til 60 hk."
      - name: "Konsoll-mock-up-ramme"
        spec: "Justerbar høyde og vinkel"
        desc: "Forhåndsrigging av styring, gass og instrumentpaneler før installasjon."
      - name: "Hydraulisk slangekrymper"
        spec: "Opp til 1\" ID, digitalt trykkmåler"
        desc: "Hydrauliske styreslangesett i tilpasset lengde med krympede fittings."
      - name: "Elektrisk ledningsbrett"
        spec: "3 m × 1.5 m, forhåndstrykte ledningsdiagrammer"
        desc: "Montering og testing av komplette elektriske ledningsett utenfor båten."
  - title: "Testing og kvalitetskontroll"
    items:
      - name: "Universell strekktester"
        spec: "50 kN, ASTM D751"
        desc: "Bruddkraft, forlengelse ved brudd og rivningsutbredelsestest for stoffpartier."
      - name: "Luftretensjonsteststativ"
        spec: "Programmerbar, 30 min. trykkhold"
        desc: "Automatisert trykkholdtest for hvert rørkammer før montering."
      - name: "Søm-avskallingstester"
        spec: "Motorisert 180° avskalling ved 100 mm/min"
        desc: "Sveiset- og limet-søm avskallingsstyrketest i henhold til ISO 6185."
      - name: "Xenon-bue-aldringskammer"
        spec: "2000 h eksponering"
        desc: "UV-resistens test for fargeendring og styrkebevaring."

