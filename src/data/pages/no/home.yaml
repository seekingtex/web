    Klar til å konfigurere <br class="block sm:hidden" /><span class="sm:whitespace-nowrap">din neste båt</span>?
  subtitle: Fortell oss hvordan du skal bruke båten, så foreslår vi modell, alternativer og pris innen én virkedag.
  actions:
    - variant: primary
      text: Be om pristilbud
      href: /contact
      icon: tabler:message-circle
    - text: Bla i katalogen
      href: /products
