features:
  id: features
  tagline: Hvorfor Seekingtex
  title: Hva du får med Seekingtex
  subtitle: Tiår med verftserfaring kondensert i én fokusert produktlinje. Solid konstruksjon, sjøprøvd, livslang støtte.
  columns: 2
  items:
    - title: Marine-grade materialer
      description: Høyfast PVC, Hypalon og aluminiumsskrog valgt for UV-bestandighet, slitestyrke og saltvannsbestandighet.
      icon: tabler:shield-check
    - title: Produksjonskvalitet
      description: Hvert skrog trykktestes, hver sveis inspiseres. Vi sender bare det vi selv ville sjøsatt.
      icon: tabler:certificate
    - title: Modulær konstruksjon
      description: Tilpass rominndeling, konsollplassering, drivstoffkapasitet og tilbehør etter dine behov.
      icon: tabler:layout-grid
    - title: Ærlige spesifikasjoner
      description: Virkelig last, virkelige mål, virkelig vekt. Ingen markedsføringsoverdrifter. Aldri.
      icon: tabler:ruler-measure
    - title: Rask levering og deler
      description: Standardmodeller sendes innen dager. Originaldeler og forbruksvarer på lager året rundt.
      icon: tabler:truck-delivery
    - title: Livslang støtte
      description: Direkte linje til designteamet vårt for tekniske råd, reparasjoner og oppgraderinger.
      icon: tabler:lifebuoy

featured_products:
  id: featured
  title: Anbefalte produkter
  subtitle: Utvalgt fra vår gjeldende katalog —?sesongens mest populære modeller.
  linkText: Se alle produkter
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: Inne i verkstedet
  title: Fra skrogdesign til levering —?hvert steg internt
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Kvalitet du ser, kjenner og kan måle</h3>
  items:
    - title: Designet av marineingeniører
      description: Skroglinjer tegnes internt og itereres gjennom CFD-analyse før første prototype.
    - title: Sveiset og montert i eget anlegg
      description: Sveising av oppblåsbare kamre, konsollmontering og beslag skjer under ett tak.
    - title: Sjøprøver før forsendelse
      description: Hver modell gjennomgår flertimers sjøprøve som tester planing, svinger, toppfart og oppførsel under last.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Verksted

steps:
  title: Fra spesifikasjon til sjøsetting i fem trinn
  items:
    - title: 'Trinn 1: <span class="font-medium">Konfigurasjon</span>'
      description: Velg modell, spesifiser alternativer og be om pristilbud på nett eller telefon. Teamet svarer innen én virkedag.
      icon: tabler:list-numbers
    - title: 'Trinn 2: <span class="font-medium">Bekreftelse</span>'
      description: Vi bekrefter spesifikasjon, leveringstid og totalpris skriftlig. Ingen overraskelser, ingen skjulte avgifter.
      icon: tabler:checks
    - title: 'Trinn 3: <span class="font-medium">Produksjon</span>'
      description: Produksjonen starter i verkstedet vårt. Vi sender bildeoppdateringer ved milepælene.
      icon: tabler:tool
    - title: 'Trinn 4: <span class="font-medium">Levering</span>'
      description: Pakket på pall, krympefoliert og sendt sjø- eller luftveien. Tollbehandling fullt inkludert.
      icon: tabler:truck-loading
    - title: 'Trinn 5: <span class="font-medium">Støtte</span>'
      description: To års garanti på skrog pluss livslang teknisk støtte. Deler sendt innen 48 timer.
      icon: tabler:headset
  image:
    src: /images/seekingtex/hero/production-dept.webp
    alt: Produksjonsprosess

blog_latest:
  title: Fra bloggen
  information: |
    Artikler, tekniske notater og casestudier fra designteamet.
    Nye innlegg kommer når et prosjekt leveres, en standard oppdateres, eller når noen har en historie verdt å fortelle.

faqs:
  title: Ofte stilte spørsmål
  subtitle: Spørsmålene vi hører oftest. Hvis ditt ikke er her, send oss en melding —?vi svarer raskt.
  columns: 2
  items:
    - title: Hvilken modell skal jeg velge
      description: Avhenger av mannskapsstørrelse, farvann og prioriteringer —?hastighet, lastekapasitet eller drivstofføkonomi. Send en kort beskrivelse, så anbefaler vi 2-3 passende modeller.
      icon: tabler:anchor
    - title: Leverer dere internasjonalt?
      description: Ja —?vi leverer til 40+ land. Sjøfrakt er mest økonomisk for hele båter; luftfrakt tilgjengelig for hasteordrer.
      icon: tabler:ship
    - title: Hva slags garanti gir dere?
      description: To år på skrog, ett år på tilbehør, livstid på våre sveiser. Garantiregistrering følger med hver levering.
      icon: tabler:shield
    - title: Kan man tilpasse en eksisterende modell?
      description: Nesten alltid. Konsollplassering, romfarge, sitteoppsett, elektronikk og motor kan tilpasses. Spesialskrog prises individuelt.
      icon: tabler:palette
    - title: Tilbyr dere opplæring og sertifisering?
      description: For kommersielle operatører kan vi arrangere opplæring på vannet ved vårt anlegg. Private kunder får gratis instruksjon ved overlevering.
      icon: tabler:school
    - title: Hvordan får jeg reservedeler?
      description: Bestill via kontaktsiden eller ring delerinfotelefonen. Typiske artikler (ventiler, belter, pumper, reparasjonssett) sendes innen 48 timer over hele verden.
      icon: tabler:settings

cta:
