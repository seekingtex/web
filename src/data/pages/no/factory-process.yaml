intro: I motsetning til merker som setter bort produksjonen til tredjepartsfabrikker, eier og driver Seekingtex hele sin produksjonskjede. Denne vertikale integrasjonen lar oss opprettholde streng kvalitetskontroll på hvert trinn, raskt respondere på tilpassede krav og levere jevn produktkvalitet batch etter batch. Slik bygges en båt i vårt anlegg.

steps:
  - step: '01'
    title: Materialmottak og inspeksjon
    description: Hvert innkommende parti PVC-stoff, glassfibermatte, harpiks og beslag inspiseres mot spesifikasjon. Stoffprøver testes for strekkstyrke, tykkelsesjevnhet og UV-bestandighet før godkjenning for produksjon. Ikke-samsvarende materialer settes i karantene og returneres.
    duration: 1–2 dager
  - step: '02'
    title: Automatisk PVC-skjæring
    description: Godkjente stoffer legges på automatisk CNC-skjæremaskin og skjæres med submillimeterpresisjon. Datamaskinoptimalisert opplegg plasserer paneler for å minimere avfall — typisk under 5%. Kuttede paneler merkes med båtmodell og kammer, deretter pakkes for overføring til sveiseverkstedet.
    duration: 2–4 timer per båtsett
  - step: '03'
    title: Rørsveising og sammenføyning
    description: Panelene heftes og sammenføyes med varmluftssveisemaskiner  ved kontrollerte temperaturer 200–600 °C. Hovedsømmer forsterkes med dielektrisk RF-sveising for lufttette, høyfaste skjøter. Ferdige kamre pumpes til 1,5× driftstrykk for 30-minutters trykktest.
    duration: 1–2 dager per båt
  - step: '04'
    title: Støping av teknisk stoff-skrog i glassfiber
    description: teknisk stoff-båtskrog produseres med håndopplegging av glassfiber. Lag med glassfibermatte og vevd stoff håndrulles med polyester- eller vinylesterharpiks i presisjonsformer. Hvert lag vakuumpakkes for jevn laminatkvalitet. Skroget etterbehandles med gelcoat for en høyglanset, UV-bestandig tekstil overflate.
    duration: 2–4 dager per skrog
  - step: '05'
    title: SUP-trykking og dekorasjon
    description: SUP-brettets dekkgrafikk påføres via digitaltrykk  for fullfarge, fotografiske design og silketrykk  for holdbare logoer og repeterende mønstre. Trykkene herdes og forsegles for UV- og slitestyrke.
    duration: 1–2 dager
  - step: '06'
    title: Sluttmontering og utrustning
    description: Glassfiber-skrog og PVC-rørenheter sammenføyes på monteringslinjen. Motor monteres, styre- og kontrollsystemer kobles, drivstoffsystem installeres og fullt elektrisk anlegg kobles. Hver båt går gjennom en 100-punkts monteringssjekkliste med obligatorisk godkjenning på hvert trinn.
    duration: 2–3 dager
  - step: '07'
    title: Kvalitetstesting og inspeksjon
    description: "Hver ferdig båt gjennomgår en obligatorisk kvalitetsport: trykktest av kamre, funksjonell systemkontroll, momentverifisering av festeelementer og kosmetisk inspeksjon. Tilpassede og prototype-design gjennomgår også sjøprøver som omfatter hastighet, manøvrering, stabilitet og utholdenhet."
    duration: 1–2 dager
  - step: '08'
    title: Pakking og forsendelse
    description: Båtene tømmes for luft, brettes etter prosedyre, pakkes i slitesterke stoff- eller kryssfinervesker og lastes for forsendelse. Hver pakke merkes med modell, serienummer og destinasjon. Vi koordinerer med speditører for FCL- og LCL-forsendelser over hele verden.
    duration: 1 dag

