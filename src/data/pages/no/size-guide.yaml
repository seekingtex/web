how_to_choose:
  title: Slik velger du riktig størrelse
  cards:
    - title: SUP-brett
      description: Velg lengde basert på vekt og bruksområde. Bredere brett (32"+) gir mer stabilitet. Lengre brett (11-12 fot) holder kursen bedre under tur. Tyngre padlere trenger brett med større volum.
    - title: tekniske stoffer
      description: Enkeltkajakker (9 fot) er best for soloturer og elver. Tandemkajakker (12 fot) rommer to padlere eller én voksen med utstyr. Sjekk lastekapasitet for totalvekt inkludert utstyr.
    - title: Båter og teknisk stoff
      description: Velg båtlengde etter antall passasjerer og bruksområde. Større teknisk stoff-er (4,5 m+) egner seg for offshore og redning. Mindre båter (2,7 m) fungerer som tender og fiskebåter.
