categories:
  inflatable: Oppblåsbare SUP-er og tekniske stoffer designet for bærbarhet uten å gå på kompromiss med ytelsen. Velg riktig størrelse for vekten din og padlestil.
  rib: funksjonelt\ stoffer med stivt skrog for kystnavigasjon, patrulje og profesjonelle marine operasjoner. Velg etter lengde og motorkraft.
  accessory: Tilbehør og sikkerhetsutstyr som kompletterer tekstilindustriutstyret ditt. Universale størrelser med flere alternativer.

