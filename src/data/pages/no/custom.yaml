hero:
  tagline: Seekingtex Skreddersydd Lab
  title: Design din egen<br />båt
  subtitle: OEM-, ODM-, private label- og tilpassede merkevaretjenester for bedrifter over hele verden. Fra enkeltprototype til full produksjonsserie.
  cta: Start prosjektet
  footer_link: /contact

steps_section:
  tagline: Slik fungerer det
  title: Fra konsept til produksjon
  subtitle: Fire trinn fra ideen din til en ferdig, sjøklar båt.
  steps:
    - num: '01'
      title: Velg et brett
      desc: Velg fra våre basismodeller — SUP, kajakk, tekstilprodukt eller teknisk stoff. Velg størrelse, materiale og farge.
    - num: '02'
      title: Send inn designet ditt
      desc: Send oss logoen din, grafikk eller merkevareretningslinjer. Designteamet vårt forbereder en digital proof.
    - num: '03'
      title: AI-gjennomgang av mockup
      desc: Se en fotorealistisk AI-generert mockup av ditt tilpassede brett før produksjonen starter.
    - num: '04'
      title: Produksjon og levering
      desc: Etter godkjenning går bestillingen din inn på vår ISO-sertifiserte produksjonslinje. Ledetid fra 30 dager.

services_section:
  tagline: Tjenester
  title: Produksjonstjenester for globale merkevarer
  subtitle: Fleksible samarbeidsmodeller — fra kontraktsproduksjon til fullverdig merkevarebygging.
  items:
    - title: OEM-produksjon
      desc: Vi produserer etter dine spesifikasjoner — din intellektuelle eiendom, dine tegninger, dine kvalitetsstandarder. Full NDA-beskyttelse.
      icon: ⚙️
    - title: ODM-løsninger
      desc: Velg fra over 50 dokumenterte plattformer og tilpass størrelse, farge, grafikk og emballasje.
      icon: '🎨'
    - title: Private Label
      desc: Ditt merke på våre produkter — logo, emballasje, merkelapper, instruksjoner. Klart for salg rett fra esken.
      icon: 🏷️
    - title: Tilpasset merkevarebygging
      desc: Dekketrykk, skrog-grafikk, tube-klistremerker og tilpassede etiketter — full merkevareintegrering.
      icon: ✨

capabilities_section:
  tagline: Kapasiteter
  title: Produksjons- og tilpasningsmuligheter
  subtitle: Alt du trenger å vite før du legger inn en bestilling.
  capabilities:
    - label: Bestillingsvolum
      value: MOQ 5–10 stk. (SUP/kajakk), 2–5 stk. (teknisk stoff)
    - label: Ledetid
      value: 30–45 dager standard; 15–20 dager for prototyper
    - label: Tilpasning
      value: Størrelse, form, farge, grafikk, emballasje, beslag
    - label: Materialer
      value: PVC, Hypalon, drop-stitch, glassfiber, aluminium
    - label: Trykk
      value: Digitalt (CMYK), silketrykk, varmeoverføring, sublimering
    - label: Sertifisering
      value: CE, UKCA, FCC (støtte for global samsvar)

why_section:
  tagline: Hvorfor Seekingtex
  title: Én fabrikk. Én standard. Null kompromisser.
  points:
    - text: Integrert produksjonsanlegg på 12 000 m²
      highlight: 12 000 m²
    - text: Over 200 kvalifiserte ansatte og ingeniører
      highlight: 200+
    - text: Over 15 000 båter produsert årlig
      highlight: 15 000+
    - text: Kvalitetsstyringssystem sertifisert 
      highlight: 
    - text: CE-sertifiserte produkter for EU-markedet
      highlight: CE
  cta: Se fabrikkdetaljer
  cta_link: /factory
  contact:
    title: Klar til å diskutere prosjektet ditt?
    desc: Teamet vårt svarer innen 24 timer med et innledende pristilbud.
