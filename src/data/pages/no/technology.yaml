hero:
  tagline: Teknologi
  title: Vår teknologi
  subtitle: Seekingtex-produkter er designet med avanserte materialer og innovativ ingeniørkunst for å levere eksepsjonell ytelse, holdbarhet og bærbarhet.

features:
  - title: Militærklasse PVC
    description: Våre funksjonelt\ stoffer og SUP-er bruker UV- og slitasjebestandig PVC-stoff med høy strekk- og punkteringsfasthet.
  - title: Drop-Stitch-konstruksjon
    description: Tusenvis av høy tetthet fibre forbinder topp- og bunnoverflaten, og skaper et stivt, høytrykksdekk – og gir oppblåsbare SUP-er ytelse nær harde brett.
  - title: Termisk sveising
    description: Skjøter er termisk sveiset, ikke limt, noe som sikrer varig bindingsstyrke i kritiske stresspunkter.
  - title: Automatisk oppblåsingsteknologi
    description: Pro-redningsvester bruker en automatisk oppblåsingsmekanisme som utløses umiddelbart ved nedsenkning, og gir pålitelig oppdrift.
