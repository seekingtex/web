hero:
  tagline: Livsstil
  title: Seekingtex-<br />livsstil
  subtitle: Laget for dem som lever på vannet — fra helgeoppdagere til kommersielle operatører som er avhengige av utstyret sitt hver dag.

values:
  - icon: 🌊
    title: Født av vann
    desc: Hvert design starter med en forståelse av hvordan vann oppfører seg. Vi designer fra kanten av forholdene og innover — fordi havet er vår lærer, ikke arbeidsplassen.
  - icon: 🔧
    title: Bygget for å vare
    desc: Det mest bærekraftige produktet er det som ikke trenger å byttes ut. Marine-grade materialer, drop-stitch-kjerner som tåler 15 PSI og sømmer som varer sesongen.
  - icon: '🏆'
    title: Tilgjengelig med vilje
    desc: tekstilindustri bør ikke være en luksus. Profesjonell ytelse til en pris som gir mening for familier, instruktører og små operatører — ikke bare kommersielle flåter.
  - icon: 🌍
    title: Globalt fellesskap
    desc: "Fra Qingdao-kysten til innsjøer i Europa, elver i Sørøst-Asia og bukter i Amerika — våre kunder forenes av én ting: kjærligheten til å være på vannet."
  - icon: ♻️
    title: Ansvarlig produksjon
    desc: Optimalisert CNC-skjæring reduserer materialavfall til under 5 %. Holdbar konstruksjon reduserer utskiftingssykluser. Vi bygger for lang levetid, fordi det er det mest bærekraftige valget.
  - icon: 🤝
    title: Støtte som varer
    desc: Skrog fra tjue år siden ringer oss fortsatt for reservedeler. Vår garantirespons er i gjennomsnitt 24 timer. Vi forsvinner ikke etter salget — vi er her gjennom hele produktets levetid.

