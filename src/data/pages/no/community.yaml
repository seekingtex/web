stories:
  tagline: 'Oppdagelseshistorier'
  title: 'Ekte eventyr fra ekte mennesker'
  subtitle: 'Hør fra padlere, familier og profesjonelle som bruker Seekingtex-utstyr på vannet.'
  items:
    - name: 'Sarah & Mike'
      title: 'SUP Explorer 11-eiere, Canada'
      content: 'Vi tok Explorer 11-ene våre med på en ukes tur gjennom Algonquin Park. De håndterte bæringer og innsjøkryssinger vakkert. Drop-stitch-konstruksjonen betydde at vi kunne pumpe opp til 15 PSI og få hardboard-ytelse fra et pakkbart brett.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Algonquin Park, Kanada'
    - name: 'Carlos R.'
      title: 'Cheetah Surge-rytter, Spania'
      content: 'Cheetah Surge er min go-to for kystcruising. Det livlige designet vekker oppsikt på stranden, og stabiliteten gir meg selvtillit i lett sjø. Den håndterer vakkert, enten jeg er på tur eller bare nyter solnedgangen.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Spania'
    - name: 'Lina og familie'
      title: 'Flowing Lotus-padlere, Sverige'
      content: 'Helge-familieeventyr i skjærgården. Flowing Lotus er stabil nok til at datteren min kan stå på den mens jeg padler. Pumpes opp på under 10 minutter —ingen tilhenger nødvendig, bare ren familieglede på vannet.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Stockholms Skjærgård, Sverige'
    - name: 'Lt. Cmdr. Andres'
      title: 'Ocean Voyager-oppdager, Filippinene'
      content: 'Jeg bruker Ocean Voyager-en min for langdistanse kystturer rundt Palawan. Etter måneder med daglig bruk i tropiske forhold fungerer brettet fortsatt som nytt. Turingsformen skjærer gjennom sjø som ville stoppet mindre brett.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filippinene'
    - name: 'Emma T.'
      title: 'Tropical Breeze-førstegangsbruker, Australia'
      content: 'Jeg hadde aldri vært på et SUP før. Tropical Breeze er så stabil at jeg følte meg trygg på første forsøk. Nå padler jeg hver helg. Læringskurven er nesten null —og brettet ser fantastisk ut på vannet.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Australia'

