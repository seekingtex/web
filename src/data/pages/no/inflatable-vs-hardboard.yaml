  <h2>Oppbevaring og vedlikehold</h2>
  <p>Oppblśįďsbare SUP-er mśįď tťÖ∂rkes og brettes riktig fťÖ∂r oppbevaring. Harde brett kan oppbevares liggende, men krever beskyttelse mot sol, varme og stťÖ∂t. Begge typer drar nytte av skylling med ferskvann etter bruk i saltvann.</p>

