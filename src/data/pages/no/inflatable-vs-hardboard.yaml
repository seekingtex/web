  <table>
    <tr><th>Faktor</th><th>Oppblśįďsbar SUP</th><th>Hard SUP</th></tr>
    <tr><td>Konstruksjon</td><td>PVC drop-stitch, oppblśįďst til 12-15 PSI</td><td>EPS-skumkjerne med glassfiber- eller epoksybelegg</td></tr>
    <tr><td>Vekt</td><td>18-28 pund (kun brett)</td><td>20-30 pund (kun brett)</td></tr>
    <tr><td>Pakket stťÖ∂rrelse</td><td>Ryggsekk (30 x 15 x 10 tommer)</td><td>Full lengde (10-14 fot)</td></tr>
