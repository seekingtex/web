label: 'Garanti'
headline: 'Seekingtex produsentens begrensede garanti'
subtitle: 'Seekingtex står bak kvaliteten på alle oppblåsbare marineprodukter vi produserer. Denne begrensede garantien fastsetter vilkårene og dekningen for ditt Seekingtex-produkt.'
seo:
  headline: 'Seekingtex oppblåsbar båtgaranti — 5 års begrenset garanti | Seekingtex'
  description: 'Seekingtex tilbyr en 5-års begrenset garanti på integriteten til primært slangevev, sømmer og glassfiber skrogstruktur. Dekker også oppblåsingsventiler og fabrikkinstallerte tilbehør. Fullstendige vilkår og betingelser for Seekingtex oppblåsbar båtgaranti.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Denne begrensede garantien gjelder for nye Seekingtex-merkede oppblåsbare marineprodukter kjøpt direkte fra Seekingtex eller fra en autorisert Seekingtex-forhandler. Ikrafttredelsesdatoen er den verifiserbare datoen for opprinnelig detaljkjøp.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Garantidekning og -varighet</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Integritet av primært slangevev (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Strukturell integritet av glassfiber skrog</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Lufttetthet av oppblåsbare slangesømmer</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Funksjonalitet av oppblåsingsventiler</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 år</h3>
        <p class="text-sm text-gray-600 mt-1">Fabrikkinstallerte tilbehør og hjelpearmatur</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 år*</h3>
        <p class="text-sm text-gray-600 mt-1">Kommersiell bruk, utleie eller flåte — alle komponenter</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Kommersiell, offentlig, charter-, utleie- eller instruksjonsbruk reduserer garantien til 1 år. Bruk i racing eller konkurranse gjør garantien helt ugyldig.</p>
  </div>

  <h2>Hva er dekket</h2>
  <h3>Primært slangevev (5 år)</h3>
  <p>Seekingtex garanterer det primære slangevevet mot porøsitetsforringelse som vesentlig svekker produktets evne til å opprettholde driftsoppblåsing. Dette gjelder CSM (Hypalon)-belagt vev og alle andre slangematerialer som brukes i produksjonen.</p>

  <h3>Strukturell integritet av glassfiber skrog (5 år)</h3>
  <p>For produkter med glassfiberforsterket plastskrog (GFP) garanteres den grunnleggende komposittstrukturen mot strukturell svikt på grunn av defekter i materialer eller utførelse.</p>

  <h3>Lufttetthet av oppblåsbare slangesømmer (5 år)</h3>
  <p>Sømmene på oppblåsbare slanger garanteres mot produksjonsfeil som resulterer i betydelig luftlekkasje gjennom sømmen. Periodisk inspeksjon og opprettholdelse av riktig oppblåsingstrykk er vilkår for dekning.</p>

  <h3>Funksjonalitet av oppblåsingsventiler (5 år)</h3>
  <p>Oppblåsingsventiler opprinnelig installert av Seekingtex garanteres mot material- eller produksjonsfeil som hindrer ventilen i å holde luft som designet.</p>

  <h3>Fabrikkinstallerte tilbehør (1 år)</h3>
  <p>Komponenter og armatur produsert av Seekingtex og opprinnelig installert på fabrikken garanteres mot material- og produksjonsfeil i ett år. Dette ekskluderer tredjepartsartikler, som kun dekkes av deres respektive produsentgarantier.</p>

  <h2>Hva er ikke dekket</h2>
  <ul>
    <li>Kosmetiske feil inkludert misfarging, flekker, falming, kalking eller andre endringer i utseende</li>
    <li>Punkteringer, kutt, rifter eller annen fysisk skade</li>
    <li>Hårfine sprekker, sprekker, slitasje, skrubbsår eller forringelse fra friksjon eller kontakt</li>
    <li>Nedbrytning fra UV-lys, værforhold eller atmosfæriske forhold</li>
    <li>Skade fra kontakt med drivstoff, løsemidler, syrer, alkalier eller kjemikalier</li>
    <li>Skade fra forsømmelse, feil bruk, misbruk, ulykke eller normal slitasje</li>
    <li>Gelcoat- eller malingsproblemer (blemmer, hårfine sprekker, misfarging, falming)</li>
    <li>Skade fra støt, belastning, feil støtte eller tilhengerkjøring</li>
    <li>Skade fra feil oppblåsing/tømming eller bruk av ikke-godkjente oppblåsingsenheter</li>
    <li>Tredjepartsutstyr, komponenter eller systemer (dekket av deres respektive produsenter)</li>
  </ul>

  <h2>Produsentens forpliktelse og rettsmiddel</h2>
  <p>Seekingtexs eneste og eksklusive forpliktelse er reparasjon eller utskifting, etter Seekingtexs valg, av enhver komponent som er bestemt å være defekt i materialer eller utførelse og dekket under denne garantien. Reparasjoner eller utskiftninger utføres av Seekingtex eller dens utpekte autoriserte servicesenter. Reparerte eller utskiftede komponenter garanteres kun for den ubrukte delen av den opprinnelige garantiperioden.</p>

  <h2>Garantibetingelser</h2>
  <ul>
    <li><strong>Registrering:</strong> Produktet må være korrekt registrert som påkrevd i garantivilkårene.</li>
    <li><strong>Vedlikehold:</strong> Produktet må vedlikeholdes i henhold til Seekingtexs publiserte retningslinjer, inkludert periodisk inspeksjon og opprettholdelse av riktig oppblåsingstrykk.</li>
    <li><strong>Samarbeid:</strong> Kjøperen må fullt ut og umiddelbart samarbeide med Seekingtex i alle saker angående garantikrav.</li>
    <li><strong>Opprinnelig kjøper:</strong> Denne garantien gis utelukkende til den opprinnelige sluttbrukeren og er ikke overførbar.</li>
  </ul>

  <h2>Kommersiell bruk</h2>
  <p>Hvis produktet brukes til kommersielle, offentlige, ideelle, charter-, utleie-, instruksjonsformål eller andre formål enn privat rekreasjon, reduseres garantiperioden for alle komponenter til ett (1) år fra opprinnelig kjøpsdato. Bruk i racing, hastighets- eller utholdenhetskonkurranse gjør garantien umiddelbart og ugjenkallelig ugyldig.</p>

  <h2>Slik sender du inn et garantikrav</h2>
  <p>Kontakt Seekingtex eller din autoriserte forhandler med kjøpsbevis og en detaljert beskrivelse av problemet. Seekingtex vil vurdere kravet og gi instruksjoner for inspeksjon og service.</p>
  <p>For garantiserviceforespørsler, vennligst kontakt oss via vår <a href="/contact" class="text-sky-600 underline">kontaktside</a> med ordrenummeret ditt og produktdetaljer.</p>

  <h2>Tredjepartsartikler</h2>
  <p>Utstyr, komponenter eller systemer produsert av tredjeparter (selv om installert av Seekingtex) dekkes utelukkende av eventuell garanti som tilbys av deres respektive produsent. Seekingtex fraskriver seg uttrykkelig ethvert garantiansvar for slike tredjepartsartikler.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Denne garantierklæringen er et sammendrag av den fullstendige begrensede produsentgarantien fra Seekingtex. Det fullstendige juridiske garantidokumentet styrer alle garantivilkår. Spesifikasjoner kan endres uten varsel. Seekingtex er et merkevare av Qingdao Vatrad Group.
  </p>
