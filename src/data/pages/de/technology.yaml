hero:
  tagline: Technologie
  title: Unsere Technologie
  subtitle: Seekingtex-Produkte werden mit fortschrittlichen Materialien und innovativer Technik entwickelt, um außergewöhnliche Leistung, Haltbarkeit und Tragbarkeit zu bieten.

features:
  - title: Militärqualität PVC
    description: Unsere Funktionsgewebe und SUPs verwenden UV-beständiges, abriebfestes PVC-Gewebe mit hoher Reißfestigkeit und Durchstoßfestigkeit.
  - title: Drop-Stitch-Konstruktion
    description: Tausende hochdichte Faserfäden verbinden Ober- und Unterseite und bilden ein starres, Hochdruckdeck – funktionale Gewebe erreichen damit fast die Leistung von Hartschalenbrettern.
  - title: Heißgeschweißte Nähte
    description: Die Nähte werden heißverschweißt statt geklebt, was an kritischen Belastungspunkten dauerhafte Haftfestigkeit bietet.
  - title: Automatische Aufblastechnologie
    description: Die Pro-Schwimmwesten verwenden einen automatischen Aufblasmechanismus, der beim Eintauchen sofort auslöst und zuverlässigen Auftrieb bietet.
