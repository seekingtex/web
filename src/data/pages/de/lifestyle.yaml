hero:
  tagline: Lebensstil
  title: Der Seekingtex<br />Lebensstil
  subtitle: Entwickelt für die, die auf dem Wasser leben – vom Wochenend-Entdecker bis zum gewerblichen Betreiber, der täglich auf seine Ausrüstung angewiesen ist.

values:
  - icon: 🌊
    title: Auf dem Wasser geboren
    desc: Jedes Design beginnt mit dem Verständnis, wie Wasser sich verhält. Wir konstruieren von den Grenzbedingungen nach innen – denn der Ozean ist unser Lehrer, nicht unser Arbeitsplatz.
  - icon: 🔧
    title: Für Langlebigkeit gebaut
    desc: Das nachhaltigste Produkt ist das, das nicht ersetzt werden muss. Marinequalität-Materialien, Drop-Stitch-Kerne mit 15 PSI Belastbarkeit und Nähte, die länger halten als die Saison.
  - icon: '🏆'
    title: Zugänglich durch Design
    desc: Textilindustrie sollte kein Luxus sein. Professionelle Leistung zu einem Preis, der für Familien, Guides und kleine Betreiber sinnvoll ist – nicht nur für gewerbliche Flotten.
  - icon: 🌍
    title: Globale Gemeinschaft
    desc: "Von der Küste Qingdaos bis zu Seen in Europa, Flüssen in Südostasien und Buchten in Amerika – unsere Kunden teilen eine Sache: die Liebe zum Wasser."
  - icon: ♻️
    title: Verantwortungsvolle Fertigung
    desc: CNC-optimierte Verschachtelung reduziert Materialabfall auf unter 5 %. Langlebige Konstruktion verringert Austauschzyklen. Wir bauen für Langlebigkeit, denn das ist die nachhaltigste Wahl.
  - icon: 🤝
    title: Unterstützung, die bleibt
    desc: Zwanzig Jahre alte Rümpfe rufen uns noch immer für Ersatzteile an. Unsere Garantieantwortzeit beträgt durchschnittlich 24 Stunden. Wir verschwinden nicht nach dem Verkauf – wir sind für die gesamte Produktlebensdauer da.

