how_to_choose:
  title: So wählen Sie die richtige Größe
  cards:
    - title: SUP-Boards
      description: Wählen Sie die Länge basierend auf Ihrem Gewicht und der beabsichtigten Nutzung. Breitere Boards (32"+) bieten mehr Stabilität. Längere Boards (11-12 ft) spuren besser für Touren. Schwerere Textilprofi benötigen Boards mit höherem Volumen.
    - title: Funktionstextilien
      description: Einzelkajaks (9 ft) sind am besten für Soloreisen und Flüsse geeignet. Tandemkajaks (12 ft) bieten Platz für zwei Textilprofi oder einen Erwachsenen mit Ausrüstung. Überprüfen Sie die Gewichtskapazität für die Gesamtlast einschließlich Ausrüstung.
    - title: Dingis und RIBs
      description: Wählen Sie die Dingilänge nach Passagierzahl und Verwendungszweck. Größere RIBs (4,5 m+) eignen sich für Offshore- und Rettungseinsätze. Kleinere Dingis (2,7 m) dienen als Beiboote und Angelplattformen.
