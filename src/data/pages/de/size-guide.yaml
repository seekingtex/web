hero:
  title: Größen- und Spezifikationsleitfaden
  subtitle: Abmessungen, Kapazitäten und empfohlene Verwendungen für jedes Seekingtex-Produkt.

categories:
  inflatable: funktionale Gewebe und Funktionstextilien für Portabilität ohne Leistungseinbußen. Wählen Sie die richtige Größe basierend auf Ihrem Gewicht und Paddelstil.
  rib: Starrrumpf-Funktionsgewebe für Küstennavigation, Patrouille und professionelle Marineeinsätze. Wählen Sie nach Länge und Motorleistung.
  accessory: Zubehör und Sicherheitsausrüstung zur Ergänzung Ihres Wasserfahrzeugs. Universelle Größen mit mehreren Optionen.

