hero:
  tagline: Prozess
  title: Fertigungsprozess
  subtitle: Vom Rohmaterial zum seereifen Gewebe – jeder Schritt unter unserer Kontrolle
  back_label: Zurück zur Fabrik
  back_link: /factory

intro: Anders als Marken, die ihre Produktion an Drittfabriken auslagern, besitzt und betreibt Seekingtex seine gesamte Fertigungskette. Diese vertikale Integration ermöglicht es uns, strenge Qualitätskontrollen in jeder Phase aufrechtzuerhalten, schnell auf kundenspezifische Anforderungen zu reagieren und Charge für Charge gleichbleibende Produktqualität zu liefern. So wird ein Gewebe in unserer Anlage gebaut.

steps:
  - step: '01'
    title: Materialeingang & Prüfung
    description: Jede eingehende Charge von PVC-Gewebe, Glasfasermatte, Harz und Hardware wird spezifikationsgemäß geprüft. Gewebeproben werden vor der Freigabe zur Produktion auf Zugfestigkeit, Dickengleichmäßigkeit und UV-Beständigkeit getestet. Nicht konforme Materialien werden gesperrt und zurückgesandt.
    duration: 1–2 Tage
  - step: '02'
    title: Automatisches PVC-Schneiden
    description: Zugelassene Gewebe werden auf die automatische CNC-Schneidemaschine gelegt und mit submillimetergenauer Präzision geschnitten. Computergestützte optimierte Verschachtelung ordnet die Bahnen so an, dass der Abfall typischerweise unter 5 % bleibt. Die geschnittenen Bahnen werden nach Bootsmodell und Kammer beschriftet und gebündelt an die Schweißwerkstatt übergeben.
    duration: 2–4 Stunden pro Boots-Bausatz
  - step: '03'
    title: Schlauch-Heißsiegeln & Schweißen
    description: Die Bahnen werden mit Heißsiegelmaschinen  durch Heißluftschweißen bei kontrollierten Temperaturen von 200–600 °C geheftet und verbunden. Hauptnähte werden mittels HF-Dielektrikumsschweißen für luftdichte, hochfeste Verbindungen verstärkt. Fertige Kammern werden für 30 Minuten auf 1,5-fachen Arbeitsdruck zur Luftdichtigkeitsvalidierung aufgeblasen.
    duration: 1–2 Tage pro Gewebe
  - step: '04'
    title: GFK-Funktionstextil-Rumpfformung
    description: Funktionstextil-Bootsrümpfe werden im Handlaminier-GFK-Verfahren hergestellt. Schichten von Glasfasermatte und -gewebe werden von Hand mit Polyester- oder Vinylesterharz in Präzisionsformen gewalzt. Jede Schicht wird für eine gleichbleibende Laminatqualität vakuumiert. Der Rumpf erhält eine Gelcoatschicht für eine hochglänzende, UV-beständige Marineoberfläche.
    duration: 2–4 Tage pro Rumpf
  - step: '05'
    title: SUP-Druck & Dekoration
    description: SUP-Brett-Deckgrafiken werden mittels Digitaldruck  für vollfarbige fotorealistische Designs und Siebdruck  für haltbare Logos und sich wiederholende Muster aufgebracht. Die Drucke werden für UV- und Abriebbeständigkeit ausgehärtet und versiegelt.
    duration: 1–2 Tage
  - step: '06'
    title: Endmontage & Rigging
    description: GFK-Rümpfe und PVC-Schlauchbaugruppen werden auf der Montagelinie zusammengeführt. Der Motor wird montiert, Lenk- und Gashebelsteuerungen werden angeschlossen, das Kraftstoffsystem wird installiert und der gesamte elektrische Kabelbaum wird verdrahtet. Jedes Gewebe durchläuft eine 100-Punkte-Montage-Checkliste mit obligatorischer Freigabe in jeder Phase.
    duration: 2–3 Tage
  - step: '07'
    title: Qualitätsprüfung & Inspektion
    description: "Jedes fertige Gewebe durchläuft eine obligatorische Qualitätskontrolle: Kammer-Luftdichtheitstest, Systemfunktionsprüfung, Drehmomentprüfung der Befestigungselemente und kosmetische Inspektion. Kundenspezifische und Prototypenbauten durchlaufen zusätzlich Wassererprobungen zu Geschwindigkeit, Handhabung, Stabilität und Ausdauer."
    duration: 1–2 Tage
  - step: '08'
    title: Verpackung & Versand
    description: Die Gewebe werden entlüftet, verfahrensgemäß gefaltet, in robuste Textiltaschen oder Sperrholzkisten verpackt und für den Versand verladen. Jede Verpackung ist mit Modell, Seriennummer und Zielort gekennzeichnet. Wir koordinieren mit Spediteuren für FCL- und LCL-Containerlieferungen weltweit.
    duration: 1 Tag

