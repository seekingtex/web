label: 'Garantie'
headline: 'Seekingtex Hersteller-Limited-Garantie'
subtitle: 'Seekingtex steht hinter der Qualität jedes aufblasbaren Marineprodukts, das wir herstellen. Diese Limited Garantie legt die Bedingungen und den Umfang der Deckung für Ihr Seekingtex-Produkt fest.'
seo:
  headline: 'Seekingtex Funktionsgewebe-Garantie — 5-Jahre Limited Garantie | Seekingtex'
  description: 'Seekingtex bietet eine 5-jährige Limited Garantie auf die Integrität des Hauptschlauchgewebes, der Nähte und der Glasfaserrumpf-Struktur. Abdeckung auch von Einlassventilen und werksseitig installiertem Zubehör. Vollständige Bedingungen der Seekingtex-Funktionsgewebe-Garantie.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Diese Limited Garantie gilt für neue Seekingtex-Marken-Funktionsgewebe, die direkt von Seekingtex oder einem autorisierten Seekingtex-Händler erworben wurden. Das Wirksamkeitsdatum ist das nachweisbare Datum des ursprünglichen Einzelhandelskaufs.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Garantieumfang und -dauer</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Jahre</h3>
        <p class="text-sm text-gray-600 mt-1">Integrität des Hauptschlauchgewebes (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Jahre</h3>
        <p class="text-sm text-gray-600 mt-1">Strukturelle Integrität des Glasfaserrumpfs</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Jahre</h3>
        <p class="text-sm text-gray-600 mt-1">Luftdichtigkeit der Schlauchbootnähte</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Jahre</h3>
        <p class="text-sm text-gray-600 mt-1">Funktion der Einlassventile</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 Jahr</h3>
        <p class="text-sm text-gray-600 mt-1">Werksseitig installiertes Zubehör und Armaturen</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 Jahr*</h3>
        <p class="text-sm text-gray-600 mt-1">Gewerbliche, Vermiet- oder Flottennutzung — alle Komponenten</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Gewerbliche, behördliche, Charter-, Vermiet- oder Ausbildungsnutzung reduziert die Garantie auf 1 Jahr. Renn- oder Wettkampfnutzung macht die Garantie vollständig ungültig.</p>
  </div>

  <h2>Was ist abgedeckt</h2>
  <h3>Hauptschlauchgewebe (5 Jahre)</h3>
  <p>Seekingtex garantiert, dass das Hauptschlauchgewebe frei von Porositätsverschlechterungen ist, die die Fähigkeit des Produkts, den Betriebsdruck zu halten, wesentlich beeinträchtigen. Dies gilt für CSM (Hypalon)-beschichtetes Gewebe und alle anderen verwendeten Schlauchmaterialien.</p>

  <h3>Strukturelle Integrität des Glasfaserrumpfs (5 Jahre)</h3>
  <p>Bei Produkten mit einem glasfaserverstärkten Kunststoffrumpf (GFK) wird die grundlegende Verbundstruktur gegen Strukturversagen aufgrund von Material- oder Verarbeitungsfehlern garantiert.</p>

  <h3>Luftdichtigkeit der Schlauchbootnähte (5 Jahre)</h3>
  <p>Die Nähte der Funktionsgewebe werden gegen Herstellungsfehler garantiert, die zu erheblichem Luftverlust durch die Naht führen. Regelmäßige Überprüfung und Einhaltung der empfohlenen Luftdrücke sind Bedingungen für die Deckung.</p>

  <h3>Funktion der Einlassventile (5 Jahre)</h3>
  <p>Die von Seekingtex ursprünglich installierten Einlassventile werden gegen Material- oder Verarbeitungsfehler garantiert, die das Ventil am bestimmungsgemäßen Lufthalten hindern.</p>

  <h3>Werksseitig installiertes Zubehör (1 Jahr)</h3>
  <p>Von Seekingtex hergestellte und werksseitig installierte Komponenten und Armaturen werden ein Jahr lang gegen Material- und Verarbeitungsfehler garantiert. Ausgeschlossen sind Drittartikel, die nur durch die jeweilige Herstellergarantie gedeckt sind.</p>

  <h2>Was ist nicht abgedeckt</h2>
  <ul>
    <li>Schönheitsfehler wie Verfärbung, Vergilbung, Ausbleichen, Kreidung oder sonstige Veränderungen des Aussehens</li>
    <li>Durchstiche, Schnitte, Risse oder andere physische Beschädigungen</li>
    <li>Haarrisse, Brüche, Abrieb, Scheuerstellen oder Verschleiß durch Reibung oder Kontakt</li>
    <li>Schäden durch UV-Strahlung, Witterungseinflüsse oder atmosphärische Bedingungen</li>
    <li>Schäden durch Kontakt mit Kraftstoffen, Lösungsmitteln, Säuren, Laugen oder Chemikalien</li>
    <li>Schäden durch Vernachlässigung, unsachgemäße Verwendung, Missbrauch, Unfall oder normalen Verschleiß</li>
    <li>Gelcoat- oder Lackoberflächenprobleme (Blasenbildung, Rissbildung, Verfärbung, Ausbleichen)</li>
    <li>Schäden durch Aufprall, Überlastung, unsachgemäße Lagerung oder Transport auf Anhänger</li>
    <li>Schäden durch unsachgemäßen Auf- oder Abbau oder Verwendung nicht zugelassener Pumpgeräte</li>
    <li>Drittausrüstung, -komponenten oder -systeme (durch die jeweiligen Hersteller gedeckt)</li>
  </ul>

  <h2>Verpflichtung des Herstellers und Abhilfe</h2>
  <p>Die alleinige und ausschließliche Verpflichtung von Seekingtex ist die Reparatur oder der Ersatz, nach Wahl von Seekingtex, von Komponenten, die als material- oder verarbeitungsfehlerhaft und unter diese Garantie fallend festgestellt wurden. Reparaturen oder Ersatz werden von Seekingtex oder einer benannten autorisierten Servicestelle durchgeführt. Reparierte oder ersetzte Komponenten sind nur für die Restlaufzeit der ursprünglichen Garantiezeit gedeckt.</p>

  <h2>Garantiebedingungen</h2>
  <ul>
    <li><strong>Registrierung:</strong> Das Produkt muss ordnungsgemäß gemäß den Garantiebedingungen registriert werden.</li>
    <li><strong>Wartung:</strong> Das Produkt muss gemäß den veröffentlichten Richtlinien von Seekingtex gewartet werden, einschließlich regelmäßiger Überprüfung und Einhaltung der empfohlenen Luftdrücke.</li>
    <li><strong>Mitwirkung:</strong> Der Käufer muss uneingeschränkt und zeitnah mit Seekingtex in allen Angelegenheiten im Zusammenhang mit Garantieansprüchen zusammenarbeiten.</li>
    <li><strong>Erstkäufer:</strong> Diese Garantie gilt ausschließlich für den ursprünglichen Endverbraucher und ist nicht übertragbar.</li>
  </ul>

  <h2>Gewerbliche Nutzung</h2>
  <p>Wenn das Produkt gewerblich, behördlich, gemeinnützig, als Charter, Vermietung, Ausbildung oder für andere als private Freizeitzwecke genutzt wird, verkürzt sich die Garantiezeit für alle Komponenten auf ein (1) Jahr ab dem ursprünglichen Kaufdatum. Die Nutzung bei Rennen, Geschwindigkeits- oder Ausdauerwettbewerben macht die Garantie sofort und unwiderruflich vollständig ungültig.</p>

  <h2>So melden Sie einen Garantieanspruch an</h2>
  <p>Kontaktieren Sie Seekingtex oder Ihren autorisierten Händler mit Kaufbeleg und einer detaillierten Beschreibung des Problems. Seekingtex prüft den Anspruch und gibt Anweisungen zur Inspektion und zum Service.</p>
  <p>Für Garantieserviceanfragen kontaktieren Sie uns bitte über unsere <a href="/contact" class="text-sky-600 underline">Kontaktseite</a> mit Ihrer Bestellnummer und Produktdetails.</p>

  <h2>Drittartikel</h2>
  <p>Ausrüstung, Komponenten oder Systeme von Drittherstellern (auch wenn von Seekingtex installiert) sind ausschließlich durch die jeweilige Herstellergarantie gedeckt. Seekingtex lehnt ausdrücklich jede Garantieverantwortung für solche Drittartikel ab.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Diese Garantieerklärung ist eine Zusammenfassung der vollständigen Seekingtex Hersteller-Limited-Garantie. Das vollständige rechtliche Garantiedokument regelt alle Garantiebedingungen. Änderungen vorbehalten. Seekingtex ist eine Marke der Qingdao Vatrad Group.
  </p>
