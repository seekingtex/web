stories:
  tagline: 'Entdeckergeschichten'
  title: 'Echte Abenteuer von echten Menschen'
  subtitle: 'Hören Sie von Paddlern, Familien und Profis, die Seekingtex-Ausrüstung auf dem Wasser nutzen.'
  items:
    - name: 'Sarah & Mike'
      title: 'SUP Explorer 11 Besitzer, Kanada'
      content: 'Wir haben unsere Explorer 11s auf eine einwöchige Reise durch den Algonquin Park mitgenommen. Sie haben Tragestellen und Seeüberquerungen wunderbar gemeistert. Die Drop-Stitch-Konstruktion bedeutete, dass wir auf 15 PSI aufpumpen und die Leistung eines Hartschalenboards von einem packbaren Board erhalten konnten.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Algonquin Park, Kanada'
    - name: 'Carlos R.'
      title: 'Cheetah Surge Fahrer, Spanien'
      content: 'Der Cheetah Surge ist mein Favorit für Küstentouren. Das lebendige Design zieht alle Blicke am Strand auf sich, und die Stabilität gibt mir Vertrauen bei leichtem Wellengang. Er fährt sich wunderbar, egal ob ich auf Tour bin oder einfach den Sonnenuntergang genieße.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Spanien'
    - name: 'Lina & Familie'
      title: 'Flowing Lotus Textilprofi, Schweden'
      content: 'Wochenend-Familienabenteuer im Archipel. Der Flowing Lotus ist stabil genug, dass meine Tochter darauf stehen kann, während ich paddle. In weniger als 10 Minuten aufgepumpt – kein Trailer nötig, einfach purer Familienspaß auf dem Wasser.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Stockholm Archipel, Schweden'
    - name: 'Lt. Cmdr. Andres'
      title: 'Ocean Voyager Entdecker, Philippinen'
      content: 'Ich nutze meinen Ocean Voyager für Langstrecken-Küstentouren rund um Palawan. Nach monatelanger täglicher Nutzung unter tropischen Bedingungen leistet das Board immer noch wie neu. Die Tourenform durchschneidet Wellen, die schwächere Boards zum Stillstand bringen würden.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Philippinen'
    - name: 'Emma T.'
      title: 'Tropical Breeze Anfängerin, Australien'
      content: 'Ich war noch nie auf einem SUP. Der Tropical Breeze ist so stabil, dass ich mich beim ersten Versuch sicher fühlte. Jetzt paddle ich jedes Wochenende. Die Lernkurve ist praktisch null – und das Board sieht auf dem Wasser fantastisch aus.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Australien'

