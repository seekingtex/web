hero:
  tagline: Seekingtex Akademie
  title: Lernzentrum
  subtitle: Anleitungen und Tutorials für jedes Könnensniveau – von SUP-Grundlagen bis zu fortgeschrittenen Rettungstechniken

categories:
  - level: Anfänger
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: SUP-Grundlagen
        desc: Lernen Sie die Grundlagen des Stand-Up-Paddelns – Haltung, Schlagtechnik und Gleichgewicht.
        slug: sup-basics
      - title: Paddeltechniken
        desc: Vorwärtsschlag, Bogenschlag, Ziehschlag und Tiefenstütz – beherrschen Sie die wesentlichen Paddelbewegungen.
        slug: paddle-techniques
      - title: Sicherheit zuerst
        desc: Grundlegende Sicherheitspraktiken einschließlich Wettercheck, Schwimmwestenpflicht, Leinenregeln und Selbstrettung.
        slug: safety-first
  - level: Fortgeschritten
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Touren-Grundlagen
        desc: Planung von mehrstündigen Paddeltouren – Navigation, Flüssigkeitszufuhr, Tempo und Windvorhersagen lesen.
        slug: touring-essentials
      - title: Wetter lesen
        desc: Interpretieren von Seewettervorhersagen, Erkennen von Wolkenmustern und Verstehen von Windeffekten auf dem Wasser.
        slug: weather-reading
      - title: Navigationsgrundlagen
        desc: Kartenlesen, Kompassnutzung, GPS-Wegpunkte und Routenplanung für Küstenpaddeltouren.
        slug: navigation-basics
      - title: Gezeitenbewusstsein
        desc: Verständnis von Gezeitenzyklen, Strömungen und deren Auswirkungen auf Startzeitpunkt und Routenführung.
        slug: tidal-awareness
  - level: Fortgeschritten
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Mehrtägige Reiseplanung
        desc: Expeditionslogistik – Ausrüstungsauswahl, Essensplanung, Sicherheitsprotokolle und Notfallkontakte.
        slug: multi-day-trip-planning
      - title: Rettungstechniken
        desc: Selbstrettung, T-Rettung, Eskimo-Rettung für Funktionstextilien und Schleppverfahren auf offenem Wasser.
        slug: rescue-techniques
      - title: Nachtpaddeln
        desc: Navigation bei Dunkelheit – Beleuchtungsanforderungen, Routenerinnerung, Gruppenkommunikation und Gefahrenbewusstsein.
        slug: night-paddling
  - level: Wartung
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Reinigung & Pflege
        desc: Süßwasserspülung, UV-Schutz, Schimmelprävention und richtige Trocknungstechniken nach jeder Session.
        slug: cleaning-and-care
      - title: Aufbewahrungsanleitung
        desc: Best Practices für die Lagerung aufblasbarer Bretter und Gewebe – Entlüftung, Falten, Temperaturkontrolle und Haltbarkeit.
        slug: storage-guide
      - title: Reparatur-Grundlagen
        desc: Kleine Durchstiche, Nahtundichtigkeiten und Ventilprobleme mit PVC-Reparatursets und Flicktechniken beheben.
        slug: repair-basics
      - title: Ventilwartung
        desc: Ventiltypen identifizieren (Halkey-Roberts, Boston, Leafield), Schmutz entfernen und defekte Ventilschäfte ersetzen.
        slug: valve-maintenance

