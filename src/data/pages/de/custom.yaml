hero:
  tagline: Seekingtex Custom Lab
  title: Entwerfen Sie Ihr eigenes<br />Textilprodukt
  subtitle: OEM-, ODM-, Private-Label- und individuelle Branding-Dienstleistungen für Unternehmen weltweit. Vom einzelnen Prototypen bis zur vollständigen Produktionsserie.
  cta: Starten Sie Ihr Projekt
  footer_link: /contact

steps_section:
  tagline: So funktioniert es
  title: Vom Konzept zur Produktion
  subtitle: Vier Schritte von Ihrer Idee bis zum fertigen, seereifen Produkt.
  steps:
    - num: '01'
      title: Wählen Sie Ihr Board
      desc: Wählen Sie aus unseren Kernmodellen – SUP, Funktionstextilien, Dingi oder Funktionstextil. Wählen Sie Größe, Material und Farbe.
    - num: '02'
      title: Laden Sie Ihr Design hoch
      desc: Senden Sie uns Ihr Logo, Ihre Grafiken oder Ihre Markenrichtlinien. Unser Designteam erstellt einen digitalen Proof.
    - num: '03'
      title: KI-Mockup-Prüfung
      desc: Sehen Sie sich ein fotorealistisches KI-generiertes Mockup Ihres individuellen Boards an, bevor die Produktion beginnt.
    - num: '04'
      title: Produktion & Lieferung
      desc: Nach der Freigabe geht Ihre Bestellung in unsere ISO-zertifizierte Produktionslinie. Lieferzeiten ab 30 Tagen.

services_section:
  tagline: Dienstleistungen
  title: Fertigungsdienstleistungen für globale Marken
  subtitle: Flexible Engagement-Modelle – von der Auftragsfertigung bis zum Full-Service-Markenaufbau.
  items:
    - title: OEM-Fertigung
      desc: Wir produzieren Ihre Entwürfe nach Spezifikation – Ihr geistiges Eigentum, Ihre Zeichnungen, Ihre Qualitätsstandards. Vollständiger NDA-Schutz.
      icon: ⚙️
    - title: ODM-Lösungen
      desc: Wählen Sie aus über 50 bewährten Plattformen und passen Sie Größe, Farbe, Grafiken und Verpackung an.
      icon: '🎨'
    - title: Private Label
      desc: Ihre Marke auf unseren Produkten – Logo, Verpackung, Anhänger, Handbücher. Verkaufsfertig aus der Verpackung.
      icon: 🏷️
    - title: Individuelles Branding
      desc: Deckpad-Druck, Rumpfgrafiken, Schlauchaufkleber und individuelle Etiketten – vollständige Markenintegration.
      icon: ✨

capabilities_section:
  tagline: Fähigkeiten
  title: Produktions- & Individualisierungsmöglichkeiten
  subtitle: Alles, was Sie vor Ihrer Bestellung wissen müssen.
  capabilities:
    - label: Bestellmenge
      value: MOQ 5–10 Einheiten (SUP/Funktionstextilien), 2–5 Einheiten (Funktionstextil)
    - label: Lieferzeit
      value: 30–45 Tage Standard; 15–20 Tage für Prototypen
    - label: Individualisierung
      value: Größe, Form, Farbe, Grafiken, Verpackung, Hardware
    - label: Materialien
      value: PVC, Hypalon, Drop-Stitch, Glasfaser, Aluminium
    - label: Druck
      value: Digital (CMYK), Siebdruck, Transferdruck, Sublimation
    - label: Zertifizierung
      value: CE, UKCA, FCC (Unterstützung für globale Konformität)

