hero:
  tagline: "Ausrüstung"
  title: "Fertigungsausrüstung & Maschinen"
  subtitle: "Industrielle Ausrüstung für Schneiden, Schweißen, Drucken und Montage"
  back_label: "Zurück zur Fabrik"
  back_link: /factory

categories:
  - title: "Schneiden & Materialvorbereitung"
    items:
      - name: "Automatische PVC-Schneidemaschine"
        spec: "CNC-gesteuert, 6.5 m × 2.5 m, 0.1 mm Genauigkeit"
        desc: "Computer gesteuerte automatische Schneidemaschine für PVC-, Hypalon- und Drop-Stitch-Gewebe. Nesting-Software optimiert die Materialausnutzung auf unter 5 % Verschnitt."
      - name: "Stoffspreizer"
        spec: "3 m max. Breite, spannungsgesteuerte Zuführung"
        desc: "Legt Stoff in einzelnen oder mehreren Lagen mit kontrollierter Spannung aus, um Verzug vor dem Schneiden zu verhindern."
  - title: "Rohrschweißen & Verbinden"
    items:
      - name: "Heißsiegelmaschine"
        spec: "Heißluftschweißen, variabel 200–600 °C, 0.5–5 m/min"
        desc: "Heißluft-Heißsiegelmaschine zum Verbinden und Schweißen von PVC- und Hypalon-Rohrnähten. Wird zum Fixieren, Versiegeln und Verschmelzen von Rohrkammern und Schwimmverbindungen verwendet."
      - name: "Dielektrische RF-Presse"
        spec: "15 kW, Platte 2000 × 600 mm"
        desc: "Hochfrequenz-Schweißpresse für Hauptlängsnähte, Heckwand-zu-Rohr-Verbindungen und die Fertigung großer Kammern."
      - name: "CNC-gesteuerte RF-Schweißmaschine"
        spec: "8 kW, XY-Tisch 2500 × 1200 mm"
        desc: "Programmierbares Schweißen gekrümmter Nähte für komplexe Geometrien, Logo-Prägung und präzise Flicken."
  - title: "Funktionstextil-Rumpffertigung"
    items:
      - name: "GFK-Handlaminierformen"
        spec: "Mehrere Formen für Funktionstextil-Rümpfe bis 6 m LOA"
        desc: "Traditionelles Handlaminieren von Glasfaser mit Polyester- und Vinylester-Harzsystemen. Jede Schicht wird von Hand gerollt und vakuumbeutelt für gleichbleibende Laminatqualität und Festigkeit."
      - name: "Gelcoat-Spritzkabine"
        spec: "Temperaturgesteuert, gefilterte Luftventilation"
        desc: "Gelcoat-Aufbringung für Funktionstextil-Rümpfe. Bietet eine hochglänzende, UV-beständige Oberfläche mit präziser Dickenkontrolle."
      - name: "CNC-Fräse (5-Achsen)"
        spec: "3 m × 2 m × 1 m Arbeitsraum, wassergekühlte Spindel"
        desc: "Bearbeitung von Rumpfeinlagen, Konsolenformen, Sitzbasen und kundenspezifischen Halterungen."
  - title: "SUP-Druck & Dekoration"
    items:
      - name: "Digitaldrucker"
        spec: "Hochauflösender Tintenstrahl, Druckbreite bis 2 m"
        desc: "Direkter Digitaldruck auf Stoff für vollfarbige SUP-Deckengrafiken. Druckt individuelle Muster, Verläufe und fotorealistische Bilder mit UV-beständigen wasserbasierten Tinten."
      - name: "Siebdruckmaschine"
        spec: "Manuell und halbautomatisch, Mehrfarben-Registration"
        desc: "Siebdruck für SUP-Brett-Logos, Markenzeichen und sich wiederholende Muster. Bietet langlebige, deckende Drucke mit lebendiger Farbsättigung."
  - title: "Montage & Ausrüstung"
    items:
      - name: "Motorheber"
        spec: "500 kg Tragkraft, verstellbare Spreizstange"
        desc: "Sichere Montage von Außenbordmotoren von 2.5 bis 60 PS."
      - name: "Konsole-Mock-up-Rahmen"
        spec: "Verstellbare Höhe und Winkel"
        desc: "Vormontage von Lenkung, Gashebel und Instrumentenfeldern vor der Installation."
      - name: "Hydraulische Schlauchpresse"
        spec: "Bis 1\" ID, digitales Druckmessgerät"
        desc: "Hydraulische Lenkschlauch-Sätze in Sonderlänge mit gepressten Verschraubungen."
      - name: "Elektrisches Kabelbrett"
        spec: "3 m × 1.5 m, vorgedruckte Verdrahtungspläne"
        desc: "Montage und Prüfung kompletter elektrischer Kabelbäume außerhalb des Bootes."
  - title: "Prüfung & Qualitätskontrolle"
    items:
      - name: "Universelle Zugprüfmaschine"
        spec: "50 kN, ASTM D751"
        desc: "Bruchkraft-, Bruchdehnungs- und Weiterreißprüfung für Stoffchargen."
      - name: "Luftrückhalte-Teststand"
        spec: "Programmierbar, 30-Minuten-Druckhaltung"
        desc: "Automatisierter Druckhaltetest für jede Rohrkammer vor der Montage."
      - name: "Naht-Peelprüfer"
        spec: "Motorisierter 180°-Peel bei 100 mm/min"
        desc: "Peel-Festigkeitsprüfung von geschweißten und geklebten Nähten gemäß ISO 6185."
      - name: "Xenon-Bogen-Bewitterungskammer"
        spec: "2000 h Bewitterung"
        desc: "UV-Beständigkeitsprüfung für Farbveränderung und Festigkeitserhalt."

