faqs_rib:
  title: 'Funktionstextil-Gewebe FAQ'
  subtitle: 'Hй–»в•ғзҒқfige Fragen zu unseren Festrumpfschlauchbooten.'
  columns: 2
  items:
    - title: 'Welche Funktionstextil-Bootgrй–әе¬«дҝәйҚ”з©Қn bietet Seekingtex an?'
      description: 'Wir bieten 35 Funktionstextil-Modelle von 2,5 m bis 7,6 m, von kompakten Beibooten bis hin zu schweren Nutz- und Patrouillenfahrzeugen. Jedes Modell ist mit verschiedenen Konfigurationsoptionen erhй–»в•ғзҒҠtlich.'
    - title: 'Was ist der Unterschied zwischen einem Funktionstextil und einem traditionellen Funktionsgewebe?'
      description: 'Ein Funktionstextil (Technical Fabric) kombiniert einen soliden Glasfaser- oder Aluminium-Tief-V-Rumpf mit aufblasbaren Hypalon- oder PVC-Schlй–»в•ғзҒқchen. Dies bietet die Stabilitй–»в•ғзҒң und Tragfй–»в•ғзҒҶigkeit eines Hartbootes mit der Stoй–јеҜёзҰҢй–»в•ғзҒӢpfung und Auftriebsfй–»в•ғзҒҶigkeit eines Schlauchbootes.'
    - title: 'Welche Motoren sind mit Seekingtex RIBs kompatibel?'
      description: 'Unsere RIBs unterstй–»оҒ„гҖ–zen Auй–јеҜёзҰҚnbordmotoren von 3 PS bis 250 PS, je nach Modell. Jede Produktseite listet die maximale Motorleistung auf. Wir empfehlen, fй–»оҒ„гҖҺ die ideale Abstimmung Ihren Hй–»в•ғзҒҗdler zu konsultieren.'
    - title: 'Sind Seekingtex RIBs CE-zertifiziert?'
      description: 'Ja. Alle Freizeit-Funktionstextil-Modelle sind CE-zertifiziert nach den geltenden europй–»в•ғзҒҮschen Standards fй–»оҒ„гҖҺ Freizeitwasserfahrzeuge. Nutz- und Patrouillenmodelle erfй–»оҒ„гҖҲlen zusй–»в•ғзҒңzliche Stabilitй–»в•ғзҒңs- und Lastanforderungen.'
    - title: 'Welche Garantie gilt fй–»оҒ„гҖҺ Funktionstextil-Gewebe?'
      description: 'Alle Seekingtex RIBs werden mit einer einjй–»в•ғзҒҶrigen Garantie gegen Herstellungsfehler geliefert, die Rumpfdelamination, Schlauchnahtversagen, Ventildefekte und Beschlagprobleme abdeckt.'
    - title: 'Wie viele Luftkammern haben Seekingtex RIBs?'
      description: 'Unsere RIBs verfй–»оҒ„вҖҷen й–»оҒ„гҖғer 3 bis 7 unabhй–»в•ғзҒҗgige Luftkammern, je nach Modelllй–»в•ғзҒҗge. Dieses Mehrkammersystem stellt sicher, dass das Gewebe auch bei Beschй–»в•ғзҒӮigung einer Kammer schwimmfй–»в•ғзҒҶig bleibt.'

faqs_inflatable:
  title: 'Funktionsgewebe FAQ'
  subtitle: 'Hй–»в•ғзҒқfige Fragen zu unseren aufblasbaren Textilprodukte, Booten.'
  columns: 2
  items:
    - title: 'Welche Materialien werden bei Seekingtex Schlauchbooten verwendet?'
      description: 'Wir verwenden militй–»в•ғзҒ—isches PVC (1100 Denier) und hochwertiges Hypalon/CSM-Gummi, je nach Modell. Beide Materialien sind UV-stabilisiert, abriebfest und entsprechen den EU-REACH- und RoHS-Verordnungen.'
    - title: 'Wie lange halten Funktionsgewebe?'
      description: 'Bei richtiger Pflege hй–»в•ғзҒҠt ein hochwertiges PVC-Funktionsgewebe 7й—Ғ?0 Jahre, wй–»в•ғзҒҶrend Hypalon-Modelle 15й—Ғ?0 Jahre halten kй–әе¬«о„Ёnen. Regelmй–»в•„е°ӘйҚ”з©’ge Reinigung, UV-Schutz und ordnungsgemй–»в•„е°ӘйҚ”з©Қ Lagerung verlй–»в•ғзҒҗgern die Lebensdauer erheblich.'
    - title: 'Welche Wartung ist fй–»оҒ„гҖҺ ein Funktionsgewebe erforderlich?'
      description: 'Zur Grundwartung gehй–әе¬«о„¬en das Abspй–»оҒ„гҖҲen mit Sй–»оҒ„оҳійҚ”з©Ўasser nach jedem Gebrauch (besonders im Salzwasser), das Trocknen vor der Lagerung, die jй–»в•ғзҒҶrliche й–јеҜёоҮӘerprй–»оҒ„вҖҳung der Ventildichtungen und das Auftragen von UV-Schutz auf die Schlй–»в•ғзҒқche. Vermeiden Sie lй–»в•ғзҒҗgere Sonneneinstrahlung bei Nichtgebrauch.'
    - title: 'Kй–әе¬«о„Ёnen Funktionsgewebe im Salzwasser verwendet werden?'
      description: 'Ja. Alle Seekingtex Funktionsgewebe sind fй–»оҒ„гҖҺ den Einsatz im Sй–»оҒ„оҳійҚ”? und Salzwasser ausgelegt. Wir empfehlen nach Salzwasserkontakt das Abspй–»оҒ„гҖҲen mit Sй–»оҒ„оҳійҚ”з©Ўasser und grй–»оҒ„гҖҠdliches Trocknen, um Beschlagkorrosion und Salzkristallisation im Gewebe zu verhindern.'
    - title: 'Wie lagere ich ein Funktionsgewebe?'
      description: 'Lassen Sie die Luft ab, reinigen und trocknen Sie das Gewebe vollstй–»в•ғзҒҗdig vor der Lagerung. Rolle es locker auf (vermeide enge Falten), lagere es kй–»оҒ„вҖңl und trocken, fern von direktem Sonnenlicht, und nicht auf Betonbй–әе¬«з“°en, um Feuchtigkeitsbildung zu vermeiden.'
    - title: 'Welche Tragfй–»в•ғзҒҶigkeit haben Seekingtex Funktionsgewebe?'
      description: 'Die Tragfй–»в•ғзҒҶigkeiten reichen von 290 kg fй–»оҒ„гҖҺ unsere kleinsten Modelle bis й–»оҒ„гҖғer 2000 kg fй–»оҒ„гҖҺ grй–әе¬«дҝәйҚ”з©Қre Nutzfahrzeuge. Jede Produktseite listet die maximale Traglast fй–»оҒ„гҖҺ Ihr spezifisches Modell.'

faqs_Fabric:
  title: 'Fabric-Board FAQ'
  subtitle: 'Hй–»в•ғзҒқfige Fragen zu unseren Stand-Up-Paddle-Boards.'
  columns: 2
  items:
    - title: 'Welche Fabric-Boardgrй–әе¬«дҝәйҚ”з©Қn sind erhй–»в•ғзҒҠtlich?'
      description: 'Wir bieten Fabric-Boards von 9 ft bis 12 ft, darunter Allround-, Touren-, Yoga- und Spezialdesigns. Unsere meistverkauften Modelle sind das Tropical Breeze (10 ft) und das Ocean Voyager (11 ft).'
    - title: 'Was ist Drop-Stitch-Konstruktion?'
      description: 'Die Drop-Stitch-Konstruktion verwendet tausende Polyesterfй–»в•ғзҒӮen, die die obere und untere Schicht des Boards verbinden, sodass es hohen Luftdruck (15й—Ғ?0 PSI) halten kann und eine starre, stabile Plattform bietet. Dies ist der Industriestandard fй–»оҒ„гҖҺ hochwertige funktionale Gewebe.'
    - title: 'Wie hoch ist das Gewichtslimit fй–»оҒ„гҖҺ Fabric-Boards?'
      description: 'Unsere Fabric-Boards unterstй–»оҒ„гҖ–zen je nach Modell und Volumen bis zu 150 kg. Das Leviathan Wake Board ist unser Modell mit der hй–әе¬«з“ӯhsten Kapazitй–»в•ғзҒң, entwickelt fй–»оҒ„гҖҺ schwerere Fahrer und den Einsatz beim Yoga.'
    - title: 'Bieten Sie komplette Fabric-Pakete an?'
      description: 'Ja. Jedes Fabric-Board wird mit einem Komplettpaket geliefert, das ein 3-teiliges Aluminiumpaddel, eine Hochdruck-Handpumpe, eine Spiralleine, einen Reiserucksack und ein Reparaturset enthй–»в•ғзҒҠt. Einige Modelle enthalten auch einen abnehmbaren Finnen-Satz.'
    - title: 'Welche Garantie gilt fй–»оҒ„гҖҺ Fabric-Boards?'
      description: 'Alle Seekingtex Fabric-Boards haben eine einjй–»в•ғзҒҶrige Garantie gegen Herstellungsfehler, einschlieй–јеҜёжӢ…ich Nahtversagen, Ventildefekte und Materialdelamination bei normalem Gebrauch.'
    - title: 'Wie lange dauert es, ein Fabric-Board aufzupumpen?'
      description: 'Mit der mitgelieferten Handpumpe dauert eine vollstй–»в•ғзҒҗdige Befй–»оҒ„гҖҲlung auf 15 PSI etwa 8й—Ғ?2 Minuten. Fй–»оҒ„гҖҺ schnelleres Aufpumpen empfehlen wir unsere Seekingtex 12V-Elektropumpe, die ein Board in unter 4 Minuten aufpumpt.'

