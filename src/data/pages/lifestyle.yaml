hero:
  tagline: Lifestyle
  title: The Seekingtex<br />Approach
  subtitle: Built for those who demand performance — from sportswear brands to outdoor equipment manufacturers who depend on our fabrics every day.

values:
  - icon: 🔬
    title: Engineered for Performance
    desc: Every fabric starts with understanding how it will be used — sport, outdoor, medical, or tactical. We engineer from application requirements inward, because performance is not optional.
  - icon: 🔧
    title: Built to Last
    desc: The most sustainable fabric is the one that does not need replacing. Superior fiber selection, precision weaving, and durable finishes that outlast industry standards.
  - icon: '🏆'
    title: Quality Without Compromise
    desc: Premium fabrics should not be a luxury reserved for high-end brands. OEKO-TEX certified quality at competitive pricing that makes sense for growing brands and established manufacturers alike.
  - icon: 🌍
    title: Global Reach
    desc: From our facility in Kunshan to garment factories in Southeast Asia, cutting rooms in Europe, and brand headquarters in the Americas — our fabrics travel the globe.
  - icon: ♻️
    title: Responsible Manufacturing
    desc: Recycled polyester options, PFAS-free waterproofing, and energy-efficient production processes. We build sustainably because that is the only responsible choice.
  - icon: 🤝
    title: Support That Lasts
    desc: Five-year-old orders still get technical support. Our team responds within 24 hours. We do not disappear after the shipment — we are here for the life of the product.

