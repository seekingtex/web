  headline: 'Outdoor & Adventure Gear Fabrics — OEM Manufacturing | Seekingtex'
  description: 'Seekingtex manufactures functional fabrics for outdoor and adventure gear: waterproof breathable membranes, moisture-wicking base layers, durable shell fabrics. OEKO-TEX certified. Custom specifications available.'
