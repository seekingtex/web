hero:
  tagline: Lifestyle
  title: Seekingtex<br />Lifestyle
  subtitle: Gemaakt voor degenen die op het water leven — van weekendontdekkers tot commerciële operators die dagelijks op hun uitrusting vertrouwen.

values:
  - icon: 🌊
    title: Geboren uit het water
    desc: Elk ontwerp begint met inzicht in hoe water zich gedraagt. We ontwerpen van de rand van de omstandigheden naar binnen — omdat de oceaan onze leraar is, niet onze werkplek.
  - icon: 🔧
    title: Gebouwd om te blijven
    desc: Het meest duurzame product is er een dat niet vervangen hoeft te worden. Maritieme materialen, drop-stitch kernen die 15 PSI weerstaan en naden die seizoenen meegaan.
  - icon: '🏆'
    title: Toegankelijk van ontwerp
    desc: Watersporten mogen geen luxe zijn. Professionele prestaties voor een prijs die logisch is voor gezinnen, instructeurs en kleine operators — niet alleen commerciële vloten.
  - icon: 🌍
    title: Wereldwijde gemeenschap
    desc: "Van de kust van Qingdao tot meren in Europa, rivieren in Zuidoost-Azië en baaien in Amerika — onze klanten delen één ding: liefde voor het zijn op het water."
  - icon: ♻️
    title: Verantwoorde productie
    desc: Geoptimaliseerd CNC-snijden vermindert materiaalafval tot onder 5%. Duurzame constructie vermindert vervangingscycli. We bouwen met het oog op duurzaamheid, want dat is de meest duurzame keuze.
  - icon: 🤝
    title: Ondersteuning die blijft
    desc: Twintig jaar oude rompen bellen ons nog steeds voor reserveonderdelen. Onze garantierespons is gemiddeld 24 uur. We verdwijnen niet na de verkoop — we zijn er voor de hele levensduur van het product.

