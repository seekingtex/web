intro:
  - Het Onderzoeks- en Ontwikkelingscentrum (R&D) van Seekingtex is de drijvende kracht achter onze missie om watersportuitrusting te revolutioneren. We versterken watersportliefhebbers wereldwijd met veiligere, comfortabelere en plezierigere producten door voortdurende innovatie in functionele stoffen's en weefsel. Ons toegewijde team van ingenieurs, ontwerpers en watersportfanaten geeft vorm aan de toekomst van de industrie door de lat voor kwaliteit, prestaties en duurzaamheid steeds hoger te leggen.
  - Onze R&D-faciliteit brengt materiaalwetenschappers, scheepsarchitecten en productie-ingenieurs onder 茅茅n dak. Van stofformulering en rompsimulatie tot lasprocesontwikkeling en volwaardige vaarproeven 鈥攅lke fase van productontwikkeling wordt door data gedreven en door tests gevalideerd.

