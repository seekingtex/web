vision:
  tagline: Onze visie
  title: Vormgeven van de toekomst van textielindustrie
  body: Seekingtex streeft ernaar de leider te zijn in de functionele boot- en textile products-industrie door continue innovatie, onwrikbare kwaliteit en een vastberaden toewijding aan veiligheid en duurzaamheid 鈥攗iteindelijk verrijken we de ervaringen van watersportliefhebbers wereldwijd. Het Seekingtex R&D-centrum is waar passie en innovatie samenkomen en nieuwe normen stellen voor de watersportindustrie.

labs_section:
  tagline: Laboratoria
  title: Onze laboratoria
  labs:
    - image: /images/seekingtex/randd/Seekingtex-pvc-material-lab.webp
      title: PVC-stoffenlaboratorium
      description: Continu onderzoek en testen van PVC- en Hypalon-buizenstoffen op treksterkte, UV-bestendigheid, slijtage en flexibiliteit bij lage temperaturen om langdurige betrouwbaarheid in maritieme omgevingen te garanderen.
      href: /randdcenter/pvc-fabric-lab
    - image: /images/seekingtex/factory/design discuss2.jpeg
      title: Romptechniek Studio
      description: CAD-ontwerp en eindige-elementenanalyse van HDPE-, aluminium- en glasvezelrompen. Elke romp wordt digitaal gesimuleerd op spanningsverdeling en schokbestendigheid voordat het eerste prototype wordt gebouwd.
      href: /randdcenter/hull-engineering
    - image: /images/seekingtex/factory/textile products making3.jpeg
      title: RF-lascentrum
      description: Speciale RF-lasfaciliteit met nauwkeurige temperatuur- en drukregeling, die hoogsterke, luchtdichte naden produceert die de -normen voor functionele vaartuigen overtreffen.
      href: /randdcenter/rf-welding
    - image: /images/seekingtex/factory/design discuss original.jpeg
      title: Hydrodynamische testtank
      description: Testen op schaalmodellen in onze eigen testtank ter optimalisatie van rompvorm, planeerprestaties, stabiliteit en brandstofeffici毛ntie over een reeks belastingen en zeegang.
      href: /randdcenter/hydrodynamic-test-tank
    - image: /images/seekingtex/products/textile products-series/textile products-ocean-voyager-1.webp
      title: Prototypewerkplaats
      description: Faciliteit voor volwaardig prototypen en uitrusten, waar nieuwe modellen worden gebouwd, gemonteerd en getest. Elk prototype ondergaat minimaal 20 uur vaartesten voordat productie wordt goedgekeurd.
      href: /randdcenter/prototype-workshop
    - image: /images/seekingtex/factory/UV Resistance Testing.jpeg
      title: Kwaliteits- en inspectielaboratorium
      description: Speciaal kwaliteitslaboratorium dat trekproeven, luchtdichtheidscycli, naadpeeltesten en materiaalcertificering uitvoert om te garanderen dat elke boot die de werkplaats verlaat aan onze gepubliceerde specificaties voldoet.
      href: /randdcenter/quality-inspection-lab
