hero:
  tagline: Technologie
  title: Onze technologie
  subtitle: Seekingtex-producten zijn ontworpen met geavanceerde materialen en innovatieve techniek om uitzonderlijke prestaties, duurzaamheid en draagbaarheid te leveren.

features:
  - title: Militaire kwaliteit PVC
    description: Onze functionele stoffen en SUP's gebruiken UV-bestendig, slijtvast PVC-weefsel met hoge trek- en scheursterkte.
  - title: Drop-Stitch constructie
    description: Duizenden hogedichtheidvezels verbinden het boven- en onderoppervlak en vormen een stijf, hogedrukdek 鈥?waardoor functionele stoffen's prestaties leveren die vergelijkbaar zijn met harde boards.
  - title: Hetelassen
    description: Verbindingen worden hetelastisch gelast in plaats van gelijmd, wat zorgt voor duurzame hechtsterkte op kritieke spanningspunten.
  - title: Automatische opblaastechnologie
    description: Safety Fabric gebruikt een automatisch opblaasmechanisme dat onmiddellijk wordt geactiveerd bij onderdompeling en betrouwbaar drijfvermogen biedt.
