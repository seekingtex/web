hero:
  tagline: Seekingtex Academy
  title: Kenniscentrum
  subtitle: Handleidingen en tutorials voor elk vaardigheidsniveau — van SUP-basis tot geavanceerde reddingstechnieken

categories:
  - level: Beginner
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: SUP-basis
        desc: Leer de basis van staand textielgebruik — houding, peddeltechniek en balans.
        slug: sup-basics
      - title: Peddeltechnieken
        desc: Voorwaarts textielgebruik, achterwaarts textielgebruik, trekpeddel en lage steun — beheers de basispeddelbewegingen.
        slug: paddle-techniques
      - title: Veiligheid voorop
        desc: Essentiële veiligheidspraktijken, waaronder weerscontrole, PFD-gebruik, leiblijnregels en zelfredding.
        slug: safety-first
  - level: Gemiddeld
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Basis toerkajakken
        desc: Meerdaagse tochten plannen — navigatie, hydratatie, tempo en windvoorspellingen lezen.
        slug: touring-essentials
      - title: Weer lezen
        desc: Marinevoorspellingen interpreteren, wolkenpatronen herkennen en de invloed van wind op water begrijpen.
        slug: weather-reading
      - title: Navigatiebasis
        desc: Kaartlezen, kompas gebruiken, GPS-waypoints en routeplanning voor kustnavigatie.
        slug: navigation-basics
      - title: Getijdenbewustzijn
        desc: Inzicht in getijdencycli, stromingen en hun invloed op vertrektijd en route.
        slug: tidal-awareness
  - level: Gevorderd
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Meerdaagse tochten plannen
        desc: Expeditielogistiek — uitrustingskeuze, maaltijdplanning, veiligheidsprotocollen en noodcontacten.
        slug: multi-day-trip-planning
      - title: Reddingstechnieken
        desc: Zelfredding, T-redding, Eskimoredding voor technische stoffen en sleepprotocollen op open water.
        slug: rescue-techniques
      - title: Nachtpeddelen
        desc: Navigatie in het donker — verlichtingseisen, routegeheugen, groepscommunicatie en gevarenbewustzijn.
        slug: night-paddling
  - level: Onderhoud
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Reiniging en verzorging
        desc: Spoelen met zoet water, UV-bescherming, schimmelpreventie en juiste droogtechnieken na elke sessie.
        slug: cleaning-and-care
      - title: Opslag
        desc: Beste opslagpraktijken voor functionele boards en weefsel — leeglaten, opvouwen, temperatuurbeheer en houdbaarheid.
        slug: storage-guide
      - title: Reparatiebasis
        desc: Kleine lekken, lekkende naden en klepproblemen repareren met PVC-reparatiesets en patchtechnieken.
        slug: repair-basics
      - title: Kleponderhoud
        desc: Identificatie van kleptypen (Halkey-Roberts, Boston, Leafield), reinigen van vuil en vervangen van defecte kleppen.
        slug: valve-maintenance

