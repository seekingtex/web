intro: In tegenstelling tot merken die productie uitbesteden aan derden, bezit en beheert Seekingtex zijn volledige productieketen. Deze verticale integratie stelt ons in staat om strikte kwaliteitscontrole te handhaven in elke fase, snel te reageren op maatwerkvereisten en consistente productkwaliteit te leveren batch na batch. Zo wordt een boot gebouwd in onze fabriek.

steps:
  - step: '01'
    title: Ontvangst en inspectie van materialen
    description: Elke inkomende batch PVC-stof, glasvezelmat, hars en beslag wordt geïnspecteerd volgens specificatie. Stofmonsters worden getest op treksterkte, diktehomogeniteit en UV-bestendigheid voordat ze worden vrijgegeven voor productie. Niet-conforme materialen worden in quarantaine geplaatst en teruggestuurd.
    duration: 1–2 dagen
  - step: '02'
    title: Automatisch PVC-snijden
    description: Goedgekeurde stoffen worden op de automatische CNC-snijmachine gelegd en gesneden met submillimeterprecisie. Computergeneste plaatsing rangschikt panelen om afval te minimaliseren — doorgaans minder dan 5%. Gesneden panelen worden gemarkeerd met bootmodel en kamer en verpakt voor transport naar de laswerkplaats.
    duration: 2–4 uur per bootset
  - step: '03'
    title: Buizen hechten en lassen
    description: Panelen worden gehecht en verbonden met heteluchtlassers  bij gecontroleerde temperaturen van 200–600 °C. Hoofdnaden worden versterkt met diëlektrisch RF-lassen voor luchtdichte, hoogsterke verbindingen. Voltooide kamers worden opgepompt tot 1,5× werkdruk voor een 30 minuten durende luchtdichtheidsvalidatie.
    duration: 1–2 dagen per boot
  - step: '04'
    title: technische stof-glasvezelromp lamineren
    description: technische stof-bootrompen worden geproduceerd met handmatig lamineren van glasvezel. Lagen glasvezelmat en weefsel worden handmatig gerold met polyester- of vinylesterhars in precisiematrijzen. Elke laag wordt vacuüm verpakt voor constante laminaatkwaliteit. De romp wordt afgewerkt met gelcoat voor een hoogglanzend, UV-bestendig maritiem oppervlak.
    duration: 2–4 dagen per romp
  - step: '05'
    title: SUP-printen en decoratie
    description: "SUP-dekgraphics worden aangebracht via digitaal printen  voor fullcolour-, fotokwaliteitsontwerpen en zeefdruk  voor duurzame logo's en herhalende patronen. Prints worden uitgehard en verzegeld voor UV- en slijtvastheid."
    duration: 1–2 dagen
  - step: '06'
    title: Eindmontage en uitrusting
    description: Glasvezelrompen en PVC-buissamenstellingen worden samengevoegd op de assemblagelijn. De motor wordt gemonteerd, stuur- en besturingssystemen aangesloten, brandstofsysteem geïnstalleerd en volledige elektrische bedrading aangelegd. Elke boot doorloopt een 100-punts montagechecklist met verplichte goedkeuring bij elke stap.
    duration: 2–3 dagen
  - step: '07'
    title: Kwaliteitstesten en inspectie
    description: "Elke voltooide boot doorloopt een verplichte kwaliteitsgate: luchtdichtheidstest van kamers, functionele systeemcontrole, aandraaimomentcontrole van bevestigingsmiddelen en cosmetische inspectie. Maatwerk- en prototypeontwerpen ondergaan ook vaarproeven op het water voor snelheid, handling, stabiliteit en uithoudingsvermogen."
    duration: 1–2 dagen
  - step: '08'
    title: Verpakking en verzending
    description: weefsel worden leeggelaten, volgens procedure opgevouwen, verpakt in stevige stoffen of triplex tassen en geladen voor verzending. Elke verpakking wordt gemarkeerd met model, serienummer en bestemming. We coördineren FCL- en LCL-zendingen wereldwijd met vervoerders.
    duration: 1 dag

