features:
  id: features
  tagline: Waarom Seekingtex
  title: Wat je krijgt met Seekingtex
  subtitle: Decennia aan scheepsbouwerervaring samengevat in één gefocuste productlijn. Solide constructie, getest op zee, levenslange ondersteuning.
  columns: 2
  items:
    - title: Maritieme materialen
      description: Hoogwaardig PVC, Hypalon en aluminium rompen geselecteerd op UV-bestendigheid, slijtvastheid en bestendigheid tegen zout water.
      icon: tabler:shield-check
    - title: Productiekwaliteit
      description: Elke romp ondergaat een druktest, elke las wordt geïnspecteerd. We verzenden alleen wat we zelf te water zouden laten.
      icon: tabler:certificate
    - title: Modulair ontwerp
      description: Pas de indeling van compartimenten, consolepositie, brandstofcapaciteit en accessoires aan naar jouw behoeften.
      icon: tabler:layout-grid
    - title: Eerlijke specificaties
      description: Echte belading, echte afmetingen, echt gewicht. Geen marketingoverdrijving. Nooit.
      icon: tabler:ruler-measure
    - title: Snelle levering en onderdelen
      description: Standaardmodellen worden binnen dagen verzonden. Originele onderdelen en verbruiksartikelen het hele jaar op voorraad.
      icon: tabler:truck-delivery
    - title: Levenslange ondersteuning
      description: Directe lijn met ons ontwerpteam voor technisch advies, reparaties en upgrades.
      icon: tabler:lifebuoy

featured_products:
  id: featured
  title: Aanbevolen producten
  subtitle: Geselecteerd uit onze huidige catalogus —?de populairste modellen van dit seizoen.
  linkText: Bekijk alle producten
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: In de werkplaats
  title: Van rompontwerp tot levering —?elke stap in eigen beheer
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Kwaliteit die je ziet, voelt en kunt meten</h3>
  items:
    - title: Ontworpen door scheepsbouwkundigen
      description: Romplijnen worden intern getekend en geïtereerd via CFD-analyse vóór het eerste prototype.
    - title: Gelast en gemonteerd in eigen fabriek
      description: Lassen van luchtkamers, montage van console en beslag gebeurt onder één dak.
    - title: Proefvaarten vóór verzending
      description: Elk model ondergaat een meerurige proefvaart ter controle van planeren, bochten, topsnelheid en gedrag onder belasting.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Werkplaats

steps:
  title: Van specificatie tot tewaterlating in vijf stappen
  items:
    - title: 'Stap 1: <span class="font-medium">Configuratie</span>'
      description: Kies een model, specificeer opties en vraag online of telefonisch een offerte aan. Het team reageert binnen één werkdag.
      icon: tabler:list-numbers
    - title: 'Stap 2: <span class="font-medium">Bevestiging</span>'
      description: We bevestigen de specificatie, leverdatum en totale kosten schriftelijk. Geen verrassingen, geen verborgen kosten.
      icon: tabler:checks
    - title: 'Stap 3: <span class="font-medium">Productie</span>'
      description: De productie start in onze werkplaats. We sturen voortgangsfoto's bij belangrijke mijlpalen.
      icon: tabler:tool
    - title: 'Stap 4: <span class="font-medium">Levering</span>'
      description: Verpakt op een rek, krimpfolie en verzonden per zee- of luchtvracht. Douaneafhandeling volledig inbegrepen.
      icon: tabler:truck-loading
    - title: 'Stap 5: <span class="font-medium">Ondersteuning</span>'
      description: Twee jaar garantie op de romp plus levenslange technische ondersteuning. Onderdelen worden binnen 48 uur verzonden.
      icon: tabler:headset
  image:
    src: /images/seekingtex/hero/production-dept.webp
    alt: Productieproces

blog_latest:
  title: Van de blog
  information: |
    Artikelen, technische notities en casestudies van het ontwerpteam.
    Nieuwe berichten verschijnen wanneer een project wordt opgeleverd, een norm wordt bijgewerkt of iemand een verhaal heeft dat het vertellen waard is.

faqs:
  title: Veelgestelde vragen
  subtitle: De vragen die we het vaakst horen. Staat de jouwe er niet bij? Stuur ons een bericht —?we antwoorden snel.
  columns: 2
  items:
    - title: Welk model kiezen
      description: Afhankelijk van bemanningsgrootte, vaargebied en prioriteiten —?snelheid, laadvermogen of brandstofefficiëntie. Stuur een korte beschrijving en we raden 2-3 geschikte modellen aan.
      icon: tabler:anchor
    - title: Leveren jullie internationaal?
      description: Ja —?we leveren aan 40+ landen. Zeevracht is het voordeligst voor complete weefsel; luchtvracht is beschikbaar voor spoedbestellingen.
      icon: tabler:ship
    - title: Wat voor garantie geven jullie?
      description: Twee jaar op de romp, een jaar op accessoires, levenslang op onze lassen. Garantieregistratie wordt bij elke levering meegeleverd.
      icon: tabler:shield
    - title: Kan een bestaand model worden aangepast?
      description: Bijna altijd. Consolepositie, compartimentkleur, zitindeling, elektronica en motor kunnen worden aangepast. Speciale rompen worden individueel beoordeeld.
      icon: tabler:palette
    - title: Bieden jullie training en certificering?
      description: Voor commerciële operators kunnen we training op het water bij onze faciliteit regelen. Individuele klanten krijgen gratis instructie bij afname.
      icon: tabler:school
    - title: Hoe krijg ik reserveonderdelen?
      description: Bestel via de contactpagina of bel de onderdelenservice. Standaard artikelen (kleppen, vesten, pompen, reparatiesets) worden binnen 48 uur wereldwijd verzonden.
      icon: tabler:settings

