  body: Met deze strenge testprocedures geeft {SITE} klanten de zekerheid dat onze functionele stoffen's en weefsel niet alleen presteren, maar ook gebouwd zijn om jaren mee te gaan —met talloze plezierige en veilige avonturen op het water. Ons kwaliteitslaboratorium werkt onafhankelijk van productie en rapporteert rechtstreeks aan het management.
