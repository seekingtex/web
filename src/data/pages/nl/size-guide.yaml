how_to_choose:
  title: Hoe kies je de juiste maat
  cards:
    - title: SUP-boards
      description: Kies de lengte op basis van je gewicht en beoogd gebruik. Bredere boards (32"+) bieden meer stabiliteit. Langere boards (11-12 voet) houden beter koers tijdens toeren. Zwaardere peddelaars hebben boards met meer volume nodig.
    - title: technische stoffen
      description: Enkele technische stoffen (9 voet) zijn het beste voor solo-reizen en rivieren. Tandemkajaks (12 voet) bieden plaats aan twee peddelaars of één volwassene met uitrusting. Controleer het draagvermogen voor het totale gewicht inclusief uitrusting.
    - title: weefsel en technische stof's
      description: Kies de bootlengte op basis van het aantal passagiers en het beoogde gebruik. Grotere technische stof's (4,5 m+) zijn geschikt voor offshore en reddingsoperaties. Kleinere weefsel (2,7 m) dienen als tender en visplatform.
