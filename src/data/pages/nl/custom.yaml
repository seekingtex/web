hero:
  tagline: Seekingtex Maatwerk Lab
  title: Ontwerp je eigen<br />boot
  subtitle: OEM-, ODM-, private-label- en merk op maat diensten voor bedrijven wereldwijd. Van enkel prototype tot volledige productieserie.
  cta: Start project
  footer_link: /contact

steps_section:
  tagline: Hoe het werkt
  title: Van concept tot productie
  subtitle: Vier stappen van jouw idee naar een zeeklare boot.
  steps:
    - num: '01'
      title: Kies een board
      desc: Kies uit onze basismodellen — SUP, technische stoffen, textielproduct of technische stof. Selecteer maat, materiaal en kleur.
    - num: '02'
      title: Dien je ontwerp in
      desc: Stuur ons je logo, ontwerp of merkrichtlijnen. Ons ontwerpteam maakt een digitaal proefdruk.
    - num: '03'
      title: AI-model bekijken
      desc: Bekijk een fotorealistisch AI-gegenereerd model van je custom board voordat de productie begint.
    - num: '04'
      title: Productie en levering
      desc: Na goedkeuring gaat je bestelling naar onze ISO-gecertificeerde productielijn. Doorlooptijd vanaf 30 dagen.

services_section:
  tagline: Diensten
  title: Productiediensten voor wereldwijde merken
  subtitle: Flexibele samenwerkingsmodellen — van contractproductie tot volledige merkenbouw.
  items:
    - title: OEM-productie
      desc: We produceren volgens jouw specificaties — jouw intellectueel eigendom, jouw tekeningen, jouw kwaliteitsnormen. Volledige NDA-bescherming.
      icon: ⚙️
    - title: ODM-oplossingen
      desc: Kies uit meer dan 50 beproefde platforms en pas maat, kleur, graphics en verpakking aan.
      icon: '🎨'
    - title: Private Label
      desc: Jouw merk op onze producten — logo, verpakking, labels, instructies. Klaar voor verkoop uit de doos.
      icon: 🏷️
    - title: Op maat gemaakte branding
      desc: Dekbedrukking, rompgraphics, tubestickers en aangepaste labels — volledige merkintegratie.
      icon: ✨

capabilities_section:
  tagline: Mogelijkheden
  title: Productie- en aanpassingsmogelijkheden
  subtitle: Alles wat je moet weten voordat je een bestelling plaatst.
  capabilities:
    - label: Bestelvolume
      value: MOQ 5–10 stuks (SUP/technische stoffen), 2–5 stuks (technische stof)
    - label: Doorlooptijd
      value: 30–45 dagen standaard; 15–20 dagen voor prototypen
    - label: Aanpassing
      value: Maat, vorm, kleur, graphics, verpakking, beslag
    - label: Materialen
      value: PVC, Hypalon, drop-stitch, glasvezel, aluminium
    - label: Druk
      value: Digitaal (CMYK), zeefdruk, warmteoverdracht, sublimatie
    - label: Certificering
      value: CE, UKCA, FCC (ondersteuning voor wereldwijde conformiteit)

why_section:
  tagline: Waarom Seekingtex
  title: Één fabriek. Één standaard. Geen compromissen.
  points:
    - text: Geïntegreerde productiefaciliteit van 12.000 m²
