    - text: Meer dan 200 geschoolde werknemers en ingenieurs
      highlight: 200+
    - text: Meer dan 15.000 weefsel per jaar geproduceerd
      highlight: 15.000+
    - text: -gecertificeerd kwaliteitsmanagementsysteem
      highlight: 
    - text: CE-gecertificeerde producten voor de EU-markt
      highlight: CE
  cta: Bekijk fabrieksdetails
