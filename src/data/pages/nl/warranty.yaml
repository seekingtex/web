label: 'Garantie'
headline: 'Beperkte fabrieksgarantie van Seekingtex'
subtitle: 'Seekingtex staat achter de kwaliteit van elk functioneel maritiem product dat wij vervaardigen. Deze beperkte garantie bepaalt de voorwaarden en dekking voor uw Seekingtex-product.'
seo:
  headline: 'Seekingtex functionele boot garantie — 5 jaar beperkte garantie | Seekingtex'
  description: 'Seekingtex biedt een beperkte garantie van 5 jaar op de integriteit van de primaire slangstof, naden en de structurele integriteit van de glasvezelromp. Ook dekking voor inflatieventielen en fabrieksmatig geïnstalleerde accessoires. Volledige voorwaarden van de Seekingtex functionele bootgarantie.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Deze beperkte garantie is van toepassing op nieuwe Seekingtex gemerkte functionele maritieme producten die rechtstreeks bij Seekingtex of bij een geautoriseerde Seekingtex-dealer of -verkoper zijn gekocht. De ingangsdatum is de verifieerbare datum van de oorspronkelijke aankoop.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Garantiedekking en -duur</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 jaar</h3>
        <p class="text-sm text-gray-600 mt-1">Integriteit van primaire slangstof (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 jaar</h3>
        <p class="text-sm text-gray-600 mt-1">Structurele integriteit van glasvezelromp</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 jaar</h3>
        <p class="text-sm text-gray-600 mt-1">Luchtdichtheid van functionele buisnaden</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 jaar</h3>
        <p class="text-sm text-gray-600 mt-1">Functionaliteit van inflatieventielen</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 jaar</h3>
        <p class="text-sm text-gray-600 mt-1">Fabrieksmatig geïnstalleerde accessoires en hulpstukken</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 jaar*</h3>
        <p class="text-sm text-gray-600 mt-1">Commercieel gebruik, verhuur of wagenpark — alle componenten</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Commercieel, gouvernementeel, charter-, verhuur- of instructiegebruik verkort de garantie tot 1 jaar. Gebruik in races of wedstrijden maakt de garantie volledig ongeldig.</p>
  </div>

  <h2>Wat is gedekt</h2>
  <h3>Primaire slangstof (5 jaar)</h3>
  <p>Seekingtex garandeert de primaire slangstof tegen poreusheidsverslechtering die het vermogen van het product om de operationele inflatie te behouden aanzienlijk schaadt. Dit geldt voor CSM (Hypalon) gecoate stof en alle andere slangmaterialen die bij de productie worden gebruikt.</p>

  <h3>Structurele integriteit van glasvezelromp (5 jaar)</h3>
  <p>Voor producten met een glasvezelversterkte kunststofromp (GVK) wordt de fundamentele composietstructuur gegarandeerd tegen structureel falen door defecten in materialen of vakmanschap.</p>

  <h3>Luchtdichtheid van functionele buisnaden (5 jaar)</h3>
  <p>De naden van functionele buizen worden gegarandeerd tegen fabricagefouten die leiden tot aanzienlijk luchtverlies door de naad. Periodieke inspectie en handhaving van de juiste inflatiedruk zijn voorwaarden voor dekking.</p>

  <h3>Functionaliteit van inflatieventielen (5 jaar)</h3>
  <p>De door Seekingtex oorspronkelijk geïnstalleerde inflatieventielen worden gegarandeerd tegen materiaal- of fabricagefouten die voorkomen dat het ventiel lucht vasthoudt zoals ontworpen.</p>

  <h3>Fabrieksmatig geïnstalleerde accessoires (1 jaar)</h3>
  <p>Door Seekingtex vervaardigde en in de fabriek geïnstalleerde componenten en hulpstukken worden gedurende één jaar gegarandeerd tegen materiaal- en fabricagefouten. Dit sluit artikelen van derden uit, die alleen gedekt worden door de respectievelijke fabrieksgaranties.</p>

  <h2>Wat is niet gedekt</h2>
  <ul>
    <li>Cosmetische gebreken zoals verkleuring, vlekken, vervaging, krijtende uitslag of andere wijzigingen in het uiterlijk</li>
    <li>Doorboringen, sneden, scheuren of andere fysieke schade</li>
    <li>Haarscheuren, barsten, schaafplekken, schuurplekken of achteruitgang door wrijving of contact</li>
    <li>Aantasting door blootstelling aan UV-licht, weersinvloeden of atmosferische omstandigheden</li>
    <li>Schade door contact met brandstoffen, oplosmiddelen, zuren, logen of chemicaliën</li>
    <li>Schade door nalatigheid, oneigenlijk gebruik, misbruik, ongeval of normale slijtage</li>
    <li>Gelcoat- of verfoppervlakproblemen (blaarvorming, haarscheuren, verkleuring, vervaging)</li>
    <li>Schade door impact, spanning, onjuiste ondersteuning of vervoer op aanhanger</li>
    <li>Schade door onjuist opblazen/laten leeglopen of gebruik van niet-goedgekeurde inflatieapparaten</li>
    <li>Apparatuur, componenten of systemen van derden (gedekt door de respectievelijke fabrikanten)</li>
  </ul>

  <h2>Verplichting en rechtsmiddel van de fabrikant</h2>
  <p>De enige en uitsluitende verplichting van Seekingtex is de reparatie of vervanging, naar keuze van Seekingtex, van elk onderdeel dat defect blijkt te zijn in materialen of vakmanschap en onder deze garantie valt. Reparaties of vervangingen worden uitgevoerd door Seekingtex of een aangewezen geautoriseerd servicecentrum. Gerepareerde of vervangen componenten zijn alleen gegarandeerd voor het niet-verlopen gedeelte van de oorspronkelijke garantieperiode.</p>

  <h2>Garantievoorwaarden</h2>
  <ul>
    <li><strong>Registratie:</strong> Het product moet correct worden geregistreerd zoals vereist in de garantievoorwaarden.</li>
    <li><strong>Onderhoud:</strong> Het product moet worden onderhouden volgens de gepubliceerde richtlijnen van Seekingtex, inclusief periodieke inspectie en handhaving van de juiste inflatiedruk.</li>
    <li><strong>Samenwerking:</strong> De koper moet volledig en tijdig met Seekingtex samenwerken in alle zaken met betrekking tot garantieclaims.</li>
    <li><strong>Oorspronkelijke koper:</strong> Deze garantie wordt uitsluitend verleend aan de oorspronkelijke eindgebruiker en is niet overdraagbaar.</li>
  </ul>

  <h2>Commercieel gebruik</h2>
  <p>Als het product wordt gebruikt voor commerciële, gouvernementele, non-profit, charter-, verhuur-, instructie- of andere doeleinden dan privé recreatief gebruik, wordt de garantieperiode voor alle componenten verkort tot één (1) jaar vanaf de oorspronkelijke aankoopdatum. Gebruik in races, snelheids- of duurzaamheidswedstrijden maakt de garantie onmiddellijk en onherroepelijk volledig ongeldig.</p>

  <h2>Hoe een garantieclaim in te dienen</h2>
  <p>Neem contact op met Seekingtex of uw geautoriseerde dealer met aankoopbewijs en een gedetailleerde beschrijving van het probleem. Seekingtex zal de claim beoordelen en instructies geven voor inspectie en service.</p>
  <p>Voor garantieservice-aanvragen kunt u contact met ons opnemen via onze <a href="/contact" class="text-sky-600 underline">contactpagina</a> met uw ordernummer en productgegevens.</p>

  <h2>Artikelen van derden</h2>
  <p>Apparatuur, componenten of systemen vervaardigd door derden (zelfs als geïnstalleerd door Seekingtex) worden uitsluitend gedekt door de garantie van de respectievelijke fabrikant. Seekingtex wijst uitdrukkelijk elke garantieverantwoordelijkheid voor dergelijke artikelen van derden af.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Deze garantieverklaring is een samenvatting van de volledige beperkte fabrieksgarantie van Seekingtex. Het volledige juridische garantiedocument beheerst alle garantievoorwaarden. Specificaties kunnen zonder voorafgaande kennisgeving worden gewijzigd. Seekingtex is een merk van Qingdao Vatrad Group.
  </p>
