hero:
  tagline: "Apparatuur"
  title: "Productieapparatuur & Machines"
  subtitle: "Industriële apparatuur voor snijden, lassen, printen en assemblage"
  back_label: "Terug naar Fabriek"
  back_link: /factory

categories:
  - title: "Snijden & Materiaalvoorbereiding"
    items:
      - name: "Automatische PVC-snijmachine"
        spec: "CNC-gestuurd, 6.5 m × 2.5 m, 0.1 mm nauwkeurigheid"
        desc: "Computer gestuurde automatische snijmachine voor PVC-, Hypalon- en drop-stitch-stoffen. Nesting-software optimaliseert het materiaalgebruik tot minder dan 5% afval."
      - name: "Stofspreider"
        spec: "Max. breedte 3 m, spanningsgestuurde aanvoer"
        desc: "Legt stof in enkele of meerdere lagen met gecontroleerde spanning om vervorming voor het snijden te voorkomen."
  - title: "Buislassen & Verbinding"
    items:
      - name: "Warmteafdichtingsmachine"
        spec: "Heetluchtlassen, variabel 200–600 °C, 0.5–5 m/min"
        desc: "Heetlucht warmteafdichtingsmachine voor het verbinden en lassen van PVC- en Hypalon-buisnaden. Gebruikt voor het vastzetten, afdichten en versmelten van buiskamers en drijfverbindingen."
      - name: "Diëlektrische RF-pers"
        spec: "15 kW, plaat 2000 × 600 mm"
        desc: "Hoogfrequent laspers voor hoofdlangsnaden, spiegel-tot-buis-verbindingen en fabricage van grote kamers."
      - name: "CNC-gestuurde RF-lasser"
        spec: "8 kW, XY-tafel 2500 × 1200 mm"
        desc: "Programmeerbaar lassen van gebogen naden voor complexe geometrieën, logo-embossing en precisieherstel."
  - title: "technische stof-bootschaalproductie"
    items:
      - name: "Handmatig glasvezel laminaatvormen"
        spec: "Meerdere vormen voor technische stof-schalen tot 6 m LOA"
        desc: "Traditioneel handmatig glasvezel laminaat met polyester- en vinylesterharssystemen. Elke laag wordt met de hand gerold en vacuum verpakt voor consistente laminaatkwaliteit en sterkte."
      - name: "Gelcoat-spuitcabine"
        spec: "Temperatuurgeregeld, gefilterde luchtventilatie"
        desc: "Gelcoat-aanbrenging op technische stof-schalen. Biedt een hoogglans, UV-bestendige afwerking met nauwkeurige diktecontrole."
      - name: "CNC-freesmachine (5-assig)"
        spec: "3 m × 2 m × 1 m bereik, watergekoelde spil"
        desc: "Bewerking van schaalinserts, consolevormen, zitbodems en op maat gemaakte beugels."
  - title: "SUP-bedrukking & Decoratie"
    items:
      - name: "Digitale printer"
        spec: "Hoogwaardige inkjet, printbreedte tot 2 m"
        desc: "Direct-op-stof digitale print voor volledig gekleurde SUP-dekgraphics. Print aangepaste patronen, gradients en fotokwaliteit afbeeldingen met UV-bestendige waterbasisinkten."
      - name: "Zeefdrukmachine"
        spec: "Handmatig en halfautomatisch, meerkleurige registratie"
        desc: "Zeefdruk voor SUP-boardlogo's, merktekens en herhalende patronen. Biedt duurzame, dekkende prints met levendige kleurverzadiging."
  - title: "Montage & Tuigage"
    items:
      - name: "Motortakel"
        spec: "500 kg capaciteit, verstelbare spreidstang"
        desc: "Veilige montage van buitenboordmotoren van 2.5 tot 60 pk."
      - name: "Console-mock-up-frame"
        spec: "Verstelbare hoogte en hoek"
        desc: "Vooraf tuigen van besturing, gashandel en instrumentpanelen voor installatie."
      - name: "Hydraulische slangkrimper"
        spec: "Tot 1\" ID, digitale drukmeter"
        desc: "Hydraulische besturingsslangassemblages op maat met geperste fittingen."
      - name: "Elektrisch bedradingsbord"
        spec: "3 m × 1.5 m, vooraf gedrukte bedradingsschema's"
        desc: "Montage en test van complete elektrische bedrading buiten de boot."
  - title: "Testen & Kwaliteitscontrole"
    items:
      - name: "Universele trekbank"
        spec: "50 kN, ASTM D751"
        desc: "Breekkracht-, rek-op-breek- en scheurvoortplantingstesten voor stofpartijen."
      - name: "Luchtdichtheidstestbank"
        spec: "Programmeerbaar, 30 min. drukbehoud"
        desc: "Geautomatiseerde drukbehoudtest voor elke buiskamer voor montage."
      - name: "Naadpeltester"
        spec: "Gemotoriseerd 180° pelen bij 100 mm/min"
        desc: "Pelsterktetest van gelaste en gelijmde naden volgens ISO 6185."
      - name: "Xenon-boog-verouderingskamer"
        spec: "2000 h blootstelling"
        desc: "UV-bestendigheidstest voor kleurverandering en sterktebehoud."

