stories:
  tagline: 'Ontdekkersverhalen'
  title: 'Echte avonturen van echte mensen'
  subtitle: 'Hoor van peddelaars, gezinnen en professionals die Seekingtex-uitrusting op het water gebruiken.'
  items:
    - name: 'Sarah & Mike'
      title: 'SUP Explorer 11-eigenaren, Canada'
      content: 'We namen onze Explorer 11s mee op een weeklange reis door Algonquin Park. Ze doorstonden overdrachten en meerovertochten prachtig. De drop-stitch constructie betekende dat we konden oppompen tot 15 PSI en hardboardprestaties kregen van een opvouwbaar board.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Algonquin Park, Canada'
    - name: 'Carlos R.'
      title: 'Cheetah Surge-rijder, Spanje'
      content: 'De Cheetah Surge is mijn favoriet voor kustcruises. Het levendige ontwerp trekt de aandacht op het strand en de stabiliteit geeft me vertrouwen in lichte golfslag. Hij vaart prachtig, of ik nu aan het toeren ben of gewoon geniet van de zonsondergang.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Spanje'
    - name: 'Lina & familie'
      title: 'Flowing Lotus-peddelaars, Zweden'
      content: 'Weekend familie-avonturen in de archipel. De Flowing Lotus is stabiel genoeg voor mijn dochter om op te staan terwijl ik peddel. In minder dan 10 minuten opgepompt — geen trailer nodig, puur familieplezier op het water.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Stockholmse Archipel, Zweden'
    - name: 'Lt. Cmdr. Andres'
      title: 'Ocean Voyager-ontdekker, Filipijnen'
      content: 'Ik gebruik mijn Ocean Voyager voor langeafstandskusttochten rond Palawan. Na maanden dagelijks gebruik in tropische omstandigheden presteert het board nog steeds als nieuw. De touringvorm snijdt door golfslag waar mindere boards stoppen.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filipijnen'
    - name: 'Emma T.'
      title: 'Tropical Breeze-eerste keer, Australië'
      content: 'Ik had nog nooit op een SUP gestaan. De Tropical Breeze is zo stabiel dat ik me bij mijn eerste poging al zelfverzekerd voelde. Nu peddel ik elk weekend. De leercurve is vrijwel nul — en het board ziet er geweldig uit op het water.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Australië'

