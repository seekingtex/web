hero:
  tagline: About us
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: Seekingtex factory and production facility
  title: |
    Textile engineering, <br />
    built the <span class="text-accent dark:text-white">Seekingtex</span> way
  subtitle: 'We started in a small workshop with one knitting machine and a stubborn belief: textiles should perform like they matter, because they do. Today we supply fabrics to brands in over 20 countries, but every roll still passes through the same quality standards that started the company.'

stats:
  title: By the numbers
  columns: 4
  stats:
    - title: Fabrics delivered (million meters)
      amount: '50+'
    - title: Countries served
      amount: '20'
    - title: Years of combined experience
      amount: '40'
    - title: Average sample response (days)
      amount: '3'

features3_what_we_build:
  title: What we manufacture
  subtitle: A focused product line we know inside out — no half-finished experiments, no compromise on quality.
  columns: 3
  isBeforeContent: true
  items:
    - title: Sun Protection Fabrics
      description: UPF 50+ rated fabrics for outdoor and sun-protective apparel. UV Standard 801 certified.
      icon: tabler:sun
    - title: Waterproof Fabrics
      description: High-performance waterproof breathable fabrics for outerwear and technical apparel.
      icon: tabler:droplet
    - title: Quick-Dry Fabrics
      description: Advanced moisture-wicking fabrics for sportswear and active lifestyle brands.
      icon: tabler:wind

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Antibacterial Fabrics
      description: 7A grade antibacterial textiles with lasting hygiene protection for medical and sportswear.
      icon: tabler:shield
    - title: Stretch Fabrics
      description: 4-way stretch performance fabrics for athletic and flexible applications.
      icon: tabler:arrows-shuffle
    - title: Eco-Friendly Fabrics
      description: Recycled polyester and sustainable textile solutions for eco-conscious brands.
      icon: tabler:leaf
  image:
    src: /images/seekingtex/factory/design-discuss.webp
    alt: Textile design and engineering discussion

steps2_values:
  title: Our values
  subtitle: Three principles that have shaped every product since day one.
  items:
    - title: Build like it carries your reputation
      description: Every roll of fabric is treated as if our own brand depends on it. Because it does.
      icon: tabler:heart
    - title: Engineer before we sell
      description: If a specification falls short, we improve the process — never lower the standard.
      icon: tabler:settings
    - title: Support that outlasts the shipment
      description: Five-year-old orders still call us for repeat runs, and we still deliver the same quality.
      icon: tabler:headset

steps2_milestones:
  title: Milestones
  subtitle: A short version of the Seekingtex story.
  isReversed: true
  items:
    - title: Founded in Kunshan
      description: Started by textile engineers with a vision for performance fabrics.
      icon: tabler:building-factory
    - title: First 10 million meters delivered
      description: Reached in our sixth year, through word of mouth and repeat customers.
      icon: tabler:circle-check
    - title: Global export program
      description: Now exporting to 20+ countries with dedicated logistics partners worldwide.
      icon: tabler:world

features2_locations:
  title: Our locations
  tagline: Find us
  columns: 3
  items:
    - title: Headquarters & factory
      description: Kunshan, Suzhou, China — open Mon-Fri for visits by appointment.
    - title: Sales office
      description: Room 1106, building 103, Baoyu Plaza, 335 Changjiang North Road, Kunshan.
    - title: Global partner network
      description: Authorized agents and distribution partners across Europe, Americas, and Southeast Asia.
