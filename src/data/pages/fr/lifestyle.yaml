hero:
  tagline: Style de vie
  title: Le style de vie<br />Seekingtex
  subtitle: Conçu pour ceux qui vivent sur l'eau — des explorateurs du week-end aux opérateurs commerciaux qui dépendent de leur équipement chaque jour.

values:
  - icon: 🌊
    title: Né sur l'eau
    desc: "Chaque conception commence par la compréhension du comportement de l'eau. Nous concevons des conditions limites vers l'intérieur — car l'océan est notre professeur, pas notre lieu de travail."
  - icon: 🔧
    title: Conçu pour durer
    desc: "Le produit le plus durable est celui qui n'a pas besoin d'être remplacé. Matériaux de qualité textile, âmes drop-stitch supportant 15 PSI et soudures qui durent plus longtemps que la saison."
  - icon: '🏆'
    title: Accessible par conception
    desc: Les industrie textile ne devraient pas être un luxe. Des performances de qualité professionnelle à un prix abordable pour les familles, guides et petits opérateurs — pas seulement pour les flottes commerciales.
  - icon: 🌍
    title: Communauté mondiale
    desc: "De la côte de Qingdao aux lacs d'Europe, aux rivières d'Asie du Sud-Est et aux baies des Amériques — nos clients partagent une chose : l'amour d'être sur l'eau."
  - icon: ♻️
    title: Fabrication responsable
    desc: "L'imbrication optimisée par CNC réduit les déchets de matériaux à moins de 5 %. Une construction durable réduit les cycles de remplacement. Nous construisons pour la longévité car c'est le choix le plus durable."
  - icon: 🤝
    title: Un soutien qui dure
    desc: Des coques de vingt ans nous appellent encore pour des pièces détachées. Notre délai de réponse sous garantie est en moyenne de 24 heures. Nous ne disparaissons pas après la vente — nous sommes là pour la durée de vie du produit.

