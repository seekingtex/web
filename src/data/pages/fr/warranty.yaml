label: 'Garantie'
headline: 'Garantie limitée du fabricant Seekingtex'
subtitle: 'Seekingtex garantit la qualité de chaque produit textile fonctionnel que nous fabriquons. Cette garantie limitée définit les termes et la couverture de votre produit Seekingtex.'
seo:
  headline: 'Garantie tissus fonctionnels Seekingtex — Garantie limitée 5 ans | Seekingtex'
  description: 'Seekingtex offre une garantie limitée de 5 ans sur l''intégrité du tissu principal des tubes, des soudures et de la coque en fibre de verre. Couvre également les valves de gonflage et les accessoires installés en usine. Conditions complètes de la garantie des tissus fonctionnels Seekingtex.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Cette garantie limitée s'applique aux nouveaux produits marins gonflables de marque Seekingtex achetés directement auprès d'Seekingtex ou d'un revendeur ou détaillant agréé Seekingtex. La date d'effet est la date vérifiable d'achat au détail d'origine.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Couverture et durée de la garantie</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 ans</h3>
        <p class="text-sm text-gray-600 mt-1">Intégrité du tissu principal des tubes (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 ans</h3>
        <p class="text-sm text-gray-600 mt-1">Intégrité structurelle de la coque en fibre de verre</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 ans</h3>
        <p class="text-sm text-gray-600 mt-1">Étanchéité à l'air des soudures des tubes gonflables</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 ans</h3>
        <p class="text-sm text-gray-600 mt-1">Fonctionnalité des valves de gonflage</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 an</h3>
        <p class="text-sm text-gray-600 mt-1">Accessoires installés en usine et raccords auxiliaires</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 an*</h3>
        <p class="text-sm text-gray-600 mt-1">Usage commercial, location ou flotte — tous les composants</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*L'usage commercial, gouvernemental, de charter, de location ou d'instruction réduit la garantie à 1 an. L'utilisation en course ou compétition annule entièrement la garantie.</p>
  </div>

  <h2>Ce qui est couvert</h2>
  <h3>Tissu principal des tubes (5 ans)</h3>
  <p>Seekingtex garantit le tissu principal des tubes contre la détérioration par porosité qui compromet substantiellement la capacité du produit à maintenir le gonflage opérationnel. Cela s'applique au tissu enduit de CSM (Hypalon) et à tous les autres matériaux de tube utilisés dans la fabrication.</p>

  <h3>Intégrité structurelle de la coque en fibre de verre (5 ans)</h3>
  <p>Pour les produits avec une coque en plastique renforcé de fibre de verre (PRV), la structure composite fondamentale est garantie contre les défaillances structurelles dues à des défauts de matériaux ou de fabrication.</p>

  <h3>Étanchéité à l'air des soudures des tubes gonflables (5 ans)</h3>
  <p>Les soudures des tubes gonflables sont garanties contre les défauts de fabrication entraînant une fuite d'air substantielle à travers la soudure. L'inspection périodique et le maintien des pressions de gonflage appropriées sont des conditions de la couverture.</p>

  <h3>Fonctionnalité des valves de gonflage (5 ans)</h3>
  <p>Les valves de gonflage installées par Seekingtex sont garanties contre les défauts de matériaux ou de fabrication empêchant la valve de retenir l'air comme conçu.</p>

  <h3>Accessoires installés en usine (1 an)</h3>
  <p>Les composants et raccords fabriqués par Seekingtex et installés en usine sont garantis contre les défauts de matériau et de fabrication pendant un an. Cela exclut les articles tiers, qui sont couverts uniquement par les garanties de leurs fabricants respectifs.</p>

  <h2>Ce qui n'est pas couvert</h2>
  <ul>
    <li>Défauts esthétiques incluant décoloration, taches, ternissement, farinage ou toute altération d'apparence</li>
    <li>Perforations, coupures, déchirures ou autres dommages physiques</li>
    <li>Fissuration, abrasion, éraflure ou détérioration due au frottement ou au contact</li>
    <li>Dégradation due à l'exposition aux UV, aux intempéries ou aux conditions atmosphériques</li>
    <li>Dommages dus au contact avec des carburants, solvants, acides, alcalis ou produits chimiques</li>
    <li>Dommages dus à la négligence, à une mauvaise utilisation, à un abus, à un accident ou à l'usure normale</li>
    <li>Problèmes de surface du gelcoat ou de la peinture (cloquage, fissuration, décoloration, ternissement)</li>
    <li>Dommages dus à un impact, une contrainte, un support inadéquat ou le remorquage</li>
    <li>Dommages dus à un gonflage/dégonflage incorrect ou à l'utilisation d'appareils de gonflage non approuvés</li>
    <li>Équipements, composants ou systèmes de tiers (couverts par leurs fabricants respectifs)</li>
  </ul>

  <h2>Obligation et recours du fabricant</h2>
  <p>La seule et exclusive obligation d'Seekingtex est la réparation ou le remplacement, à la discrétion d'Seekingtex, de tout composant jugé défectueux en matériaux ou en fabrication et couvert par cette garantie. Les réparations ou remplacements sont effectués par Seekingtex ou son centre de service agréé désigné. Les composants réparés ou remplacés ne sont garantis que pour la portion non expirée de la période de garantie d'origine.</p>

  <h2>Conditions de la garantie</h2>
  <ul>
    <li><strong>Enregistrement :</strong> Le produit doit être correctement enregistré conformément aux conditions de la garantie.</li>
    <li><strong>Entretien :</strong> Le produit doit être entretenu conformément aux directives publiées d'Seekingtex, y compris l'inspection périodique et le maintien des pressions de gonflage appropriées.</li>
    <li><strong>Coopération :</strong> L'acheteur doit coopérer pleinement et rapidement avec Seekingtex dans toutes les questions relatives aux réclamations de garantie.</li>
    <li><strong>Acheteur d'origine :</strong> Cette garantie est exclusivement étendue à l'acheteur utilisateur final d'origine et n'est pas transférable.</li>
  </ul>

  <h2>Usage commercial</h2>
  <p>Si le produit est utilisé à des fins commerciales, gouvernementales, à but non lucratif, de charter, de location, d'instruction ou à toute autre fin que la récréation privée, la période de garantie pour tous les composants est réduite à un (1) an à compter de la date d'achat au détail d'origine. L'utilisation en course, compétition de vitesse ou d'endurance annule immédiatement et irrévocablement la garantie.</p>

  <h2>Comment faire une réclamation de garantie</h2>
  <p>Contactez Seekingtex ou votre revendeur agréé avec une preuve d'achat et une description détaillée du problème. Seekingtex examinera la réclamation et fournira des instructions pour l'inspection et le service.</p>
  <p>Pour les demandes de service sous garantie, veuillez nous contacter via notre <a href="/contact" class="text-sky-600 underline">page de contact</a> avec votre numéro de commande et les détails du produit.</p>

  <h2>Articles tiers</h2>
  <p>Les équipements, composants ou systèmes fabriqués par des tiers (même installés par Seekingtex) sont couverts exclusivement par toute garantie offerte par leur fabricant respectif. Seekingtex décline expressément toute responsabilité de garantie pour ces articles tiers.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Cette déclaration de garantie est un résumé de la garantie limitée complète du fabricant Seekingtex. Le document de garantie juridique complet régit toutes les conditions de garantie. Spécifications sujettes à changement sans préavis. Seekingtex est une marque du groupe Qingdao Vatrad.
  </p>
