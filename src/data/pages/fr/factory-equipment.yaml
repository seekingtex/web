hero:
  tagline: "Équipement"
  title: "Équipement et Machines de Fabrication"
  subtitle: "Équipement de grade industriel pour la découpe, le soudage, l'impression et l'assemblage"
  back_label: "Retour à l'Usine"
  back_link: /factory

categories:
  - title: "Découpe et Préparation des Matériaux"
    items:
      - name: "Machine de Découpe Automatique PVC"
        spec: "Contrôlée par CNC, 6.5 m × 2.5 m, précision 0.1 mm"
        desc: "Machine de découpe automatique contrôlée par ordinateur pour les tissus PVC, Hypalon et drop-stitch. Le logiciel d'imbrication optimise l'utilisation du matériau à moins de 5 % de perte."
      - name: "Étaleuse de Tissu"
        spec: "Largeur max 3 m, alimentation à tension contrôlée"
        desc: "Pose le tissu en plis simples ou multiples avec une tension contrôlée pour éviter la distorsion avant la découpe."
  - title: "Soudage et Liaison des Tubes"
    items:
      - name: "Machine de Soudure par Thermoscellage"
        spec: "Soudure à air chaud, variable 200–600 °C, 0.5–5 m/min"
        desc: "Machine de thermoscellage à air chaud pour l'assemblage et la soudure des coutures de tubes PVC et Hypalon. Utilisée pour le pointage, l'étanchéité et la fusion des chambres de tube et des joints de flottaison."
      - name: "Presse RF Diélectrique"
        spec: "15 kW, plaque 2000 × 600 mm"
        desc: "Presse de soudure haute fréquence pour les coutures longitudinales principales, les joints transom-tube et la fabrication de grandes chambres."
      - name: "Soudeuse RF Contrôlée par CNC"
        spec: "8 kW, table XY 2500 × 1200 mm"
        desc: "Soudure programmable de coutures courbes pour géométries complexes, gaufrage de logo et raccommodage de précision."
  - title: "Fabrication de Coque tissu technique"
    items:
      - name: "Moules en Fibre de Verre à Pose Manuelle"
        spec: "Plusieurs moules pour coques tissu technique jusqu'à 6 m LOA"
        desc: "Moulage traditionnel de fibre de verre à pose manuelle avec systèmes de résine polyester et vinylester. Chaque couche est roulée à la main et mise sous vide pour une qualité et résistance constantes du stratifié."
      - name: "Cabine de Pulvérisation Gelcoat"
        spec: "Température contrôlée, ventilation à air filtré"
        desc: "Application de gelcoat sur les coques tissu technique. Offre une finition brillante, résistante aux UV, avec un contrôle précis de l'épaisseur."
      - name: "Routeur CNC (5 axes)"
        spec: "Enveloppe 3 m × 2 m × 1 m, broche refroidie par eau"
        desc: "Usinage des inserts de coque, moules de console, bases de siège et supports sur mesure."
  - title: "Impression et Décoration SUP"
    items:
      - name: "Imprimante Numérique"
        spec: "Jet d'encre haute résolution, largeur d'impression jusqu'à 2 m"
        desc: "Impression numérique directe sur tissu pour graphismes de pont SUP en pleine couleur. Imprime motifs personnalisés, dégradés et images de qualité photo avec encres à base d'eau résistantes aux UV."
      - name: "Machine de Sérigraphie"
        spec: "Manuelle et semi-automatique, enregistrement multicolore"
        desc: "Sérigraphie pour logos de tissu fonctionnel, marques et motifs répétitifs. Offre des impressions durables, opaques avec une saturation colorée vive."
  - title: "Assemblage et Gréement"
    items:
      - name: "Palan de Moteur"
        spec: "Capacité 500 kg, barre de répartition réglable"
        desc: "Montage sûr des moteurs hors-bord de 2.5 à 60 ch."
      - name: "Châssis Maquette de Console"
        spec: "Hauteur et angle réglables"
        desc: "Pré-équipement du direction, de l'accélérateur et des panneaux d'instruments avant l'installation."
      - name: "Sertisseuse de Durite Hydraulique"
        spec: "Jusqu'à 1\" ID, manomètre numérique"
        desc: "Ensembles de durites de direction hydraulique de longueur personnalisée avec raccords sertis."
      - name: "Planche de Faisceaux Électrique"
        spec: "3 m × 1.5 m, schémas de câblage préimprimés"
        desc: "Assemblage et test de faisceaux électriques complets hors du tissu."
  - title: "Essais et Contrôle Qualité"
    items:
      - name: "Machine de Traction Universelle"
        spec: "50 kN, ASTM D751"
        desc: "Essai de force de rupture, d'allongement à la rupture et de propagation de déchirure pour lots de tissu."
      - name: "Banc d'Essai de Rétention d'Air"
        spec: "Programmable, maintien de pression 30 min"
        desc: "Test automatisé de maintien de pression pour chaque chambre de tube avant l'assemblage."
      - name: "Testeur de Pelage de Couture"
        spec: "Pelage motorisé 180° à 100 mm/min"
        desc: "Essai de résistance au pelage des coutures soudées et collées selon ISO 6185."
      - name: "Chambre de Vieillissement à Arc Xénon"
        spec: "2000 h exposition"
        desc: "Essai de résistance UV pour changement de couleur et retention de résistance."

