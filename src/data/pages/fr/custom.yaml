hero:
  tagline: Seekingtex Custom Lab
  title: Concevez votre propre<br />tissu
  subtitle: Services OEM, ODM, marque blanche et image de marque personnalisée pour les entreprises du monde entier. D'un prototype unique à des séries de production complètes.
  cta: Lancez votre projet
  footer_link: /contact

steps_section:
  tagline: Comment ça marche
  title: Du concept à la production
  subtitle: Quatre étapes de votre idée à un produit fini prêt pour la mer.
  steps:
    - num: '01'
      title: Choisissez votre planche
      desc: Sélectionnez parmi nos modèles de base — SUP, tissus techniques, annexe ou tissu technique. Choisissez taille, matériau et couleur.
    - num: '02'
      title: Téléchargez votre design
      desc: Envoyez-nous votre logo, vos graphismes ou vos directives de marque. Notre équipe de design prépare une épreuve numérique.
    - num: '03'
      title: Prévisualisation IA
      desc: Visualisez une maquette photoréaliste générée par IA de votre planche personnalisée avant le début de la production.
    - num: '04'
      title: Production & livraison
      desc: Une fois approuvée, votre commande entre dans notre ligne de production certifiée ISO. Délais à partir de 30 jours.

services_section:
  tagline: Services
  title: Services de fabrication pour les marques mondiales
  subtitle: Modèles d'engagement flexibles — de la sous-traitance à la construction de marque clé en main.
  items:
    - title: Fabrication OEM
      desc: Nous produisons vos conceptions selon vos spécifications — votre PI, vos dessins, vos normes de qualité. Protection NDA complète.
      icon: ⚙️
    - title: Solutions ODM
      desc: Choisissez parmi plus de 50 plateformes éprouvées et personnalisez taille, couleur, graphismes et emballage.
      icon: '🎨'
    - title: Marque blanche
      desc: Votre marque sur nos produits — logo, emballage, étiquettes, manuels. Prêt à vendre dès la sortie de la boîte.
      icon: 🏷️
    - title: Image de marque personnalisée
      desc: Impression du deck, graphismes de coque, décalcomanies et étiquettes personnalisées — intégration complète de la marque.
      icon: ✨

capabilities_section:
  tagline: Capacités
  title: Capacités de production & de personnalisation
  subtitle: Tout ce que vous devez savoir avant de passer commande.
  capabilities:
    - label: Volume de commande
      value: MOQ 5–10 unités (SUP/tissus techniques), 2–5 unités (tissu technique)
    - label: Délai de livraison
      value: 30–45 jours standard ; 15–20 jours pour les prototypes
    - label: Personnalisation
      value: Taille, forme, couleur, graphismes, emballage, quincaillerie
    - label: Matériaux
      value: PVC, Hypalon, drop-stitch, fibre de verre, aluminium
    - label: Impression
      value: Numérique (CMJN), sérigraphie, transfert thermique, sublimation
    - label: Certification
      value: CE, UKCA, FCC (support pour conformité mondiale)

