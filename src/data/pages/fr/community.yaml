stories:
  tagline: 'Histoires d''Explorateurs'
  title: 'De vraies aventures de vraies personnes'
  subtitle: 'Écoutez les pagayeurs, les familles et les professionnels qui utilisent l''équipement Seekingtex sur l''eau.'
  items:
    - name: 'Sarah & Mike'
      title: 'Propriétaires de SUP Explorer 11, Canada'
      content: 'Nous avons emmené nos Explorer 11 pour un voyage d''une semaine dans le parc Algonquin. Ils ont magnifiquement géré les portages et les traversées de lacs. La construction drop-stitch nous a permis de gonfler à 15 PSI et d''obtenir des performances de planche rigide à partir d''une planche pliable.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Parc Algonquin, Canada'
    - name: 'Carlos R.'
      title: 'Rider Cheetah Surge, Espagne'
      content: 'La Cheetah Surge est mon choix pour les croisières côtières. Le design vibrant attire les regards sur la plage, et la stabilité me donne confiance dans les petites vagues. Elle se comporte magnifiquement, que je sois en randonnée ou en train de profiter du coucher de soleil.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Espagne'
    - name: 'Lina & famille'
      title: 'Pagayeuses Flowing Lotus, Suède'
      content: 'Aventures familiales le week-end dans l''archipel. La Flowing Lotus est assez stable pour que ma fille se tienne debout pendant que je pagaye. Se gonfle en moins de 10 minutes — pas de remorque nécessaire, juste du pur plaisir familial sur l''eau.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Archipel de Stockholm, Suède'
    - name: 'Lt. Cmdr. Andres'
      title: 'Explorateur Ocean Voyager, Philippines'
      content: 'J''utilise mon Ocean Voyager pour des tournées côtières longue distance autour de Palawan. Après des mois d''utilisation quotidienne sous les tropiques, la planche fonctionne toujours comme neuve. La forme de randonnée traverse les vagues qui arrêteraient des planches inférieures.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Philippines'
    - name: 'Emma T.'
      title: 'Débutante Tropical Breeze, Australie'
      content: 'Je n''avais jamais fait de SUP auparavant. La Tropical Breeze est si stable que je me suis sentie confiante dès mon premier essai. Maintenant, je pagaye tous les week-ends. La courbe d''apprentissage est pratiquement nulle — et la planche est superbe sur l''eau.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Australie'

