hero:
  tagline: Technologie
  title: Notre technologie
  subtitle: Les produits Seekingtex sont conçus avec des matériaux avancés et une ingénierie innovante pour offrir des performances, une durabilité et une portabilité exceptionnelles.

features:
  - title: PVC de qualité militaire
    description: Nos tissus fonctionnels et SUP utilisent un tissu PVC résistant aux UV et à l'abrasion avec une résistance élevée à la traction et aux perforations.
  - title: Construction Drop-Stitch
    description: Des milliers de fils de fibres à haute densité relient les surfaces supérieure et inférieure, créant un pont rigide à haute pression – donnant aux SUP gonflables des performances proches de celles des planches rigides.
  - title: Joints soudés à chaud
    description: Les joints sont soudés à chaud plutôt que collés, offrant une force de liaison durable aux points de contrainte critiques.
  - title: Technologie de gonflage automatique
    description: Les gilets de sauvetage Pro utilisent un mécanisme de gonflage automatique qui se déclenche immédiatement en cas d'immersion, fournissant une flottabilité fiable.
