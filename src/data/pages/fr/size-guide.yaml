how_to_choose:
  title: Comment choisir la bonne taille
  cards:
    - title: tissu fonctionnel
      description: Choisissez la longueur en fonction de votre poids et de l'utilisation prévue. Les planches plus larges (32"+) offrent plus de stabilité. Les planches plus longues (11-12 pi) trackent mieux pour le touring. Les pagayeurs plus lourds ont besoin de planches à plus grand volume.
    - title: tissus techniques
      description: Les tissus techniques simples (9 pi) sont idéaux pour les voyages en solo et les rivières. Les tissus techniques tandem (12 pi) accueillent deux pagayeurs ou un adulte avec du matériel. Vérifiez la capacité de poids pour la charge totale incluant l'équipement.
    - title: Annexes et tissu technique
      description: Choisissez la longueur de l'annexe selon le nombre de passagers et l'utilisation prévue. Les tissu technique plus grands (4,5 m+) sont adaptés au large et au sauvetage. Les plus petites annexes (2,7 m) servent de tender et de plateforme de pêche.
