hero:
  tagline: à propos
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: Atelier Seekingtex
  title: |
    Ingénierie textile, <br />
    façon <span class="text-accent dark:text-white">Seekingtex</span>
  subtitle: "Nous avons commencé dans un atelier côtier avec un seul tissu et une conviction inébranlable : les produits marins doivent être conçus comme s'ils comptaient, parce qu'ils comptent. Aujourd'hui, nous expédions dans plus de 40 pays, mais chaque coque passe encore entre les mêmes mains qui ont fondé l'entreprise."

stats:
  title: En chiffres
  columns: 4
  stats:
    - title: Coques livrées
      amount: '2 400+'
    - title: Pays desservis
      amount: '40'
    - title: Années d'expérience cumulée
      amount: '60'
    - title: Délai moyen de réponse sous garantie (heures)
      amount: '24'

features3_what_we_build:
  title: Ce que nous construisons
  subtitle: Une gamme de produits ciblée que nous maîtrisons de A à Z ¡ª pas d'expériences inachevées, pas d'ingénierie d'étiquette.
  columns: 3
  isBeforeContent: true
  items:
    - title: tissu tissu technique
      description: tissu technique à coque aluminium de 3,3 m à 7,5 m. Conçus pour la patrouille, la plongée, la pêche et un usage familial.
      icon: tabler:ship
    - title: tissu pneumatiques
      description: Annexe pneumatiques PVC et Hypalon de 2,4 m à 4,2 m. Légers, robustes et faciles à ranger.
      icon: tabler:speedboat
    - title: Annexes pour superyachts
      description: tissu technique compacts et haut de gamme construits sur mesure pour correspondre au style de votre navire mère.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Accessoires
      description: Avirons, pompes, housses, sacs étanches, réservoirs de carburant et électronique. Tous adaptés à nos tissu.
      icon: tabler:package
    - title: Réfection et réparation
      description: Remplacement de boudin en interne, rénovation électronique et mise à niveau moteur.
      icon: tabler:tool
    - title: Constructions sur mesure
      description: Conception projet par projet pour clients commerciaux, scientifiques et militaires.
      icon: tabler:hammer
  image:
    src: /images/seekingtex/factory/design discuss2.jpeg
    alt: Construction de tissu sur mesure

steps2_values:
  title: Nos valeurs
  subtitle: Trois principes qui façonnent chaque produit depuis le premier jour.
  items:
    - title: Construire comme pour votre famille
      description: Chaque coque, soudure et fixation est traitée comme si nos propres familles allaient l'utiliser.
      icon: tabler:heart
    - title: Concevoir avant de vendre
      description: Si une spécification est erronée, nous modifions la spécification ¡ª jamais le client.
      icon: tabler:settings
    - title: Un service qui dépasse la garantie
      description: Les coques de vingt ans nous appellent encore pour des pièces détachées, et nous répondons toujours.
      icon: tabler:headset

steps2_milestones:
  title: Jalons
  subtitle: Une version courte de l'histoire de Seekingtex.
  isReversed: true
  items:
    - title: Fondé dans un atelier côtier
      description: Lancé par deux architectes navals avec une fraiseuse CNC et une idée tenace.
      icon: tabler:building-factory
    - title: Premières 1 000 coques livrées
      description: Atteint en sept ans, principalement par le bouche-à-oreille et la fidélisation des clients.
      icon: tabler:circle-check
    - title: Programme d'exportation international
      description: Expédition vers plus de 40 pays avec des partenaires de support localisés sur cinq continents.
      icon: tabler:world

features2_locations:
  title: Nos sites
  tagline: Nous trouver
  columns: 3
  items:
    - title: Siège social et atelier
      description: Parc industriel côtier, batiment 4 ¡ª ouvert du lun au ven pour les visites sur rendez-vous.
    - title: Centre de service UE
      description: Port méditerranéen ¡ª réfection, réparation et support sous garantie pour les clients européens.
    - title: Réseau de partenaires APAC
      description: Partenaires de service agréés en Australie, au Japon, à Singapour et à Hong Kong.
