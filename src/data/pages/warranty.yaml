label: 'Warranty'
headline: 'Seekingtex Manufacturer Limited Warranty'
subtitle: 'Seekingtex stands behind the quality of every functional fabric we manufacture. This Limited Warranty sets forth the terms and coverage for your Seekingtex fabric product.'
seo:
  headline: 'Seekingtex Functional Fabrics Warranty — Limited Warranty | Seekingtex'
  description: 'Seekingtex offers warranty coverage on fabric defects, seam integrity, colourfastness, and functional performance. Full terms and conditions for Seekingtex fabric warranty.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    This Limited Warranty applies to new Seekingtex branded functional fabrics purchased directly from Seekingtex or from an authorized Seekingtex distributor or retailer. The effective date is the verifiable date of original purchase.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Warranty Coverage & Duration</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Years</h3>
        <p class="text-sm text-gray-600 mt-1">Fabric structural integrity (woven/knitted construction)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">3 Years</h3>
        <p class="text-sm text-gray-600 mt-1">Functional coating adhesion & performance</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">2 Years</h3>
        <p class="text-sm text-gray-600 mt-1">Colourfastness to light & washing</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">2 Years</h3>
        <p class="text-sm text-gray-600 mt-1">Seam & stitch integrity (garment applications)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 Year</h3>
        <p class="text-sm text-gray-600 mt-1">Dimensional stability (shrinkage within 3%)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 Year*</h3>
        <p class="text-sm text-gray-600 mt-1">Industrial or heavy-use applications — all coverage</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Industrial, military, or extreme-environment use reduces warranty to 1 year. Improper care or unauthorised chemical treatment voids warranty entirely.</p>
  </div>

  <h2>What Is Covered</h2>
  <h3>Fabric Structural Integrity (5 Years)</h3>
  <p>Seekingtex warrants the woven or knitted fabric construction against defects that substantially compromise the fabric's mechanical performance — including yarn slippage, broken picks, or structural delamination under normal use conditions.</p>

  <h3>Functional Coating Adhesion (3 Years)</h3>
  <p>For fabrics with functional coatings (waterproof PU, PVC lamination, anti-bacterial, or UV-protective), the bond between coating and substrate is warranted against peeling, flaking, or delamination under normal care and use.</p>

  <h3>Colourfastness (2 Years)</h3>
  <p>The colour of dyed or printed fabric is warranted against fading beyond Grade 4 on the Grey Scale for light exposure and Grade 3–4 for laundering under standard test conditions (AATCC or ISO methods).</p>

  <h3>Seam & Stitch Integrity (2 Years)</h3>
  <p>For fabrics used in sewn products, the seam construction is warranted against thread breakage, seam pucker, or stitch skipping occurring under normal use — provided seams were constructed using recommended needle, thread, and stitch type for the fabric weight.</p>

  <h3>Dimensional Stability (1 Year)</h3>
  <p>Fabric is warranted against excessive shrinkage or growth beyond 3% after three home launderings or dry cleanings per care label instructions.</p>

  <h2>What Is Not Covered</h2>
  <ul>
    <li>Cosmetic issues including minor shade variation, slubs, neps, or natural fibre characteristics</li>
    <li>Pilling, fuzzing, or abrasion damage from normal wear and friction</li>
    <li>Damage from improper washing, bleaching, drying, or ironing</li>
    <li>Degradation from UV exposure beyond specified UPF rating conditions</li>
    <li>Damage from contact with strong acids, alkalis, solvents, or industrial chemicals</li>
    <li>Damage from negligence, misuse, abuse, accident, or normal wear and tear</li>
    <li>Crocking or colour transfer under wet or dry abrasion beyond standard tolerances</li>
    <li>Damage from improper cutting, sewing, or handling during garment manufacturing</li>
    <li>Fabric that has been altered, over-dyed, or re-finished by the customer or a third party</li>
    <li>Third-party trims, zippers, or components (covered by their respective manufacturers)</li>
  </ul>

  <h2>Manufacturer's Obligation & Remedy</h2>
  <p>Seekingtex's sole and exclusive obligation is the replacement, at Seekingtex's option, of any fabric determined to be defective in materials or workmanship and covered under this warranty. Replacement fabric is warranted only for the unexpired portion of the original warranty period. No labour, production downtime, or consequential damages are covered.</p>

  <h2>Conditions of Warranty</h2>
  <ul>
    <li><strong>Registration:</strong> The purchase must be properly registered as mandated in the warranty terms.</li>
    <li><strong>Care Compliance:</strong> The fabric must be cared for in accordance with Seekingtex's published care guidelines.</li>
    <li><strong>Cooperation:</strong> The purchaser must fully and promptly cooperate with Seekingtex in all matters pertaining to warranty claims, including providing retained samples for testing.</li>
    <li><strong>Original Purchaser:</strong> This warranty is extended exclusively to the original end-user purchaser and is not transferable.</li>
  </ul>

  <h2>Industrial or Heavy Use</h2>
  <p>If the fabric is used in industrial, military, uniform, rental, or extreme-environment applications — or any purpose beyond standard garment, accessory, or home textile use — the warranty period for all coverage is reduced to one (1) year from the original date of purchase. Use in applications involving sustained chemical immersion, continuous outdoor exposure without maintenance, or abrasive environments immediately voids warranty coverage.</p>

  <h2>How to Make a Warranty Claim</h2>
  <p>Contact Seekingtex or your authorized distributor with proof of purchase, lot number, and a detailed description of the issue. Seekingtex will review the claim and may request a retained sample for lab testing. Claims must be submitted within 30 days of discovering the defect.</p>
  <p>For warranty service inquiries, please contact us through our <a href="/contact" class="text-sky-600 underline">contact page</a> with your order number and product details.</p>

  <h2>Third-Party Items</h2>
  <p>Trims, zippers, buttons, and other components manufactured by third parties (even if supplied by Seekingtex) are covered exclusively by any warranty offered by their respective manufacturer. Seekingtex expressly disclaims any warranty responsibility for such third-party items.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    This warranty statement is a summary of the complete Seekingtex Manufacturer's Limited Warranty. The full legal warranty document governs all warranty terms and conditions. Specifications subject to change without notice. Seekingtex is a brand of Qingdao Vatrad Group.
  </p>
