label: 'Warranty'
headline: 'Seekingtex Manufacturer Limited Warranty'
subtitle: 'Seekingtex stands behind the quality of every high-performance marine product we manufacture. This Limited Warranty sets forth the terms and coverage for your Seekingtex product.'
seo:
  headline: 'Seekingtex functional fabrics Warranty — 5-Year Limited Warranty | Seekingtex'
  description: 'Seekingtex offers a 5-year limited warranty on primary tube fabric, seams, and fiberglass hull structural integrity. Also covering inflation valves and factory-installed accessories. Full terms and conditions for Seekingtex functional fabrics warranty.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    This Limited Warranty applies to new Seekingtex branded high-performance marine products purchased directly from Seekingtex or from an authorized Seekingtex dealer or retailer. The effective date is the verifiable date of original retail purchase.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Warranty Coverage & Duration</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Years</h3>
        <p class="text-sm text-gray-600 mt-1">Primary tube fabric integrity (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Years</h3>
        <p class="text-sm text-gray-600 mt-1">Fiberglass hull structural integrity</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Years</h3>
        <p class="text-sm text-gray-600 mt-1">high-performance tube seam air-holding capability</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 Years</h3>
        <p class="text-sm text-gray-600 mt-1">Inflation valve functionality</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 Year</h3>
        <p class="text-sm text-gray-600 mt-1">Factory-installed accessories and auxiliary fittings</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 Year*</h3>
        <p class="text-sm text-gray-600 mt-1">Commercial, rental, or fleet use — all components</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Commercial, governmental, charter, rental, or instructional use reduces warranty to 1 year. Racing or competition use voids warranty entirely.</p>
  </div>

  <h2>What Is Covered</h2>
  <h3>Primary Tube Fabric (5 Years)</h3>
  <p>Seekingtex warrants the principal tube fabric against porosity deterioration that substantially compromises the product's ability to maintain operational inflation. This applies to CSM (Hypalon) coated fabric and all other tube fabric materials used in manufacture.</p>

  <h3>Fiberglass Hull Structural Integrity (5 Years)</h3>
  <p>For products with a fiberglass-reinforced plastic (FRP) hull, the fundamental composite structure is warranted against structural failure due to defects in materials or workmanship.</p>

  <h3>high-performance Tube Seam Air-Holding Capability (5 Years)</h3>
  <p>The seams of high-performance tubes, where joined during manufacture, are warranted against manufacturing defects that result in substantial air leakage through the seam. Periodic inspection and maintenance of appropriate inflation pressures are conditions of coverage.</p>

  <h3>Inflation Valve Functionality (5 Years)</h3>
  <p>Air inflation valves originally installed by Seekingtex are warranted against manufacturing defects in materials or workmanship that prevent the valve from holding air as designed.</p>

  <h3>Factory-Installed Accessories (1 Year)</h3>
  <p>Components and fittings manufactured by Seekingtex and originally installed at the factory are warranted against defects in material and workmanship for one year. This excludes third-party items, which are covered only by their respective manufacturer warranties.</p>

  <h2>What Is Not Covered</h2>
  <ul>
    <li>Cosmetic flaws including discoloration, staining, fading, chalking, or any alteration in appearance</li>
    <li>Punctures, cuts, tears, rips, or other physical damage</li>
    <li>Crazing, cracking, abrasion, scuffing, or deterioration from friction or contact</li>
    <li>Degradation from UV light exposure, weathering, or atmospheric conditions</li>
    <li>Damage from contact with fuels, solvents, acids, alkalis, or chemicals</li>
    <li>Damage from negligence, improper use, abuse, accident, or normal wear and tear</li>
    <li>Gelcoat or paint surface issues (blistering, crazing, discoloration, fading)</li>
    <li>Damage from impact, stress, improper support, or trailering</li>
    <li>Damage from improper inflation/deflation or use of non-approved inflation devices</li>
    <li>Third-party equipment, components, or systems (covered by their respective manufacturers)</li>
  </ul>

  <h2>Manufacturer's Obligation & Remedy</h2>
  <p>Seekingtex's sole and exclusive obligation is the repair or replacement, at Seekingtex's option, of any component determined to be defective in materials or workmanship and covered under this warranty. Repairs or replacements are performed by Seekingtex or its designated authorized service facility. Components repaired or replaced are warranted only for the unexpired portion of the original warranty period.</p>

  <h2>Conditions of Warranty</h2>
  <ul>
    <li><strong>Registration:</strong> The product must be properly registered as mandated in the warranty terms.</li>
    <li><strong>Maintenance:</strong> The product must be maintained in accordance with Seekingtex's published guidelines, including periodic inspection and maintenance of appropriate inflation pressures.</li>
    <li><strong>Cooperation:</strong> The purchaser must fully and promptly cooperate with Seekingtex in all matters pertaining to warranty claims.</li>
    <li><strong>Original Purchaser:</strong> This warranty is extended exclusively to the original end-user purchaser and is not transferable.</li>
  </ul>

  <h2>Commercial Use</h2>
  <p>If the product is used for commercial, governmental, non-profit, charter, rental, instructional, or any purpose other than private recreational use, the warranty period for all components is reduced to one (1) year from the original date of retail purchase. Use in racing, speed or endurance competition immediately and irrevocably voids the warranty entirely.</p>

  <h2>How to Make a Warranty Claim</h2>
  <p>Contact Seekingtex or your authorized dealer with proof of purchase and a detailed description of the issue. Seekingtex will review the claim and provide instructions for inspection and service.</p>
  <p>For warranty service inquiries, please contact us through our <a href="/contact" class="text-sky-600 underline">contact page</a> with your order number and product details.</p>

  <h2>Third-Party Items</h2>
  <p>Equipment, components, or systems manufactured by third parties (even if installed by Seekingtex) are covered exclusively by any warranty offered by their respective manufacturer. Seekingtex expressly disclaims any warranty responsibility for such third-party items.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    This warranty statement is a summary of the complete Seekingtex Manufacturer's Limited Warranty. The full legal warranty document governs all warranty terms and conditions. Specifications subject to change without notice. Seekingtex is a brand of Qingdao Vatrad Group.
  </p>
