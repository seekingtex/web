hero:
  tagline: Seekingtexカスタムラボ
  title: あなただけの<br />ウォータークラフトをデザイン
  subtitle: OEM、ODM、プライベートラベル、カスタムブランディングサービスを世界中の企業に提供。単一プロトタイプから本格生産まで対応。
  cta: プロジェクトを開始
  footer_link: /contact

steps_section:
  tagline: 仕組み
  title: コンセプトから生産へ
  subtitle: アイデアから完成品の海上出荷まで4つのステップ。
  steps:
    - num: '01'
      title: ボードを選ぶ
      desc: SUP、技術ファブリック、ディンギー、RIBからお選びください。サイズ、素材、色をお選びいただけます。
    - num: '02'
      title: デザインをアップロード
      desc: ロゴ、アートワーク、ブランドガイドラインをお送りください。当社のデザインチームがデジタルプルーフを作成します。
    - num: '03'
      title: AIモックアップレビュー
      desc: 生産開始前に、お客様のカスタムボードのフォトリアリスティックなAI生成モックアップをご確認いただけます。
    - num: '04'
      title: 生産と納品
      desc: 承認後、お客様のご注文はISO認証生産ラインに投入されます。リードタイムは30日から。

services_section:
  tagline: サービス
  title: グローバルブランド向け製造サービス
  subtitle: 請負製造からフルサービスのブランド構築まで、柔軟な契約形態。
  items:
    - title: OEM製造
      desc: お客様の設計を仕様通りに生産 — お客様のIP、図面、品質基準。完全なNDA保護付き。
      icon: ⚙️
    - title: ODMソリューション
      desc: 50以上の実績あるプラットフォームから選択し、サイズ、色、グラフィック、パッケージをカスタマイズ。
      icon: '🎨'
    - title: プライベートラベル
      desc: 当社製品にあなたのブランド — ロゴ、パッケージ、ハングタグ、マニュアル。開梱するだけで小売可能。
      icon: 🏷️
    - title: カスタムブランディング
      desc: デッキパッド印刷、ハルグラフィック、チューブデカール、カスタムラベル — 完全なブランド統合。
      icon: ✨

capabilities_section:
  tagline: 能力
  title: 生産・カスタマイズ能力
  subtitle: ご注文前に知っておくべきすべての情報。
  capabilities:
    - label: 注文数量
      value: MOQ 5–10台（SUP/技術ファブリック）、2–5台（技術ファブリック）
    - label: リードタイム
      value: 標準30–45日、試作品15–20日
    - label: カスタマイズ
      value: サイズ、形状、色、グラフィック、パッケージ、ハードウェア
    - label: 素材
      value: PVC、Hypalon、ドローステッチ、FRP、アルミニウム
    - label: 印刷
      value: デジタル（CMYK）、シルクスクリーン、熱転写、昇華
    - label: 認証
      value: CE、、UKCA、FCC（グローバルコンプライアンス対応）

