hero:
  tagline: Seekingtexアカデミー
  title: 学習センター
  subtitle: SUP基礎から高度なレスキュー技術まで、あらゆるスキルレベルに対応するガイドとチュートリアル

categories:
  - level: 初心者
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: SUPの基礎
        desc: スタンドアップ繊維ボーディングの基本 — スタンス、ストロークテクニック、バランスを学びます。
        slug: sup-basics
      - title: 繊維テクニック
        desc: フォワードストローク、スイープストローク、ドロウストローク、ローブレース — 必須の繊維動作を習得します。
        slug: paddle-techniques
      - title: 安全第一
        desc: 天候確認、ライフジャケット使用、リーシュルール、セルフレスキューを含む重要な安全習慣。
        slug: safety-first
  - level: 中級
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: ツーリングの基本
        desc: 数時間の繊維技術計画 — ナビゲーション、水分補給、ペーシング、風向予報の読み方。
        slug: touring-essentials
      - title: 天候の読み方
        desc: 繊維予報の解釈、雲パターンの識別、水面への風の影響の理解。
        slug: weather-reading
      - title: ナビゲーション基礎
        desc: 海図の読み方、コンパスの使用、GPSウェイポイント、海岸繊維技術のルート計画。
        slug: navigation-basics
      - title: 潮汐の理解
        desc: 潮汐サイクル、海流、およびそれらが出発タイミングとルートに与える影響を理解します。
        slug: tidal-awareness
  - level: 上級
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: 複数日トリップ計画
        desc: 遠征ロジスティクス — ギア選定、食料計画、安全プロトコル、緊急連絡先。
        slug: multi-day-trip-planning
      - title: レスキュー技術
        desc: セルフレスキュー、Tレスキュー、技術ファブリックのエスキモーロール、オープンウォーターでのけん引プロトコル。
        slug: rescue-techniques
      - title: 夜間繊維技術
        desc: 暗闇でのナビゲーション — 照明要件、ルート記憶、グループコミュニケーション、危険認識。
        slug: night-paddling
  - level: メンテナンス
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: 洗浄とケア
        desc: 毎セッション後の真水すすぎ、紫外線防止、カビ防止、適切な乾燥技術。
        slug: cleaning-and-care
      - title: 保管ガイド
        desc: 機能性ボードとボートの保管のベストプラクティス — 空気抜き、折り畳み、温度管理、保存期間。
        slug: storage-guide
      - title: 修理の基礎
        desc: PVC修理キットとパッチ技術を使用した小さな穴、シーム漏れ、バルブの問題の修理。
        slug: repair-basics
      - title: バルブメンテナンス
        desc: バルブタイプの識別（Halkey-Roberts、Boston、Leafield）、ゴミの除去、故障したステムの交換。
        slug: valve-maintenance

read_guide: ガイドを読む →

