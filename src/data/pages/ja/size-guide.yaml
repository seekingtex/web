how_to_choose:
  title: 適切なサイズの選び方
  cards:
    - title: SUPボード
      description: 体重と使用目的に基づいて長さを選びます。幅広のボード（32インチ以上）は安定性が高くなります。長いボード（11-12フィート）はツーリングでのトラッキングが向上します。体重の重い繊維専門家はより容量の大きいボードが必要です。
    - title: 技術ファブリック
      description: シングル技術ファブリック（9フィート）はソロ旅行や川に最適です。タンデム技術ファブリック（12フィート）は2人の繊維専門家または1人の大人と装備に対応します。装備を含む総積載量の重量容量を確認してください。
    - title: ディンギーとRIB
      description: 乗客数と使用目的に応じてディンギーの長さを選びます。大型のRIB（4.5m以上）はオフショアや救助に適しています。小型のディンギー（2.7m）はテンダーや釣りプラットフォームとして機能します。
