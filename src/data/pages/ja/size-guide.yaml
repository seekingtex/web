categories:
  inflatable: パフォーマンスを犠牲にすることなく携帯性を重視して設計された機能性SUPと技術ファブリック。体重と繊維技術スタイルに合わせて適切なサイズをお選びください。
  rib: 沿岸航行、パトロール、プロの繊維業務向けのリジッドハル機能性ボート。長さとエンジン容量でお選びください。
  accessory: ウォータークラフトを補完するアクセサリーと安全装備。複数のオプションがあるユニバーサルサイズ。

