tests:
  - title: 圧力テスト
    description: 機能性チャンバーは、推奨使用限界を超える圧力に長時間さらされます。これにより、素材とシームの気密性と構造的完全性が検証され、製品が意図された使用や過剰な空気注入に耐え、故障や漏れが発生しないことが確認されます。
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: 衝撃テスト
    description: 製品はさまざまな重量と角度から制御された衝撃を受けます。素材の耐パンク性、耐引裂性、水中の障害物との衝突による損傷に対する耐性を評価し、耐久性と寿命を実証します。
    image: /images/seekingtex/factory/producing department.jpeg
  - title: 耐紫外線テスト
    description: 完成品は長時間にわたり模擬太陽光にさらされ、長期の紫外線暴露による劣化、退色、脆弱化に対する素材の耐性を評価します。これは熱帯や日射量の多い環境で使用されるボートにとって重要です。
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: 耐摩耗性テスト
    description: 素材サンプルを制御された圧力下で特定回数、研磨面にこすりつけます。繰り返しの使用、砂、岩などの表面との接触による摩耗に耐える素材の能力を測定し、長期的な耐久性を確保します。
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: 低温性能テスト
    description: 製品は寒冷環境でテストされ、さまざまな温度条件下での機能性と耐久性を評価し、冷水域での硬化やひび割れを防ぎます。冬季や高緯度地域での使用を目的としたボートに不可欠です。
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: 浮力・積載量テスト
    description: 製品はさまざまな重量でテストされ、最大耐荷重能力を決定し、ユーザーとギアを安全に支えられることを確認します。すべてのモデルの定格容量はリリース前に検証されます。
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: 操縦性テスト
    description: 繊維技術やモーター入力に対する製品の応答性をテストし、旋回半径と取り扱いの容易さを評価します。繊維試験により、実際の操縦性が設計仕様に一致することを検証します。
    image: /images/seekingtex/factory/sup making.jpeg
  - title: 水密性テスト
    description: 完全に組み立てられた製品を水没させるか、水スプレーにさらして、シーム、バルブ、素材からの漏れをチェックします。すべてのボートは出荷前に必須の水密性チェックに合格する必要があります。
    image: /images/seekingtex/factory/producing department2.jpeg

testing_section:
  tagline: テスト手順
  title: あらゆる段階での厳格なテスト

commitment:
  title: 私たちの約束
  body: これらの厳格なテスト手順を通じて、{SITE}はお客様に対し、当社の機能性SUPとボートが高性能であるだけでなく、長持ちするように作られていることを保証します。これにより、繊維での無数の楽しく安全な冒険をお約束します。当社の品質ラボは生産部門から独立して運営され、経営陣に直接報告されます。
  cta: テスト文書をリクエスト
  cta_link: /contact
