stories:
  tagline: '探検家のストーリー'
  title: 'リアルな人々のリアルな冒険'
  subtitle: 'アクアフェアラーのギアを繊維で使用する繊維専門家、家族、プロフェッショナルたちの声をお届けします。'
  items:
    - name: 'サラ＆マイク'
      title: 'SUP Explorer 11 オーナー、カナダ'
      content: '私たちはExplorer 11をアルゴンキン州立公園での1週間の旅行に持って行きました。ポーテージと湖の横断を美しくこなしました。ドロップステッチ構造のおかげで15 PSIまで膨らませ、パック可能なボードでハードボードのパフォーマンスを得ることができました。'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'アルゴンキン州立公園、カナダ'
    - name: 'カルロス R.'
      title: 'Cheetah Surge ライダー、スペイン'
      content: 'Cheetah Surgeは私の海岸クルージングの頼れる相棒です。鮮やかなデザインはビーチで注目を集め、安定性は軽い波でも自信を与えてくれます。ツーリング中でも夕日を楽しむときでも美しく扱えます。'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'コスタ・ブラバ、スペイン'
    - name: 'リナと家族'
      title: 'Flowing Lotus 繊維専門家、スウェーデン'
      content: '群島での週末の家族冒険。Flowing Lotusは私が繊維している間、娘が立つのに十分安定しています。10分以内で膨らみます — トレーラー不要、純粋な家族の楽しみを繊維で。'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'ストックホルム群島、スウェーデン'
    - name: 'アンドレス中佐'
      title: 'Ocean Voyager 探検家、フィリピン'
      content: 'パラワン周辺の長距離沿岸ツアーにOcean Voyagerを使用しています。熱帯条件での毎日の使用から数ヶ月経っても、ボードは新品同様に機能します。ツーリングシェイプは、劣ったボードなら止まるような波を切ります。'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'パラワン、フィリピン'
    - name: 'エマ T.'
      title: 'Tropical Breeze 初心者、オーストラリア'
      content: 'SUPに乗ったことは一度もありませんでした。Tropical Breezeはとても安定していて、初めての試みで自信を持てました。今では毎週末繊維技術しています。学習曲線はほぼゼロ — そしてボードは繊維で素晴らしく見えます。'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'ゴールドコースト、オーストラリア'

