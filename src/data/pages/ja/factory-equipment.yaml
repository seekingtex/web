hero:
  tagline: "設備"
  title: "製造装置および機械"
  subtitle: "切断、溶接、印刷、組立に対応する工業グレードの装置"
  back_label: "工場に戻る"
  back_link: /factory

categories:
  - title: "切断と素材準備"
    items:
      - name: "自動PVC切断機"
        spec: "CNC制御、6.5 m × 2.5 m、0.1 mm精度"
        desc: "PVC、Hypalon、drop-stitch生地用のコンピュータ制御自動切断機。ネスティングソフトウェアが材料利用率を5%未満の廃棄に最適化します。"
      - name: "生地広げ機"
        spec: "最大幅3 m、テンション制御給送"
        desc: "切断前の歪みを防ぐため、制御されたテンションで単層または多層の生地を敷設します。"
  - title: "チューブ溶接と接合"
    items:
      - name: "ヒートシール機"
        spec: "熱風溶接、可変200–600 °C、0.5–5 m/min"
        desc: "PVCおよびHypalonチューブシームの接合および溶接用の熱風熱シール機。チューブチャンバーやフロート継手の仮止め、シール、融着に使用します。"
      - name: "誘電RFプレス"
        spec: "15 kW、プラテン2000 × 600 mm"
        desc: "主縦シーム、トランサム-チューブ継手、大型チャンバー製造用の高周波溶接プレス。"
      - name: "CNC制御RF溶接機"
        spec: "8 kW、XYテーブル2500 × 1200 mm"
        desc: "複雑な形状、ロゴエンボス、精密パッチのためのプログラム可能な曲線シーム溶接。"
  - title: "RIBハル製造"
    items:
      - name: "手積みガラスファイバー金型"
        spec: "全長6 m LOAまでのRIBハル用複数金型"
        desc: "ポリエステルおよびビニルエステル樹脂システムによる従来の手積みガラスファイバー成形。各層は手でローラーがけされ、一貫した積層品質と強度のために真空バッグ処理されます。"
      - name: "ゲルコートスプレーブース"
        spec: "温度制御、フィルタ付き換気"
        desc: "RIBハルへのゲルコート塗布。正確な厚さ管理で光沢のあるUV耐性仕上げを提供します。"
      - name: "CNCルーター（5軸）"
        spec: "3 m × 2 m × 1 m加工範囲、水冷スピンドル"
        desc: "ハルインサート、コンソール金型、シートベース、カスタムブラケットの加工。"
  - title: "SUP印刷と装飾"
    items:
      - name: "デジタルプリンタ"
        spec: "高解像度インクジェット、印刷幅最大2 m"
        desc: "フルカラーSUPデッキグラフィック用の直接布地デジタル印刷。UV耐性の水性インクでカスタムパターン、グラデーション、写真品質の画像を印刷します。"
      - name: "シルクスクリーン印刷機"
        spec: "手動および半自動、多色登録"
        desc: "SUPボードロゴ、ブランドマーク、繰り返しパターン用のシルクスクリーン。鮮やかな色彩で耐久性があり不透明な印刷を提供します。"
  - title: "組立と艤装"
    items:
      - name: "エンジンホイスト"
        spec: "500 kg能力、調整可能なスプレッダバー"
        desc: "2.5から60 hpの船外機の安全な取り付け。"
      - name: "コンソールモックアップフレーム"
        spec: "高さと角度調整可能"
        desc: "設置前のステアリング、スロットル、計器パネルの事前艤装。"
      - name: "油圧ホースクリンパ"
        spec: "最大1\" ID、デジタル圧力計"
        desc: "スウェージ継手付きカスタム長の油圧ステアリングホースアセンブリ。"
      - name: "電装ハーネス盤"
        spec: "3 m × 1.5 m、事前印刷配線図"
        desc: "ボート外での完全な電装ハーネスの組立と試験。"
  - title: "試験と品質管理"
    items:
      - name: "万能引張試験機"
        spec: "50 kN, ASTM D751"
        desc: "布地ロットの破断力、破断伸び、引き裂き伝播試験。"
      - name: "空気保持試験台"
        spec: "プログラマブル、30分圧力保持"
        desc: "組立前の各チューブチャンバーの自動圧力保持試験。"
      - name: "シーム剥離試験機"
        spec: "モーター式180°剥離、100 mm/min"
        desc: "ISO 6185に準拠した溶接および接着シームの剥離強度試験。"
      - name: "キセノンアーク耐候試験機"
        spec: "2000 h曝露"
        desc: "変色と強度維持のためのUV耐性試験。"

cta:
  title: "工場見学にご興味はありますか？"
  desc: "青島の施設へお客様を歓迎します。装置と工程を直接ご覧ください。"
  label: "見学を予約する →"
  link: /contact
