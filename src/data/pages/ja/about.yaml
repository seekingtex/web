hero:
  tagline: 私たちについて
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: Seekingtex 工場
  title: |
    繊維エンジニアリング、<br />
    <span class="text-accent dark:text-white">Seekingtex</span>流に造る
  subtitle: '私たちは、1隻のボートと頑固な信念を持って海岸の工房から始めました。繊維製品は重要なものとしてエンジニアリングされるべきです。なぜなら実際に重要なものだからです。現在では40か国以上に出荷していますが、すべての船体は今もなお、会社を創業した同じ手を通っています。'

stats:
  title: 数字で見る
  columns: 4
  stats:
    - title: 納入船体数
      amount: '2,400+'
    - title: 出荷国数
      amount: '40'
    - title: 経験年数の合計
      amount: '60'
    - title: 平均保証対応時間（時間）
      amount: '24'

features3_what_we_build:
  title: 私たちの製品
  subtitle: 完全に熟知している集中型の製品ライン — 中途半端な実験も、バッジエンジニアリングもありません。
  columns: 3
  isBeforeContent: true
  items:
    - title: RIBボート
      description: 3.3m〜7.5mのアルミ船体RIB。パトロール、ダイビング、フィッシング、ファミリー用に設計。
      icon: tabler:ship
    - title: 機能性ボート
      description: 2.4m〜4.2mのPVCおよびHypalon製機能性ディンギー。軽量で頑丈、収納も簡単。
      icon: tabler:speedboat
    - title: スーパープレミアムファブリックテンダー
      description: 母船の外観に合わせてカスタムビルドされたコンパクトでハイスペックなRIB。
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: アクセサリー
      description: オール、ポンプ、カバー、ドライバッグ、燃料タンク、エレクトロニクス。すべて当社のボートに対応。
      icon: tabler:package
    - title: 改装・修理
      description: 自社内でのチューブ交換、エレクトロニクス改造、エンジンアップグレード。
      icon: tabler:tool
    - title: カスタム製造
      description: 商業、科学、軍事顧客向けのプロジェクト単位の設計。
      icon: tabler:hammer
  image:
    src: /images/seekingtex/factory/design discuss2.jpeg
    alt: ボート設計とエンジニアリング打ち合わせ

steps2_values:
  title: 私たちの価値観
  subtitle: 創業時からすべての製品を形作ってきた3つの原則。
  items:
    - title: 家族を乗せているかのように造る
      description: すべての船体、溶接、留め具は、自身の家族が使用するかのように扱われます。
      icon: tabler:heart
    - title: 販売前にエンジニアリング
      description: スペックが間違っている場合は、スペックを変更します — 決してお客様を変えません。
      icon: tabler:settings
    - title: 保証を超えて続くサポート
      description: 20年前の船体からもスペアパーツの問い合わせがあり、私たちは今も対応します。
      icon: tabler:headset

steps2_milestones:
  title: マイルストーン
  subtitle: Seekingtexのストーリーの概要。
  isReversed: true
  items:
    - title: 海岸の工房で創業
      description: 2人の造船設計士がCNCフライス盤と頑固なアイデアでスタート。
      icon: tabler:building-factory
    - title: 1,000隻目の船体納入
      description: 7年目に達成。主に口コミとリピート顧客による。
      icon: tabler:circle-check
    - title: 国際輸出プログラム
      description: 5大陸にローカライズされたサポートパートナーを持つ40か国以上へ出荷中。
      icon: tabler:world

features2_locations:
  title: 拠点
  tagline: アクセス
  columns: 3
  items:
    - title: 本社・工場
      description: 沿岸工業団地、4号館 — 月〜金、予約制で見学可能。
    - title: EUサービスセンター
      description: 地中海港 — 欧州顧客向けの改装、修理、保証サポート。
    - title: APACパートナーネットワーク
      description: オーストラリア、日本、シンガポール、香港の認定サービスパートナー。
