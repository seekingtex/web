workshops_section:
  tagline: ワークショップ
  title: 製造ワークショップ
  workshops:
    - title: PVC切断＆材料準備
      description: 自動CNC切断機がPVC、ハイパロン、ドロップステッチファブリックをサブミリ精度で加工。コンピューター最適化されたネスティングが材料廃棄を最小限に抑え、すべてのパネルが溶着前にその寸法仕様を満たすことを保証します。
      image: /images/seekingtex/hero/production-dept.webp
    - title: チューブ溶着＆熱シール
      description: 熱シール機 とRF誘電プレスを備えた専用溶着ワークショップ。熱風熱シーラーがPVCチューブチャンバーを接着・融合し、RF溶着は 要件を超える高強度の気密シームを生成します。
      image: /images/seekingtex/hero/production-workshop.webp
    - title: RIBハル生産 — グラスファイバー
      description: RIBボートのハルは、ポリエステルおよびビニルエステル樹脂システムを使用したハンドレイアップグラスファイバー成形によって生産されます。各層は一貫した品質のためにハンドロールおよびバキュームバッグ処理されます。ゲルコートスプレーブースが高光沢の耐UV性繊維仕上げを提供します。
      image: /images/seekingtex/factory/Seekingtex-warehouse-storage.webp
    - title: SUP印刷＆装飾
      description: SUPボードは、フルカラーグラフィック向けのデジタル印刷 とロゴや反復パターン向けのスクリーン印刷 を使用して装飾されます。デジタルプリンターは写真品質のデッキデザインを生成し、スクリーン印刷は耐久性のある鮮やかなブランドマークを提供します。
      image: /images/seekingtex/products/sup-series/sup-medusa-glow-1.webp
    - title: 最終組立＆リギング
      description: グラスファイバーハルとPVCチューブが結合され、エンジンが取り付けられ、ステアリングとコントロールが接続され、電気システムが配線される組立ライン。各ボートはチームリーダーが署名する100ポイントの組立チェックリストに従います。
      image: /images/seekingtex/hero/factory-gate.webp
    - title: 品質テスト＆検査
      description: 完成したすべてのボートは、出荷前に必須の空気保持テスト、シーム剥離検証、全システムチェックを受けます。当社の品質ラボは生産から独立して運営され、管理部門に直接報告します。
      image: /images/seekingtex/factory/Pressure Testing.jpeg

