hero:
  tagline: 工場
  title: 工場と製造
  subtitle: 12,000m2の統合製造 — 原材料から完成ボートまで

intro:
  - '**青島ヴァトラッドグループ有限公司** のファクトリーブランドとして、アクアフェアラーは生産のすべての段階を管理しています — 原材料のPVCやグラスファイバー材料の到着から、完成ボートの最終出荷前検査まで。青島経済開発区にある当社の製造施設は12,000平方メートルに及び、PVC切断、チューブ熱シール、グラスファイバーRIBハル生産、SUPデジタル印刷、最終組立、品質テスト専用のワークショップを備えています。'
  - 設計、エンジニアリング、プロトタイピング、製造、テストを1つの屋根の下に統合することで、契約製造の非効率性を排除し、製造品質、材料選択、納期スケジュールを直接管理しています。当社のワークショップを出るすべてのボートは、当社の人員によって、当社の設備で、当社の基準に従って製造されています。

