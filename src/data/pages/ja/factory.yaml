qc_section:
  tagline: 品質管理
  title: テスト＆品質保証プロセス
  subtitle: すべてのボートは出荷前に必須テストを受けます。当社の品質ラボは生産から独立して運営され、管理部門に直接報告します。
  steps:
    - step: '1'
      title: 原材料検査
      desc: PVC、ハイパロン、ドロップステッチファブリックは、バッチが生産に入る前に引張テスト、ティア伝播、耐UV性検証を受けます。
    - step: '2'
      title: 48時間空気保持テスト
      desc: すべてのチューブチャンバーは定格圧力の125%に膨らませ、48時間保持されます。5%未満の圧力低下は自動拒否とシーム再検査をトリガーします。
    - step: '3'
      title: 負荷＆バランステスト
      desc: 完成したボートは最大定格容量まで積載され、安定性、乾舷、ハンドリングについてテストされます。各船舶は最終検査前に繊維テストされます。

oem_section:
  tagline: OEMプロジェクト
  title: ブランド＆OEMパートナーシップケーススタディ
  subtitle: コンセプトからコンテナまで — グローバルブランドが機能性ウォータークラフトラインを立ち上げ、拡大する方法。
  cases:
    - challenge: 欧州のアウトドア小売業者は、ユニークなデッキグラフィック、エコフレンドリーなPVC、小売準備完了のパッケージングを備えたプライベートラベルSUPラインを必要としていました — すべて60日以内に納品。
      solution: カスタムデジタル印刷ファイルを開発し、REACH準拠のPVCを調達し、設計チームを青島工場に同地配置することでサンプリングを3ラウンドから1ラウンドに短縮。
      result: 署名済みPOからFOBまで55日。4つのSKUで2,400ユニット。最初のコンテナが到着する前にリピートオーダー。
    - challenge: 米国の繊維産業スタートアップは、カスタムハル形状、共同ブランドパッケージング、小売配置のためのBSCI認証を備えた高性能ドロップステッチ技術ファブリックを必要としていました。
      solution: 修正されたロッカープロファイルで既存のドロップステッチ技術ファブリック金型を適合、共同ブランドパッケージアートワークを開発、完全なBSCI監査文書を提供。
      result: 米国の主要アウトドアチェーン3社で listing に成功。初年度5,000ユニット以上、98%の消化率。
    - challenge: オーストラリアのディストリビューターは、カスタムチューブカラー、ハイパロンアップグレードオプション、オーストラリア規格AS 1799への準拠を備えたCE認証RIBレンジを必要としていました。
      solution: 4つのチューブカラーバリエーションで試作品を生産、日本のサプライヤーからCSMハイパロンを調達、第三者AS 1799コンプライアンステストを調整。
      result: 3モデルのRIBレンジが豪州/ニュージーランド市場で発売。続いて12隻のパトロールRIBの政府入札に勝利。

faq_section:
  tagline: FAQ
  title: B2B＆OEMよくある質問
  questions:
    - q: OEM機能性SUPボードの最小発注数量（MOQ）は？
      a: 標準OEMモデルのMOQは5–10ユニットからです。カスタム金型およびプライベートラベルプロジェクトは、複雑さに応じて最低200ユニットが必要です。新ブランド立ち上げ向けのトライアルオーダーおよびサンプルランも利用可能です。
    - q: アクアフェアラーはBSCI認証を保持していますか？
      a: はい。当社工場は有効なBSCI社会コンプライアンス認証を維持しています（監査レポートはリクエストに応じて利用可能）。また、品質管理のための およびすべての製品はCE 認証を保持しています。REACHおよびRoHSコンプライアンス文書はすべてのOEM出荷に提供されます。
    - q: OEM注文の標準的なリードタイムは？
      a: 標準リードタイムは、確認済みPOおよびデポジットから30〜45日です。カスタム金型開発には工具製作に15〜20日が追加されます。緊急注文および夏前の繁忙期（1月〜3月）の季節的なラッシュには迅速生産を提供しています。
    - q: FOB青島またはCIFで出荷できますか？
      a: はい。FOB青島、主要グローバル港へのCIF、および資格のあるパートナー向けDDPで出荷しています。当社の物流チームがコンテナ予約、輸出書類、通関手続きを管理します。EU、米国、豪州、アジア市場の50ヶ国以上に出荷しています。

b2b_moq: '標準MOQ：モデルあたり5–10ユニット（SUP/技術ファブリック/ドロップステッチ）。技術ファブリック MOQ：2–5ユニット。新しいパートナーシップ向けのトライアルオーダーを歓迎します。'

