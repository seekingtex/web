  subtitle: |
    家族、探検家、プロフェッショナルのための<br />
    機能性SUP、ボート、繊維装備を生み出すグローバルウォーターエクスプロレーションブランドです。
  taglineSection: '探検のために設計され、信頼性のためにエンジニアリングされ、グローバルパートナーのために構築されました。'
