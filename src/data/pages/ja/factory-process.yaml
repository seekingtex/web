intro: 生産を外部の工場に委託するブランドとは異なり、Seekingtexは製造チェーン全体を所有・運営しています。この垂直統合により、すべての段階で厳格な品質管理を維持し、カスタム要件に迅速に対応し、ロットごとに一貫した製品品質を提供することができます。以下は、当社施設でボートが製造されるプロセスです。

steps:
  - step: '01'
    title: 材料受入・検査
    description: 入荷するPVC生地、ガラス繊維マット、樹脂、金具の各バッチは仕様に照らして検査されます。生地サンプルは、生産にリリースされる前に引張強度、厚さの均一性、耐紫外線性がテストされます。不適合材料は隔離され返品されます。
    duration: 1〜2日
  - step: '02'
    title: 自動PVC切断
    description: 承認された生地は自動CNC切断機にセットされ、サブミリ精度で切断されます。コンピューター最適化されたネスティングにより、パネルの廃棄率は通常5%未満に抑えられます。カットされたパネルはボートモデルとチャンバーごとにラベル付けされ、溶接ワークショップに送られます。
    duration: ボートキットあたり2〜4時間
  - step: '03'
    title: チューブ熱封着・溶接
    description: パネルは200〜600°Cの制御温度で熱風溶接により熱封着機（圧膠機）で仮付け・接着されます。主シームはRF誘電溶接で補強され、気密で高強度な接合部が形成されます。完成したチャンバーは1.5倍の使用圧力で30分間の気密検証を受けます。
    duration: ボート1隻あたり1〜2日
  - step: '04'
    title: FRP RIBハル成形
    description: RIBボートハルはハンドレイアップFRP成形で製造されます。ガラス繊維マットとロービングクロスの層が精密金型内でポリエステルまたはビニルエステル樹脂とともにハンドローリングされます。各層は一貫した積層品質のためにバキュームバッグ処理されます。ハルは高光沢、耐紫外線の繊維表面を提供するゲルコートで仕上げられます。
    duration: ハル1つあたり2〜4日
  - step: '05'
    title: SUP印刷・装飾
    description: SUPボードデッキグラフィックは、フルカラー写真品質デザイン用のデジタル印刷と、耐久性のあるロゴや繰り返しパターン用のシルクスクリーン印刷で施されます。印刷物は紫外線と耐摩耗性のために硬化・密封処理されます。
    duration: 1〜2日
  - step: '06'
    title: 最終組立・艤装
    description: 組立ラインでFRPハルとPVCチューブアセンブリが結合されます。エンジンが搭載され、ステアリングとスロットルコントロールが接続され、燃料システムが取り付けられ、完全な電気ハーネスが配線されます。各ボートは各段階で必須の署名を必要とする100ポイントの組立チェックリストに従います。
    duration: 2〜3日
  - step: '07'
    title: 品質テスト・検査
    description: 完成したすべてのボートは必須の品質ゲートを受けます：チャンバー気密テスト、システム機能チェック、ファスナートルク検証、外観検査。カスタムビルドやプロトタイプは、速度、操縦性、安定性、耐久性をカバーする繊維試験も受けます。
    duration: 1〜2日
  - step: '08'
    title: 梱包・出荷
    description: ボートは空気を抜かれ、手順に従って折り畳まれ、頑丈な織物バッグまたはベニヤ箱に梱包され、出荷用に積載されます。各パッケージにはモデル、シリアル番号、仕向け地がラベル表示されます。当社はフォワーダーと連携し、世界中にFCLおよびLCLコンテナ出荷を手配します。
    duration: 1日

