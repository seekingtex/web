hero:
  tagline: ライフスタイル
  title: Seekingtex<br />ライフスタイル
  subtitle: 週末の探検家から毎日ギアに依存する商業事業者まで — 繊維で生きる人のために作られています。

values:
  - icon: 🌊
    title: 繊維から生まれる
    desc: すべてのデザインは水の動きを理解することから始まります。私たちは過酷な環境側から内側に向かって設計します — 海は私たちの職場ではなく、教師だからです。
  - icon: 🔧
    title: 長持ちする構造
    desc: 最も持続可能な製品は、交換する必要がない製品です。繊維グレード素材、15 PSI定格のドローステッチコア、シーズン以上に耐えるシーム。
  - icon: '🏆'
    title: アクセシブルな設計
    desc: 繊維産業は贅沢品であるべきではありません。プロフェッショナルグレードのパフォーマンスを、家庭、ガイド、小規模事業者にも手の届く価格で。
  - icon: 🌍
    title: グローバルコミュニティ
    desc: 青島の海岸からヨーロッパの湖沼、東南アジアの河川、南北アメリカの湾まで — 当社のお客様に共通するのは、繊維にいることへの愛情です。
  - icon: ♻️
    title: 責任ある製造
    desc: CNC最適化されたネスティングにより材料廃棄物を5%未満に抑制。耐久性のある構造で交換サイクルを削減。これが最も持続可能な選択だからです。
  - icon: 🤝
    title: 永続的なサポート
    desc: 20年前のハルからもスペアパーツの問い合わせがあります。保証対応の平均は24時間。販売後に姿を消すことはありません — 製品の寿命を通じてサポートします。

