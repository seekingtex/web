hero:
  tagline: '물 위의 신뢰할 수 있는 모험 엔지니어링'
  title: 'Seekingtex'
  subtitle: |
    가족, 탐험가, 전문가를 위한<br />
    인플레이타블 SUP, 원단 및 섬유 장비를 만드는 글로벌 워터 익스플로레이션 브랜드입니다.
  taglineSection: '탐험을 위해 설계되고, 신뢰성을 위해 엔지니어링되었으며, 글로벌 파트너를 위해 만들어졌습니다.'
  actions:
    - variant: primary
      text: 제품 둘러보기
      href: /products
      icon: tabler:shopping-bag
    - text: 자세히 알아보기
      href: '#features'
  image:
    src: ~/assets/images/hero-image.webp
    alt: Seekingtex 히어로 이미지

hero_carousel:
  autoplay_interval: 5000
  slides:
    - image:
        src: /images/seekingtex/hero/hero-scenic.webp
        alt: Seekingtex 공장 및 시설 전경
      tagline: 환영합니다
      title: |
        물 위를 위해 설계되었습니다. <br />
        <span class="text-sky-300">선상 생활</span>을 위해 제작되었습니다.
      subtitle: 섬유 전문가와 애호가를 위한 프리미엄 고무원단, 기술 원단 및 엔지니어링 제품.
      actions:
        - text: 제품 둘러보기
          href: /products
          variant: primary
        - text: 견적 문의
          href: /contact
          variant: secondary
    - image:
        src: /images/seekingtex/hero/hero-5.webp
        alt: Seekingtex 원단가 물 위에 있는 모습
      tagline: 장인 정신
      title: |
        보증 기간보다 오래가는 선체. <br />
        선체보다 오래가는 서비스.
      subtitle: 선박용 소재. 알루미늄 용접. 20년 된 원단도 여전히 부품을 문의합니다.
      actions:
        - text: 회사 소개
          href: /about
          variant: primary
    - image:
        src: /images/seekingtex/hero/boat man Seekingtex-min.jpeg
        alt: Seekingtex 고무원단가 물 위에 있는 모습
      tagline: 지원
      title: |
        판매 전에 엔지니어링하고, <br />
        판매 후에도 오랫동안 지원합니다.
      subtitle: 40여 개국 공인 서비스 파트너. 20년 된 선체도 부품을 문의하며 — 우리는 여전히 전화를 받습니다.
      actions:
        - text: 문의하기
          href: /contact
          variant: primary
        - text: 가격 보기
          href: /pricing
          variant: secondary

features:
  id: features
  tagline: Seekingtex를 선택해야 하는 이유
  title: Seekingtex와 함께라면
  subtitle: 수십 년의 섬유 엔지니어링 경험을 집약한 특화 제품 라인. 튼튼하게 제작되고, 바다에서 테스트되며, 평생 지원됩니다.
  columns: 2
  items:
    - title: 선박용 소재
      description: 자외선, 내마모성 및 내염수성에 강한 헤비듀티 PVC, 하이팔론 및 알루미늄 선체.
      icon: tabler:shield-check
    - title: 생산 품질
      description: 모든 선체는 압력 테스트를 거치고, 모든 용접부는 검사됩니다. 당사가 직접 사용할 수 있는 제품만 출고합니다.
      icon: tabler:certificate
    - title: 모듈식 설계
      description: 튜브 레이아웃, 콘솔 위치, 연료 용량 및 액세서리를 용도에 맞게 커스터마이징 가능.
      icon: tabler:layout-grid
    - title: 정직한 사양
      description: 실제 적재 하중, 실제 치수, 실제 중량. 마케팅 부풀리기는 절대 없습니다.
      icon: tabler:ruler-measure
    - title: 빠른 배송 및 예비 부품
      description: 일반 모델은 수일 내 출고. 정품 예비 부품 및 소모품은 연중 재고 보유.
      icon: tabler:truck-delivery
    - title: 평생 지원
      description: 기술 문의, 수리 및 개조 조언을 위한 엔지니어링팀 직통 연락.
      icon: tabler:lifebuoy

featured_products:
  id: featured
  title: 추천 제품
  subtitle: 현재 카탈로그에서 엄선 — 이번 시즌 가장 인기 있는 모델.
  linkText: 모든 제품 보기
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: 작업 현장
  title: 선체 설계도에서 출고까지, 모든 과정이 자체적으로 이루어집니다
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">보고, 느끼고, 측정할 수 있는 품질</h3>
  items:
    - title: 조선 기술자가 설계
      description: 선체 라인은 자체적으로 설계되고 CFD 해석을 통해 반복 개선된 후 첫 번째 프로토타입이 진수됩니다.
    - title: 자체 시설에서 용접 및 조립
      description: 튜브 용접, 콘솔 장착 및 리깅이 한 공간에서 이루어져 모든 단계의 품질을 관리합니다.
    - title: 출하 전 해상 테스트
      description: 모든 모델은 활주, 선회, 최고 속도 및 하중 처리를 포함한 수 시간의 해상 시험을 완료합니다.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Seekingtex 생산 작업장

steps:
  title: 사양서에서 진수까지 5단계
  items:
    - title: '1단계: <span class="font-medium">구성</span>'
      description: 모델을 선택하고, 옵션을 고르고, 온라인 또는 전화로 견적을 요청하세요. 당사 팀이 영업일 기준 1일 이내에 답변드립니다.
      icon: tabler:list-numbers
    - title: '2단계: <span class="font-medium">확인</span>'
      description: 사양, 리드 타임 및 총 비용을 서면으로 확인해 드립니다. 예상치 못한 일이나 숨겨진 비용은 없습니다.
      icon: tabler:checks
    - title: '3단계: <span class="font-medium">제작</span>'
      description: 당사 작업장에서 생산이 시작됩니다. 주요 단계마다 진행 사진을 보내드립니다.
      icon: tabler:tool
    - title: '4단계: <span class="font-medium">배송</span>'
      description: 고정 장치에 안전하게 포장되어 해상 또는 항공으로 발송됩니다. 통관 서류는 처음부터 끝까지 처리해 드립니다.
      icon: tabler:truck-loading
    - title: '5단계: <span class="font-medium">지원</span>'
      description: 2년 선체 보증 및 평생 기술 지원. 예비 부품은 48시간 이내 출고.
      icon: tabler:headset
  image:
    src: /images/seekingtex/hero/production-dept.webp
    alt: Seekingtex 제조 과정

blog_latest:
  title: 블로그 소식
  information: |
    엔지니어링팀의 기사, 기술 노트 및 사례 연구.
    프로젝트가 출고되거나, 표준이 업데이트되거나, 이야기할 가치가 있는 일이 있을 때마다 새 글이 추가됩니다.

faqs:
  title: 자주 묻는 질문
  subtitle: Seekingtex 고무원단, 보증, 배송 및 OEM/ODM 파트너십에 대한 일반 문의 사항. 원하는 내용이 없다면 문의해 주세요.
  columns: 2
  items:
    - title: Seekingtex의 미국 창고 위치와 배송 기간은 어떻게 되나요?
      description: "당사의 미국 창고는 캘리포니아주 몬클레어에 위치해 있습니다. 서부: 2~3일. 중부: 3~4일. 동부: 4~5일. 해외 배송도 가능합니다 — 맞춤 견적은 문의해 주세요."
      icon: tabler:truck-delivery
    - title: Seekingtex 고무원단의 보증 정책은 어떻게 되나요?
      description: "Seekingtex 고무원단 제품은 튜브 원단 무결성, 이음새 기밀성, 유리섬유 선체 구조 및 공기 주입 밸브에 대해 5년 제한 보증이 적용됩니다. 공장 설치 액세서리는 1년 보증 적용. 상업용: 1년 제한 보증. 전체 이용 약관은 보증 페이지에서 확인하실 수 있습니다."
      icon: tabler:shield-check
    - title: Seekingtex 원단에는 등록 서류가 포함되나요?
      description: 네, 모든 Seekingtex 고무원단에는 등록에 필요한 서류가 포함됩니다. 제조사 원산지 증명서는 사용 설명서 뒷면에서 확인하실 수 있으며, 요청 시 다운로드 가능한 사본을 제공해 드립니다. 미국 해안경비대 제조 승인.
      icon: tabler:file-text
    - title: Seekingtex 원단는 미국 해안경비대 승인을 받았나요?
      description: "네, Seekingtex 고무원단는 미국 해안경비대(USCG) 제조 승인을 받았습니다. 당사 공장은 또한 EU 시장 진출을 위한 CE 인증과  인증을 보유하고 있습니다."
      icon: tabler:flag
    - title: 제품 포장이 손상된 상태로 도착하면 어떻게 하나요?
      description: Seekingtex 제품 포장이 손상된 상태로 도착할 경우, 배송을 거절하시고 발송인에게 반품해 주세요. 당사 지원팀에 연락 주시면 신속하게 교체품을 보내드립니다.
      icon: tabler:package
    - title: 예상 배송일까지 제품이 도착하지 않으면 어떻게 하나요?
      description: Seekingtex가 제공하는 배송 시간은 예상치이며 보장되지 않습니다. 발송 후 패키지 수령은 고객의 책임입니다. 패키지가 지정된 배송 장소에 놓인 경우, 배송 완료 시 소유권이 이전됩니다.
      icon: tabler:calendar-clock

cta:
  title: |
    지금 바로 <br class="block sm:hidden" /><span class="sm:whitespace-nowrap">OEM/ODM 프로젝트</span>를 시작해 보시겠습니까?
  subtitle: 요구 사항을 알려주시면 영업일 기준 1일 이내에 맞춤 견적, 최소 주문 수량 및 리드 타임을 제공해 드립니다.
  actions:
    - variant: primary
      text: 견적 요청
      href: /contact
      icon: tabler:message-circle
    - text: 공장 방문
      href: /factory
