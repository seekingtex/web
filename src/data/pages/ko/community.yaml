stories:
  tagline: '탐험가 이야기'
  title: '진짜 사람들의 진짜 모험'
  subtitle: '물 위에서 Seekingtex 장비를 사용하는 섬유러, 가족 및 전문가들의 이야기를 들어보세요.'
  items:
    - name: 'Sarah & Mike'
      title: 'SUP Explorer 11 소유자, 캐나다'
      content: '우리는 Explorer 11을 가지고 알곤킨 공원에서 일주일 여행을 했습니다. 포티지와 호수 횡단을 아름답게 처리했습니다.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: '알곤킨 공원, 캐나다'
    - name: 'Carlos R.'
      title: 'Cheetah Surge 라이더, 스페인'
      content: 'Cheetah Surge는 해안 크루징을 위한 나의 최고 선택입니다. 생생한 디자인이 해변에서 시선을 사로잡습니다.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: '코스타 브라바, 스페인'
    - name: 'Lina & 가족'
      title: 'Flowing Lotus 섬유러, 스웨덴'
      content: '군도에서의 주말 가족 모험. Flowing Lotus는 제가 노를 젓는 동안 딸이 서 있을 수 있을 정도로 안정적입니다.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: '스톡홀름 군도, 스웨덴'
    - name: 'Andres 중령'
      title: 'Ocean Voyager 탐험가, 필리핀'
      content: '팔라완 주변 장거리 해안 투어에 Ocean Voyager를 사용합니다. 몇 달간 열대 조건에서 매일 사용해도 보드는 여전히 새것처럼 작동합니다.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: '팔라완, 필리핀'
    - name: 'Emma T.'
      title: 'Tropical Breeze 초보자, 호주'
      content: 'SUP에 탄 적이 없었습니다. Tropical Breeze는 너무 안정적이어서 첫 시도에 자신감을 느꼈습니다.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: '골드 코스트, 호주'

