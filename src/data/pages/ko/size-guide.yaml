hero:
  title: 사이즈 및 사양 가이드
  subtitle: 모든 Seekingtex 제품의 치수, 용량 및 권장 용도입니다.

categories:
  inflatable: 성능을 희생하지 않으면서 휴대성을 위해 설계된 기능성 SUP 및 기술 원단. 체중과 섬유 기술 스타일에 맞는 올바른 사이즈를 선택하세요.
  rib: 연안 항해, 순찰 및 전문 섬유 작업을 위한 리지드-헐 기능성 원단. 길이와 엔진 용량에 따라 선택하세요.
  accessory: 선박을 보완하는 액세서리 및 안전 장비. 여러 옵션이 있는 유니버설 사이즈.

