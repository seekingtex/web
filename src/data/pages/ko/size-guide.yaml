how_to_choose:
  title: 올바른 사이즈 선택 방법
  cards:
    - title: SUP 보드
      description: 체중과 사용 목적에 따라 길이를 선택하세요. 더 넓은 보드(32인치+)는 더 큰 안정성을 제공합니다. 더 긴 보드(11-12피트)는 투어링에 더 좋은 트래킹을 제공합니다. 체중이 더 나가는 섬유러는 더 큰 볼륨의 보드가 필요합니다.
    - title: 기술 원단
      description: 싱글 기술 원단(9피트)은 솔로 여행과 강에 가장 적합합니다. 탠덤 기술 원단(12피트)은 두 명의 섬유러 또는 한 명의 성인과 장비를 수용합니다. 장비를 포함한 총 하중에 대한 중량 용량을 확인하세요.
    - title: 딩기 및 기술 원단
      description: 승객 수와 사용 목적에 따라 딩기 길이를 선택하세요. 더 큰 기술 원단(4.5m+)는 오프쇼어 및 구조에 적합합니다. 더 작은 딩기(2.7m)는 텐더 및 낚시 플랫폼으로 사용됩니다.
