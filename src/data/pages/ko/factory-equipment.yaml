hero:
  tagline: "장비"
  title: "제조 장비 및 기계"
  subtitle: "절단, 용접, 인쇄, 조립을 위한 산업용 등급 장비"
  back_label: "공장으로 돌아가기"
  back_link: /factory

categories:
  - title: "절단 및 소재 준비"
    items:
      - name: "자동 PVC 절단기"
        spec: "CNC 제어, 6.5 m × 2.5 m, 0.1 mm 정밀도"
        desc: "PVC, Hypalon, drop-stitch 원단용 컴퓨터 제어 자동 절단기. 네스팅 소프트웨어가 재료 사용률을 5% 미만의 폐기물로 최적화합니다."
      - name: "원단 펼침기"
        spec: "최대 폭 3 m, 장력 제어 공급"
        desc: "절단 전 비틀림을 방지하기 위해 제어된 장력으로 단일 또는 다중 겹으로 원단을 펼칩니다."
  - title: "튜브 용접 및 접합"
    items:
      - name: "열 밀봉 기계"
        spec: "열풍 용접, 가변 200–600 °C, 0.5–5 m/min"
        desc: "PVC 및 Hypalon 튜브 심의 접합 및 용접용 열풍 열 밀봉 기계. 튜브 챔버와 부력 연결부의 임시 고정, 밀봉 및 융합에 사용됩니다."
      - name: "유전체 RF 프레스"
        spec: "15 kW, 플래튼 2000 × 600 mm"
        desc: "주 종방향 심, 트랜섬-튜브 조인트, 대형 챔버 제작을 위한 고주파 용접 프레스."
      - name: "CNC 제어 RF 용접기"
        spec: "8 kW, XY 테이블 2500 × 1200 mm"
        desc: "복잡한 형상, 로고 엠보싱, 정밀 패치 작업을 위한 프로그래밍 가능한 곡선 심 용접."
  - title: "기술 원단 선체 제조"
    items:
      - name: "수동 적층 유리섬유 금형"
        spec: "전장 6 m LOA까지의 기술 원단 선체용 다수 금형"
        desc: "폴리에스터 및 비닐에스터 수지 시스템을 사용한 전통적인 수동 적층 유리섬유 성형. 각 층은 손으로 롤링되고 일관된 적층 품질과 강도를 위해 진공 백 처리됩니다."
      - name: "겔코트 분무 부스"
        spec: "온도 제어, 여과된 공기 환기"
        desc: "기술 원단 선체에 겔코트 도포. 정밀한 두께 제어로 고광택, UV 저항성 마감을 제공합니다."
      - name: "CNC 라우터 (5축)"
        spec: "3 m × 2 m × 1 m 작업 범위, 수냉 스핀들"
        desc: "선체 삽입물, 콘솔 금형, 시트 베이스 및 맞춤형 브래킷 가공."
  - title: "SUP 인쇄 및 장식"
    items:
      - name: "디지털 프린터"
        spec: "고해상도 잉크젯, 인쇄 폭 최대 2 m"
        desc: "풀 컬러 SUP 데크 그래픽용 직물 직접 디지털 인쇄. UV 저항성 수성 잉크로 맞춤 패턴, 그라데이션 및 사진 품질 이미지를 인쇄합니다."
      - name: "스크린 인쇄기"
        spec: "수동 및 반자동, 다색 등록"
        desc: "SUP 보드 로고, 브랜드 마크 및 반복 패턴용 스크린 인쇄. 생생한 색상 채도로 내구성 있고 불투명한 인쇄를 제공합니다."
  - title: "조립 및 장비"
    items:
      - name: "엔진 호이스트"
        spec: "500 kg 용량, 조절 가능한 스프레더 바"
        desc: "2.5~60 hp 선외기를 안전하게 장착합니다."
      - name: "콘솔 목업 프레임"
        spec: "높이 및 각도 조절 가능"
        desc: "설치 전 조향, 스로틀 및 계기판의 사전 배선."
      - name: "유압 호스 크림퍼"
        spec: "최대 1\" ID, 디지털 압력 게이지"
        desc: "스웨이지 피팅이 있는 맞춤 길이 유압 조향 호스 어셈블리."
      - name: "전기 하니스 보드"
        spec: "3 m × 1.5 m, 사전 인쇄 배선도"
        desc: "원단 외부에서 완전한 전기 하니스의 조립 및 테스트."
  - title: "시험 및 품질 관리"
    items:
      - name: "만능 인장 시험기"
        spec: "50 kN, ASTM D751"
        desc: "원단 로트의 파단력, 파단 신율 및 찢김 전파 시험."
      - name: "공기 유지 시험 장치"
        spec: "프로그래밍 가능, 30분 압력 유지"
        desc: "조립 전 각 튜브 챔버에 대한 자동 압력 유지 시험."
      - name: "심 박리 시험기"
        spec: "모터 구동 180° 박리, 100 mm/min"
        desc: "ISO 6185에 따른 용접 및 접착 심의 박리 강도 시험."
      - name: "제논 아크 내후성 챔버"
        spec: "2000 h 노출"
        desc: "변색 및 강도 유지를 위한 UV 저항성 시험."

cta:
  title: "공장 견학에 관심이 있으신가요?"
  desc: "칭다오 시설을 방문하시는 분들을 환영합니다. 장비와 공정을 직접 확인하세요."
  label: "방문 예약 →"
