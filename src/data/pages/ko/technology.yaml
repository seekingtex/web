hero:
  tagline: 기술
  title: 당사의 기술
  subtitle: Seekingtex 제품은 고급 소재와 혁신적인 엔지니어링으로 설계되어 탁월한 성능, 내구성 및 휴대성을 제공합니다.

features:
  - title: 군용 등급 PVC
    description: 당사의 기능성 원단와 SUP는 높은 인장 강도와 내천공성을 갖춘 자외선 차단, 내마모성 PVC 원단을 사용합니다.
  - title: 드롭 스티치 구조
    description: 수천 개의 고밀도 섬유사가 상하 표면을 연결하여 단단한 고압 데크를 형성합니다. 기능성 SUP에 하드보드에 가까운 성능을 제공합니다.
  - title: 열융착 이음매
    description: 이음매는 접착이 아닌 열융착 방식으로 처리되어 중요한 응력 지점에서 내구성 있는 접합 강도를 제공합니다.
  - title: 자동 팽창 기술
    description: Pro 구명조끼는 침수 시 즉시 작동하는 자동 팽창 메커니즘을 사용하여 안정적인 부력을 제공합니다.
