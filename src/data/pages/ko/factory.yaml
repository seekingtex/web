workshops_section:
  tagline: 워크숍
  title: 제조 워크숍
  workshops:
    - title: PVC 재단 및 소재 준비
      description: 자동 CNC 재단기가 PVC, Hypalon, 드롭스티치 원단을 서브밀리미터 정밀도로 가공합니다. 컴퓨터로 최적화된 네스팅은 소재 낭비를 최소화하고 용접 전 모든 패널이 치수 규격을 충족하도록 보장합니다.
      image: /images/seekingtex/hero/production-dept.webp
    - title: 튜브 용접 및 열융착
      description: 핫에어 열융착기와 RF 유전체 프레스를 갖춘 전용 용접 워크숍이 있습니다. 핫에어 열융착기는 PVC 튜브 챔버를 접합·융합하고, RF 용접은 요구 사항을 초과하는 고강도 기밀 심지를 생성합니다.
      image: /images/seekingtex/hero/production-workshop.webp
    - title: 기술 원단 선체 생산 — 유리섬유
      description: 기술 원단 선체는 폴리에스터와 비닐에스터 수지 시스템을 사용하는 핸드레이업 유리섬유 성형으로 생산됩니다. 각 레이어는 일관된 품질을 위해 수작업으로 롤링되고 진공백 처리됩니다. 겔코트 스프레이 부스는 고광택, 자외선 저항성 섬유 마감을 제공합니다.
      image: /images/seekingtex/factory/Seekingtex-warehouse-storage.webp
    - title: SUP 인쇄 및 장식
      description: SUP 보드는 풀컬러 그래픽용 디지털 인쇄와 로고 및 반복 패턴용 스크린 인쇄로 장식됩니다. 디지털 프린터는 사진 품질의 데크 디자인을, 스크린 인쇄는 내구성 있고 선명한 브랜드 마크를 제공합니다.
      image: /images/seekingtex/products/sup-series/sup-medusa-glow-1.webp
    - title: 최종 조립 및 리깅
      description: 유리섬유 선체와 PVC 튜브를 결합하고, 엔진을 장착하며, 조향 및 제어장치를 연결하고, 전기 시스템을 배선하는 조립 라인입니다. 각 원단는 팀장이 승인하는 100점 조립 체크리스트를 따릅니다.
      image: /images/seekingtex/hero/factory-gate.webp
    - title: 품질 테스트 및 검사
      description: 모든 완성된 원단는 선적 전 의무적인 공기 유지 테스트, 심지 박리 검증, 전체 시스템 점검을 거칩니다. 당사 품질 연구소는 생산과 독립적으로 운영되며 경영진에 직접 보고합니다.
      image: /images/seekingtex/factory/Pressure Testing.jpeg

