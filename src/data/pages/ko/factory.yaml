qc_section:
  tagline: 품질 관리
  title: 테스트 및 품질 보증 프로세스
  subtitle: 모든 원단는 선적 전 의무 테스트를 거칩니다. 당사 품질 연구소는 생산과 독립적으로 운영되며 경영진에 직접 보고합니다.
  steps:
    - step: '1'
      title: 원자재 검사
      desc: PVC, Hypalon, 드롭스티치 원단은 생산 투입 전 인장 테스트, 인열 전파, 자외선 저항성 검증을 거칩니다.
    - step: '2'
      title: 48시간 공기 유지 테스트
      desc: 모든 튜브 챔버는 정격 압력의 125%까지 팽창 후 48시간 유지됩니다. 압력 강하가 5%를 초과하면 자동 폐기 및 심지 재검사가 진행됩니다.
    - step: '3'
      title: 하중 및 밸런스 테스트
      desc: 완성된 원단는 최대 정격 용량으로 적재되어 안정성, 프리보드, 조종성에 대해 테스트됩니다. 각 선박은 최종 검사 전 수중 테스트를 거칩니다.

oem_section:
  tagline: OEM 프로젝트
  title: 브랜드 및 OEM 파트너십 사례 연구
  subtitle: 컨셉부터 컨테이너까지 — 글로벌 브랜드가 인플러터블 수상 레저 기재 라인을 론칭하고 확장하도록 돕는 방법.
  cases:
    - challenge: 유럽 아웃도어 소매업체는 고유한 데크 그래픽, 친환경 PVC, 리테일 준비 포장이 적용된 프라이빗 라벨 SUP 라인을 60일 내에 납품받아야 했습니다.
      solution: 맞춤 디지털 인쇄 파일을 개발하고 REACH 준수 PVC를 조달했으며, 디자인 팀을 청도 공장에 배치해 샘플링을 3회에서 1회로 압축했습니다.
      result: 서명된 PO부터 FOB까지 55일 소요. 4개 SKU에 걸쳐 2,400대 생산. 첫 컨테이너 도착 전 재주문 확정.
    - challenge: 미국 섬유 산업 스타트업은 맞춤 선체 형상, 공동 브랜드 포장, 리테일 입점을 위한 BSCI 인증이 적용된 고성능 드롭스티치 기술 원단이 필요했습니다.
      solution: 기존 드롭스티치 기술 원단 금형에 수정된 로커 프로파일을 적용하고 공동 브랜드 포장 아트워크를 개발했으며 전체 BSCI 감사 문서를 제공했습니다.
      result: 미국 주요 아웃도어 체인 3곳에 정식 입점. 첫해 5,000대 이상 판매, 98% 판매율 기록.
    - challenge: 호주 유통사는 맞춤 튜브 색상, Hypalon 업그레이드 옵션, 호주 기준 AS 1799 준수가 적용된 CE 인증 기술 원단 라인이 필요했습니다.
      solution: 4가지 튜브 색상 변형의 시제품을 생산하고 일본 공급업체에서 CSM Hypalon을 조달했으며 제3자 AS 1799 준수 테스트를 조율했습니다.
      result: AU/NZ 시장에 3개 모델 기술 원단 라인 론칭. 이어 12대의 순찰용 기술 원단 정부 입찰 수주.

faq_section:
  tagline: 자주 묻는 질문
  title: B2B 및 OEM 자주 묻는 질문
  questions:
    - q: OEM 인플러터블 SUP 보드의 최소 주문 수량(MOQ)은 얼마인가요?
      a: 표준 OEM 모델의 MOQ는 5–10대부터 시작합니다. 맞춤 금형 및 프라이빗 라벨 프로젝트는 복잡도에 따라 최소 200대가 필요합니다. 신규 브랜드 론칭을 위한 시험 주문 및 샘플 생산도 가능합니다.
    - q: 아쿠아페어는 BSCI 인증을 보유하고 있나요?
      a: 네. 당사 공장은 유효한 BSCI 사회적 책임 인증을 유지하고 있습니다(감사 보고서는 요청 시 제공). 또한 품질 경영을 위한 인증과 모든 제품의 CE 인증을 보유하고 있습니다. 모든 OEM 선적물에는 REACH 및 RoHS 준수 문서가 동봉됩니다.
    - q: OEM 주문의 일반적인 리드타임은 어떻게 되나요?
      a: 표준 리드타임은 PO 및 계약금 확정 후 30–45일입니다. 맞춤 금형 개발은 금형 제작에 15–20일이 추가됩니다. 긴급 주문과 여름 철(1–3월) 성수기 물량을 위한 신속 생산도 제공합니다.
    - q: FOB 청도 또는 당사 항구까지 CIF로 선적 가능한가요?
      a: 네. FOB 청도, 주요 글로벌 항구까지 CIF, 자격을 갖춘 파트너에게는 DDP로 선적합니다. 당사 물류 팀이 컨테이너 예약, 수출 서류, 통관을 관리합니다. EU, 미국, 호주, 아시아 시장의 50개 이상 국가로 선적합니다.

b2b_moq: '표준 MOQ: 모델당 5–10대 (SUP/기술 원단/드롭스티치). 기술 원단 MOQ: 2–5대. 신규 파트너십을 위해 시험 주문 환영.'

