hero:
  tagline: 공장
  title: 공장 및 제조
  subtitle: 12,000m²의 통합 제조 시설 — 원자재부터 완성된 원단까지

intro:
  - "**청도 바트라드 그룹 유한공사(Qingdao Vatrad Group Co., Ltd.)**의 공장 브랜드인 아쿠아페어는 원료 PVC 및 유리섬유 소재가 입고되는 시점부터 완성된 원단의 출고 전 최종 검사까지 생산의 모든 단계를 직접 관리합니다. 청도 경제개발구에 위치한 당사의 제조 시설은 12,000제곱미터 규모이며 PVC 재단, 튜브 열융착, 유리섬유 기술 원단 선체 생산, SUP 디지털 인쇄, 최종 조립, 품질 검사를 위한 전용 워크숍을 갖추고 있습니다."
  - "설계, 엔지니어링, 프로토타이핑, 제조, 테스트를 한 곳에서 통합함으로써 위탁 제조의 비효율을 제거하고 건축 품질, 소재 선택, 납기 일정에 대한 직접적인 통제를 유지합니다. 당사 워크숍을 떠나는 모든 원단는 우리 장비로, 우리 기준에 따라 우리 사람들이 만듭니다."

