label: '보증'
headline: 'Seekingtex 제조업체 제한 보증'
subtitle: 'Seekingtex는 당사가 제조하는 모든 기능성 섬유 제품의 품질을 보증합니다. 본 제한 보증은 귀하의 Seekingtex 제품에 대한 조건과 보장 범위를 명시합니다.'
seo:
  headline: 'Seekingtex 기능성 원단 보증 — 5년 제한 보증 | Seekingtex'
  description: 'Seekingtex는 주요 튜브 원단의 무결성, 솔기 및 유리 섬유 선체 구조적 무결성에 대해 5년 제한 보증을 제공합니다. 팽창 밸브 및 공장 설치 액세서리도 포함됩니다. Seekingtex 기능성 원단 보증의 전체 이용 약관.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    본 제한 보증은 Seekingtex에서 직접 또는 공인된 Seekingtex 대리점이나 소매점에서 구매한 새로운 Seekingtex 브랜드 기능성 섬유 제품에 적용됩니다. 발효일은 확인 가능한 최초 소매 구매일입니다.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">보증 범위 및 기간</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5년</h3>
        <p class="text-sm text-gray-600 mt-1">주요 튜브 원단 무결성 (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5년</h3>
        <p class="text-sm text-gray-600 mt-1">유리 섬유 선체 구조적 무결성</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5년</h3>
        <p class="text-sm text-gray-600 mt-1">기능성 튜브 솔기의 기밀성</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5년</h3>
        <p class="text-sm text-gray-600 mt-1">팽창 밸브 기능</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1년</h3>
        <p class="text-sm text-gray-600 mt-1">공장 설치 액세서리 및 보조 피팅</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1년*</h3>
        <p class="text-sm text-gray-600 mt-1">상업용, 렌탈 또는 함대 사용 — 모든 구성품</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*상업, 정부, 전세, 렌탈 또는 교육용 사용은 보증 기간이 1년으로 단축됩니다. 경주 또는 경쟁 사용은 보증을 전적으로 무효화합니다.</p>
  </div>

  <h2>보증 대상</h2>
  <h3>주요 튜브 원단 (5년)</h3>
  <p>Seekingtex는 주요 튜브 원단이 제품의 작동 팽창 유지 능력을 실질적으로 손상시키는 다공성 열화에 대해 보증합니다. 이는 CSM(Hypalon) 코팅 원단 및 제조에 사용되는 기타 모든 튜브 재료에 적용됩니다.</p>

  <h3>유리 섬유 선체 구조적 무결성 (5년)</h3>
  <p>유리 섬유 강화 플라스틱(GRP) 선체가 있는 제품의 경우, 기본 복합 구조는 재료 또는 제조상의 결함으로 인한 구조적 파손에 대해 보증됩니다.</p>

  <h3>기능성 튜브 솔기의 기밀성 (5년)</h3>
  <p>기능성 튜브의 솔기는 솔기를 통한 상당한 공기 누출을 초래하는 제조 결함에 대해 보증됩니다. 정기 검사 및 적절한 팽창 압력 유지는 보장의 조건입니다.</p>

  <h3>팽창 밸브 기능 (5년)</h3>
  <p>Seekingtex가 원래 설치한 팽창 밸브는 설계된 대로 공기를 유지하지 못하게 하는 재료 또는 제조상의 결함에 대해 보증됩니다.</p>

  <h3>공장 설치 액세서리 (1년)</h3>
  <p>Seekingtex가 제조하고 공장에서 원래 설치한 구성품 및 피팅은 1년 동안 재료 및 제조상의 결함에 대해 보증됩니다. 여기에는 타사 제품이 제외되며, 해당 제품은 각 제조업체 보증에 의해서만 보장됩니다.</p>

  <h2>보증 제외 사항</h2>
  <ul>
    <li>변색, 얼룩, 색바램, 백화 현상 또는 외관 변화를 포함한 미용상의 결함</li>
    <li>천공, 절단, 찢김 또는 기타 물리적 손상</li>
    <li>마찰 또는 접촉으로 인한 균열, 마모, 긁힘 또는 손상</li>
    <li>자외선, 기후 또는 대기 조건에 노출로 인한 열화</li>
    <li>연료, 용제, 산, 알칼리 또는 화학물질 접촉으로 인한 손상</li>
    <li>과실, 부적절한 사용, 남용, 사고 또는 정상적인 마모로 인한 손상</li>
    <li>젤코트 또는 도장 표면 문제 (물집, 균열, 변색, 색바램)</li>
    <li>충격, 응력, 부적절한 지지 또는 트레일러 운송으로 인한 손상</li>
    <li>부적절한 팽창/수축 또는 승인되지 않은 팽창 장치 사용으로 인한 손상</li>
    <li>타사 장비, 구성품 또는 시스템 (해당 제조업체가 보장)</li>
  </ul>

  <h2>제조업체의 의무 및 구제책</h2>
  <p>Seekingtex의 유일하고 배타적인 의무는 재료 또는 제조상 결함이 있고 본 보증의 적용을 받는 것으로 판단된 구성품의 수리 또는 교체(Seekingtex의 선택에 따름)입니다. 수리 또는 교체는 Seekingtex 또는 지정된 공인 서비스 센터에서 수행합니다. 수리 또는 교체된 구성품은 원래 보증 기간의 남은 부분에 대해서만 보증됩니다.</p>

  <h2>보증 조건</h2>
  <ul>
    <li><strong>등록:</strong> 보증 조건에 따라 제품을 적절히 등록해야 합니다.</li>
    <li><strong>유지 관리:</strong> 정기 검사 및 적절한 팽창 압력 유지를 포함하여 Seekingtex의 공개 지침에 따라 제품을 유지 관리해야 합니다.</li>
    <li><strong>협력:</strong> 구매자는 보증 청구와 관련된 모든 사항에 대해 Seekingtex와 완전하고 신속하게 협력해야 합니다.</li>
    <li><strong>최초 구매자:</strong> 본 보증은 최초 최종 사용자 구매자에게 독점적으로 제공되며 양도할 수 없습니다.</li>
  </ul>

  <h2>상업적 사용</h2>
  <p>제품이 상업, 정부, 비영리, 전세, 렌탈, 교육 목적 또는 개인 레크리에이션 이외의 목적으로 사용되는 경우, 모든 구성품의 보증 기간은 최초 구매일로부터 1년으로 단축됩니다. 경주, 속도 또는 지구력 경쟁에서의 사용은 즉시 그리고 취소 불가능하게 보증을 전적으로 무효화합니다.</p>

  <h2>보증 청구 방법</h2>
  <p>구매 증명서와 문제에 대한 자세한 설명을 가지고 Seekingtex 또는 공인 대리점에 문의하십시오. Seekingtex가 청구를 검토하고 검사 및 서비스 지침을 제공합니다.</p>
  <p>보증 서비스 문의는 <a href="/contact" class="text-sky-600 underline">문의 페이지</a>를 통해 주문 번호와 제품 세부 정보를 알려주시기 바랍니다.</p>

  <h2>타사 제품</h2>
  <p>타사에서 제조한 장비, 구성품 또는 시스템(Seekingtex가 설치한 경우에도)은 해당 제조업체가 제공하는 보증에 의해서만 보장됩니다. Seekingtex는 이러한 타사 제품에 대한 모든 보증 책임을 명시적으로 부인합니다.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    본 보증 설명은 완전한 Seekingtex 제조업체 제한 보증의 요약입니다. 전체 법적 보증 문서가 모든 보증 조건을 규율합니다. 사양은 예고 없이 변경될 수 있습니다. Seekingtex는 Qingdao Vatrad Group의 브랜드입니다.
  </p>
