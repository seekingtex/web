hero:
  tagline: 라이프스타일
  title: Seekingtex<br />라이프스타일
  subtitle: 주말 탐험가부터 매일 장비에 의존하는 상업 운영자까지 — 물 위에서 사는 사람들을 위해 만들어졌습니다.

values:
  - icon: 🌊
    title: 물 위에서 태어나다
    desc: 모든 디자인은 물의 움직임을 이해하는 것에서 시작합니다. 우리는 극한 환경에서 안쪽으로 설계합니다 — 바다는 우리의 작업장이 아니라 스승이기 때문입니다.
  - icon: 🔧
    title: 오래가는 제품
    desc: 가장 지속 가능한 제품은 교체할 필요가 없는 제품입니다. 선급 등급 소재, 15 PSI 정격 드롭스티치 코어, 시즌보다 오래가는 이음새.
  - icon: '🏆'
    title: 누구나 접근 가능
    desc: 섬유 산업는 사치품이 되어서는 안 됩니다. 프로페셔널 등급의 성능을 가족, 가이드, 소규모 사업자도 합리적인 가격에 이용할 수 있도록.
  - icon: 🌍
    title: 글로벌 커뮤니티
    desc: 칭다오 해안에서 유럽의 호수, 동남아시아의 강, 아메리카의 만까지 — 고객들의 공통점은 물 위에 있는 것을 사랑한다는 것입니다.
  - icon: ♻️
    title: 책임 있는 제조
    desc: CNC 최적화 네스팅으로 재료 폐기물 5% 미만으로 감축. 내구성 있는 구조로 교체 주기 감소. 오래 사용할 수 있도록 제조하는 것이 가장 지속 가능한 선택이기 때문입니다.
  - icon: 🤝
    title: 지속적인 지원
    desc: 20년 된 선체도 예비 부품을 위해 전화를 겁니다. 당사의 보증 응답 시간은 평균 24시간입니다. 판매 후 사라지지 않습니다 — 제품 수명 내내 함께합니다.

