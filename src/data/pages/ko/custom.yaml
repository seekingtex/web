hero:
  tagline: Seekingtex 맞춤 연구소
  title: 나만의<br />수상 선박 디자인
  subtitle: 전 세계 기업을 위한 OEM, ODM, 자체 브랜드 및 맞춤 브랜딩 서비스. 단일 프로토타입부터 전체 생산 런까지.
  cta: 프로젝트 시작하기
  footer_link: /contact

steps_section:
  tagline: 작동 방식
  title: 컨셉에서 생산까지
  subtitle: 아이디어에서 완제품 출하까지 4단계.
  steps:
    - num: '01'
      title: 보드 선택
      desc: SUP, 기술 원단, 딩기 또는 기술 원단 중에서 선택하세요. 크기, 소재, 색상을 고르십시오.
    - num: '02'
      title: 디자인 업로드
      desc: 로고, 아트워크 또는 브랜드 가이드라인을 보내주세요. 당사 디자인 팀이 디지털 프루프를 준비합니다.
    - num: '03'
      title: AI 목업 검토
      desc: 생산 시작 전에 맞춤 보드의 포토리얼리스틱 AI 생성 목업을 확인하세요.
    - num: '04'
      title: 생산 및 납품
      desc: 승인 후 주문이 ISO 인증 생산 라인에 투입됩니다. 리드 타임은 30일부터.

services_section:
  tagline: 서비스
  title: 글로벌 브랜드를 위한 제조 서비스
  subtitle: 위탁 제조부터 풀 서비스 브랜드 구축까지 유연한 계약 방식.
  items:
    - title: OEM 제조
      desc: 고객 설계를 사양대로 생산 — 고객의 IP, 도면, 품질 기준. 완전한 NDA 보호.
      icon: ⚙️
    - title: ODM 솔루션
      desc: 50개 이상의 검증된 플랫폼 중에서 선택하고 크기, 색상, 그래픽, 패키징을 맞춤화.
      icon: '🎨'
    - title: 자체 브랜드
      desc: 당사 제품에 고객의 브랜드 — 로고, 패키지, 행택, 매뉴얼. 개봉 즉시 소매 가능.
      icon: 🏷️
    - title: 맞춤 브랜딩
      desc: 데크 패드 인쇄, 선체 그래픽, 튜브 데칼 및 맞춤 라벨 — 완전한 브랜드 통합.
      icon: ✨

capabilities_section:
  tagline: 역량
  title: 생산 및 맞춤화 역량
  subtitle: 주문 전에 알아야 할 모든 정보.
  capabilities:
    - label: 주문 수량
      value: MOQ 5–10대 (SUP/기술 원단), 2–5대 (기술 원단)
    - label: 리드 타임
      value: 표준 30–45일, 프로토타입 15–20일
    - label: 맞춤화 범위
      value: 크기, 형태, 색상, 그래픽, 패키징, 하드웨어
    - label: 소재
      value: PVC, Hypalon, 드롭스티치, FRP, 알루미늄
    - label: 인쇄 방식
      value: 디지털(CMYK), 스크린 인쇄, 열전사, 승화
    - label: 인증
      value: CE, UKCA, FCC (글로벌 규정 준수 지원)

why_section:
  tagline: Seekingtex를 선택해야 하는 이유
  title: 하나의 공장. 하나의 기준. 타협 없음.
  points:
    - text: 12,000제곱미터 통합 제조 시설
      highlight: 12,000 sqm
    - text: 200명 이상의 숙련 근로자와 엔지니어
      highlight: 200+
    - text: 연간 15,000척 이상의 원단 생산
      highlight: 15,000+
    - text:  인증 품질 관리
      highlight: ISO 9001
    - text: EU 시장용 CE 인증 제품
      highlight: CE
  cta: 공장 세부정보 보기
  cta_link: /factory
  contact:
    title: 프로젝트에 대해 논의할 준비가 되셨나요?
    desc: 당사 팀이 24시간 이내에 초기 견적을 회신합니다.
