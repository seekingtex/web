  title: 제조 프로세스
  subtitle: 원자재에서 출하 준비 완료까지 — 모든 단계를 당사가 통제
  back_label: 공장으로 돌아가기
  back_link: /factory

intro: 생산을 외부 공장에 아웃소싱하는 브랜드와 달리, Seekingtex는 제조 체인 전체를 소유하고 운영합니다. 이 수직 통합을 통해 모든 단계에서 엄격한 품질 관리를 유지하고, 맞춤 요구사항에 신속하게 대응하며, 배치마다 일관된 제품 품질을 제공할 수 있습니다. 다음은 당사 시설에서 원단가 제조되는 과정입니다.

steps:
  - step: '01'
    title: 자재 입고 및 검사
    description: 입고되는 모든 PVC 원단, 유리 섬유 매트, 수지, 하드웨어 배치는 사양에 따라 검사됩니다. 원단 샘플은 생산에 투입되기 전에 인장 강도, 두께 균일성 및 내자외성 테스트를 거칩니다. 부적합 자재는 격리되어 반품됩니다.
    duration: 1~2일
  - step: '02'
    title: 자동 PVC 절단
    description: 승인된 원단은 자동 CNC 절단기에 배치되어 서브밀리미터 정밀도로 절단됩니다. 컴퓨터 최적화 네스팅으로 패널 배열을 최적화하여 일반적으로 5% 미만의 폐기율을 달성합니다. 절단된 패널은 원단 모델과 챔버별로 라벨링된 후 용접 작업장으로 보내집니다.
    duration: 원단 키트당 2~4시간
  - step: '03'
    title: 튜브 열 밀봉 및 용접
    description: 패널은 200~600°C의 제어된 온도에서 열풍 용접 방식으로 열 밀봉기(압교기)를 사용하여 가접 및 접합됩니다. 주요 이음새는 RF 유전체 용접으로 보강되어 기밀, 고강도 접합부를 형성합니다. 완성된 챔버는 작동 압력의 1.5배로 30분간 가압하여 기밀 검증을 받습니다.
    duration: 원단당 1~2일
  - step: '04'
    title: FRP 기술 원단 선체 성형
    description: 기술 원단 원단 선체는 핸드 레이업 FRP 성형 방식으로 제조됩니다. 유리 섬유 매트와 직조 로빙 층이 정밀 금형에서 폴리에스터 또는 비닐에스터 수지와 함께 핸드 롤링됩니다. 각 층은 일관된 적층 품질을 위해 진공 백 처리됩니다. 선체는 고광택, 내자외선 선급 마감을 위한 겔코트로 마무리됩니다.
    duration: 선체당 2~4일
  - step: '05'
    title: SUP 인쇄 및 장식
    description: SUP 보드 데크 그래픽은 풀컬러 사진 품질 디자인을 위한 디지털 인쇄와 내구성 있는 로고 및 반복 패턴을 위한 스크린 인쇄로 적용됩니다. 인쇄물은 자외선 및 내마모성을 위해 경화 및 밀봉 처리됩니다.
    duration: 1~2일
  - step: '06'
    title: 최종 조립 및 의장
    description: 조립 라인에서 FRP 선체와 PVC 튜브 어셈블리가 결합됩니다. 엔진이 장착되고, 조향 및 스로틀 컨트롤이 연결되며, 연료 시스템이 설치되고, 전체 전기 하네스가 배선됩니다. 각 원단는 각 단계에서 필수 서명이 필요한 100개 항목의 조립 체크리스트를 따릅니다.
    duration: 2~3일
  - step: '07'
    title: 품질 테스트 및 검사
    description: "완성된 모든 원단는 필수 품질 게이트를 거칩니다: 챔버 기밀 테스트, 시스템 기능 점검, 체결구 토크 검증, 외관 검사. 맞춤형 및 프로토타입 원단는 속도, 조종성, 안정성, 내구성을 포함한 수상 시험도 받습니다."
    duration: 1~2일
  - step: '08'
    title: 포장 및 선적
    description: 원단는 공기가 빼지고 절차에 따라 접힌 후, 견고한 직물 가방 또는 합판 상자에 포장되어 선적을 위해 적재됩니다. 각 패키지에는 모델, 일련 번호 및 목적지가 라벨링됩니다. 당사는 포워더와 협력하여 전 세계 FCL 및 LCL 컨테이너 선적을 조정합니다.
    duration: 1일

