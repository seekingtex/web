label: 'Garantía'
headline: 'Garantía limitada del fabricante Seekingtex'
subtitle: 'Seekingtex respalda la calidad de cada producto textil funcional que fabricamos. Esta garantía limitada establece los términos y la cobertura para su producto Seekingtex.'
seo:
  headline: 'Garantía de bote funcional Seekingtex — Garantía limitada de 5 años | Seekingtex'
  description: 'Seekingtex ofrece una garantía limitada de 5 años sobre la integridad del tejido principal de los tubos, las costuras y la estructura del casco de fibra de vidrio. También cubre válvulas de inflado y accesorios instalados de fábrica. Términos y condiciones completos de la garantía de botes inflables Seekingtex.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Esta garantía limitada se aplica a los nuevos productos marinos inflables de la marca Seekingtex comprados directamente a Seekingtex o a un concesionario o minorista autorizado de Seekingtex. La fecha de vigencia es la fecha verificable de compra minorista original.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Cobertura y duración de la garantía</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 años</h3>
        <p class="text-sm text-gray-600 mt-1">Integridad del tejido principal de los tubos (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 años</h3>
        <p class="text-sm text-gray-600 mt-1">Integridad estructural del casco de fibra de vidrio</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 años</h3>
        <p class="text-sm text-gray-600 mt-1">Capacidad de retención de aire de las costuras de los tubos</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 años</h3>
        <p class="text-sm text-gray-600 mt-1">Funcionalidad de las válvulas de inflado</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 año</h3>
        <p class="text-sm text-gray-600 mt-1">Accesorios instalados de fábrica y accesorios auxiliares</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 año*</h3>
        <p class="text-sm text-gray-600 mt-1">Uso comercial, alquiler o flota — todos los componentes</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*El uso comercial, gubernamental, charter, alquiler o instrucción reduce la garantía a 1 año. El uso en carreras o competiciones anula la garantía por completo.</p>
  </div>

  <h2>Lo que está cubierto</h2>
  <h3>Tejido principal de los tubos (5 años)</h3>
  <p>Seekingtex garantiza el tejido principal de los tubos contra el deterioro por porosidad que comprometa sustancialmente la capacidad del producto para mantener la inflación operativa. Esto se aplica al tejido recubierto de CSM (Hypalon) y a todos los demás materiales de tubo utilizados en la fabricación.</p>

  <h3>Integridad estructural del casco de fibra de vidrio (5 años)</h3>
  <p>Para productos con casco de plástico reforzado con fibra de vidrio (PRFV), la estructura compuesta fundamental está garantizada contra fallos estructurales debidos a defectos en materiales o mano de obra.</p>

  <h3>Capacidad de retención de aire de las costuras de los tubos (5 años)</h3>
  <p>Las costuras de los tubos inflables están garantizadas contra defectos de fabricación que resulten en una fuga de aire sustancial a través de la costura. La inspección periódica y el mantenimiento de las presiones de inflado apropiadas son condiciones de la cobertura.</p>

  <h3>Funcionalidad de las válvulas de inflado (5 años)</h3>
  <p>Las válvulas de inflado instaladas originalmente por Seekingtex están garantizadas contra defectos de materiales o mano de obra que impidan que la válvula retenga aire según lo diseñado.</p>

  <h3>Accesorios instalados de fábrica (1 año)</h3>
  <p>Los componentes y accesorios fabricados por Seekingtex e instalados originalmente en la fábrica están garantizados contra defectos de material y mano de obra durante un año. Esto excluye artículos de terceros, que están cubiertos solo por las garantías de sus respectivos fabricantes.</p>

  <h2>Lo que no está cubierto</h2>
  <ul>
    <li>Defectos estéticos como decoloración, manchas, pérdida de color, empolvamiento o cualquier alteración en la apariencia</li>
    <li>Perforaciones, cortes, desgarros o cualquier otro daño físico</li>
    <li>Agrietamiento, abrasión, rozaduras o deterioro por fricción o contacto</li>
    <li>Degradación por exposición a rayos UV, intemperie o condiciones atmosféricas</li>
    <li>Daños por contacto con combustibles, disolventes, ácidos, álcalis o productos químicos</li>
    <li>Daños por negligencia, uso inadecuado, abuso, accidente o desgaste normal</li>
    <li>Problemas de superficie del gelcoat o pintura (ampollas, craquelado, decoloración, pérdida de color)</li>
    <li>Daños por impacto, esfuerzo, soporte inadecuado o remolque</li>
    <li>Daños por inflado/desinflado incorrecto o uso de dispositivos de inflado no aprobados</li>
    <li>Equipos, componentes o sistemas de terceros (cubiertos por sus respectivos fabricantes)</li>
  </ul>

  <h2>Obligación y recurso del fabricante</h2>
  <p>La única y exclusiva obligación de Seekingtex es la reparación o el reemplazo, a opción de Seekingtex, de cualquier componente determinado como defectuoso en materiales o mano de obra y cubierto bajo esta garantía. Las reparaciones o reemplazos son realizados por Seekingtex o su centro de servicio autorizado designado. Los componentes reparados o reemplazados están garantizados solo por la parte no vencida del período de garantía original.</p>

  <h2>Condiciones de la garantía</h2>
  <ul>
    <li><strong>Registro:</strong> El producto debe estar correctamente registrado según lo estipulado en los términos de la garantía.</li>
    <li><strong>Mantenimiento:</strong> El producto debe mantenerse de acuerdo con las pautas publicadas de Seekingtex, incluida la inspección periódica y el mantenimiento de las presiones de inflado apropiadas.</li>
    <li><strong>Cooperación:</strong> El comprador debe cooperar plena y rápidamente con Seekingtex en todos los asuntos relacionados con reclamaciones de garantía.</li>
    <li><strong>Comprador original:</strong> Esta garantía se extiende exclusivamente al comprador usuario final original y no es transferible.</li>
  </ul>

  <h2>Uso comercial</h2>
  <p>Si el producto se utiliza con fines comerciales, gubernamentales, sin fines de lucro, charter, alquiler, instrucción o cualquier propósito que no sea recreativo privado, el período de garantía para todos los componentes se reduce a un (1) año desde la fecha de compra minorista original. El uso en carreras, competiciones de velocidad o resistencia anula inmediata e irrevocablemente la garantía por completo.</p>

  <h2>Cómo hacer un reclamo de garantía</h2>
  <p>Contacte a Seekingtex o a su distribuidor autorizado con el comprobante de compra y una descripción detallada del problema. Seekingtex revisará el reclamo y proporcionará instrucciones para la inspección y el servicio.</p>
  <p>Para consultas de servicio de garantía, contáctenos a través de nuestra <a href="/contact" class="text-sky-600 underline">página de contacto</a> con su número de pedido y detalles del producto.</p>

  <h2>Artículos de terceros</h2>
  <p>Los equipos, componentes o sistemas fabricados por terceros (incluso si son instalados por Seekingtex) están cubiertos exclusivamente por cualquier garantía ofrecida por su respectivo fabricante. Seekingtex renuncia expresamente a cualquier responsabilidad de garantía por dichos artículos de terceros.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Esta declaración de garantía es un resumen de la Garantía limitada completa del fabricante Seekingtex. El documento de garantía legal completo rige todos los términos y condiciones de la garantía. Especificaciones sujetas a cambios sin previo aviso. Seekingtex es una marca de Qingdao Vatrad Group.
  </p>
