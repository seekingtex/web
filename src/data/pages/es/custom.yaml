hero:
  tagline: Laboratorio de personalización Seekingtex
  title: Diseña tu propia<br />embarcación
  subtitle: Servicios de OEM, ODM, marca privada y personalización de marca para empresas de todo el mundo. Desde un solo prototipo hasta producciones completas.
  cta: Comienza tu proyecto
  footer_link: /contact

steps_section:
  tagline: Cómo funciona
  title: Del concepto a la producción
  subtitle: Cuatro pasos desde tu idea hasta un producto terminado y listo para navegar.
  steps:
    - num: '01'
      title: Elige tu tabla
      desc: Selecciona entre nuestros modelos principales — tejido funcional, tejidos tecnicos, bote o tejido tecnico. Elige tamaño, material y color.
    - num: '02'
      title: Sube tu diseño
      desc: Envíanos tu logotipo, tu obra gráfica o tus pautas de marca. Nuestro equipo de diseño prepara una prueba digital.
    - num: '03'
      title: Revisión del mockup con IA
      desc: Visualiza un mockup fotorrealista generado por IA de tu tabla personalizada antes de que comience la producción.
    - num: '04'
      title: Producción y entrega
      desc: Una vez aprobado, tu pedido entra en nuestra línea de producción. Plazos de entrega desde 30 días.

services_section:
  tagline: Servicios
  title: Servicios de fabricación para marcas globales
  subtitle: Modelos de colaboración flexibles — desde la fabricación por contrato hasta la construcción de marca de servicio completo.
  items:
    - title: Fabricación OEM
      desc: Producimos tus diseños según las especificaciones — tu propiedad intelectual, tus planos, tus estándares de calidad. Protección completa con NDA.
      icon: ⚙️
    - title: Soluciones ODM
      desc: Elige entre más de 50 plataformas probadas y personaliza tamaño, color, gráficos y embalaje.
      icon: '🎨'
    - title: Marca privada
      desc: Tu marca en nuestros productos — logotipo, embalaje, etiquetas colgantes, manuales. Listos para la venta minorista desde el primer momento.
      icon: 🏷️
    - title: Personalización de marca
      desc: Impresión en las almohadillas de cubierta, gráficos del casco, calcomanías en los tubos y etiquetas personalizadas — integración completa de la marca.
      icon: ✨

capabilities_section:
  tagline: Capacidades
  title: Capacidades de producción y personalización
  subtitle: Todo lo que necesitas saber antes de hacer tu pedido.
  capabilities:
    - label: Volumen de pedido
      value: MOQ 5–10 unidades (tejido funcional/tejidos tecnicos), 2–5 unidades (tejido tecnico)
    - label: Plazo de entrega
      value: 30–45 días estándar; 15–20 días para prototipos
    - label: Personalización
      value: Tamaño, forma, color, gráficos, embalaje, herrajes
    - label: Materiales
      value: PVC, Hypalon, drop-stitch, fibra de vidrio, aluminio
    - label: Impresión
      value: Digital (CMYK), serigrafía, transferencia de calor, sublimación
    - label: Certificación
      value: CE, UKCA, FCC (soporte para el cumplimiento global)

