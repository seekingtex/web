hero:
  tagline: "Equipo"
  title: "Equipo y Maquinaria de Fabricación"
  subtitle: "Equipo de grado industrial para corte, soldadura, impresión y ensamblaje"
  back_label: "Volver a la Fábrica"
  back_link: /factory

categories:
  - title: "Corte y Preparación de Materiales"
    items:
      - name: "Máquina Cortadora Automática de PVC"
        spec: "Controlada por CNC, 6.5 m × 2.5 m, precisión 0.1 mm"
        desc: "Máquina cortadora automática controlada por computadora para tejidos PVC, Hypalon y drop-stitch. El software de anidado optimiza la utilización del material por debajo del 5 % de desperdicio."
      - name: "Extendedora de Tejido"
        spec: "Ancho máx. 3 m, alimentación de tensión controlada"
        desc: "Coloca el tejido en capas simples o múltiples con tensión controlada para evitar la distorsión antes del corte."
  - title: "Soldadura y Unión de Tubos"
    items:
      - name: "Máquina de Sellado por Calor"
        spec: "Soldadura de aire caliente, variable 200–600 °C, 0.5–5 m/min"
        desc: "Máquina de sellado térmico por aire caliente para unir y soldar costuras de tubos PVC y Hypalon. Se usa para fijar, sellar y fundir cámaras de tubo y uniones de flotación."
      - name: "Prensa Dieléctrica RF"
        spec: "15 kW, placa 2000 × 600 mm"
        desc: "Prensa de soldadura de alta frecuencia para costuras longitudinales principales, uniones de bañera a tubo y fabricación de cámaras grandes."
      - name: "Soldadora RF Controlada por CNC"
        spec: "8 kW, mesa XY 2500 × 1200 mm"
        desc: "Soldadura programable de costuras curvas para geometrías complejas, grabado de logotipos y parches de precisión."
  - title: "Fabricación de Cascos tejido tecnico"
    items:
      - name: "Moldes de Fibra de Vidrio por Colocación Manual"
        spec: "Varios moldes para cascos tejido tecnico hasta 6 m LOA"
        desc: "Moldeo tradicional de fibra de vidrio por colocación manual con sistemas de resina de poliéster y viniléster. Cada capa se enrolla a mano y se vacuum-bag para una calidad y resistencia de laminado consistentes."
      - name: "Cabina de Pulverización de Gelcoat"
        spec: "Control de temperatura, ventilación de aire filtrado"
        desc: "Aplicación de gelcoat en cascos tejido tecnico. Proporciona un acabado de alto brillo, resistente a los UV, con control preciso del espesor."
      - name: "Router CNC (5 ejes)"
        spec: "Volumen 3 m × 2 m × 1 m, husillo refrigerado por agua"
        desc: "Mecanizado de insertos de casco, moldes de consola, bases de asiento y soportes a medida."
  - title: "Impresión y Decoración tejido funcional"
    items:
      - name: "Impresora Digital"
        spec: "Inyección de tinta de alta resolución, ancho de impresión hasta 2 m"
        desc: "Impresión digital directa al tejido para gráficos de cubierta tejido funcional a todo color. Imprime patrones personalizados, degradados e imágenes de calidad fotográfica con tintas base agua resistentes a los UV."
      - name: "Máquina de Serigrafía"
        spec: "Manual y semiautomática, registro multicolor"
        desc: "Serigrafía para logotipos de tejido funcional, marcas comerciales y patrones repetitivos. Proporciona impresiones duraderas y opacas con saturación de color vibrante."
  - title: "Ensamblaje y Equipamiento"
    items:
      - name: "Polipasto de Motor"
        spec: "Capacidad 500 kg, barra separadora ajustable"
        desc: "Montaje seguro de motores fuera de borda de 2.5 a 60 hp."
      - name: "Marco de Maqueta de Consola"
        spec: "Altura y ángulo ajustables"
        desc: "Preinstalación de dirección, acelerador y paneles de instrumentos antes de la instalación."
      - name: "Crimpadora de Manguera Hidráulica"
        spec: "Hasta 1\" ID, manómetro digital"
        desc: "Conjuntos de manguera de dirección hidráulica de longitud a medida con accesorios engastados."
      - name: "Tablero de Arneses Eléctricos"
        spec: "3 m × 1.5 m, diagramas de cableado preimpresos"
        desc: "Ensamblaje y prueba de arneses eléctricos completos fuera del bote."
  - title: "Pruebas y Control de Calidad"
    items:
      - name: "Probador Universal de Tracción"
        spec: "50 kN, ASTM D751"
        desc: "Prueba de fuerza de rotura, elongación en la rotura y propagación del desgarro para lotes de tejido."
      - name: "Banco de Prueba de Retención de Aire"
        spec: "Programable, retención de presión 30 min"
        desc: "Prueba automatizada de retención de presión para cada cámara de tubo antes del ensamblaje."
      - name: "Probador de Desprendimiento de Costuras"
        spec: "Desprendimiento motorizado 180° a 100 mm/min"
        desc: "Prueba de resistencia al desprendimiento de costuras soldadas y pegadas según ISO 6185."
      - name: "Cámara de Envejecimiento por Arco de Xenón"
        spec: "2000 h exposición"
        desc: "Prueba de resistencia a los UV para cambio de color y retención de resistencia."

