hero:
  tagline: Estilo de vida
  title: El estilo de vida<br />Seekingtex
  subtitle: Diseñado para quienes viven en el agua — desde exploradores de fin de semana hasta operadores comerciales que dependen de su equipo cada día.

values:
  - icon: 🌊
    title: Nacidos en el agua
    desc: Cada diseño comienza con la comprensión de cómo se comporta el agua. Diseñamos con ingeniería desde el límite de las condiciones hacia adentro — porque el océano es nuestro maestro, no nuestro lugar de trabajo.
  - icon: 🔧
    title: Construidos para durar
    desc: El producto más sostenible es el que no necesita reemplazo. Materiales de grado textil, núcleos drop-stitch clasificados para 15 PSI y costuras que duran más que la temporada.
  - icon: '🏆'
    title: Accesibles por diseño
    desc: Los deportes acuáticos no deberían ser un lujo. Rendimiento de nivel profesional a un precio que tiene sentido para familias, guías y pequeños operadores — no solo para flotas comerciales.
  - icon: 🌍
    title: Comunidad global
    desc: "Desde la costa de Qingdao hasta los lagos de Europa, los ríos del sudeste asiático y las bahías de América, nuestros clientes comparten una cosa: el amor por estar en el agua."
  - icon: ♻️
    title: Fabricación responsable
    desc: El anidado optimizado por CNC reduce el desperdicio de material por debajo del 5%. La construcción duradera reduce los ciclos de reemplazo. Construimos para la longevidad porque es la opción más sostenible.
  - icon: 🤝
    title: Un soporte que perdura
    desc: Cascos de veinte años que aún nos llaman por repuestos. Nuestra respuesta de garantía promedia 24 horas. No desaparecemos después de la venta — estamos aquí durante toda la vida del producto.

