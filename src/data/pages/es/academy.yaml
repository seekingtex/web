hero:
  tagline: Academia Seekingtex
  title: Centro de aprendizaje
  subtitle: Guías y tutoriales para cada nivel de habilidad — desde los conceptos básicos del tejido funcional hasta técnicas avanzadas de rescate

categories:
  - level: Principiante
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: Fundamentos del tejido funcional
        desc: Aprende los fundamentos del tejido funcional — postura, técnica de remada y equilibrio.
        slug: tejido funcional-basics
      - title: Técnicas de remada
        desc: Remada frontal, remada de barrido, remada de arrastre y apoyo bajo — domina los movimientos esenciales de la pala.
        slug: paddle-techniques
      - title: La seguridad primero
        desc: Prácticas de seguridad esenciales que incluyen comprobación del tiempo, uso del PFD, normas del leash y autorrescate.
        slug: safety-first
  - level: Intermedio
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Fundamentos del touring
        desc: Planificación de travesías de varias horas — navegación, hidratación, ritmo y lectura de pronósticos de viento.
        slug: touring-essentials
      - title: Lectura del tiempo
        desc: Interpreta los pronósticos marinos, identifica patrones de nubes y comprende los efectos del viento sobre el agua.
        slug: weather-reading
      - title: Fundamentos de navegación
        desc: Lectura de cartas, uso de la brújula, waypoints de GPS y planificación de rutas para remar en la costa.
        slug: navigation-basics
      - title: Conciencia de las mareas
        desc: Comprender los ciclos de las mareas, las corrientes y cómo afectan al momento de salida y a la ruta.
        slug: tidal-awareness
  - level: Avanzado
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Planificación de travesías de varios días
        desc: Logística de expedición — selección de equipo, planificación de comidas, protocolos de seguridad y contactos de emergencia.
        slug: multi-day-trip-planning
      - title: Técnicas de rescate
        desc: Autorrescate, rescate en T, rescate esquimal para tejidos tecnicos y protocolos de remolque para aguas abiertas.
        slug: rescue-techniques
      - title: Remar de noche
        desc: Navegación después del anochecer — requisitos de iluminación, memoria de la ruta, comunicación en grupo y conciencia de los peligros.
        slug: night-paddling
  - level: Mantenimiento
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Limpieza y cuidado
        desc: Enjuague con agua dulce, protección UV, prevención del moho y técnicas de secado adecuadas después de cada sesión.
        slug: cleaning-and-care
      - title: Guía de almacenamiento
        desc: Mejores prácticas para almacenar tablas y botes inflables — desinflado, plegado, control de temperatura y vida útil.
        slug: storage-guide
      - title: Fundamentos de reparación
        desc: Repara pequeños pinchazos, fugas en las costuras y problemas de válvulas con kits de reparación de PVC y técnicas de parcheo.
        slug: repair-basics
      - title: Mantenimiento de válvulas
        desc: Identifica los tipos de válvula (Halkey-Roberts, Boston, Leafield), limpia los residuos y reemplaza los vástagos defectuosos.
        slug: valve-maintenance

