  headline: 'Medical & Healthcare Textiles — OEM Manufacturing | Seekingtex'
  description: 'Seekingtex manufactures antibacterial, fluid-resistant, and protective fabrics for healthcare applications. OEKO-TEX certified. Custom specifications for medical apparel, scrubs, and protective wear.'
