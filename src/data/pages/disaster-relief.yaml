faqs:
  - question: What healthcare applications do Seekingtex fabrics support?
    answer: 'Seekingtex fabrics are used for medical scrubs, lab coats, patient gowns, healthcare uniforms, antimicrobial protective wear, and cleanroom garments. Our antibacterial fabrics are designed for the demanding requirements of healthcare environments.'
  - question: What antimicrobial technology does Seekingtex use?
    answer: 'We use silver-based (Ag+) and zinc-based (ZnO) antimicrobial technologies integrated at the fiber level or as durable finishes. These provide broad-spectrum protection against bacteria including Staphylococcus aureus and Escherichia coli, with durability through 50+ washes.'
  - question: Are Seekingtex medical fabrics certified for safety?
    answer: 'Yes. All Seekingtex fabrics carry OEKO-TEX Standard 100 certification, ensuring they are free from harmful substances. Antibacterial efficacy is tested per AATCC 100 and ISO 20743 standards.'
  - question: Can Seekingtex develop custom medical fabric specifications?
    answer: 'Yes. We offer OEM/ODM development including specific antimicrobial treatments, fluid-resistant finishes, custom colors for healthcare branding, and specific weight and construction requirements. Our technical team works directly with healthcare textile specifiers.'
  - question: What is the typical lead time?
    answer: 'Standard production lead time is 30-45 days. Sample yardage ships in 5-10 days. Bulk orders for healthcare systems can be staged for just-in-time delivery.'
body: |
  <h2>Textile Solutions for Healthcare Environments</h2>
  <p>Healthcare environments place unique demands on textiles. Fabrics must resist bacterial growth, withstand frequent high-temperature washing, maintain appearance through hundreds of industrial laundry cycles, and provide comfort for professionals who wear them for 12+ hour shifts.</p>
  <p>Seekingtex antibacterial and performance fabrics meet these demanding requirements through advanced fiber technology and precision manufacturing.</p>

  <h2>Antibacterial Technology</h2>
  <p>Seekingtex 7A Antibacterial Fabric technology uses silver ion (Ag+) antimicrobial agents that inhibit bacterial growth by disrupting cell membranes and preventing reproduction. The treatment is effective against a broad spectrum of bacteria including MRSA, E. coli, and Staphylococcus aureus.</p>
  <p>Fiber-level integration ensures antibacterial efficacy through 50+ industrial wash cycles. The technology is skin-safe, non-leaching, and OEKO-TEX certified. Third-party testing per AATCC 100 confirms >99.9% bacterial reduction.</p>

  <h2>Product Categories</h2>

  <h3>Medical Scrubs & Uniforms</h3>
  <p>Polyester/cotton and polyester/spandex blends with antimicrobial finish. Wrinkle-resistant, stain-release, and colorfast for industrial laundry. Available in healthcare-standard colors with custom embroidery capability. Weights from 150-220 gsm.</p>

  <h3>Patient Gowns & Linens</h3>
  <p>Soft, breathable fabrics with antimicrobial treatment for patient comfort and infection control. Fluid-resistant options available for high-risk areas. Disposable and reusable options available. OEKO-TEX Class 1 certified for patient skin contact.</p>

  <h3>Protective Wear</h3>
  <p>Fluid-resistant and breathable fabrics for protective medical wear. Antimicrobial coating adds protection against surface contamination. Lightweight and comfortable for extended wear. Available in multiple colors and customizable for healthcare systems.</p>

  <h2>Quality Control & Testing</h2>
  <p>Every Seekingtex healthcare fabric lot undergoes AATCC 100 antibacterial efficacy testing, wash durability testing (50+ cycles), colorfastness to industrial laundry, dimensional stability testing, and skin irritation / cytotoxicity testing. Comprehensive documentation accompanies every delivery.</p>
