tests:
  - title: 压力测试
    description: 气室在超过推荐工作极限的压力下进行长时间测试，验证材料的密封性和结构完整性，确保产品能够承受预期使用及可能的过度功能性而不会失效或漏气。
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: 冲击测试
    description: 产品承受来自不同重量和角度的受控冲击，评估材料抵抗穿刺、撕裂以及水中障碍物碰撞损伤的能力，证明其耐用性和使用寿命。
    image: /images/seekingtex/factory/producing department.jpeg
  - title: 抗紫外线测试
    description: 成品在模拟阳光下长时间暴露，评估材料的抗降解、褪色和因长期紫外线照射而弱化的能力——这对于在热带和高日照环境中使用的面料至关重要。
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: 耐磨性测试
    description: 材料样品在受控压力下与磨料表面进行指定次数的摩擦，测量材料抵抗反复使用、接触沙石等表面而磨损的能力，确保长期耐用性。
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: 低温性能测试
    description: 产品在寒冷环境中进行测试，评估在不同温度条件下的功能和耐用性，防止在较冷水域中变硬或开裂，适用于冬季或高纬度地区使用的面料。
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: 浮力与载重测试
    description: 产品使用各种重量进行测试，确定最大承载能力，确保安全支撑用户和设备。每个型号的额定容量在发布前均经过验证。
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: 操控性测试
    description: 测试产品对纺织技术或马达输入的响应，评估转弯半径和操控便捷性。纺织试验验证实际操控是否符合设计规格。
    image: /images/seekingtex/factory/sup making.jpeg
  - title: 水密性测试
    description: 完全组装好的产品被浸入水中或接受喷水测试，检查接缝、阀门或材料是否存在泄漏。每艘面料在发货前都必须通过强制性水密性检查。
    image: /images/seekingtex/factory/producing department2.jpeg

