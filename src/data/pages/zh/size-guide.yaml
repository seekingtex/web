how_to_choose:
  title: 如何选择合适的尺寸
  cards:
    - title: SUP 功能性面料
      description: 根据体重和预期用途选择长度。更宽的板（32"+）提供更好的稳定性。更长的板（11-12英尺）更适合 touring。较重的划手需要更大容量的板。
    - title: 功能性面料
      description: 单人功能性面料（9英尺）最适合单独旅行和河流。双人功能性面料（12英尺）可容纳两名划手或一名成人加装备。检查承重能力以包括装备在内的总负载。
    - title: 小艇和RIB
      description: 根据乘客数量和预期用途选择小艇长度。较大的RIB（4.5米+）适合离岸和救援。较小的小艇（2.7米）可作为补给艇和钓鱼平台。
