hero:
  tagline: "设备"
  title: "制造设备与机械"
  subtitle: "用于切割、焊接、印刷和组装的工业级设备"
  back_label: "返回工厂"
  back_link: /factory

categories:
  - title: "切割与材料准备"
    items:
      - name: "自动PVC切割机"
        spec: "CNC控制, 6.5 m × 2.5 m, 0.1 mm精度"
        desc: "用于PVC、Hypalon和drop-stitch面料的计算机控制自动切割机。排料软件将材料利用率优化至低于5%的废料。"
      - name: "布料铺展机"
        spec: "最大宽度3 m, 张力控制送料"
        desc: "以受控张力将布料铺成单层或多层，以防切割前变形。"
  - title: "管材焊接与粘接"
    items:
      - name: "热封机"
        spec: "热风焊接, 可变200–600 °C, 0.5–5 m/min"
        desc: "用于连接和焊接PVC及Hypalon管材接缝的热风热封机。用于管材腔室和浮体接头的固定、密封和熔合。"
      - name: "介电RF压力机"
        spec: "15 kW, 压板2000 × 600 mm"
        desc: "用于主要纵向接缝、尾板-管材接头和大型腔室制造的高频焊接压力机。"
      - name: "CNC控制的RF焊机"
        spec: "8 kW, XY工作台2500 × 1200 mm"
        desc: "用于复杂几何形状、徽标压花和精密补片的程序化曲线接缝焊接。"
  - title: "RIB面料体制造"
    items:
      - name: "玻璃纤维手工铺层模具"
        spec: "用于长达6 m LOA的RIB面料体的多个模具"
        desc: "采用聚酯和乙烯基酯树脂系统的传统手工铺层玻璃纤维成型。每层手工滚压并真空袋压，以确保层压板质量与强度一致。"
      - name: "胶衣喷涂房"
        spec: "温度控制, 过滤空气通风"
        desc: "用于RIB面料体的胶衣喷涂。提供高光泽、抗紫外线的表面，厚度控制精确。"
      - name: "CNC路由器（5轴）"
        spec: "3 m × 2 m × 1 m行程, 水冷主轴"
        desc: "加工面料体嵌件、控制台模具、座椅底座和定制支架。"
  - title: "SUP印刷与装饰"
    items:
      - name: "数字打印机"
        spec: "高分辨率喷墨, 打印宽度达2 m"
        desc: "用于全彩SUP甲板图形的直接织物数字印刷。使用抗紫外线的水性墨水打印定制图案、渐变和照片质量图像。"
      - name: "丝网印刷机"
        spec: "手动和半自动, 多色套印"
        desc: "用于SUP板徽标、品牌标志和重复图案的丝网印刷。提供耐用、不透明的印刷，色彩饱和鲜艳。"
  - title: "组装与装配"
    items:
      - name: "发动机葫芦"
        spec: "500 kg承重, 可调横杆"
        desc: "安全安装2.5至60马力的舷外发动机。"
      - name: "控制台样架"
        spec: "高度和角度可调"
        desc: "安装前对转向、节流和仪表盘进行预装配。"
      - name: "液压软管压接机"
        spec: "最大1\" ID, 数字压力表"
        desc: "带有压制接头的定制长度液压转向软管组件。"
      - name: "电气线束板"
        spec: "3 m × 1.5 m, 预先印制的接线图"
        desc: "在面料外组装和测试完整的电气线束。"
  - title: "测试与质量控制"
    items:
      - name: "万能拉力试验机"
        spec: "50 kN, ASTM D751"
        desc: "面料批次的断裂力、断裂伸长率和撕裂扩展测试。"
      - name: "保气测试台"
        spec: "可编程, 保压30分钟"
        desc: "组装前对每个管材腔室的自动保压测试。"
      - name: "接缝剥离测试仪"
        spec: "电动180°剥离, 100 mm/min"
        desc: "根据ISO 6185对焊接和粘合接缝的剥离强度测试。"
      - name: "氙弧老化试验箱"
        spec: "2000 h暴露"
        desc: "针对变色和强度保持的紫外线耐受性测试。"

