workshops_section:
  tagline: 车间
  title: 制造车间
  workshops:
    - title: PVC切割与材料准备
      description: 自动CNC切割机以亚毫米精度处理PVC、Hypalon和滴塑面料。计算机优化排版最小化材料浪费。
      image: /images/seekingtex/hero/production-dept.webp
    - title: 管焊接与热封
      description: 专用焊接车间配备热封机和RF介质压力机。热风热封机粘合PVC管室，RF焊接产生超过要求的高强度气密接缝。
      image: /images/seekingtex/hero/production-workshop.webp
    - title: RIB面料体生产——玻璃钢
      description: RIB面料体采用手糊玻璃钢成型，使用聚酯和乙烯基酯树脂系统。每层手工辊涂和真空袋压以确保质量一致。
      image: /images/seekingtex/factory/Seekingtex-warehouse-storage.webp
    - title: SUP印刷与装饰
      description: SUP板采用数字印刷进行全彩图形装饰，丝网印刷用于标志和重复图案。数字打印机产生照片质量的甲板设计。
      image: /images/seekingtex/products/sup-series/sup-medusa-glow-1.webp
    - title: 最终装配与安装
      description: 装配线上玻璃钢面料体和PVC管对接、安装发动机、连接转向和控制系统以及布线。每艘面料都经过100点装配检查清单。
      image: /images/seekingtex/hero/factory-gate.webp
    - title: 质量测试与检验
      description: 每艘成品面料在发货前都经过强制性气密性测试、接缝剥离验证和全面系统检查。质量实验室独立于生产运营。
      image: /images/seekingtex/factory/Pressure Testing.jpeg

