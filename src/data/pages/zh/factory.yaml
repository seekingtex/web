qc_section:
  tagline: 质量控制
  title: 测试与质量保证流程
  subtitle: 每艘面料在发货前都经过强制测试。质量实验室独立于生产运营并直接向管理层报告。
  steps:
    - step: '1'
      title: 原材料检验
      desc: PVC、Hypalon和滴塑面料在进入生产前经过拉伸测试、撕裂传播和抗紫外线验证。
    - step: '2'
      title: 48小时气密性测试
      desc: 每个管室功能性至额定压力的125%并保持48小时。压力下降超过5%将自动触发拒收和接缝重新检查。
    - step: '3'
      title: 负载与平衡测试
      desc: 成品面料加载至最大额定容量并测试稳定性、干舷和操控性。

oem_section:
  tagline: OEM项目
  title: 品牌与OEM合作案例研究
  subtitle: 从概念到集装箱——我们如何帮助全球品牌推出和扩展其功能性面料产品线。
  cases:
    - challenge: 欧洲户外零售商需要自有品牌SUP产品线，具有独特甲板图形、环保PVC和零售就绪包装——全部在60天内交付。
      solution: 开发定制数字打印文件，采购符合REACH的PVC，将取样从3轮减少到1轮。
      result: 从签署PO到FOB 55天。2,400件，4个SKU。第一批集装箱到达前已下重复订单。
    - challenge: 美国纺织行业初创公司需要高性能滴塑皮艇，具有定制面料体形状、联合品牌包装和BSCI认证。
      solution: 修改现有滴塑皮艇模具，开发联合品牌包装，提供完整BSCI审计文件。
      result: 成功进入3家美国主要户外连锁店。第一年5,000+件，售罄率98%。
    - challenge: 澳大利亚分销商需要CE认证的RIB系列，具有定制管颜色、Hypalon升级选项和符合澳大利亚标准AS 1799。
      solution: 生产4种管颜色变体的预生产样品，从日本供应商采购CSM Hypalon，协调第三方AS 1799合规测试。
      result: 3型号RIB系列在澳新市场推出，随后赢得12艘巡逻RIB的政府招标。

faq_section:
  tagline: 常见问题
  title: B2B和OEM常见问题
  questions:
    - q: OEM功能性SUP板的最小订单量（MOQ）是多少？
      a: 标准OEM型号的MOQ从5–10艘起。定制模具和自有品牌项目根据复杂度需要至少200艘。新品牌推出可提供试订单和样品运行。
    - q: Seekingtex是否持有BSCI认证？
      a: 是的。我们的工厂保持有效的BSCI社会合规认证。我们还持有质量管理认证，所有产品均带有CE认证。每批OEM货物均提供REACH和RoHS合规文件。
    - q: OEM订单的典型交货期是多少？
      a: 标准交货期为确认PO和定金后30-45天。定制模具开发增加15-20天。我们为紧急订单和季节性高峰期提供加急生产。
    - q: 你们能按FOB青岛或CIF运送到我们的港口吗？
      a: 是的。我们按FOB青岛、CIF全球主要港口和DDP为合格合作伙伴发货。我们的物流团队管理集装箱预订、出口文件和清关。我们发货到全球50多个国家。

b2b_moq: '标准MOQ：每型号5–10艘（SUP/皮艇/滴塑）。技术面料 MOQ：2-5艘。欢迎新合作伙伴的试订单。'

