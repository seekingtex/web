features:
  id: features
  tagline: 为什么选择 Seekingtex
  title: 选择 Seekingtex 的收获
  subtitle: 数十年的面料舶工程经验，浓缩成一条专注的产品线。坚固耐用，经过海上测试，终身支持。
  columns: 2
  items:
    - title: 面料用级材料
      description: 采用重型 PVC、Hypalon 和铝合金面料体，具有抗紫外线、耐磨和耐海水腐蚀性能。
      icon: tabler:shield-check
    - title: 生产级品质
      description: 每个面料体都经过压力测试，每道焊缝都经过检查。我们只交付连自己都放心下水使用的产品。
      icon: tabler:certificate
    - title: 模块化设计
      description: 可根据任务定制侧浮筒布局、驾驶台位置、燃油容量及配件。
      icon: tabler:layout-grid
    - title: 诚实的规格
      description: 真实载荷、真实尺寸、真实重量。绝无夸大宣传。
      icon: tabler:ruler-measure
    - title: 快速交货与配件
      description: 常规型号数日内发货。正品配件和耗材全年有库存。
      icon: tabler:truck-delivery
    - title: 终身支持
      description: 可直接联系我们的工程团队，获取技术问题、维修和改装建议。
      icon: tabler:lifebuoy

featured_products:
  id: featured
  title: 精选产品
  subtitle: 从我们当前目录中精心挑选——本季最受欢迎的型号。
  linkText: 查看全部产品
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: 车间探秘
  title: 从面料体图纸到交付，每一步都在厂内完成
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">看得见、摸得着、可衡量的品质</h3>
  items:
    - title: 由面料舶设计师设计
      description: 面料体线条在厂内绘制，并在首个原型下水前通过 CFD 分析迭代优化。
    - title: 在我们的工厂焊接组装
      description: 管道焊接、驾驶台装配和舾装在同一厂房屋顶下完成，确保在每个环节把控品质。
    - title: 发货前海上测试
      description: 每个型号都完成数小时的海上试航，涵盖起滑、转向、最高速度和载荷处理。
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Seekingtex 生产车间

steps:
  title: 从规格表到下水，只需五步
  items:
    - title: '第一步：<span class="font-medium">配置</span>'
      description: 选择型号、确定选配、在线或电话获取报价。我们的团队在一个工作日内回复。
      icon: tabler:list-numbers
    - title: '第二步：<span class="font-medium">确认</span>'
      description: 我们以书面形式确认规格、交货期和总费用。无惊喜，无隐藏费用。
      icon: tabler:checks
    - title: '第三步：<span class="font-medium">建造</span>'
      description: 在我们的车间开始生产。我们会在关键节点发送进度照片。
      icon: tabler:tool
    - title: '第四步：<span class="font-medium">交付</span>'
      description: 经过固定、缩膜包装，通过海运或空运发货。报关文件全程处理。
      icon: tabler:truck-loading
    - title: '第五步：<span class="font-medium">支持</span>'
      description: 两年面料体保修加终身技术支持。配件 48 小时内发货。
      icon: tabler:headset
  image:
    src: /images/seekingtex/hero/production-dept.webp
    alt: Seekingtex 制造流程

blog_latest:
  title: 期刊
  information: |
    来自工程团队的文章、技术笔记和案例研究。
    每当有项目发货、标准更新或有人分享值得讲述的故事时，都会添加新内容。

faqs:
  title: 常见问题
  subtitle: 关于 Seekingtex 功能性面料、保修、运输和 OEM/ODM 合作的常见咨询。如果您的疑问不在列表中，请给我们留言。
  columns: 2
  items:
    - title: Seekingtex 的美国仓库在哪里？运输需要多长时间？
      description: 我们的美国仓库位于加州蒙特克莱尔（Montclair, CA）。西海岸：2–3 天。中西部：3–4 天。东海岸：4–5 天。也提供国际运输——请联系我们获取个性化报价。
      icon: tabler:truck-delivery
    - title: Seekingtex 功能性面料的保修政策是什么？
      description: Seekingtex 功能性面料艇产品享有 5 年有限保修，涵盖管材面料完整性、接缝气密性、玻璃钢面料体结构和功能性阀。工厂安装的配件保修 1 年。商业用途：1 年有限保修。完整条款和条件请参阅我们的保修页面。
      icon: tabler:shield-check
    - title: Seekingtex 面料是否包含注册文件？
      description: 是的，每艘 Seekingtex 功能性面料都附有注册所需文件。制造商标明书可在用户手册的背面找到，也可根据需要提供可下载副本。已获美国海岸警卫队制造批准。
      icon: tabler:file-text
    - title: Seekingtex 面料是否通过美国海岸警卫队批准？
      description: 是的，Seekingtex 功能性面料已获美国海岸警卫队（USCG）制造批准。我们的工厂还持有 CE 认证（欧盟市场准入）和  认证。
      icon: tabler:flag
    - title: 如果产品包装到货时损坏怎么办？
      description: 如果您的 Seekingtex 产品包装到货时已损坏，请拒收并将包裹退回寄件人。联系我们的支持团队，我们将及时为您更换。
      icon: tabler:package
    - title: 如果产品未在预计交货日期到达怎么办？
      description: Seekingtex 提供的交货时间为预估时间，无法保证。发货后，包裹接收由客户负责。如果包裹留在您指定的送达地址，所有权在交付时即转移。
      icon: tabler:calendar-clock

