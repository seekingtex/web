  tagline: 流程
  title: 制造流程
  subtitle: 从原材料到可下海的面料——每一步都在我们的掌控之中
  back_label: 返回工厂
  back_link: /factory

intro: 与将生产外包给第三方工厂的品牌不同，Seekingtex拥有并运营其整个制造链。这种垂直整合使我们能够在每个环节保持严格的质量控制，快速响应定制需求，并批次接批次地提供一致的产品质量。以下是我们工厂中一艘面料的制造过程。

steps:
  - step: '01'
    title: 材料接收与检验
    description: 每批进厂的PVC面料、玻璃纤维毡、树脂和五金件都按照规格进行检查。面料样品在放行生产前进行拉伸强度、厚度均匀性和抗紫外线测试。不合格材料被隔离并退回。
    duration: 1–2天
  - step: '02'
    title: 自动PVC裁切
    description: 合格面料铺设在自动CNC裁切机上，以亚毫米精度裁剪。计算机优化套裁安排面板以最小化浪费——通常低于5%。裁切后的面板按面料型编号和气室标记，然后打包送往焊接车间。
    duration: 每套面料2–4小时
  - step: '03'
    title: 管材热封与焊接
    description: 面板使用热封机（压胶机）在200–600°C的受控温度下进行热风焊接定位和粘合。主缝采用高频介质焊接进行加固，形成气密、高强度的接头。完成的气室功能性至1.5倍工作压力，保持30分钟进行气密性验证。
    duration: 每艘面料1–2天
  - step: '04'
    title: 玻璃钢RIB面料壳成型
    description: RIB面料壳采用手糊玻璃钢成型工艺制造。在精密模具中，玻璃纤维毡和编织粗纱层与聚酯或乙烯基酯树脂手工滚压。每层都经过真空袋压以确保一致的层压质量。面料壳用胶衣完成，形成高光泽、抗紫外线的面料用表面。
    duration: 每个面料壳2–4天
  - step: '05'
    title: SUP印刷与装饰
    description: SUP板甲板图形采用数码印花进行全彩照片级设计，以及丝网印花用于耐用的Logo和重复图案。印刷品经过固化和密封以达到抗紫外线和耐磨性。
    duration: 1–2天
  - step: '06'
    title: 最终组装与装配
    description: 玻璃钢面料壳和PVC管材组件在组装线上对接。安装发动机，连接转向和油门控制装置，安装燃油系统，并布线全套电气线束。每艘面料按照包含100个检查点的组装清单执行，每个阶段都有强制签字确认。
    duration: 2–3天
  - step: '07'
    title: 质量测试与检验
    description: 每艘完工面料必须通过强制性质量关卡：气室气密性测试、系统功能检查、紧固件扭矩验证和外观检查。定制和原型面料还接受纺织试航，涵盖速度、操控性、稳定性和续航测试。
    duration: 1–2天
  - step: '08'
    title: 包装与发货
    description: 面料放气，按规程折叠，装入重型编织袋或胶合板箱，并装载发运。每个包装都标有型号、序列号和目的地。我们与货运代理协调全球范围内的整箱和拼箱集装箱运输。
    duration: 1天

