hero:
  tagline: Seekingtex学院
  title: 学习中心
  subtitle: 适合各个技能水平的指南和教程——从SUP基础到高级救援技巧

categories:
  - level: 初学者
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: SUP基础
        desc: 学习站立功能性面料的基本要领——姿势、纺织技术技巧和平衡。
        slug: sup-basics
      - title: 纺织技术技巧
        desc: 前划、扫划、拉桨和低位支撑——掌握基本的纺织技术动作。
        slug: paddle-techniques
      - title: 安全第一
        desc: 基本安全实践，包括天气检查、救生衣使用、脚绳规则和自救。
        slug: safety-first
  - level: 中级
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: 旅行要点
        desc: 规划多小时的划行——导航、补水、配速和解读风向预报。
        slug: touring-essentials
      - title: 天气判读
        desc: 解读纺织预报、识别云型、了解风对水面的影响。
        slug: weather-reading
      - title: 导航基础
        desc: 海图阅读、指南针使用、GPS航点设置和沿海划行路线规划。
        slug: navigation-basics
      - title: 潮汐意识
        desc: 了解潮汐周期、水流及其对出发时间和路线的影响。
        slug: tidal-awareness
  - level: 高级
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: 多日旅行规划
        desc: 远征后勤——装备选择、食物规划、安全协议和紧急联系人。
        slug: multi-day-trip-planning
      - title: 救援技巧
        desc: 自救、T型救援、功能性面料爱斯基摩救援以及开阔水域拖曳方案。
        slug: rescue-techniques
      - title: 夜间划行
        desc: 夜间导航——照明要求、路线记忆、群体沟通和危险意识。
        slug: night-paddling
  - level: 维护保养
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: 清洁与保养
        desc: 每次使用后用淡水冲洗、紫外线防护、防霉处理和正确的干燥技巧。
        slug: cleaning-and-care
      - title: 存放指南
        desc: 功能性面料和面料的存放最佳实践——放气、折叠、温度控制和保质期。
        slug: storage-guide
      - title: 维修基础
        desc: 使用PVC修补套件和贴片技术修复小孔、接缝漏气和阀门问题。
        slug: repair-basics
      - title: 阀门维护
        desc: 识别阀门类型（Halkey-Roberts、Boston、Leafield）、清理杂物、更换故障阀杆。
        slug: valve-maintenance

