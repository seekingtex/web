how_to_choose:
  title: Como escolher o tamanho certo
  cards:
    - title: Pranchas SUP
      description: Escolha o comprimento com base no seu peso e uso pretendido. Pranchas mais largas (32"+) oferecem mais estabilidade. Pranchas mais longas (11-12 pés) trackeiam melhor para touring. Remadores mais pesados precisam de pranchas de maior volume.
    - title: tecidos tecnicos
      description: tecidos tecnicos individuais (9 pés) são melhores para viagens a solo e rios. tecidos tecnicos tandem (12 pés) acomodam dois remadores ou um adulto com equipamento. Verifique a capacidade de peso para a carga total incluindo equipamento.
    - title: Botes e RIBs
      description: Escolha o comprimento do bote pelo número de passageiros e uso pretendido. RIBs maiores (4,5 m+) são adequados para offshore e resgate. Botes menores (2,7 m) funcionam como tender e plataformas de pesca.
