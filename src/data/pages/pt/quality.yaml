tests:
  - title: Teste de Pressão
    description: As câmaras infláveis são submetidas a pressões que excedem os seus limites operacionais recomendados por períodos prolongados. Isto verifica a estanqueidade e integridade estrutural do material e costuras, garantindo que o produto suporta o uso pretendido e potencial sobre-inflação sem falhas ou fugas.
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: Teste de Impacto
    description: Os produtos são submetidos a impactos controlados de vários pesos e ângulos. Isto avalia a resistência do material a perfurações, rasgos e danos de colisões com obstáculos na água, demonstrando durabilidade e longevidade.
    image: /images/seekingtex/factory/producing department.jpeg
  - title: Teste de Resistência UV
    description: Os produtos acabados são expostos à luz solar simulada por longos períodos para avaliar a resistência do material à degradação, desbotamento e enfraquecimento causados pela exposição prolongada aos UV —crucial para barcos usados em ambientes tropicais e de alto sol.
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: Teste de Resistência à Abrasão
    description: Amostras de material são esfregadas contra superfícies abrasivas por um número especificado de ciclos sob pressão controlada. Isto mede a capacidade do material de suportar desgaste do uso repetido, contato com areia, rochas ou outras superfícies, garantindo durabilidade a longo prazo.
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: Teste de Desempenho em Baixa Temperatura
    description: Os produtos são testados em ambientes frios para avaliar funcionalidade e durabilidade em várias condições de temperatura, prevenindo rigidez ou rachaduras em águas mais frias. Essencial para barcos destinados a uso no inverno ou em altas latitudes.
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: Teste de Flutuabilidade e Capacidade de Carga
    description: Os produtos são testados com vários pesos para determinar sua capacidade máxima de carga e garantir que suportam usuários e equipamentos com segurança. A capacidade nominal de cada modelo é verificada antes do lançamento.
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: Teste de Manobrabilidade
    description: Os produtos são testados quanto à resposta a comandos de textil ou motor, avaliando raio de viragem e facilidade de manuseio. Testes na água validam se o manuseio real corresponde às especificações de projeto.
    image: /images/seekingtex/factory/sup making.jpeg
  - title: Teste de Estanqueidade
    description: Os produtos totalmente montados são submersos ou sujeitos a pulverização de água para verificar possíveis fugas através de costuras, válvulas ou materiais. Cada tecido passa por uma verificação obrigatória de estanqueidade antes do envio.
    image: /images/seekingtex/factory/producing department2.jpeg

