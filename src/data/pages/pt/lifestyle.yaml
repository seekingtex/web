hero:
  tagline: Estilo de Vida
  title: O Estilo de Vida<br />Seekingtex
  subtitle: Construído para quem vive na água — desde exploradores de fim de semana a operadores comerciais que dependem do seu equipamento todos os dias.

values:
  - icon: 🌊
    title: Nascido na Água
    desc: Cada design começa com a compreensão de como a água se comporta. Projetamos das condições extremas para dentro — porque o oceano é o nosso professor, não o nosso local de trabalho.
  - icon: 🔧
    title: Construído para Durar
    desc: O produto mais sustentável é aquele que não precisa de substituição. Materiais de grau textil, núcleos drop-stitch classificados para 15 PSI e costuras que duram mais que a estação.
  - icon: '🏆'
    title: Acessível por Design
    desc: Os desportos aquáticos não devem ser um luxo. Desempenho de nível profissional a um preço que faz sentido para famílias, guias e pequenos operadores — não apenas para frotas comerciais.
  - icon: 🌍
    title: Comunidade Global
    desc: "Da costa de Qingdao aos lagos na Europa, rios no Sudeste Asiático e baías nas Américas — os nossos clientes partilham uma coisa: o amor por estar na água."
  - icon: ♻️
    title: Fabrico Responsável
    desc: O corte otimizado por CNC reduz o desperdício de material para menos de 5%. A construção durável reduz os ciclos de substituição. Construímos para longevidade porque essa é a escolha mais sustentável.
  - icon: 🤝
    title: Suporte que Dura
    desc: Cascos de vinte anos ainda nos contactam para peças sobresselentes. O nosso tempo de resposta de garantia é em média 24 horas. Não desaparecemos após a venda — estamos aqui durante toda a vida do produto.

