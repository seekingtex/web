hero:
  tagline: Seekingtex Custom Lab
  title: Projete o Seu Próprio<br />tecido
  subtitle: Serviços OEM, ODM, private label e branding personalizado para empresas em todo o mundo. De um único protótipo a séries de produção completas.
  cta: Inicie o seu projeto
  footer_link: /contact

steps_section:
  tagline: Como funciona
  title: Do conceito à produção
  subtitle: Quatro passos da sua ideia a um tecido acabado e pronto para o mar.
  steps:
    - num: '01'
      title: Escolha a Sua Prancha
      desc: Selecione dos nossos modelos principais — SUP, tecidos tecnicos, dingue ou tecido tecnico. Escolha tamanho, material e cor.
    - num: '02'
      title: Envie o Seu Design
      desc: Envie-nos o seu logótipo, arte ou diretrizes de marca. A nossa equipa de design prepara uma prova digital.
    - num: '03'
      title: Revisão de Mockup IA
      desc: Veja um mockup fotorrealista gerado por IA da sua prancha personalizada antes do início da produção.
    - num: '04'
      title: Produção e Entrega
      desc: Após aprovação, a sua encomenda entra na nossa linha de produção certificada ISO. Prazos a partir de 30 dias.

services_section:
  tagline: Serviços
  title: Serviços de fabrico para marcas globais
  subtitle: Modelos de envolvimento flexíveis — desde fabrico por contrato até construção completa de marca.
  items:
    - title: Fabrico OEM
      desc: Produzimos os seus designs conforme especificação — sua PI, seus desenhos, seus padrões de qualidade. Proteção NDA total.
      icon: ⚙️
    - title: Soluções ODM
      desc: Escolha entre mais de 50 plataformas comprovadas e personalize tamanho, cor, gráficos e embalagem.
      icon: '🎨'
    - title: Private Label
      desc: A sua marca nos nossos produtos — logótipo, embalagem, etiquetas, manuais. Pronto para venda a retalho.
      icon: 🏷️
    - title: Branding Personalizado
      desc: Impressão no deck, gráficos de casco, decalques nos tubos e etiquetas personalizadas — integração total da marca.
      icon: ✨

capabilities_section:
  tagline: Capacidades
  title: Capacidades de produção e personalização
  subtitle: Tudo o que precisa saber antes de fazer a sua encomenda.
  capabilities:
    - label: Volume de encomenda
      value: MOQ 5–10 unidades (SUP/tecidos tecnicos), 2–5 unidades (tecido tecnico)
    - label: Prazo de entrega
      value: 30–45 dias padrão; 15–20 dias para protótipos
    - label: Personalização
      value: Tamanho, forma, cor, gráficos, embalagem, ferragens
    - label: Materiais
      value: PVC, Hypalon, drop-stitch, fibra de vidro, alumínio
    - label: Impressão
      value: Digital (CMYK), serigrafia, transferência térmica, sublimação
    - label: Certificação
      value: CE, UKCA, FCC (suporte para conformidade global)

