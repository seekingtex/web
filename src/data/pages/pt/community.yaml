stories:
  tagline: 'Histórias de Exploradores'
  title: 'Aventuras reais de pessoas reais'
  subtitle: 'Ouça remadores, famílias e profissionais que usam equipamentos Seekingtex na água.'
  items:
    - name: 'Sarah & Mike'
      title: 'Proprietários do SUP Explorer 11, Canadá'
      content: 'Levamos nossos Explorer 11s para uma viagem de uma semana pelo Parque Algonquin. Eles lidaram com travessias de lagos e portagens lindamente. A construção drop-stitch nos permitiu inflar a 15 PSI e obter desempenho de prancha rígida a partir de uma prancha compactável.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Parque Algonquin, Canadá'
    - name: 'Carlos R.'
      title: 'Piloto de Cheetah Surge, Espanha'
      content: 'O Cheetah Surge é o meu preferido para cruzeiros costeiros. O design vibrante chama atenção na praia, e a estabilidade me dá confiança em ondas leves. Ele se comporta lindamente, seja em travessias ou apenas apreciando o pôr do sol.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Espanha'
    - name: 'Lina & família'
      title: 'Remadores Flowing Lotus, Suécia'
      content: 'Aventuras familiares de fim de semana no arquipélago. O Flowing Lotus é estável o suficiente para minha filha ficar em pé enquanto eu textil. Infla em menos de 10 minutos — sem necessidade de reboque, apenas diversão em família na água.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Arquipélago de Estocolmo, Suécia'
    - name: 'Tenente-Cmdr. Andres'
      title: 'Explorador Ocean Voyager, Filipinas'
      content: 'Uso meu Ocean Voyager para travessias costeiras de longa distância ao redor de Palawan. Após meses de uso diário em condições tropicais, a prancha ainda funciona como nova. O formato de travessia corta ondas que parariam pranchas inferiores.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filipinas'
    - name: 'Emma T.'
      title: 'Iniciante no Tropical Breeze, Austrália'
      content: 'Nunca tinha estado em um SUP antes. O Tropical Breeze é tão estável que me senti confiante na minha primeira tentativa. Agora textil todo fim de semana. A curva de aprendizado é praticamente zero — e a prancha fica linda na água.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Austrália'

