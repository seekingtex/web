hero:
  tagline: "Equipamento"
  title: "Equipamentos e Maquinaria de Fabrico"
  subtitle: "Equipamento de grau industrial para corte, soldadura, impressão e montagem"
  back_label: "Voltar à Fábrica"
  back_link: /factory

categories:
  - title: "Corte e Preparação de Materiais"
    items:
      - name: "Máquina de Corte Automática de PVC"
        spec: "Controlada por CNC, 6.5 m × 2.5 m, precisão 0.1 mm"
        desc: "Máquina de corte automática controlada por computador para tecidos PVC, Hypalon e drop-stitch. O software de aninhamento optimiza a utilização de material para menos de 5% de desperdício."
      - name: "Espalhador de Tecido"
        spec: "Largura máx. 3 m, alimentação de tensão controlada"
        desc: "Coloca o tecido em camadas simples ou múltiplas com tensão controlada para evitar distorção antes do corte."
  - title: "Soldadura e União de Tubos"
    items:
      - name: "Máquina de Selagem Térmica"
        spec: "Soldadura de ar quente, variável 200–600 °C, 0.5–5 m/min"
        desc: "Máquina de selagem térmica por ar quente para unir e soldar costuras de tubos PVC e Hypalon. Usada para fixação, selagem e fusão de câmaras de tubo e juntas de flutuação."
      - name: "Prensa RF Dielétrica"
        spec: "15 kW, placa 2000 × 600 mm"
        desc: "Prensa de soldadura de alta frequência para costuras longitudinais principais, juntas casco-tubo e fabrico de grandes câmaras."
      - name: "Soldadora RF Controlada por CNC"
        spec: "8 kW, mesa XY 2500 × 1200 mm"
        desc: "Soldadura programável de costuras curvas para geometrias complexas, gravação de logótipos e remendos de precisão."
  - title: "Fabrico de Casco tecido tecnico"
    items:
      - name: "Moldes de Fibra de Vidro por Colocação Manual"
        spec: "Vários moldes para cascos tecido tecnico até 6 m LOA"
        desc: "Moldagem tradicional de fibra de vidro por colocação manual com sistemas de resina de poliéster e viniléster. Cada camada é enrolada à mão e vacuum-bag para qualidade e resistência consistentes do laminado."
      - name: "Cabine de Pulverização de Gelcoat"
        spec: "Temperatura controlada, ventilação de ar filtrado"
        desc: "Aplicação de gelcoat em cascos tecido tecnico. Oferece um acabamento de alto brilho, resistente aos UV, com controlo preciso da espessura."
      - name: "Router CNC (5 eixos)"
        spec: "Envolvente 3 m × 2 m × 1 m, fuso arrefecido a água"
        desc: "Usinagem de insertos de casco, moldes de consola, bases de assento e suportes personalizados."
  - title: "Impressão e Decoração SUP"
    items:
      - name: "Impressora Digital"
        spec: "Jacto de tinta de alta resolução, largura de impressão até 2 m"
        desc: "Impressão digital direta no tecido para gráficos de convés SUP a cores completas. Imprime padrões personalizados, gradientes e imagens de qualidade fotográfica com tintas à base de água resistentes aos UV."
      - name: "Máquina de Serigrafia"
        spec: "Manual e semiautomática, registo multicolor"
        desc: "Serigrafia para logótipos de pranchas SUP, marcas e padrões repetitivos. Oferece impressões duráveis, opacas com saturação de cor vibrante."
  - title: "Montagem e Armamento"
    items:
      - name: "Guindauto de Motor"
        spec: "Capacidade 500 kg, barra espalhadora ajustável"
        desc: "Montagem segura de motores de popa de 2.5 a 60 cv."
      - name: "Moldura de Maquete de Consola"
        spec: "Altura e ângulo ajustáveis"
        desc: "Pré-armamento de direção, acelerador e painéis de instrumentos antes da instalação."
      - name: "Crimpadora de Mangueira Hidráulica"
        spec: "Até 1\" ID, manómetro digital"
        desc: "Conjuntos de mangueira de direção hidráulica de comprimento personalizado com acessórios prensados."
      - name: "Quadro de Feixes Elétricos"
        spec: "3 m × 1.5 m, diagramas de cablagem pré-impressos"
        desc: "Montagem e teste de feixes elétricos completos fora do tecido."
  - title: "Testes e Controlo de Qualidade"
    items:
      - name: "Tesour Universal de Tração"
        spec: "50 kN, ASTM D751"
        desc: "Ensaio de força de rotura, alongamento na rotura e propagação de rasgão para lotes de tecido."
      - name: "Banco de Teste de Retenção de Ar"
        spec: "Programável, retenção de pressão 30 min"
        desc: "Teste automatizado de retenção de pressão para cada câmara de tubo antes da montagem."
      - name: "Testador de Descolagem de Costuras"
        spec: "Descolagem motorizada 180° a 100 mm/min"
        desc: "Ensaio de resistência à descolagem de costuras soldadas e coladas segundo ISO 6185."
      - name: "Câmara de Envelhecimento por Arco de Xénon"
        spec: "2000 h exposição"
        desc: "Ensaio de resistência aos UV para alteração de cor e retenção de resistência."

