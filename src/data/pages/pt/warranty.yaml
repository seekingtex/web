label: 'Garantia'
headline: 'Garantia limitada do fabricante Seekingtex'
subtitle: 'A Seekingtex garante a qualidade de cada produto textil insuflável que fabricamos. Esta garantia limitada estabelece os termos e a cobertura para o seu produto Seekingtex.'
seo:
  headline: 'Garantia de tecido insuflável Seekingtex — Garantia limitada de 5 anos | Seekingtex'
  description: 'A Seekingtex oferece uma garantia limitada de 5 anos sobre a integridade do tecido principal dos tubos, costuras e estrutura do casco em fibra de vidro. Cobrindo também válvulas de insuflação e acessórios instalados de fábrica. Termos e condições completos da garantia do tecido insuflável Seekingtex.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Esta garantia limitada aplica-se a novos produtos marinhos insufláveis da marca Seekingtex adquiridos diretamente à Seekingtex ou a um concessionário ou retalhista autorizado Seekingtex. A data de vigência é a data verificável de compra a retalho original.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Cobertura e duração da garantia</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 anos</h3>
        <p class="text-sm text-gray-600 mt-1">Integridade do tecido principal dos tubos (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 anos</h3>
        <p class="text-sm text-gray-600 mt-1">Integridade estrutural do casco em fibra de vidro</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 anos</h3>
        <p class="text-sm text-gray-600 mt-1">Capacidade de retenção de ar das costuras dos tubos insufláveis</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 anos</h3>
        <p class="text-sm text-gray-600 mt-1">Funcionalidade das válvulas de insuflação</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 ano</h3>
        <p class="text-sm text-gray-600 mt-1">Acessórios instalados de fábrica e acessórios auxiliares</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 ano*</h3>
        <p class="text-sm text-gray-600 mt-1">Uso comercial, aluguer ou frota — todos os componentes</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Uso comercial, governamental, charter, aluguer ou instrução reduz a garantia para 1 ano. Utilização em corridas ou competição anula totalmente a garantia.</p>
  </div>

  <h2>O que está coberto</h2>
  <h3>Tecido principal dos tubos (5 anos)</h3>
  <p>A Seekingtex garante o tecido principal dos tubos contra deterioração por porosidade que comprometa substancialmente a capacidade do produto em manter a insuflação operacional. Isto aplica-se ao tecido revestido a CSM (Hypalon) e a todos os outros materiais de tubo utilizados no fabrico.</p>

  <h3>Integridade estrutural do casco em fibra de vidro (5 anos)</h3>
  <p>Para produtos com casco em plástico reforçado com fibra de vidro (PRFV), a estrutura compósita fundamental está garantida contra falha estrutural devido a defeitos nos materiais ou mão de obra.</p>

  <h3>Capacidade de retenção de ar das costuras dos tubos insufláveis (5 anos)</h3>
  <p>As costuras dos tubos insufláveis estão garantidas contra defeitos de fabrico que resultem em fuga de ar substancial através da costura. A inspeção periódica e a manutenção das pressões de insuflação adequadas são condições da cobertura.</p>

  <h3>Funcionalidade das válvulas de insuflação (5 anos)</h3>
  <p>As válvulas de insuflação originalmente instaladas pela Seekingtex estão garantidas contra defeitos de materiais ou mão de obra que impeçam a válvula de reter ar conforme projetado.</p>

  <h3>Acessórios instalados de fábrica (1 ano)</h3>
  <p>Os componentes e acessórios fabricados pela Seekingtex e originalmente instalados na fábrica estão garantidos contra defeitos de material e mão de obra por um ano. Isto exclui artigos de terceiros, que estão cobertos apenas pelas respetivas garantias do fabricante.</p>

  <h2>O que não está coberto</h2>
  <ul>
    <li>Imperfeições estéticas incluindo descoloração, manchas, desbotamento, calcinação ou qualquer alteração na aparência</li>
    <li>Perfurações, cortes, rasgões ou outros danos físicos</li>
    <li>Fissuras, fendilhação, abrasão, desgaste ou deterioração por fricção ou contacto</li>
    <li>Degradação por exposição a luz UV, intempéries ou condições atmosféricas</li>
    <li>Danos por contacto com combustíveis, solventes, ácidos, álcalis ou produtos químicos</li>
    <li>Danos por negligência, uso inadequado, abuso, acidente ou desgaste normal</li>
    <li>Problemas de superfície do gelcoat ou pintura (bolhas, fissuras, descoloração, desbotamento)</li>
    <li>Danos por impacto, tensão, suporte inadequado ou reboque</li>
    <li>Danos por insuflação/desinsuflação incorreta ou uso de dispositivos de insuflação não aprovados</li>
    <li>Equipamentos, componentes ou sistemas de terceiros (cobertos pelos respetivos fabricantes)</li>
  </ul>

  <h2>Obrigação e recurso do fabricante</h2>
  <p>A única e exclusiva obrigação da Seekingtex é a reparação ou substituição, por opção da Seekingtex, de qualquer componente determinado como defeituoso nos materiais ou mão de obra e coberto por esta garantia. As reparações ou substituições são efetuadas pela Seekingtex ou pelo seu centro de assistência autorizado designado. Os componentes reparados ou substituídos estão garantidos apenas pela parte não expirada do período de garantia original.</p>

  <h2>Condições da garantia</h2>
  <ul>
    <li><strong>Registo:</strong> O produto deve ser devidamente registado conforme exigido nos termos da garantia.</li>
    <li><strong>Manutenção:</strong> O produto deve ser mantido de acordo com as diretrizes publicadas pela Seekingtex, incluindo inspeção periódica e manutenção das pressões de insuflação adequadas.</li>
    <li><strong>Cooperação:</strong> O comprador deve cooperar total e prontamente com a Seekingtex em todos os assuntos relativos a reclamações de garantia.</li>
    <li><strong>Comprador original:</strong> Esta garantia é estendida exclusivamente ao comprador utilizador final original e não é transferível.</li>
  </ul>

  <h2>Uso comercial</h2>
  <p>Se o produto for utilizado para fins comerciais, governamentais, sem fins lucrativos, charter, aluguer, instrução ou qualquer outro fim que não seja recreativo privado, o período de garantia para todos os componentes é reduzido para um (1) ano a partir da data de compra a retalho original. A utilização em corridas, competição de velocidade ou resistência anula imediata e irrevogavelmente toda a garantia.</p>

  <h2>Como fazer uma reclamação de garantia</h2>
  <p>Contacte a Seekingtex ou o seu concessionário autorizado com comprovativo de compra e uma descrição detalhada do problema. A Seekingtex analisará a reclamação e fornecerá instruções para inspeção e assistência.</p>
  <p>Para consultas de serviço de garantia, contacte-nos através da nossa <a href="/contact" class="text-sky-600 underline">página de contacto</a> com o seu número de encomenda e detalhes do produto.</p>

  <h2>Artigos de terceiros</h2>
  <p>Equipamentos, componentes ou sistemas fabricados por terceiros (mesmo que instalados pela Seekingtex) estão cobertos exclusivamente por qualquer garantia oferecida pelo respetivo fabricante. A Seekingtex renuncia expressamente a qualquer responsabilidade de garantia por tais artigos de terceiros.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Esta declaração de garantia é um resumo da Garantia limitada completa do fabricante Seekingtex. O documento de garantia legal completo rege todos os termos e condições da garantia. Especificações sujeitas a alterações sem aviso prévio. A Seekingtex é uma marca do Qingdao Vatrad Group.
  </p>
