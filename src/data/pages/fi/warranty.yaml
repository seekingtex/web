label: 'Takuu'
headline: 'Seekingtexin valmistajan rajoitettu takuu'
subtitle: 'Seekingtex seisoo jokaisen valmistamansa kumivenetuotteen laadun takana. Tämä rajoitettu takuu määrittelee Seekingtex-tuotteesi ehdot ja kattavuuden.'
seo:
  headline: 'Seekingtex-kumiveneen takuu — 5 vuoden rajoitettu takuu | Seekingtex'
  description: 'Seekingtex tarjoaa 5 vuoden rajoitetun takuun ensisijaiselle putkikankaalle, saumoille ja lasikuituisen rungon rakenteelle. Kattaa myös täyttöventtiilit ja tehtaalla asennetut lisävarusteet. Täydelliset ehdot Seekingtex-kumiveneen takuulle.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Tämä rajoitettu takuu koskee uusia Seekingtex-merkkisiä kumivenetuotteita, jotka on ostettu suoraan Seekingtexilta tai valtuutetulta Seekingtex-jälleenmyyjältä. Voimaantulopäivä on alkuperäisen vähittäismyyntiostoksen todennettavissa oleva päivämäärä.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Takuun kattavuus ja kesto</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 vuotta</h3>
        <p class="text-sm text-gray-600 mt-1">Ensisijaisen putkikankaan eheys (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 vuotta</h3>
        <p class="text-sm text-gray-600 mt-1">Lasikuituisen rungon rakenteellinen eheys</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 vuotta</h3>
        <p class="text-sm text-gray-600 mt-1">Täytettävän putken sauman ilmanpysyvyys</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 vuotta</h3>
        <p class="text-sm text-gray-600 mt-1">Täyttöventtiilin toimivuus</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 vuosi</h3>
        <p class="text-sm text-gray-600 mt-1">Tehtaalla asennetut lisävarusteet ja apukiinnikkeet</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 vuosi*</h3>
        <p class="text-sm text-gray-600 mt-1">Kaupallinen, vuokra- tai laivastokäyttö — kaikki komponentit</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Kaupallinen, valtiollinen, charter-, vuokra- tai opetuskäyttö lyhentää takuun yhteen vuoteen. Kilpailu- tai nopeuskäyttö mitätöi takuun kokonaan.</p>
  </div>

  <h2>Mitä takuu kattaa</h2>
  <h3>Ensisijainen putkikangas (5 vuotta)</h3>
  <p>Seekingtex takaa ensisijaisen putkikankaan huokoisuuden heikkenemistä vastaan, joka olennaisesti vaarantaa tuotteen kyvyn ylläpitää käyttöpainetta. Tämä koskee CSM (Hypalon) -pinnoitettua kangasta ja kaikkia muita valmistuksessa käytettyjä putkikangasmateriaaleja.</p>

  <h3>Lasikuituisen rungon rakenteellinen eheys (5 vuotta)</h3>
  <p>Tuotteille, joissa on lasikuidulla vahvistettu muovirunko (FRP), peruskomposiittirakenne on taattu rakenteellista vikaantumista vastaan materiaali- tai työvirheistä johtuen.</p>

  <h3>Täytettävän putken sauman ilmanpysyvyys (5 vuotta)</h3>
  <p>Täytettävien putkien saumat, jotka on liitetty valmistuksen aikana, on taattu valmistusvirheitä vastaan, jotka johtavat merkittävään ilman vuotamiseen sauman läpi. Säännöllinen tarkastus ja asianmukaisten täyttöpaineiden ylläpito ovat kattavuuden ehtoja.</p>

  <h3>Täyttöventtiilin toimivuus (5 vuotta)</h3>
  <p>Seekingtexin alun perin asentamat ilmantäyttöventtiilit on taattu materiaali- tai työvirheitä vastaan, jotka estävät venttiiliä pitämään ilmaa suunnitellusti.</p>

  <h3>Tehtaalla asennetut lisävarusteet (1 vuosi)</h3>
  <p>Seekingtexin valmistamat ja tehtaalla alun perin asennetut komponentit ja kiinnikkeet on taattu materiaali- ja työvirheitä vastaan yhden vuoden ajan. Tämä ei koske kolmannen osapuolen tuotteita, joita kattavat vain niiden omien valmistajien takuut.</p>

  <h2>Mitä takuu ei kata</h2>
  <ul>
    <li>Kosmeettiset viat, kuten värinmuutos, tahriintuminen, haalistuminen, liituuntuminen tai mikä tahansa ulkonäön muutos</li>
    <li>Puhkeamiset, leikkaukset, repeämät tai muut fyysiset vauriot</li>
    <li>Halkeilu, säröily, kuluminen, hankautuminen tai kitkasta tai kosketuksesta johtuva heikkeneminen</li>
    <li>UV-valoaltistuksen, sään tai ilmakehän olosuhteiden aiheuttama heikkeneminen</li>
    <li>Vauriot polttoaineiden, liuottimien, happojen, emästen tai kemikaalien kosketuksesta</li>
    <li>Vahingot laiminlyönnistä, virheellisestä käytöstä, väärinkäytöstä, onnettomuudesta tai normaalista kulumisesta</li>
    <li>Geelipinnoite- tai maalipinnan ongelmat (rakkulointi, halkeilu, värinmuutos, haalistuminen)</li>
    <li>Iskun, rasituksen, virheellisen tuennan tai perävaunukuljetuksen aiheuttamat vauriot</li>
    <li>Virheellisestä täytöstä/tyhjennyksestä tai ei-hyväksyttyjen täyttölaitteiden käytöstä aiheutuvat vauriot</li>
    <li>Kolmannen osapuolen laitteet, komponentit tai järjestelmät (omien valmistajiensa kattamia)</li>
  </ul>

  <h2>Valmistajan velvollisuus ja korjauskeino</h2>
  <p>Seekingtexin ainoa ja yksinomainen velvollisuus on tämän takuun alaisena materiaali- tai työvirheelliseksi todetun komponentin korjaaminen tai vaihtaminen Seekingtexin harkinnan mukaan. Korjaukset tai vaihdot suorittaa Seekingtex tai sen nimeämä valtuutettu huoltoliike. Korjatut tai vaihdetut komponentit on taattu vain alkuperäisen takuuajan jäljellä olevalle osalle.</p>

  <h2>Takuun ehdot</h2>
  <ul>
    <li><strong>Rekisteröinti:</strong> Tuote on rekisteröitävä asianmukaisesti takuuehtojen edellyttämällä tavalla.</li>
    <li><strong>Huolto:</strong> Tuotetta on huollettava Seekingtexin julkaistujen ohjeiden mukaisesti, mukaan lukien säännöllinen tarkastus ja asianmukaisten täyttöpaineiden ylläpito.</li>
    <li><strong>Yhteistyö:</strong> Ostajan on täysimääräisesti ja viipymättä tehtävä yhteistyötä Seekingtexin kanssa kaikissa takuuvaatimuksiin liittyvissä asioissa.</li>
    <li><strong>Alkuperäinen ostaja:</strong> Tämä takuu koskee yksinomaan alkuperäistä loppukäyttäjäostajaa eikä ole siirrettävissä.</li>
  </ul>

  <h2>Kaupallinen käyttö</h2>
  <p>Jos tuotetta käytetään kaupalliseen, valtiolliseen, voittoa tavoittelemattomaan, charter-, vuokra-, opetus- tai muuhun kuin yksityiseen virkistyskäyttöön, kaikkien komponenttien takuuaika lyhenee yhteen (1) vuoteen alkuperäisestä vähittäismyyntipäivästä. Käyttö kilpailussa, nopeus- tai kestävyyskilpailuissa mitätöi takuun välittömästi ja peruuttamattomasti.</p>

  <h2>Takuuvaatimuksen tekeminen</h2>
  <p>Ota yhteyttä Seekingtexiin tai valtuutettuun jälleenmyyjään ostotodistuksella ja yksityiskohtaisella kuvauksella ongelmasta. Seekingtex tarkistaa vaatimuksen ja antaa ohjeet tarkastusta ja huoltoa varten.</p>
  <p>Takuuhuoltokyselyissä ota yhteyttä <a href="/contact" class="text-sky-600 underline">yhteydenottosivumme</a> kautta tilausnumerolla ja tuotetiedoilla.</p>

  <h2>Kolmannen osapuolen tuotteet</h2>
  <p>Kolmannen osapuolen valmistamat laitteet, komponentit tai järjestelmät (vaikka Seekingtex olisi ne asentanut) kuuluvat yksinomaan niiden valmistajien mahdollisten takuiden piiriin. Seekingtex kiistää nimenomaisesti kaiken takuuvastuun tällaisille kolmannen osapuolen tuotteille.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Tämä takuulausunto on yhteenveto Seekingtexin valmistajan rajoitetusta takuusta. Täydellinen oikeudellinen takuuasiakirja määrää kaikkia takuuehtoja. Tekniset tiedot voivat muuttua ilman erillistä ilmoitusta. Seekingtex on Qingdao Vatrad Groupin tuotemerkki.
  </p>
