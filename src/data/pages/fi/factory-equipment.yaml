hero:
  tagline: "Kalusto"
  title: "Valmistuskalusto ja koneet"
  subtitle: "Teollisen luokan kalustoa leikkaamiseen, hitsaamiseen, painamiseen ja kokoamiseen"
  back_label: "Takaisin tehtaalle"
  back_link: /factory

categories:
  - title: "Leikkaus ja materiaalin valmistelu"
    items:
      - name: "Automaattinen PVC-leikkauskone"
        spec: "CNC-ohjattu, 6.5 m × 2.5 m, 0.1 mm tarkkuus"
        desc: "Tietokoneohjattu automaattinen leikkauskone PVC-, Hypalon- ja drop-stitch-kankaille. Pesimohjelmisto optimoi materiaalin käytön alle 5 % hukkaan."
      - name: "Kangaslevittäjä"
        spec: "Enint. 3 m leveys, jännitysohjattu syöttö"
        desc: "Asettaa kankaan yhtenä tai useampana kerroksena ohjatulla jännityksellä estääkseen vääristymisen ennen leikkausta."
  - title: "Putkihitsaus ja liitos"
    items:
      - name: "Kuumasulkukone"
        spec: "Kuuman ilman hitsaus, vaihteleva 200–600 °C, 0.5–5 m/min"
        desc: "Kuuman ilman kuumasulku- ja hitsauskone PVC- ja Hypalon-putkisaumojen liittämiseen ja hitsaamiseen. Käytetään kiinnitykseen, tiivistykseen ja putkikammioiden sekä kellukeliitosten sulattamiseen."
      - name: "Dielektrinen RF-puristin"
        spec: "15 kW, levyt 2000 × 600 mm"
        desc: "Radiotaajuushitsauspuristin pääpitkittäissaumoille, perälaudan ja putken liitoksille sekä suurten kammioiden valmistukseen."
      - name: "CNC-ohjattu RF-hitsauskone"
        spec: "8 kW, XY-pöytä 2500 × 1200 mm"
        desc: "Ohjelmoitava kaarevien saumojen hitsaus monimutkaisiin muotoihin, logon kohokuviointiin ja tarkkaan paikkaukseen."
  - title: "tekninen kangas-rungon valmistus"
    items:
      - name: "Lasikuitukäsikovamuotit"
        spec: "Useita muotteja tekninen kangas-rungoille enintään 6 m LOA"
        desc: "Perinteinen lasikuidun käsikovaus polyesteri- ja vinylesterihartsijärjestelmillä. Jokainen kerros rullataan käsin ja vakuumoidaan tasaisen laminointilaadun ja lujuuden takaamiseksi."
      - name: "Gelcoat-suihkukoppi"
        spec: "Lämpötilaohjattu, suodatettu ilmanvaihto"
        desc: "Gelcoat-käsittely tekninen kangas-rungoille. Tarjoaa korkeakiiltoisen, UV-kestävän pinnan tarkan paksuuden hallinnalla."
      - name: "CNC-jyrsinkone (5-akselinen)"
        spec: "Tila 3 m × 2 m × 1 m, vesijäähdytetty ikä"
        desc: "Rungon lisäosien, konsolimuottien, istuinpohjien ja mukautettujen kiinnikkeiden koneistus."
  - title: "SUP-painatus ja koristelu"
    items:
      - name: "Digitaalinen tulostin"
        spec: "Korkearesoluutioinen mustesuihku, tulostusleveys enint. 2 m"
        desc: "Suora kangaspainatus täysvärisille SUP-kannen grafiikoille. Tulostaa mukautettuja kuvioita, liukuvärejä ja valokuvalaatuisia kuvia UV-kestävillä vesipohjaisilla musteilla."
      - name: "Silkkipainokone"
        spec: "Käsikäyttöinen ja puoliautomaattinen, monivärirekisteröinti"
        desc: "Silkkipainatus SUP-lautojen logoihin, tavaramerkkeihin ja toistuviin kuvioihin. Tarjoaa kestäviä, peittäviä painatuksia eloisalla värikylläisyydellä."
  - title: "Kokoonpano ja varustelu"
    items:
      - name: "Moottorinostin"
        spec: "500 kg kantavuus, säädettävä puristusvarsi"
        desc: "Turvallinen perämoottorien asennus 2.5–60 hp."
      - name: "Konsolin mallipohja"
        spec: "Säädettävä korkeus ja kulma"
        desc: "Ohjauksen, kaasun ja mittaripaneelien esiasennus ennen asennusta."
      - name: "Hydraulinen letkupuristin"
        spec: "Enint. 1\" ID, digitaalinen painemittari"
        desc: "Mukautetun pituiset hydrauliset ohjausletkusarjat puristetuilla liittimillä."
      - name: "Sähköisen päällysteen taulu"
        spec: "3 m × 1.5 m, esipainetut kytkentäkaaviot"
        desc: "Valmiiden sähköpäällysteiden kokoaminen ja testaus veneen ulkopuolella."
  - title: "Testaus ja laadunvalvonta"
    items:
      - name: "Yleinen vetokoekehys"
        spec: "50 kN, ASTM D751"
        desc: "Katkeamispakan, murtovenymän ja repeytymisen etenemisen testaus kangaserille."
      - name: "Ilmanpitävyystestiteline"
        spec: "Ohjelmoitava, 30 min paineenpito"
        desc: "Automatisoitu paineenpitotesti jokaiselle putkikammiolle ennen kokoonpanoa."
      - name: "Sauman kuorintatesti"
        spec: "Moottoroitu 180° kuorinta nopeudella 100 mm/min"
        desc: "Hitsattujen ja liimattujen saumojen kuorintalujuuden testaus ISO 6185 mukaan."
      - name: "Ksenon-kaari-ikääntymiskammio"
        spec: "2000 h altistus"
        desc: "UV-kestävyystesti värimuutokselle ja lujuuden säilymiselle."

