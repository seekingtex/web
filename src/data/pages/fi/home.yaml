hero:
  tagline: ''
  title: |
    Kumiveneiden tehdas — <br class="hidden sm:inline" />
    OEM/ODM <span class="text-accent dark:text-white">valmistaja</span>
  subtitle: |
    <span class="hidden sm:inline"><span class="font-semibold">Seekingtex</span> on Kiinassa toimiva OEM/ODM-valmistaja CE-sertifioiduille kumiveneille, SUP-laudoille, kajakeille, tekninen kangas-veneille ja meriturvallisuusvarusteille.</span>
    <span class="block mb-1 sm:hidden font-bold text-blue-600">Seekingtex: luotettava tehdas vuodesta 2012.</span>
    Palvelemme B2B-asiakkaita yli 50 maassa irtomyynnillä, yksityisellä merkillä, mukautetulla suunnittelulla ja täydellisillä toimitusketjuratkaisuilla.
  actions:
    - variant: primary
      text: Tutustu tuotteisiin
      href: /products
      icon: tabler:shopping-bag
    - text: Lue lisää
      href: '#features'
  image:
    src: ~/assets/images/hero-image.webp
    alt: Seekingtex-kuva
