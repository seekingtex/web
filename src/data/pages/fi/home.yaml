features:
  id: features
  tagline: Miksi Seekingtex
  title: Mitä saat Seekingtexilta
  subtitle: Vuosikymmenten meritekniikan kokemus tiivistettynä keskittyneeseen tuotevalikoimaan. Rakennettu kestäväksi, testattu merellä, tuettu koko elinkaaren ajan.
  columns: 2
  items:
    - title: Merikelpoiset materiaalit
      description: Kestävä PVC, Hypalon ja alumiinirungot valittu UV-, kulutus- ja suolavesikestävyyttä varten.
      icon: tabler:shield-check
    - title: Tuotantovalmiit laatu
      description: Jokainen runko painetestataan, jokainen hitsaus tarkastetaan. Lähetämme vain sen, minkä itse laittaisimme vesille.
      icon: tabler:certificate
    - title: Modulaarinen muotoilu
      description: Mukauta putkien asettelu, konsolin sijainti, polttoainekapasiteetti ja tarvikkeet tehtäväsi mukaan.
      icon: tabler:layout-grid
    - title: Rehelliset tekniset tiedot
      description: Todelliset kuormitusarvot, todelliset mitat, todellinen paino. Ei koskaan markkinointiliioittelua.
      icon: tabler:ruler-measure
    - title: Nopea toimitus ja varaosat
      description: Yleisimmät mallit lähtevät päivissä. Aidot varaosat ja tarvikkeet varastossa ympäri vuoden.
      icon: tabler:truck-delivery
    - title: Elinikäinen tuki
      description: Suora yhteys suunnittelutiimiimme teknisiin kysymyksiin, korjauksiin ja jälkiasennusneuvoihin.
      icon: tabler:lifebuoy
featured_products:
  id: featured
  title: Esittelyssä olevat tuotteet
  subtitle: Käsin poimittu nykyisestä tuotekuvastostamme — tämän kauden suosituimmat mallit.
  linkText: Katso kaikki tuotteet
  linkUrl: /products
content_workshop:
  isReversed: true
  tagline: Verstaalla
  title: Rungon piirustuksesta toimitukseen, jokainen vaihe on omassa talossa
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Laatua, jonka voit nähdä, tuntea ja mitata</h3>
  items:
    - title: Laivastarkkitehtien suunnittelema
      description: Runkojen linjat piirretään talon sisällä ja iteroidaan CFD-analyysillä ennen ensimmäistä prototyyppiä.
    - title: Hitsataan ja kootaan omassa tehtaassamme
      description: Putkien hitsaus, konsolien asennus ja varustelu tapahtuvat saman katon alla — hallitsemme laadun jokaisessa vaiheessa.
    - title: Testattu merellä ennen lähetystä
      description: Jokainen malli suorittaa monituntisen merikokeen, joka kattaa liukumisen, kääntymisen, huippunopeuden ja kuormankäsittelyn.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Seekingtex-tuotantovalmistamo
steps:
  title: Teknisistä tiedoista vesille viidessä vaiheessa
  items:
    - title: 'Vaihe 1: <span class="font-medium">Konfiguroi</span>'
      description: Valitse malli, valitse vaihtoehdot, pyydä tarjous verkossa tai puhelimitse. Tiimimme vastaa yhden työpäivän kuluessa.
      icon: tabler:list-numbers
    - title: 'Vaihe 2: <span class="font-medium">Vahvista</span>'
      description: Vahvistamme tekniset tiedot, toimitusajan ja kokonaiskustannukset kirjallisesti. Ei yllätyksiä, ei piilokuluja.
      icon: tabler:checks
    - title: 'Vaihe 3: <span class="font-medium">Rakenna</span>'
      description: Tuotanto alkaa verstallamme. Lähetämme edistymiskuvia tärkeimmissä vaiheissa.
      icon: tabler:tool
    - title: 'Vaihe 4: <span class="font-medium">Toimita</span>'
      description: Tuettu, kutistekäärritty ja lähetetty meriteitse tai lentoteitse. Tulliasiakirjat hoidetaan päästä päähän.
      icon: tabler:truck-loading
    - title: 'Vaihe 5: <span class="font-medium">Tue</span>'
      description: Kahden vuoden runkotakuu sekä elinikäinen tekninen tuki. Varaosat lähetetään 48 tunnin kuluessa.
      icon: tabler:headset
blog_latest:
  title: Päiväkirjasta
  information: |
    Artikkeleita, teknisiä muistiinpanoja ja tapaustutkimuksia suunnittelutiimiltä.
    Uusia kirjoituksia lisätään aina, kun projekti lähetetään, standardi päivitetään tai jollain on tarina kerrottavanaan.
faqs:
  title: Usein kysytyt kysymykset
  subtitle: Yleisiä kysymyksiä Seekingtex-kumiveneistä, takuista, toimituksesta ja OEM/ODM-kumppanuuksista. Jos kysymystäsi ei ole listalla, ota yhteyttä.
  columns: 2
  items:
    - title: Missä on Seekingtexin Yhdysvaltain varasto ja kuinka kauan toimitus kestää?
      description: "Yhdysvaltain varastomme sijaitsee Montclairissa, Kaliforniassa. Länsirannikko: 2–3 päivää. Keskinen USA: 3–4 päivää. Itärannikko: 4–5 päivää. Kansainvälinen toimitus on myös mahdollista — ota yhteyttä saadaksesi henkilökohtaisen tarjouksen."
      icon: tabler:truck-delivery
    - title: Mikä on Seekingtexin takuupolitiikka kumiveneille?
      description: "Seekingtexin kumivenetuotteet on katettu 5 vuoden rajoitetulla takuulla putkikankaan eheyden, saumojen ilmanpitävyyden, lasikuituisen rungon rakenteen ja täyttöventtiilien osalta. Tehtaalla asennetut lisävarusteet on katettu 1 vuoden ajan. Kaupallinen käyttö: 1 vuoden rajoitettu takuu. Täydelliset ehdot ovat saatavilla takuusivullamme."
      icon: tabler:shield-check
    - title: Sisältyykö Seekingtex-veneisiin rekisteröintiasiakirjat?
      description: Kyllä, jokainen Seekingtex-kumivene sisältää tarvittavat asiakirjat rekisteröintiä varten. Valmistajan alkuperätodistus löytyy omistajan käsikirjan takasivulta, ja ladattava kopio on saatavissa pyynnöstä. Yhdysvaltain rannikkovartioston hyväksymä valmistus.
      icon: tabler:file-text
    - title: Ovatko Seekingtex-veneet Yhdysvaltain rannikkovartioston hyväksymiä?
      description: "Kyllä, Seekingtex-kumiveneet on Yhdysvaltain rannikkovartioston (USCG) hyväksymiä valmistusta varten. Tehtaallamme on myös CE-sertifiointi EU-markkinoille ja  -sertifiointi."
      icon: tabler:flag
    - title: Mitä teen, jos tuotteen pakkaus saapuu vahingoittuneena?
      description: Jos Seekingtex-tuotteen pakkaus saapuu vahingoittuneena, kieltäydy toimituksesta ja palauta paketti lähettäjälle. Ota yhteyttä tukitiimiimme, ja lähetämme sinulle nopeasti korvaavan tuotteen.
      icon: tabler:package
    - title: Mitä teen, jos tuote ei saavu arvioituun toimituspäivään mennessä?
      description: Seekingtexin ilmoittamat toimitusajat ovat arvioita, eikä niitä voida taata. Kun paketti on lähetetty, sen vastaanotto on asiakkaan vastuulla. Jos paketti jätetään sovittuun toimitusosoitteeseen, omistajuus siirtyy luovutuksen yhteydessä.
      icon: tabler:calendar-clock
