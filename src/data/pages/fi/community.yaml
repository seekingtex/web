stories:
  tagline: 'Tutkimusmatkailijoiden tarinoita'
  title: 'Todellisia seikkailuja oikeilta ihmisiltä'
  subtitle: 'Kuule melojilta, perheiltä ja ammattilaisilta, jotka käyttävät Seekingtex-varusteita vesillä.'
  items:
    - name: 'Sarah & Mike'
      title: 'SUP Explorer 11 -omistajat, Kanada'
      content: 'Veimme Explorer 11 -lautamme viikon mittaiselle retkelle Algonquin Parkiin. Ne selvisivät kanootin kantamisista ja järvenylityksistä kauniisti. Drop-stitch -rakenne mahdollisti täyttämisen 15 PSI:hen ja kovalautaisen suorituskyvyn saattoi saada pakattavasta laudasta.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Algonquin Park, Kanada'
    - name: 'Carlos R.'
      title: 'Cheetah Surge -ajaja, Espanja'
      content: 'Cheetah Surge on minun valintani rannikkoristeilyihin. Eloisa muotoilu herättää huomiota rannalla, ja vakaus antaa minulle itseluottamusta kevyessä aallokossa. Se käyttäytyy kauniisti, olenpa sitten retkeilemässä tai vain nauttimassa auringonlaskusta.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Espanja'
    - name: 'Lina ja perhe'
      title: 'Flowing Lotus -melojat, Ruotsi'
      content: 'Viikonlopun perheseikkailuja saaristossa. Flowing Lotus on riittävän vakaa, jotta tyttäreni voi seisoa sillä meloessani. Täyttyy alle 10 minuutissa — ei perävaunua tarvita, pelkkää perheen hauskanpitoa vesillä.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Tukholman saaristo, Ruotsi'
    - name: 'Lt. Cmdr. Andres'
      title: 'Ocean Voyager -tutkimusmatkailija, Filippiinit'
      content: 'Käytän Ocean Voyageriani pitkän matkan rannikkoretkiin Palawanin ympärillä. Kuukausien päivittäisen käytön jälkeen trooppisissa olosuhteissa lauta toimii edelleen kuin uusi. Retkeilymuoto leikkaa aallokon, joka pysäyttäisi vähemmät laudat.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filippiinit'
    - name: 'Emma T.'
      title: 'Tropical Breeze -aloittelija, Australia'
      content: 'En ollut koskaan ollut SUP-laudalla ennen. Tropical Breeze on niin vakaa, että tunsin oloni varmaksi heti ensimmäisellä kerralla. Nyt tekstiili joka viikonloppu. Oppimiskäyrä on käytännössä olematon — ja lauta näyttää upealta vesillä.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Australia'

