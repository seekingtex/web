tests:
  - title: Painetestaus
    description: Täytettäviä kammioita altistetaan niiden suositeltuja käyttörajoja korkeammille paineille pitkien ajanjaksojen ajan. Tämä varmistaa materiaalin ja saumojen ilmatiiviyden sekä rakenteellisen eheyden varmistaen, että tuote kestää aiottua käyttöä ja mahdollista ylitäyttöä ilman vikoja tai vuotoja.
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: Iskunkestävyystestaus
    description: Tuotteita altistetaan hallituille iskuille eri painoista ja kulmista. Tämä arvioi materiaalin kestävyyttä puhkaisuja, repeämiä ja törmäysvaurioita vastaan vedessä, osoittaen kestävyyttä ja pitkäikäisyyttä.
    image: /images/seekingtex/factory/producing department.jpeg
  - title: UV-kestävyystestaus
    description: Lopputuotteita altistetaan simuloidulle auringonvalolle pitkiä aikoja materiaalin heikkenemiskestävyyden, haalistumisen ja UV-altistuksen aiheuttaman heikkenemisen arvioimiseksi —kriittistä trooppisissa ja runsasaurinkoisissa ympäristöissä käytettäville veneille.
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: Kulutuskestävyystestaus
    description: Materiaalinäytteitä hangataan hankaavia pintoja vastaan määrätyn määrän jaksoja hallitussa paineessa. Tämä mittaa materiaalin kykyä kestää kulutusta toistuvasta käytöstä, kosketuksesta hiekkaan, kiviin tai muihin pintoihin varmistaen pitkäaikaisen kestävyyden.
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: Matalan lämpötilan suorituskykytestaus
    description: Tuotteita testataan kylmissä ympäristöissä toimivuuden ja kestävyyden arvioimiseksi eri lämpötilaolosuhteissa, estäen jäykistymistä tai halkeilua kylmemmissä vesissä. Välttämätöntä talvi- tai korkealeveysasteilla käytettäville veneille.
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: Kelluvuus- ja kuormankapasiteettitestaus
    description: Tuotteita testataan eri painoilla niiden maksimaalisen kantokyvyn määrittämiseksi ja sen varmistamiseksi, että ne tukevat turvallisesti käyttäjiä ja varusteita. Jokaisen mallin ilmoitettu kapasiteetti varmennetaan ennen julkaisua.
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: Ohjattavuustestaus
    description: Tuotteita testataan niiden reagointikyvyn suhteen melonta- tai moottorisyötteisiin, arvioiden kääntösädettä ja käsiteltävyyttä. Vesikokeet varmistavat, että todellinen käsiteltävyys vastaa suunnitteluvaatimuksia.
    image: /images/seekingtex/factory/sup making.jpeg
  - title: Vesitiiviystestaus
    description: Täysin koottuja tuotteita upotetaan tai altistetaan vesisuihkulle vuotojen tarkistamiseksi saumoista, venttiileistä tai materiaaleista. Jokainen kangas läpäisee pakollisen vesitiiviystarkastuksen ennen lähetystä.
    image: /images/seekingtex/factory/producing department2.jpeg

