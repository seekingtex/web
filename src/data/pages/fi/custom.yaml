hero:
  tagline: Seekingtex Räätälöity Lab
  title: Suunnittele oma<br />vesialuksesi
  subtitle: OEM-, ODM-, yksityisen etiketin ja räätälöidyn brändäyksen palvelut yrityksille maailmanlaajuisesti. Yhdestä prototyypistä täyteen tuotantosarjaan.
  cta: Aloita projektisi
  footer_link: /contact

steps_section:
  tagline: Kuinka se toimii
  title: Konseptista tuotantoon
  subtitle: Neljä vaihetta ideastasi valmiiseen, merivalmiiseen tuotteeseen.
  steps:
    - num: '01'
      title: Valitse lautasi
      desc: Valitse ydinkuvioistamme — SUP, kajakki, jolla tai tekninen kangas. Valitse koko, materiaali ja väri.
    - num: '02'
      title: Lähetä suunnitelmasi
      desc: Lähetä meille logosi, taide tai brändiohjeistus. Suunnittelutiimimme valmistaa digitaalisen vedoksen.
    - num: '03'
      title: AI-mockupin tarkastelu
      desc: Katso fotorealistinen AI-tuotettu mallinnus räätälöidystä laudastasi ennen tuotannon aloitusta.
    - num: '04'
      title: Tuotanto ja toimitus
      desc: Hyväksynnän jälkeen tilauksesi siirtyy ISO-sertifioidulle tuotantolinjalle. Toimitusaika alkaen 30 päivästä.

services_section:
  tagline: Palvelut
  title: Valmistuspalvelut maailmanlaajuisille brändeille
  subtitle: Joustavat yhteistyömallit — sopimusvalmistuksesta täyden palvelun brändinrakennukseen.
  items:
    - title: OEM-valmistus
      desc: Tuotamme suunnitelmasi määrittelyjen mukaan — sinun IP:si, piirustuksesi, laatustandardisi. Täysi NDA-suoja.
      icon: ⚙️
    - title: ODM-ratkaisut
      desc: Valitse yli 50 todistetusta alustasta ja räätälöi koko, väri, grafiikka ja pakkaus.
      icon: '🎨'
    - title: Yksityinen etiketti
      desc: Sinun brändisi meidän tuotteissamme — logo, pakkaus, hintalaput, oppaat. Vähittäismyyntivalmis suoraan laatikosta.
      icon: 🏷️
    - title: Räätälöity brändäys
      desc: Kansipohjan painatus, runkografiikka, putkidekalit ja räätälöidyt tarrat — täysi brändi-integraatio.
      icon: ✨

capabilities_section:
  tagline: Kyvykkyydet
  title: Tuotanto- ja räätälöintikyvykkyydet
  subtitle: Kaikki mitä sinun tarvitsee tietää ennen tilauksen tekemistä.
  capabilities:
    - label: Tilausmäärä
      value: MOQ 5–10 yksikköä (SUP/kajakki), 2–5 yksikköä (tekninen kangas)
    - label: Toimitusaika
      value: 30–45 päivää vakio; 15–20 päivää prototyypeille
    - label: Räätälöinti
      value: Koko, muoto, väri, grafiikka, pakkaus, varusteet
    - label: Materiaalit
      value: PVC, Hypalon, drop-stitch, lasikuitu, alumiini
    - label: Painatus
      value: Digitaalinen (CMYK), silkkipaino, lämpösiirto, sublimointi
    - label: Sertifiointi
      value: CE, UKCA, FCC (tuki maailmanlaajuiselle vaatimustenmukaisuudelle)

