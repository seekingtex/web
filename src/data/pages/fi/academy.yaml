hero:
  tagline: Seekingtex-akatemia
  title: Oppimiskeskus
  subtitle: Oppaita ja opetusohjelmia jokaiselle taitotasolle — SUP-perusteista edistyneisiin pelastustekniikoihin

categories:
  - level: Aloittelija
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: SUP-perusteet
        desc: Opi seisontamelontalautailun perusteet — asento, melan veto ja tasapaino.
        slug: sup-basics
      - title: Melatekniikat
        desc: Eteenpäin veto, kaariveto, sivuveto ja matala tuki — hallitse olennaiset melontaliikkeet.
        slug: paddle-techniques
      - title: Turvallisuus ensin
        desc: Keskeiset turvallisuuskäytännöt, mukaan lukien säätarkistukset, pelastusliivien käyttö, melan narusäännöt ja itsensä pelastaminen.
        slug: safety-first
  - level: Keskitaso
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Retkeilyn perusteet
        desc: Monen tunnin melontaretkien suunnittelu — navigointi, nesteytys, rytmitys ja tuuliennusteiden lukeminen.
        slug: touring-essentials
      - title: Säätilan lukeminen
        desc: Tulkitse merisääennusteita, tunnista pilvikuviot ja ymmärrä tuulen vaikutukset veteen.
        slug: weather-reading
      - title: Navigoinnin perusteet
        desc: Kartanluku, kompassin käyttö, GPS-reittipisteet ja reittisuunnittelu rannikkomelontaan.
        slug: navigation-basics
      - title: Vuorovesitietoisuus
        desc: Vuorovesijaksojen, virtausten ja niiden vaikutuksen ymmärtäminen lähtöaikaan ja reititykseen.
        slug: tidal-awareness
  - level: Edistynyt
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Monipäiväisen retken suunnittelu
        desc: Retkikunnan logistiikka — varustevalinta, ruokasuunnittelu, turvallisuusprotokollat ja hätäyhteystiedot.
        slug: multi-day-trip-planning
      - title: Pelastustekniikat
        desc: Itsensä pelastaminen, T-pelastus, eskimo-pelastus kajakeille ja hinausprotokollat avovedessä.
        slug: rescue-techniques
      - title: Yömelonta
        desc: Navigointi pimeällä — valaistusvaatimukset, reittimuisti, ryhmäviestintä ja vaaratietoisuus.
        slug: night-paddling
  - level: Ylläpito
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Puhdistus ja hoito
        desc: Makealla vedellä huuhtelu, UV-suojaus, homeen esto ja oikeat kuivaustekniikat jokaisen käyttökerran jälkeen.
        slug: cleaning-and-care
      - title: Säilytysohje
        desc: Parhaat käytännöt kumilautojen ja -veneiden säilytykseen — tyhjennys, taittelu, lämpötilan hallinta ja säilyvyys.
        slug: storage-guide
      - title: Korjauksen perusteet
        desc: Korjaa pienet puhkeamat, saumavuodot ja venttiiliongelmat PVC-korjaussarjoilla ja paikkaustekniikoilla.
        slug: repair-basics
      - title: Venttiilien huolto
        desc: Tunnista venttiilityypit (Halkey-Roberts, Boston, Leafield), puhdista roskat ja vaihda vialliset varret.
        slug: valve-maintenance

