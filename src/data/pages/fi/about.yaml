hero:
  tagline: Meistä
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: Seekingtex-tehdas ja työpaja
  title: |
    Meritekniikkaa, <br />
    rakennettu <span class="text-accent dark:text-white">Seekingtex</span>-tavalla
  subtitle: 'Aloitimme rannikkopajassa yhdellä veneellä ja itsepäisellä uskomuksella: merituotteiden tulee olla suunniteltuja huolella, koska ne ovat tärkeitä. Nykyään toimitamme yli 40 maahan, mutta jokainen runko kulkee edelleen samojen käsien läpi, jotka perustivat yrityksen.'

stats:
  title: Lukuina
  columns: 4
  stats:
    - title: Toimitettuja runkoja
      amount: '2,400+'
    - title: Maita, joihin toimitetaan
      amount: '40'
    - title: Yhdistetty kokemus vuosina
      amount: '60'
    - title: Keskimääräinen takuuvaste (tunteja)
      amount: '24'

features3_what_we_build:
  title: Mitä rakennamme
  subtitle: Keskittynyt tuotevalikoima, jonka tunnemme perusteellisesti — ei puolivalmiita kokeiluja, ei merkkituotteiden uudelleenbrändäystä.
  columns: 3
  isBeforeContent: true
  items:
    - title: tekninen kangas-veneet
      description: Alumiinirunkoiset tekninen kangas-veneet 3,3 m – 7,5 m. Suunniteltu partiointiin, sukellukseen, kalastukseen ja perhekäyttöön.
      icon: tabler:ship
    - title: Kumiveneet
      description: PVC- ja Hypalon-kumiveneet 2,4 m – 4,2 m. Kevyitä, kestäviä ja helppoja säilyttää.
      icon: tabler:speedboat
    - title: Superjahtien tenderit
      description: Kompaktit, huippuluokan tekninen kangas-veneet, jotka on rakennettu vastaamaan emoaluksesi ilmettä.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Varusteet
      description: Airot, pumput, suojat, kuivalaukut, polttoainesäiliöt ja elektroniikka. Kaikki yhteensopivia veneidemme kanssa.
      icon: tabler:package
    - title: Kunnostus ja korjaus
      description: Oma putkien vaihto, elektroniikan päivitys ja moottoripäivitykset.
      icon: tabler:tool
    - title: Räätälöidyt rakennusprojektit
      description: Projekti kerrallaan suunnittelua kaupallisiin, tieteellisiin ja sotilaallisiin tarpeisiin.
      icon: tabler:hammer
  image:
    src: /images/seekingtex/factory/design discuss2.jpeg
    alt: Veneen suunnittelu- ja insinöörityökeskustelu

steps2_values:
  title: Arvomme
  subtitle: Kolme periaatetta, jotka ovat muokanneet jokaista tuotetta ensimmäisestä päivästä lähtien.
  items:
    - title: Rakenna kuin se kantaisi perhettäsi
      description: Jokaista runkoa, hitsiä ja kiinnitintä käsitellään kuin oma perheemme käyttäisi sitä.
      icon: tabler:heart
    - title: Suunnittele ennen kuin myymme
      description: Jos määrittely on väärä, muutamme määrittelyä — emme koskaan asiakasta.
      icon: tabler:settings
    - title: Tuki, joka kestää takuuta pidempään
      description: Kaksikymmentä vuotta vanhat rungot soittavat edelleen meille varaosia varten, ja vastaamme yhä.
      icon: tabler:headset

steps2_milestones:
  title: Virstanpylväät
  subtitle: Lyhyt versio Seekingtexin tarinasta.
  isReversed: true
  items:
    - title: Perustettu rannikkopajassa
      description: Kahden laivainsinöörin perustama, CNC-koneella ja itsepäisellä idealla.
      icon: tabler:building-factory
    - title: Ensimmäiset 1 000 runkoa toimitettu
      description: Saavutettu seitsemäntenä vuotena, pääasiassa puskaradion ja toistuvien asiakkaiden kautta.
      icon: tabler:circle-check
    - title: Kansainvälinen vientiohjelma
      description: Toimitamme nyt yli 40 maahan, paikallisia tukikumppaneita viidellä mantereella.
      icon: tabler:world

features2_locations:
  title: Toimipisteemme
  tagline: Löydä meidät
  columns: 3
  items:
    - title: Pääkonttori ja työpaja
      description: Rannikon teollisuuspuisto, rakennus 4 — avoinna ma–pe vierailuille sopimuksen mukaan.
    - title: EU-huoltokeskus
      description: Välimeren satama — kunnostus, korjaus ja takuutuki Euroopan asiakkaille.
    - title: APAC-kumppaniverkosto
      description: Valtuutetut huoltokumppanit Australiassa, Japanissa, Singaporessa ja Hongkongissa.
