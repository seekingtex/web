hero:
  tagline: Elämäntapa
  title: Seekingtex-<br />elämäntapa
  subtitle: Rakennettu niille, jotka elävät vesillä — viikonloppuseikkailijoista kaupallisiin toimijoihin, jotka luottavat varusteisiinsa päivittäin.

values:
  - icon: 🌊
    title: Syntynyt vedellä
    desc: Jokainen muotoilu alkaa veden käyttäytymisen ymmärtämisestä. Suunnittelemme olosuhteiden reunamilta sisäänpäin — koska tekstiili on opettajamme, ei työpaikkamme.
  - icon: 🔧
    title: Rakennettu kestämään
    desc: "Kestävin tuote on se, jota ei tarvitse vaihtaa. Merikelpoiset materiaalit, 15 PSI:hin luokitellut tikaturt ytimet ja saumat, jotka kestävät kautta pidempään."
  - icon: '🏆'
    title: Saavutettava muotoilu
    desc: Vesiliikunnan ei pitäisi olla luksusta. Ammattilaistason suorituskyky hintaan, joka on järkevä perheille, oppaille ja pienille toimijoille — ei vain kaupallisille laivastoille.
  - icon: 🌍
    title: Maailmanlaajuinen yhteisö
    desc: "Qingdaon rannikolta Euroopan järviille, Kaakkois-Aasian joille ja Amerikanlahdille — asiakkaitamme yhdistää yksi asia: rakkaus vesillä oloon."
  - icon: ♻️
    title: Vastuullinen valmistus
    desc: CNC-optimoitu asettelu vähentää materiaalihävikin alle 5 %. Kestävä rakenne vähentää vaihtosyklejä. Rakennamme pitkäikäisyyttä, koska se on kestävin valinta.
  - icon: 🤝
    title: Tuki, joka kestää
    desc: 20 vuotta vanhat rungot soittavat yhä varaosien perässä. Takuuvastauksemme keskimääräinen aika on 24 tuntia. Emme katoa kaupan jälkeen — olemme täällä tuotteen koko eliniän ajan.

