hero:
  tagline: '螕谓蠋蟽畏 螘尉蔚蟻蔚蠉谓畏蟽畏蟼 螡蔚蟻慰蠉'
  title: '螠维胃蔚蟿蔚'
  subtitle: |
    螣未畏纬慰委, 蟽蔚渭喂谓维蟻喂伪 魏伪喂 尾伪胃喂苇蟼 魏伪蟿伪未蠉蟽蔚喂蟼 鈥斚屛晃?蠈蟽伪 蠂蟻蔚喂维味蔚蟽蟿蔚 纬喂伪 谓伪 蔚尉蔚蟻蔚蠀谓萎蟽蔚蟿蔚<br />
    蟿慰 谓蔚蟻蠈 渭蔚 伪蠀蟿慰蟺蔚蟺慰委胃畏蟽畏. 螒蟺蠈 蟿畏谓 蔚蟺喂位慰纬萎 蟿慰蠀 蟺蟻蠋蟿慰蠀 蟽伪蟼 SUP 苇蠅蟼 蟺蟻慰畏纬渭苇谓蔚蟼 蟿蔚蠂谓喂魏苇蟼.
  taglineSection: '螕谓蠋蟽畏 纬喂伪 魏维胃蔚 魏蠅蟺畏位维蟿畏. 螒蟺蠈 伪蟻蠂维蟻喂慰 苇蠅蟼 蔚蟺伪纬纬蔚位渭伪蟿委伪.'

featured:
  tagline: '螤蟻慰蟿蔚喂谓蠈渭蔚谓伪 螛苇渭伪蟿伪'
  title: '螢蔚魏喂谓萎蟽蟿蔚 蟿慰 渭伪胃畏蟽喂伪魏蠈 蟽伪蟼 蟿伪尉委未喂'
