      description: '螌位伪 蠈蟽伪 蟺蟻苇蟺蔚喂 谓伪 纬谓蠅蟻委味蔚喂 苇谓伪蟼 伪蟻蠂维蟻喂慰蟼 鈥斚勏嵪€慰喂 蟽伪谓委未蠅谓, 渭苇纬蔚胃慰蟼 魏慰蠀蟺喂慰蠉, 蟽蟿维蟽畏 魏伪喂 蟽蠀渭尾慰蠀位苇蟼.'
      icon: 'tabler:lifebuoy'
      href: '/learn/fabrics'
    - title: '桅慰蠀蟽魏蠅蟿蠈 vs 危魏位畏蟻萎 危伪谓委未伪'
      description: '螤慰喂慰 蔚委谓伪喂 魏伪蟿维位位畏位慰 纬喂伪 蔚蟽维蟼; 危蠀纬魏蟻委谓慰蠀渭蔚 蠁慰蟻畏蟿蠈蟿畏蟿伪, 伪蟺蠈未慰蟽畏 魏伪喂 伪谓胃蔚魏蟿喂魏蠈蟿畏蟿伪.'
