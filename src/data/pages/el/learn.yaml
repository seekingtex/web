      href: '/compare/inflatable-vs-hardboard'
    - title: '螒蟽蠁维位蔚喂伪 螡蔚蟻慰蠉'
      description: '螔伪蟽喂魏萎 纬谓蠋蟽畏 伪蟽蠁伪位蔚委伪蟼 鈥斘何蔽瓜佅屜? PFD, 伪蠀蟿慰未喂维蟽蠅蟽畏 魏伪喂 维位位伪.'
      icon: 'tabler:shield'
      href: '/learn/quality-standards'
    - title: '螣未畏纬蠈蟼 违位喂魏蠋谓'
      description: 'PVC vs Hypalon, 蟿蔚蠂谓慰位慰纬委伪 drop-stitch 鈥斘何毕勎蔽轿课兿勎?伪蟺蠈 蟿喂 蔚委谓伪喂 蠁蟿喂伪纬渭苇谓慰蟼 慰 蔚尉慰蟺位喂蟽渭蠈蟼 蟽伪蟼.'
      icon: 'tabler:molecules'
      href: '/learn/materials'
    - title: '螣未畏纬蠈蟼 螠蔚纬苇胃慰蠀蟼 SUP'
      description: '螔蟻蔚委蟿蔚 蟿慰 蟽蠅蟽蟿蠈 渭萎魏慰蟼, 蟺位维蟿慰蟼 魏伪喂 蠈纬魏慰 蟽伪谓委未伪蟼 纬喂伪 蔚蟽维蟼.'
      icon: 'tabler:ruler'
      href: '/size-guide'
    - title: '螘谓未喂维渭蔚蟽蔚蟼 韦蔚蠂谓喂魏苇蟼'
      description: '螒谓蔚尾维蟽蟿蔚 蔚蟺委蟺蔚未慰 渭蔚 蟺蟻慰畏纬渭苇谓蔚蟼 魏喂谓萎蟽蔚喂蟼 魏伪喂 蟿蔚蠂谓喂魏苇蟼 蟽蟿蟻慰蠁萎蟼.'
