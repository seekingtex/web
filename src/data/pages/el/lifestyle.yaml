hero:
  tagline: Τρόπος ζωής
  title: Τρόπος ζωής<br />Seekingtex
  subtitle: Φτιαγμένο για όσους ζουν στο νερό — από εξερευνητές των Σαββατοκύριακων έως επαγγελματίες χειριστές που βασίζονται στον εξοπλισμό τους καθημερινά.

values:
  - icon: 🌊
    title: Γεννημένοι από το νερό
    desc: Κάθε σχέδιο ξεκινά με την κατανόηση του πώς συμπεριφέρεται το νερό. Σχεδιάζουμε από τα όρια των συνθηκών προς τα μέσα — επειδή ο ωκεανός είναι ο δάσκαλός μας, όχι ο χώρος εργασίας μας.
  - icon: 🔧
    title: Κατασκευασμένα για να διαρκούν
    desc: Το πιο βιώσιμο προϊόν είναι αυτό που δεν χρειάζεται αντικατάσταση. Υλικά υφαντουργικόιας ποιότητας, πυρήνες drop-stitch που αντέχουν 15 PSI και ραφές που διαρκούν όλη τη σεζόν.
  - icon: '🏆'
    title: Προσβάσιμα εκ σχεδιασμού
    desc: Τα κλωστοϋφαντουργία δεν θα έπρεπε να είναι πολυτέλεια. Επαγγελματική απόδοση σε τιμή που έχει νόημα για οικογένειες, εκπαιδευτές και μικρούς χειριστές — όχι μόνο για εμπορικούς στόλους.
  - icon: 🌍
    title: Παγκόσμια κοινότητα
    desc: "Από τις ακτές του Qingdao έως τις λίμνες της Ευρώπης, τα ποτάμια της Νοτιοανατολικής Ασίας και τους κόλπους της Αμερικής — τους πελάτες μας ενώνει ένα πράγμα: η αγάπη για το νερό."
  - icon: ♻️
    title: Υπεύθυνη παραγωγή
    desc: Η βελτιστοποιημένη κοπή CNC μειώνει τα απόβλητα υλικών κάτω από 5%. Η ανθεκτική κατασκευή μειώνει τους κύκλους αντικατάστασης. Χτίζουμε με γνώμονα τη μακροζωία, επειδή αυτή είναι η πιο βιώσιμη επιλογή.
  - icon: 🤝
    title: Υποστήριξη που διαρκεί
    desc: Σκάφη είκοσι ετών ακόμα μας τηλεφωνούν για ανταλλακτικά. Ο χρόνος απόκρισης εγγύησης είναι κατά μέσο όρο 24 ώρες. Δεν εξαφανιζόμαστε μετά την πώληση — είμαστε εδώ για όλη τη διάρκεια ζωής του προϊόντος.

