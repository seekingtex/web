hero:
  tagline: "Εξοπλισμός"
  title: "Εξοπλισμός και Μηχανήματα Παραγωγής"
  subtitle: "Βιομηχανικός εξοπλισμός για κοπή, συγκόλληση, εκτύπωση και συναρμολόγηση"
  back_label: "Πίσω στο Εργοστάσιο"
  back_link: /factory

categories:
  - title: "Κοπή & Προετοιμασία Υλικών"
    items:
      - name: "Αυτόματο Μηχάνημα Κοπής PVC"
        spec: "Ελεγχόμενο CNC, 6.5 m × 2.5 m, ακρίβεια 0.1 mm"
        desc: "Αυτόματο μηχάνημα κοπής ελεγχόμενο από υπολογιστή για υφάσματα PVC, Hypalon και drop-stitch. Το λογισμικό nesting βελτιστοποιεί την αξιοποίηση υλικού σε λιγότερο από 5% απόβλητα."
      - name: "Απλωτήρας Υφάσματος"
        spec: "Μέγιστο πλάτος 3 m, τροφοδοσία ελεγχόμενης τάσης"
        desc: "Απλώνει το ύφασμα σε μονές ή πολλαπλές στρώσεις με ελεγχόμενη τάση για την αποφυγή παραμόρφωσης πριν την κοπή."
  - title: "Συγκόλληση & Σύνδεση Σωλήνων"
    items:
      - name: "Μηχάνημα Θερμοσφράγισης"
        spec: "Συγκόλληση θερμού αέρα, μεταβλητό 200–600 °C, 0.5–5 m/min"
        desc: "Μηχάνημα θερμοσφράγισης με θερμό αέρα για σύνδεση και συγκόλληση ραφών σωλήνων PVC και Hypalon. Χρησιμοποιείται για σταθεροποίηση, σφράγιση και τήξη θαλάμων σωλήνων και ενώσεων επίπλευσης."
      - name: "Διηλεκτρική Πρέσα RF"
        spec: "15 kW, πλάκα 2000 × 600 mm"
        desc: "Πρέσα συγκόλλησης υψίσυχνων για κύριες διαμήκεις ραφές, ενώσεις κατασκευής-προς-σωλήνα και κατασκευή μεγάλων θαλάμων."
      - name: "Συγκολλητής RF Ελεγχόμενος CNC"
        spec: "8 kW, τραπέζι XY 2500 × 1200 mm"
        desc: "Προγραμματιζόμενη συγκόλληση καμπύλων ραφών για σύνθετα γεωμετρικά σχήματα, εμπίεση λογότυπων και ακριβής επιδιόρθωση."
  - title: "Κατασκευή Γάστρας τεχνικό ύφασμα"
    items:
      - name: "Καλούπια Χειροποίητης Στρώσης Ίνας Γυαλιού"
        spec: "Πολλαπλά καλούπια για γάστρες τεχνικό ύφασμα έως 6 m LOA"
        desc: "Παραδοσιακή χειροποίητη στρώση ίνας γυαλιού με συστήματα ρητίνης πολυεστέρα και βινυλεστέρα. Κάθε στρώση τυλίγεται στο χέρι και συσκευάζεται με κενό για συνεπή ποιότητα και αντοχή του στρώματος."
      - name: "Θάλαμος Ψεκασμού Gelcoat"
        spec: "Ελεγχόμενη θερμοκρασία, φιλτραρισμένος αερισμός"
        desc: "Εφαρμογή gelcoat σε γάστρες τεχνικό ύφασμα. Παρέχει γυαλιστερό, ανθεκτικό στην UV επίστρωση με ακριβή έλεγχο πάχους."
      - name: "CNC Router (5 αξόνων)"
        spec: "Χώρος 3 m × 2 m × 1 m, άξονας ψυχόμενος με νερό"
        desc: "Κατεργασία εισαγωγών γάστρας, καλουπιών κονσόλας, βάσεων καθισμάτων και προσαρμοσμένων στηριγμάτων."
  - title: "Εκτύπωση & Διακόσμηση SUP"
    items:
      - name: "Ψηφιακός Εκτυπωτής"
        spec: "Inkjet υψηλής ανάλυσης, πλάτος εκτύπωσης έως 2 m"
        desc: "Άμεση ψηφιακή εκτύπωση σε ύφασμα για γραφικά καταστρώματος SUP πλήρους χρώματος. Εκτυπώνει προσαρμοσμένα μοτίβα, διαβαθμίσεις και εικόνες φωτογραφικής ποιότητας με μελάνια με βάση το νερό ανθεκτικά στην UV."
      - name: "Μηχάνημα Μεταξοτυπίας"
        spec: "Χειροκίνητο και ημιαυτόματο, πολυχρωματική ευθυγράμμιση"
        desc: "Μεταξοτυπία για λογότυπα σανίδων SUP, εμπορικά σήματα και επαναλαμβανόμενα μοτίβα. Παρέχει ανθεκτικές, αδιαφανείς εκτυπώσεις με ζωντανό κορεσμό χρώματος."
  - title: "Συναρμολόγηση & Εξοπλισμός"
    items:
      - name: "Γερανός Κινητήρα"
        spec: "Χωρητικότητα 500 kg, ρυθμιζόμενη μπάρα διαστολής"
        desc: "Ασφαλής τοποθέτηση εξωλέμβων κινητήρων από 2.5 έως 60 hp."
      - name: "Πλαίσιο Προσομοίωσης Κονσόλας"
        spec: "Ρυθμιζόμενο ύψος και γωνία"
        desc: "Προσυναρμολόγηση τιμονιού, γκαζιού και πινάκων οργάνων πριν την εγκατάσταση."
      - name: "Υδραυλικό Πιεστήριο Σωλήνων"
        spec: "Έως 1\" ID, ψηφιακός μετρητής πίεσης"
        desc: "Σύνολα υδραυλικών σωλήνων τιμονιού προσαρμοσμένου μήκους με πρεσαριστά εξαρτήματα."
      - name: "Πίνακας Ηλεκτρικής Καλωδίωσης"
        spec: "3 m × 1.5 m, προτυπωμένα διαγράμματα καλωδίωσης"
        desc: "Συναρμολόγηση και δοκιμή ολοκληρωμένων ηλεκτρικών καλωδιώσεων εκτός ύφασμαυς."
  - title: "Δοκιμή & Έλεγχος Ποιότητας"
    items:
      - name: "Καθολικός Δοκιμής Εφελκυσμού"
        spec: "50 kN, ASTM D751"
        desc: "Δοκιμή δύναμης θραύσης, επιμήκυνσης κατά τη θραύση και εξάπλωσης σχισίματος για παρτίδες υφασμάτων."
      - name: "Σταθμός Δοκιμής Συγκράτησης Αέρα"
        spec: "Προγραμματιζόμενο, διατήρηση πίεσης 30 λεπτά"
        desc: "Αυτοματοποιημένη δοκιμή διατήρησης πίεσης για κάθε θάλαμο σωλήνα πριν τη συναρμολόγηση."
      - name: "Δοκιμή Αποφλοίωσης Ραφής"
        spec: "Κινητήρος αποφλοίωσης 180° στα 100 mm/min"
        desc: "Δοκιμή αντοχής αποφλοίωσης συγκολλημένων και κολλημένων ραφών σύμφωνα με ISO 6185."
      - name: "Θάλαμος Γήρανσης Τόξου Ξένου"
        spec: "2000 h έκθεση"
        desc: "Δοκιμή αντοχής στην UV για αλλαγή χρώματος και διατήρηση αντοχής."

