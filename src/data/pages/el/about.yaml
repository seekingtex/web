hero:
  tagline: Σχετικά με την εταιρεία
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: Εργαστήριο Seekingtex
  title: |
    Ναυτική μηχανική <br />
    σε στιλ <span class="text-accent dark:text-white">Seekingtex</span>
  subtitle: 'Ξεκινήσαμε σε ένα παραυφαντουργικόιο εργαστήριο με ένα ύφασμας και μια ακλόνητη πεποίθηση: τα υφαντουργικόια προϊόντα πρέπει να σχεδιάζονται σαν να εξαρτώνται ζωές από αυτά – γιατί έτσι είναι. Σήμερα, εξάγουμε σε 40+ χώρες, αλλά κάθε γάστρα περνά ακόμα από τα ίδια χέρια που ίδρυσαν την εταιρεία.'

stats:
  title: Με αριθμούς
  columns: 4
  stats:
    - title: Παραδοθείσες γάστρες
      amount: '2,400+'
    - title: Χώρες παράδοσης
      amount: '40'
    - title: Συνολική εμπειρία (έτη)
      amount: '60'
    - title: Μέσος χρόνος απόκρισης (ώρες)
      amount: '24'

features3_what_we_build:
  title: Τι κατασκευάζουμε
  subtitle: Μια εστιασμένη σειρά προϊόντων που γνωρίζουμε άριστα – χωρίς μισές λύσεις ή badge engineering.
  columns: 3
  isBeforeContent: true
  items:
    - title: Σκάφη τεχνικό ύφασμα
      description: τεχνικό ύφασμα με αλουμινένια γάστρα από 3,3 m έως 7,5 m. Σχεδιασμένα για περιπολία, καταδύσεις, ψάρεμα και οικογενειακή χρήση.
      icon: tabler:ship
    - title: Φουσκωτά ύφασμα
      description: Φουσκωτά ύφασμα από PVC και Hypalon από 2,4 m έως 4,2 m. Ελαφριά, ανθεκτικά και εύκολα στην αποθήκευση.
      icon: tabler:speedboat
    - title: Tender superyacht
      description: Συμπαγή τεχνικό ύφασμα υψηλών προδιαγραφών, κατασκευασμένα κατά παραγγελία για το σχέδιο του μητρικού ύφασμαυς.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Αξεσουάρ
      description: Ιμάντες, αντλίες, καλύμματα, αδιάβροχες τσάντες, δοχεία καυσίμου και ηλεκτρονικά. Όλα συμβατά με τα ύφασμα μας.
      icon: tabler:package
    - title: Τροποποιήσεις και επισκευές
      description: Επισκευή φουσκωτών διαμερισμάτων, αναβάθμιση ηλεκτρονικών και αντικατάσταση κινητήρων.
      icon: tabler:tool
    - title: Προϊόντα κατά παραγγελία
      description: Σχεδιασμός για εμπορικούς, επιστημονικούς και στρατιωτικούς πελάτες.
      icon: tabler:hammer
  image:
    src: /images/seekingtex/factory/design discuss2.jpeg
    alt: Σκάφος κατά παραγγελία

steps2_values:
  title: Οι αξίες μας
  subtitle: Τρεις αρχές που διαμορφώνουν κάθε προϊόν από την πρώτη μέρα.
  items:
    - title: Χτίζε σαν να είναι η οικογένειά σου στο ύφασμας
      description: Κάθε γάστρα, κάθε συγκόλληση και κάθε εξάρτημα αντιμετωπίζονται σαν να προορίζονται για τις δικές μας οικογένειες.
      icon: tabler:heart
    - title: Μηχανική πριν από την πώληση
      description: Αν η προδιαγραφή είναι λάθος, αλλάζουμε την προδιαγραφή – ποτέ τον πελάτη.
      icon: tabler:settings
    - title: Υποστήριξη πέρα από την εγγύηση
      description: Γάστρες είκοσι ετών ακόμα τηλεφωνούν για ανταλλακτικά – και ακόμα απαντάμε.
      icon: tabler:headset

steps2_milestones:
  title: Ορόσημα
  subtitle: Η σύντομη έκδοση της ιστορίας της Seekingtex.
  isReversed: true
  items:
    - title: Ιδρύθηκε σε παραυφαντουργικόιο εργαστήριο
      description: Δύο ναυπηγοί μηχανικοί με μία φρέζα CNC και μια ακλόνητη ιδέα.
      icon: tabler:building-factory
    - title: Πρώτες 1.000 παραδοθείσες γάστρες
      description: Επιτεύχθηκε τον έβδομο χρόνο, κυρίως μέσω από στόμα σε στόμα και πιστών πελατών.
      icon: tabler:circle-check
    - title: Διεθνές πρόγραμμα εξαγωγών
      description: Παραδόσεις σε 40+ χώρες με τοπικούς συνεργάτες σέρβις σε πέντε ηπείρους.
      icon: tabler:world

features2_locations:
  title: Οι τοποθεσίες μας
  tagline: Πού να μας βρείτε
  columns: 3
  items:
    - title: Έδρα και εργαστήριο
      description: Παραυφαντουργικόιο βιομηχανικό πάρκο, κτίριο 4 – ανοιχτά Δευτ-Παρ για επισκέψεις κατόπιν ραντεβού.
    - title: Κέντρο σέρβις ΕΕ
      description: Μεσογειακό λιμάνι – τροποποιήσεις, επισκευές και υποστήριξη εγγύησης για Ευρωπαίους πελάτες.
    - title: Δίκτυο συνεργατών APAC
      description: Εξουσιοδοτημένοι συνεργάτες σέρβις στην Αυστραλία, Ιαπωνία, Σιγκαπούρη και Χονγκ Κονγκ.
