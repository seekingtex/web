hero:
  tagline: 'Κοινότητα'
  title: 'Η Κοινότητα Seekingtex'
  subtitle: |
    Πραγματικοί άνθρωποι, αληθινό νερό, αληθινές περιπέτειες. Από κωπηλάτες Σαββατοκύριακου<br />
    έως επαγγελματίες χειριστές —ανακαλύψτε πώς η κοινότητά μας εξερευνά τον κόσμο στο νερό.
  image: '/images/seekingtex/team/Seekingtex-paddle-girls-team.webp'
  imageAlt: 'Seekingtex community paddling on calm waters'

