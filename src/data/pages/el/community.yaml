stories:
  tagline: 'Ιστορίες Εξερευνητών'
  title: 'Αληθινές περιπέτειες από αληθινούς ανθρώπους'
  subtitle: 'Ακούστε από κωπηλάτες, οικογένειες και επαγγελματίες που χρησιμοποιούν εξοπλισμό Seekingtex.'
  items:
    - name: 'Sarah & Mike'
      title: 'Κάτοχοι SUP Explorer 11, Καναδάς'
      content: 'Πήραμε τα Explorer 11 σε ένα ταξίδι μιας εβδομάδας στο Επαρχιακό Πάρκο Algonquin. Χειρίστηκαν τις μεταφορές και τις διαβάσεις λιμνών υπέροχα.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Επαρχιακό Πάρκο Algonquin, Καναδάς'
    - name: 'Carlos R.'
      title: 'Αναβάτης Cheetah Surge, Ισπανία'
      content: 'Το Cheetah Surge είναι το αγαπημένο μου για παράκτιες κρουαζιέρες. Το ζωντανό σχέδιο τραβά τα βλέμματα στην παραλία.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Ισπανία'
    - name: 'Lina & οικογένεια'
      title: 'Κωπηλάτες Flowing Lotus, Σουηδία'
      content: 'Οικογενειακές περιπέτειες Σαββατοκύριακου στο αρχιπέλαγος. Το Flowing Lotus είναι αρκετά σταθερό για την κόρη μου να στέκεται πάνω ενώ εγώ κωπηλατώ.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Αρχιπέλαγος Στοκχόλμης, Σουηδία'
    - name: 'Αντιπλοίαρχος Andres'
      title: 'Εξερευνητής Ocean Voyager, Φιλιππίνες'
      content: 'Χρησιμοποιώ το Ocean Voyager μου για υπεράκτιες παράκτιες περιηγήσεις γύρω από το Palawan. Η σανίδα αποδίδει ακόμα σαν καινούργια μετά από μήνες καθημερινής χρήσης.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Φιλιππίνες'
    - name: 'Emma T.'
      title: 'Πρωτάρα Tropical Breeze, Αυστραλία'
      content: 'Δεν είχα ξανανέβει σε SUP. Το Tropical Breeze είναι τόσο σταθερό που ένιωσα αυτοπεποίθηση από την πρώτη προσπάθεια.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Αυστραλία'

