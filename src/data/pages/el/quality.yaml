hero:
  tagline: Διασφάλιση ποιότητας
  title: Δοκιμές απόδοσης και ποιότητας
  subtitle: Κάθε λειτουργικό ύφασμας και SUP της Seekingtex υποβάλλεται σε αυστηρές δοκιμές απόδοσης και ποιότητας στο Κέντρο Ε&Α μας πριν από την αποστολή. Οι ολοκληρωμένες δοκιμές μας παρέχουν απτή απόδειξη της αριστείας των προϊόντων.

