hero:
  tagline: Πόροι
  title: Κέντρο πολυμέσων
  subtitle: Κατέβασε υλικό μάρκας, φωτογραφίες προϊόντων, καταλόγους και βίντεο

sections:
  - id: product-images
    title: Φωτογραφίες προϊόντων
    desc: Φωτογραφίες προϊόντων υψηλής ανάλυσης για χρήση στο διαδίκτυο, εκτύπωση και λιανικό εμπόριο.
    items:
      - Γκαλερί σανίδων SUP
      - Γκαλερί σκαφών τεχνικό ύφασμα
      - Γκαλερί φουσκωτών τεχνικά υφάσματα
      - Αξεσουάρ και εξοπλισμός ασφαλείας
  - id: logo-brand-kit
    title: Λογότυπο και κιτ μάρκας
    desc: Επίσημα αρχεία λογότυπου Seekingtex, χρωματική παλέτα, τυπογραφία και οδηγίες μάρκας.
    items:
      - Βασικό λογότυπο (PNG/SVG/EPS)
      - Εικονικό σήμα
      - Χρωματική παλέτα
      - Προδιαγραφή τυπογραφίας
      - Οδηγίες μάρκας PDF
  - id: catalogs
    title: Κατάλογοι PDF
    desc: Κατάλογοι προϊόντων, φύλλα προδιαγραφών και τεχνική τεκμηρίωση προς λήψη.
    items:
      - Κατάλογος προϊόντων 2026
      - Παρουσίαση δυνατοτήτων OEM/ODM
      - Φυλλάδιο σειράς τεχνικό ύφασμα
      - Τεχνικές προδιαγραφές
  - id: videos
    title: Βίντεο
    desc: Παρουσιάσεις προϊόντων, ξεναγήσεις στο εργοστάσιο, βίντεο μάρκας και μαρτυρίες πελατών.
    items:
      - Παρουσιάσεις προϊόντων
      - Ξενάγηση στο εργοστάσιο
      - Βίντεο μάρκας
      - Ιστορίες πελατών
      - Οδηγοί

