hero:
  tagline: Διαδικασία
  title: Διαδικασία παραγωγής
  subtitle: Από την πρώτη ύλη στο έτοιμο για θάλασσα ύφασμας — κάθε βήμα υπό τον έλεγχό μας
  back_label: Επιστροφή στο εργοστάσιο
  back_link: /factory

intro: Σε αντίθεση με επωνυμίες που αναθέτουν την παραγωγή σε τρίτα εργοστάσια, η Seekingtex κατέχει και λειτουργεί ολόκληρη την αλυσίδα παραγωγής της. Αυτή η κάθετη ολοκλήρωση μας επιτρέπει να διατηρούμε αυστηρό ποιοτικό έλεγχο σε κάθε στάδιο, να ανταποκρινόμαστε γρήγορα σε προσαρμοσμένες απαιτήσεις και να παρέχουμε σταθερή ποιότητα προϊόντων παρτίδα με παρτίδα. Να πώς κατασκευάζεται ένα ύφασμας στην εγκατάστασή μας.

steps:
  - step: '01'
    title: Παραλαβή και επιθεώρηση υλικών
    description: Κάθε εισερχόμενη παρτίδα υφάσματος PVC, υαλοπίνακα fiberglass, ρητίνης και εξαρτημάτων ελέγχεται σύμφωνα με τις προδιαγραφές. Δείγματα υφασμάτων δοκιμάζονται για αντοχή εφελκυσμού, ομοιογένεια πάχους και αντοχή UV πριν εγκριθούν για παραγωγή. Τα μη συμμορφούμενα υλικά απομονώνονται και επιστρέφονται.
    duration: 1–2 ημέρες
  - step: '02'
    title: Αυτόματη κοπή PVC
    description: Τα εγκεκριμένα υφάσματα απλώνονται στην αυτόματη μηχανή κοπής CNC και κόβονται με ακρίβεια κάτω του χιλιοστού. Η βελτιστοποιημένη από υπολογιστή διάταξη τοποθετεί τα πάνελ για ελαχιστοποίηση αποβλήτων — συνήθως κάτω από 5%. Τα κομμένα πάνελ επισημαίνονται με μοντέλο ύφασμαυς και θάλαμο και συσκευάζονται για μεταφορά στο συνεργείο συγκόλλησης.
    duration: 2–4 ώρες ανά σετ ύφασμαυς
  - step: '03'
    title: Συγκόλληση σωλήνων και συγκόλληση
    description: Τα πάνελ συνδέονται και ενώνονται με μηχανές συγκόλλησης θερμού αέρα  σε ελεγχόμενες θερμοκρασίες 200–600 °C. Οι κύριες ραφές ενισχύονται με διηλεκτρική συγκόλληση RF για στεγανές, υψηλής αντοχής συνδέσεις. Οι έτοιμοι θάλαμοι φουσκώνονται στο 1,5× της πίεσης λειτουργίας για 30λεπτη επικύρωση συγκράτησης αέρα.
    duration: 1–2 ημέρες ανά ύφασμας
  - step: '04'
    title: Διαμόρφωση γάστρας τεχνικό ύφασμα από fiberglass
    description: Οι γάστρες τεχνικό ύφασμα παράγονται με χειροποίητη στρώση fiberglass. Στρώσεις υαλοπίνακα και υφάσματος κορδονιού τυλίγονται με πολυεστερική ή βινυλοεστερική ρητίνη σε ακριβή καλούπια. Κάθε στρώση κενούται για σταθερή ποιότητα ελάσματος. Η γάστρα τελειώνει με gelcoat για υψηλής στιλπνότητας, ανθεκτική στην UV υφαντουργικόια επιφάνεια.
    duration: 2–4 ημέρες ανά γάστρα
  - step: '05'
    title: Εκτύπωση SUP και διακόσμηση
    description: Τα γραφικά καταστρώματος σανίδας SUP εφαρμόζονται με ψηφιακή εκτύπωση  για έγχρωμα σχέδια φωτογραφικής ποιότητας και μεταξοτυπία  για ανθεκτικά λογότυπα και επαναλαμβανόμενα σχέδια. Οι εκτυπώσεις σκληρύνονται και σφραγίζονται για αντοχή UV και τριβής.
    duration: 1–2 ημέρες
  - step: '06'
    title: Τελική συναρμολόγηση και εξάρτυση
    description: Οι γάστρες fiberglass και τα συγκροτήματα σωλήνων PVC ενώνονται στη γραμμή συναρμολόγησης. Ο κινητήρας τοποθετείται, συνδέονται τα συστήματα διεύθυνσης και ελέγχου, εγκαθίσταται το σύστημα καυσίμου και καλωδιώνεται πλήρως η ηλεκτρική εγκατάσταση. Κάθε ύφασμας περνά από λίστα ελέγχου 100 σημείων με υποχρεωτική έγκριση σε κάθε στάδιο.
    duration: 2–3 ημέρες
  - step: '07'
    title: Ποιοτικός έλεγχος και επιθεώρηση
    description: "Κάθε ολοκληρωμένο ύφασμας περνά υποχρεωτική πύλη ποιότητας: δοκιμή συγκράτησης αέρα θαλάμων, λειτουργικό έλεγχο συστημάτων, επαλήθευση ροπής συνδετήρων και καλλυντική επιθεώρηση. Οι προσαρμοσμένες κατασκευές και τα πρωτότυπα υποβάλλονται επίσης σε υφαντουργικόιες δοκιμές που περιλαμβάνουν ταχύτητα, χειρισμό, σταθερότητα και ανθεκτικότητα."
    duration: 1–2 ημέρες
  - step: '08'
    title: Συσκευασία και αποστολή
    description: Τα ύφασμα ξεφουσκώνονται, διπλώνονται σύμφωνα με διαδικασία, συσκευάζονται σε ανθεκτικές υφασμάτινες τσάντες ή κόντρα-πλακέ και φορτώνονται για αποστολή. Κάθε πακέτο επισημαίνεται με μοντέλο, σειριακό αριθμό και προορισμό. Συντονιζόμαστε με μεταφορείς για αποστολές FCL και LCL παγκοσμίως.
    duration: 1 ημέρα

