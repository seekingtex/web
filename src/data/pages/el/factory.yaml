oem_section:
  tagline: OEM 螆蟻纬伪
  title: 螠蔚位苇蟿蔚蟼 螤蔚蟻喂蟺蟿蠋蟽蔚蠅谓 危蠀谓蔚蟻纬伪蟽委伪蟼
  subtitle: 螒蟺蠈 蟿畏 蟽蠉位位畏蠄畏 蟽蟿慰 魏慰谓蟿苇喂谓蔚蟻 鈥斚€蠋蟼 尾慰畏胃维渭蔚 蟺伪纬魏蠈蟽渭喂蔚蟼 渭维蟻魏蔚蟼.
  cases:
    - challenge: 螘蠀蟻蠅蟺伪委慰蟼 位喂伪谓慰蟺蠅位畏蟿萎蟼 蠂蟻蔚喂伪味蠈蟿伪谓 喂未喂蠅蟿喂魏萎蟼 蔚蟿喂魏苇蟿伪蟼 SUP 蟽蔚喂蟻维.
      solution: 螒谓伪蟺蟿蠉尉伪渭蔚 蟺蟻慰蟽伪蟻渭慰蟽渭苇谓伪 伪蟻蠂蔚委伪 蠄畏蠁喂伪魏萎蟼 蔚魏蟿蠉蟺蠅蟽畏蟼.
      result: 55 畏渭苇蟻蔚蟼 伪蟺蠈 PO 蟽蔚 FOB. 2.400 渭慰谓维未蔚蟼.
    - challenge: 螒渭蔚蟻喂魏伪谓喂魏萎 startup 萎胃蔚位蔚 蟿蔚蠂谓喂魏维 蠀蠁维蟽渭伪蟿伪 technical 蠀蠄畏位蠋谓 蔚蟺喂未蠈蟽蔚蠅谓.
      solution: 螤蟻慰蟽伪蟻渭蠈蟽伪渭蔚 蠀蟺维蟻蠂慰谓 魏伪位慰蠉蟺喂 蟿蔚蠂谓喂魏维 蠀蠁维蟽渭伪蟿伪.
      result: 5.000+ 渭慰谓维未蔚蟼 蟺蟻蠋蟿慰 苇蟿慰蟼.
    - challenge: 螒蠀蟽蟿蟻伪位蠈蟼 未喂伪谓慰渭苇伪蟼 萎胃蔚位蔚 蟺喂蟽蟿慰蟺慰喂畏渭苇谓畏 CE 蟽蔚喂蟻维 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪.
      solution: 螤伪蟻伪纬蠅纬萎 蟺蟻慰-蟺伪蟻伪纬蠅纬萎蟼 未蔚喂纬渭维蟿蠅谓 渭蔚 4 蠂蟻蠋渭伪蟿伪.
      result: 3-渭慰谓蟿苇位慰 蟽蔚喂蟻维 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 蟽蟿畏谓 伪纬慰蟻维 AU/NZ.

