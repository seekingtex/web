hero:
  tagline: Seekingtex Academy
  title: Κέντρο γνώσης
  subtitle: Οδηγοί και εκπαιδευτικά σεμινάρια για κάθε επίπεδο δεξιοτήτων — από βασικές αρχές SUP έως προηγμένες τεχνικές διάσωσης

categories:
  - level: Αρχάριος
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: Βασικές αρχές SUP
        desc: Μάθετε τα βασικά της κωπηλασίας όρθιας σανίδας — στάση, τεχνική κωπηλασίας και ισορροπία.
        slug: sup-basics
      - title: Τεχνικές κωπηλασίας
        desc: Κωπηλασία εμπρός, κωπηλασία οπίσθιας, έλξη και χαμηλή στήριξη — κατακτήστε τις βασικές κινήσεις κουπιού.
        slug: paddle-techniques
      - title: Ασφάλεια πρώτα
        desc: Βασικές πρακτικές ασφαλείας, συμπεριλαμβανομένων ελέγχου καιρού, χρήσης PFD, κανόνων λουριού και αυτοδιάσωσης.
        slug: safety-first
  - level: Μέσος
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Βασικά στοιχεία περιήγησης με τεχνικά υφάσματα
        desc: Σχεδιασμός πολύωρων διαδρομών — πλοήγηση, ενυδάτωση, ρυθμός και ανάγνωση προγνώσεων ανέμου.
        slug: touring-essentials
      - title: Ανάγνωση καιρού
        desc: Ερμηνεύστε υφαντουργικόιες προγνώσεις, αναγνωρίστε σχηματισμούς νεφών και κατανοήστε την επίδραση του ανέμου στο νερό.
        slug: weather-reading
      - title: Βασικές αρχές πλοήγησης
        desc: Ανάγνωση χαρτών, χρήση πυξίδας, σημεία GPS και σχεδιασμός διαδρομής για παράκτια πλεύση.
        slug: navigation-basics
      - title: Ενημερότητα παλίρροιας
        desc: Κατανόηση κύκλων παλίρροιας, ρευμάτων και της επίδρασής τους στον χρόνο εκκίνησης και τη διαδρομή.
        slug: tidal-awareness
  - level: Προχωρημένος
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Σχεδιασμός πολυήμερων ταξιδιών
        desc: Logistics αποστολής — επιλογή εξοπλισμού, σχεδιασμός γευμάτων, πρωτόκολλα ασφαλείας και επαφές έκτακτης ανάγκης.
        slug: multi-day-trip-planning
      - title: Τεχνικές διάσωσης
        desc: Αυτοδιάσωση, διάσωση Τ, διάσωση Εσκιμώων για τεχνικά υφάσματα και πρωτόκολλα ρυμούλκησης σε ανοιχτά νερά.
        slug: rescue-techniques
      - title: Νυχτερινή κωπηλασία
        desc: Πλοήγηση στο σκοτάδι — απαιτήσεις φωτισμού, μνήμη διαδρομής, επικοινωνία ομάδας και επίγνωση κινδύνων.
        slug: night-paddling
  - level: Συντήρηση
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Καθαρισμός και φροντίδα
        desc: Ξέπλυμα με γλυκό νερό, προστασία UV, πρόληψη μούχλας και κατάλληλες τεχνικές στεγνώματος μετά από κάθε χρήση.
        slug: cleaning-and-care
      - title: Αποθήκευση
        desc: Βέλτιστες πρακτικές αποθήκευσης φουσκωτών σανίδων και σκαφών — ξεφούσκωμα, δίπλωμα, έλεγχος θερμοκρασίας και διάρκεια ζωής.
        slug: storage-guide
      - title: Βασικές επισκευές
        desc: Επισκευή μικρών τρυπημάτων, διαρροών ραφών και προβλημάτων βαλβίδων με κιτ επισκευής PVC και τεχνικές μπαλωμάτων.
        slug: repair-basics
      - title: Συντήρηση βαλβίδων
        desc: Αναγνώριση τύπων βαλβίδων (Halkey-Roberts, Boston, Leafield), καθαρισμός υπολειμμάτων και αντικατάσταση ελαττωματικών στελεχών.
        slug: valve-maintenance

read_guide: Διαβάστε τον οδηγό →

