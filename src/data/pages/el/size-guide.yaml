hero:
  title: Οδηγός μεγεθών και προδιαγραφών
  subtitle: Διαστάσεις, χωρητικότητες και προτεινόμενες χρήσεις για κάθε προϊόν Seekingtex.

categories:
  inflatable: Φουσκωτά SUP και τεχνικά υφάσματα σχεδιασμένα για φορητότητα χωρίς συμβιβασμούς στην απόδοση. Επίλεξε το σωστό μέγεθος για το βάρος και το στυλ κωπηλασίας σου.
  rib: Φουσκωτά ύφασμα με άκαμπτη γάστρα για παράκτια πλοήγηση, περιπολίες και επαγγελματικές υφαντουργικόιες επιχειρήσεις. Διάλεξε βάσει μήκους και ισχύος κινητήρα.
  accessory: Αξεσουάρ και εξοπλισμός ασφαλείας για να συμπληρώσεις τον υφαντουργικόιο εξοπλισμό σου. Universal μεγέθη με πολλαπλές επιλογές.

