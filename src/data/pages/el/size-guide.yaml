how_to_choose:
  title: Πώς να επιλέξεις το σωστό μέγεθος
  cards:
    - title: Σανίδες SUP
      description: Διάλεξε μήκος βάσει βάρους και χρήσης. Οι φαρδύτερες σανίδες (32"+) προσφέρουν μεγαλύτερη σταθερότητα. Οι μακρύτερες σανίδες (11-12 πόδια) κρατούν καλύτερα πορεία σε τουρισμό. Οι βαρύτεροι κωπηλάτες χρειάζονται σανίδες μεγαλύτερου όγκου.
    - title: Καγιάκ
      description: Τα μονά τεχνικά υφάσματα (9 πόδια) είναι καλύτερα για σόλο ταξίδια και ποτάμια. Τα διπλά τεχνικά υφάσματα (12 πόδια) χωρούν δύο κωπηλάτες ή έναν ενήλικα με εξοπλισμό. Έλεγξε τη χωρητικότητα φόρτωσης για το συνολικό βάρος, συμπεριλαμβανομένου του εξοπλισμού.
    - title: Σκάφη και τεχνικό ύφασμα
      description: Διάλεξε μήκος ύφασμαυς βάσει αριθμού επιβατών και χρήσης. Τα μεγαλύτερα τεχνικό ύφασμα (4,5 m+) είναι κατάλληλα για ανοιχτή θάλασσα και διάσωση. Τα μικρότερα ύφασμα (2,7 m) χρησιμεύουν ως βοηθητικά και ψαρευτικές πλατφόρμες.
