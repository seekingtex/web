hero:
  tagline: Τεχνολογία
  title: Η τεχνολογία μας
  subtitle: Τα προϊόντα Seekingtex είναι σχεδιασμένα με προηγμένα υλικά και καινοτόμο μηχανική για να προσφέρουν εξαιρετική απόδοση, ανθεκτικότητα και φορητότητα.

features:
  - title: PVC στρατιωτικής ποιότητας
    description: Τα λειτουργικά υφάσματα και SUP μας χρησιμοποιούν ύφασμα PVC ανθεκτικό σε UV και τριβή, με υψηλή αντοχή εφελκυσμού και διάτρησης.
  - title: Κατασκευή Drop-Stitch
    description: Χιλιάδες ίνες υψηλής πυκνότητας συνδέουν την πάνω και κάτω επιφάνεια, δημιουργώντας ένα άκαμπτο, υψηλής πίεσης κατάστρωμα – προσφέροντας στα λειτουργικά υφάσματα απόδοση κοντά σε αυτή των σκληρών σανίδων.
  - title: Θερμική συγκόλληση
    description: Οι ενώσεις συγκολλώνται θερμικά, αντί να κολλούνται, εξασφαλίζοντας διαρκής αντοχή δεσμού σε κρίσιμα σημεία καταπόνησης.
  - title: Τεχνολογία αυτόματου φουσκώματος
    description: Τα σωσίβια Pro χρησιμοποιούν μηχανισμό αυτόματου φουσκώματος που ενεργοποιείται αμέσως μετά τη βύθιση, παρέχοντας αξιόπιστη άνωση.
