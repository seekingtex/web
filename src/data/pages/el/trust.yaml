  columns: 3
  isBeforeContent: true
  items:
    - title: '螤喂蟽蟿慰蟺慰委畏蟽畏 CE'
      description: '螌位伪 蟿伪 Fabric, 蟿蔚蠂谓喂魏维 蠀蠁维蟽渭伪蟿伪, 尾慰畏胃畏蟿喂魏维 蠉蠁伪蟽渭伪 魏伪喂 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 蟿畏蟼 Seekingtex 蟺位畏蟻慰蠉谓 蟿慰 蔚蠀蟻蠅蟺伪蠆魏蠈 蟺蟻蠈蟿蠀蟺慰 伪蟽蠁伪位蔚委伪蟼 CE. 螝维胃蔚 蟺蟻慰蠆蠈谓 蠀蟺慰尾维位位蔚蟿伪喂 蟽蔚 未慰魏喂渭萎 蟺委蔚蟽畏蟼, 蟺位蔚蠀蟽蟿蠈蟿畏蟿伪蟼 魏伪喂 蠁慰蟻蟿委慰蠀 蟺蟻喂谓 蠁蠉纬蔚喂 伪蟺蠈 蟿慰 蔚蟻纬慰蟽蟿维蟽喂慰.'
      icon: 'tabler:certificate'
    - title: ''
      description: '螚 蔚纬魏伪蟿维蟽蟿伪蟽萎 渭伪蟼 12.000 m虏 蟽蟿慰 Qingdao 位蔚喂蟿慰蠀蟻纬蔚委 蠀蟺蠈 蟽蠉蟽蟿畏渭伪 未喂伪蠂蔚委蟻喂蟽畏蟼 蟺慰喂蠈蟿畏蟿伪蟼 . 螝维胃蔚 蟺伪蟻蟿委未伪 蟺伪蟻伪纬蠅纬萎蟼 蔚委谓伪喂 喂蠂谓畏位维蟽喂渭畏 魏伪喂 蔚位蔚纬渭苇谓畏.'
      icon: 'tabler:clipboard-check'
    - title: '螝慰喂谓蠅谓喂魏萎 危蠀渭渭蠈蟻蠁蠅蟽畏 BSCI'
      description: '螘委渭伪蟽蟿蔚 蟺喂蟽蟿慰蟺慰喂畏渭苇谓慰喂 BSCI, 未喂伪蟽蠁伪位委味慰谓蟿伪蟼 畏胃喂魏苇蟼 蔚蟻纬伪蟽喂伪魏苇蟼 蟺蟻伪魏蟿喂魏苇蟼 魏伪喂 蟺蔚蟻喂尾伪位位慰谓蟿喂魏萎 蔚蠀胃蠉谓畏.'
      icon: 'tabler:users'
    - title: 'REACH & RoHS'
      description: '螌位伪 蟿伪 蠀位喂魏维 蟽蠀渭渭慰蟻蠁蠋谓慰谓蟿伪喂 渭蔚 蟿慰蠀蟼 魏伪谓慰谓喂蟽渭慰蠉蟼 REACH 魏伪喂 RoHS 蟿畏蟼 螘螘. 螝伪渭委伪 慰蠀蟽委伪 蠀蟺蠈 蟺蔚蟻喂慰蟻喂蟽渭蠈.'
      icon: 'tabler:flask'
    - title: '螘蟻纬伪蟽蟿萎蟻喂慰 螖慰魏喂渭蠋谓 违位喂魏蠋谓'
      description: '螘蟽蠅蟿蔚蟻喂魏蠈 蔚蟻纬伪蟽蟿萎蟻喂慰 未慰魏喂渭维味蔚喂 伪谓蟿慰蠂萎 蔚蠁蔚位魏蠀蟽渭慰蠉, UV 伪谓蟿慰蠂萎 魏伪喂 伪魏蔚蟻伪喂蠈蟿畏蟿伪 蟻伪蠁蠋谓 纬喂伪 魏维胃蔚 蟺伪蟻蟿委未伪 蠀蠁维蟽渭伪蟿慰蟼.'
      icon: 'tabler:microscope'
    - title: '2蔚蟿萎蟼 螘纬纬蠉畏蟽畏'
      description: '螝维胃蔚 蟺蟻慰蠆蠈谓 Seekingtex 蟽蠀谓慰未蔚蠉蔚蟿伪喂 伪蟺蠈 未喂蔚蟿萎 蔚纬纬蠉畏蟽畏 苇谓伪谓蟿喂 魏伪蟿伪蟽魏蔚蠀伪蟽蟿喂魏蠋谓 蔚位伪蟿蟿蠅渭维蟿蠅谓.'
      icon: 'tabler:shield-check'

testimonials:
  tagline: '螘渭蟺喂蟽蟿慰蟽蠉谓畏 螤蔚位伪蟿蠋谓'
  title: '韦喂 位苇谓蔚 慰喂 蟺蔚位维蟿蔚蟼 渭伪蟼'
  subtitle: '螒蟺蠈 伪蟻蠂维蟻喂慰蠀蟼 魏蠅蟺畏位维蟿蔚蟼 苇蠅蟼 蔚蟺伪纬纬蔚位渭伪蟿委蔚蟼 蠂蔚喂蟻喂蟽蟿苇蟼 蟽蟿蠈位慰蠀.'
  items:
    - content: '螘尉慰蟺位委蟽伪渭蔚 慰位蠈魏位畏蟻慰 蟿慰谓 蟽蟿蠈位慰 蔚谓慰喂魏委伪蟽萎蟼 渭伪蟼 渭蔚 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 Seekingtex. 螖蠉慰 蟽蔚味蠈谓, 渭畏未蔚谓喂魏苇蟼 尾位维尾蔚蟼. 螚 蟺喂蟽蟿慰蟺慰委畏蟽畏 CE 未喂蔚蠀魏蠈位蠀谓蔚 蟿畏谓 苇纬魏蟻喂蟽畏 伪蟽蠁维位喂蟽畏蟼.'
      name: 'Marco V.'
      title: '韦慰蠀蟻喂蟽蟿喂魏蠈蟼 蠂蔚喂蟻喂蟽蟿萎蟼, 螝蟻慰伪蟿委伪'
    - content: '惟蟼 蟺蟻蠅蟿维蟻畏蟼 伪纬慰蟻伪蟽蟿萎蟼, 伪谓畏蟽蠀蠂慰蠉蟽伪 纬喂伪 蟿畏谓 蟺慰喂蠈蟿畏蟿伪. 螚 蟿蔚魏渭畏蟻委蠅蟽畏 魏伪喂 慰喂 伪谓伪蠁慰蟻苇蟼 未慰魏喂渭蠋谓 蟺慰蠀 渭慰喂蟻维蟽蟿畏魏伪谓 渭慰蠀 苇未蠅蟽伪谓 蟺位萎蟻畏 蔚渭蟺喂蟽蟿慰蟽蠉谓畏.'
      name: 'James T.'
      title: '螝维蟿慰蠂慰蟼 Fabric Explorer 11, 螝伪谓伪未维蟼'
    - content: '危蠀谓蔚蟻纬伪味蠈渭伪蟽蟿蔚 渭蔚 蟿畏谓 Seekingtex 纬喂伪 蟺伪蟻维魏蟿喂蔚蟼 渭慰谓维未蔚蟼 蟺蔚蟻喂蟺慰位委伪蟼. 螚 未喂伪未喂魏伪蟽委伪 QC 蔚委谓伪喂 蟽蠀谓蔚蟺萎蟼 蟽蔚 魏维胃蔚 蟺伪蟻蟿委未伪.'
      name: '螒谓蟿喂蟺位慰委伪蟻蠂慰蟼 Andres'
      title: '螡伪蠀蟿喂魏苇蟼 蟺蟻慰渭萎胃蔚喂蔚蟼, 桅喂位喂蟺蟺委谓蔚蟼'

