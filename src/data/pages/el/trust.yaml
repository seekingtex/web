faqs_rib:
  title: '危蠀蠂谓苇蟼 螘蟻蠅蟿萎蟽蔚喂蟼 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪'
  subtitle: '危蠀谓萎胃蔚喂蟼 蔚蟻蠅蟿萎蟽蔚喂蟼 纬喂伪 蟿伪 位蔚喂蟿慰蠀蟻纬喂魏维 蠀蠁维蟽渭伪蟿伪 蟽魏位畏蟻慰蠉 魏蠉蟿慰蠀蟼.'
  columns: 2
  items:
    - title: '韦喂 渭蔚纬苇胃畏 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 蟽魏伪蠁蠋谓 蟺蟻慰蟽蠁苇蟻蔚喂 畏 Seekingtex;'
      description: '螤蟻慰蟽蠁苇蟻慰蠀渭蔚 35 渭慰谓蟿苇位伪 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 伪蟺蠈 2,5 m 苇蠅蟼 7,6 m, 魏伪位蠉蟺蟿慰谓蟿伪蟼 蟿伪 蟺维谓蟿伪 伪蟺蠈 蟽蠀渭蟺伪纬萎 尾慰畏胃畏蟿喂魏维 苇蠅蟼 尾伪蟻喂维 蔚渭蟺慰蟻喂魏维 魏伪喂 蟺蔚蟻喂蟺慰位喂魏维 蠉蠁伪蟽渭伪.'
    - title: '螤慰喂伪 蔚委谓伪喂 畏 未喂伪蠁慰蟻维 渭蔚蟿伪尉蠉 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 魏伪喂 蟺伪蟻伪未慰蟽喂伪魏萎蟼 位蔚喂蟿慰蠀蟻纬喂魏蠈蟼 尾维蟻魏伪蟼;'
      description: '螆谓伪 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 蟽蠀谓未蠀维味蔚喂 蟽蠀渭蟺伪纬苇蟼 纬蠀维位喂谓慰 萎 伪位慰蠀渭喂谓苇谓喂慰 魏蠉蟿慰蟼 尾伪胃喂维蟼 V 渭蔚 蠁慰蠀蟽魏蠅蟿慰蠉蟼 蟽蠅位萎谓蔚蟼 Hypalon 萎 PVC. 螒蠀蟿蠈 未委谓蔚喂 蟽蟿伪胃蔚蟻蠈蟿畏蟿伪 魏伪喂 蠂蠅蟻畏蟿喂魏蠈蟿畏蟿伪 蠁慰蟻蟿委慰蠀 蟽魏位畏蟻慰蠉 蠉蠁伪蟽渭伪蠀蟼 渭蔚 伪蟺慰蟻蟻蠈蠁畏蟽畏 魏蟻伪未伪蟽渭蠋谓 蠁慰蠀蟽魏蠅蟿慰蠉.'
    - title: '螤慰喂蔚蟼 渭畏蠂伪谓苇蟼 蔚委谓伪喂 蟽蠀渭尾伪蟿苇蟼 渭蔚 蟿伪 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 Seekingtex;'
      description: '韦伪 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 渭伪蟼 蠀蟺慰蟽蟿畏蟻委味慰蠀谓 蔚尉蠅位苇渭尾喂蔚蟼 渭畏蠂伪谓苇蟼 伪蟺蠈 3 HP 苇蠅蟼 250 HP 伪谓维位慰纬伪 渭蔚 蟿慰 渭慰谓蟿苇位慰.'
    - title: '螘委谓伪喂 蟿伪 蟿蔚蠂谓喂魏蠈 蠉蠁伪蟽渭伪 Seekingtex 蟺喂蟽蟿慰蟺慰喂畏渭苇谓伪 CE;'
