hero:
  tagline: Seekingtex Custom Lab
  title: Σχεδιάστε το δικό σας<br />ύφασμας
  subtitle: Υπηρεσίες OEM, ODM, ιδιωτικής ετικέτας και προσαρμοσμένης επωνυμίας για επιχειρήσεις παγκοσμίως. Από ένα μεμονωμένο πρωτότυπο έως πλήρη σειρά παραγωγής.
  cta: Ξεκινήστε το έργο
  footer_link: /contact

steps_section:
  tagline: Πώς λειτουργεί
  title: Από τη σύλληψη στην παραγωγή
  subtitle: Τέσσερα βήματα από την ιδέα σας σε ένα έτοιμο, υφαντουργικόιο ύφασμας.
  steps:
    - num: '01'
      title: Επιλέξτε σανίδα
      desc: Διαλέξτε από τα βασικά μας μοντέλα — SUP, τεχνικά υφάσματα, υφαντουργικό προϊόν ή τεχνικό ύφασμα. Επιλέξτε μέγεθος, υλικό και χρώμα.
    - num: '02'
      title: Υποβάλετε το σχέδιό σας
      desc: Στείλτε μας το λογότυπο, τα γραφικά ή τις οδηγίες επωνυμίας σας. Η ομάδα σχεδιασμού μας θα ετοιμάσει ένα ψηφιακό δείγμα.
    - num: '03'
      title: Προεπισκόπηση AI mockup
      desc: Δείτε ένα φωτορεαλιστικό mockup με τεχνητή νοημοσύνη της προσαρμοσμένης σανίδας σας πριν ξεκινήσει η παραγωγή.
    - num: '04'
      title: Παραγωγή και παράδοση
      desc: Μετά την έγκριση, η παραγγελία σας εισέρχεται στην πιστοποιημένη ISO γραμμή παραγωγής μας. Χρόνος παράδοσης από 30 ημέρες.

services_section:
  tagline: Υπηρεσίες
  title: Υπηρεσίες παραγωγής για παγκόσμιες επωνυμίες
  subtitle: Ευέλικτα μοντέλα συνεργασίας — από συμβατική παραγωγή έως ολοκληρωμένη δημιουργία επωνυμίας.
  items:
    - title: Παραγωγή OEM
      desc: Παράγουμε σύμφωνα με τις προδιαγραφές σας — η πνευματική σας ιδιοκτησία, τα σχέδιά σας, τα ποιοτικά σας πρότυπα. Πλήρης προστασία NDA.
      icon: "\u2699\ufe0f"
    - title: Λύσεις ODM
      desc: Επιλέξτε από πάνω από 50 δοκιμασμένες πλατφόρμες και προσαρμόστε μέγεθος, χρώμα, γραφικά και συσκευασία.
      icon: "\ud83c\udfa8"
    - title: Ιδιωτική ετικέτα
      desc: Η επωνυμία σας στα προϊόντα μας — λογότυπο, συσκευασία, ετικέτες, οδηγίες. Έτοιμο προς πώληση κατευθείαν από το κουτί.
      icon: "\ud83c\udff7\ufe0f"
    - title: Προσαρμοσμένη επωνυμία
      desc: Εκτύπωση καταστρώματος, γραφικά γάστρας, αυτοκόλλητα σωλήνων και προσαρμοσμένες ετικέτες — πλήρης ενσωμάτωση επωνυμίας.
      icon: "\u2728"

capabilities_section:
  tagline: Δυνατότητες
  title: Παραγωγικές δυνατότητες και προσαρμογή
  subtitle: Όλα όσα πρέπει να γνωρίζετε πριν υποβάλετε παραγγελία.
  capabilities:
    - label: Όγκος παραγγελίας
      value: MOQ 5–10 τεμ. (SUP/τεχνικά υφάσματα), 2–5 τεμ. (τεχνικό ύφασμα)
    - label: Χρόνος παράδοσης
      value: 30–45 ημέρες standard, 15–20 ημέρες για πρωτότυπα
    - label: Προσαρμογή
      value: Μέγεθος, σχήμα, χρώμα, γραφικά, συσκευασία, εξαρτήματα
    - label: Υλικά
      value: PVC, Hypalon, drop-stitch, fiberglass, αλουμίνιο
    - label: Εκτύπωση
      value: Ψηφιακή (CMYK), μεταξοτυπία, θερμική μεταφορά, sublimation
    - label: Πιστοποίηση
      value: CE, UKCA, FCC (υποστήριξη παγκόσμιας συμμόρφωσης)

