hero:
  tagline: ''
  title: |
    Σχεδιασμένα για το νερό. <br class="hidden sm:inline" />
    Κατασκευασμένα για <span class="text-accent dark:text-white">ζωή στο ύφασμας</span>.
  subtitle: |
    <span class="hidden sm:inline"><span class="font-semibold">Seekingtex</span> σχεδιάζει και κατασκευάζει υψηλής ποιότητας λειτουργικά υφάσματα, τεχνικό ύφασμα και τεχνικά προϊόντα.</span>
    <span class="block mb-1 sm:hidden font-bold text-blue-600">Seekingtex: φτιαγμένη για απόδοση.</span>
    Για υφαντουργικόιους επαγγελματίες, εμπορικούς χειριστές και λάτρεις που απαιτούν αξιοπιστία και δεξιοτεχνία.
  actions:
    - variant: primary
      text: Δείτε προϊόντα
      href: /products
      icon: tabler:shopping-bag
    - text: Μάθετε περισσότερα
      href: '#features'
  image:
    src: ~/assets/images/hero-image.webp
    alt: Εξώφυλλο Seekingtex

hero_carousel:
  autoplay_interval: 5000
  slides:
    - image:
        src: /images/seekingtex/hero/hero-scenic.webp
        alt: Παραυφαντουργικόιο εργαστήριο Seekingtex
      tagline: Καλώς ήρθατε
      title: |
        Σχεδιασμένα για το νερό. <br />
        Κατασκευασμένα για <span class="text-sky-300">ζωή στο ύφασμας</span>.
      subtitle: Υψηλής ποιότητας λειτουργικά υφάσματα, τεχνικό ύφασμα και τεχνικά προϊόντα για υφαντουργικόιους επαγγελματίες και λάτρεις.
      actions:
        - text: Δείτε προϊόντα
          href: /products
          variant: primary
        - text: Ζητήστε τιμή
          href: /contact
          variant: secondary
    - image:
        src: /images/seekingtex/hero/hero-5.webp
        alt: Κατασκευή ύφασμαυς κατά παραγγελία
      tagline: Δεξιοτεχνία
      title: |
        Γάστρες ανθεκτικές όσο η εγγύηση. <br />
        Σέρβις ανθεκτικό όσο η γάστρα.
      subtitle: Υλικά υφαντουργικόιας κλάσης. Αλουμινένια συγκόλληση. Είκοσι ετών ύφασμα ακόμα μας τηλεφωνούν για ανταλλακτικά.
      actions:
        - text: Η ιστορία μας
          href: /about
          variant: primary
    - image:
        src: /images/seekingtex/hero/boat man Seekingtex-min.jpeg
        alt: Φουσκωτό ύφασμας στο νερό
      tagline: Υποστήριξη
      title: |
        Σχεδιασμένο πριν την πώληση. <br />
        Υποστηριζόμενο πολύ μετά από αυτήν.
      subtitle: Εξουσιοδοτημένοι συνεργάτες σέρβις σε 40+ χώρες. Γάστρες είκοσι ετών ακόμα τηλεφωνούν – και ακόμα απαντάμε.
      actions:
        - text: Επικοινωνήστε
          href: /contact
          variant: primary
        - text: Δείτε τιμές
          href: /pricing
          variant: secondary

features:
  id: features
  tagline: Γιατί Seekingtex
  title: Τι κερδίζετε με την Seekingtex
  subtitle: Δεκαετίες ναυπηγικής εμπειρίας συμπυκνωμένες σε μία εστιασμένη σειρά προϊόντων. Στιβαρή κατασκευή, υφαντουργικόιες δοκιμές, ισόβια υποστήριξη.
  columns: 2
  items:
    - title: Υλικά υφαντουργικόιας κλάσης
      description: PVC υψηλής αντοχής, Hypalon και αλουμινένιες γάστρες επιλεγμένες για αντοχή UV, τριβή και αλμυρό νερό.
      icon: tabler:shield-check
    - title: Ποιότητα παραγωγής
      description: Κάθε γάστρα περνά δοκιμή πίεσης, κάθε συγκόλληση ελέγχεται. Αποστέλλουμε μόνο ό,τι θα καθελκύαμε μόνοι μας.
      icon: tabler:certificate
    - title: Αρθρωτός σχεδιασμός
      description: Προσαρμόστε διάταξη θαλάμων, θέση κονσόλας, χωρητικότητα καυσίμου και αξεσουάρ στις ανάγκες σας.
      icon: tabler:layout-grid
    - title: Τίμιες προδιαγραφές
      description: Πραγματικό φορτίο, πραγματικές διαστάσεις, πραγματικό βάρος. Χωρίς υπερβολές μάρκετινγκ. Ποτέ.
      icon: tabler:ruler-measure
    - title: Γρήγορη παράδοση και ανταλλακτικά
      description: Τυπικά μοντέλα αποστέλλονται εντός ημερών. Γνήσια ανταλλακτικά και αναλώσιμα σε απόθεμα όλο τον χρόνο.
      icon: tabler:truck-delivery
    - title: Ισόβια υποστήριξη
      description: Άμεση γραμμή με την ομάδα σχεδιασμού μας για τεχνικές συμβουλές, επισκευές και αναβαθμίσεις.
      icon: tabler:lifebuoy

featured_products:
  id: featured
  title: Προτεινόμενα προϊόντα
  subtitle: Επιλεγμένα από τον τρέχοντα κατάλογό μας – τα πιο δημοφιλή μοντέλα της σεζόν.
  linkText: Δείτε όλα τα προϊόντα
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: Μέσα στο συνεργείο
  title: Από τον σχεδιασμό γάστρας έως την παράδοση – κάθε βήμα εσωτερικά
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Ποιότητα που βλέπετε, αισθάνεστε και μπορείτε να μετρήσετε</h3>
  items:
    - title: Σχεδιασμένο από ναυπηγούς μηχανικούς
      description: Οι γραμμές γάστρας σχεδιάζονται εσωτερικά και βελτιώνονται μέσω ανάλυσης CFD πριν από το πρώτο πρωτότυπο.
    - title: Συγκολλημένο και συναρμολογημένο στο εργοστάσιό μας
      description: Η συγκόλληση φουσκωτών θαλάμων, η συναρμολόγηση κονσόλας και εξαρτημάτων γίνεται κάτω από μία στέγη.
    - title: Θαλάσσιες δοκιμές πριν την αποστολή
      description: Κάθε μοντέλο περνά πολύωρη υφαντουργικόια δοκιμή ελέγχοντας ολίσθηση, στροφές, μέγιστη ταχύτητα και συμπεριφορά υπό φορτίο.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Συνεργείο

steps:
  title: Από προδιαγραφή σε καθέλκυση σε πέντε βήματα
  items:
    - title: 'Βήμα 1: <span class="font-medium">Διαμόρφωση</span>'
      description: Επιλέξτε μοντέλο, καθορίστε επιλογές και ζητήστε προσφορά online ή τηλεφωνικά. Η ομάδα απαντά εντός μίας εργάσιμης ημέρας.
      icon: tabler:list-numbers
    - title: 'Βήμα 2: <span class="font-medium">Επιβεβαίωση</span>'
      description: Επιβεβαιώνουμε την προδιαγραφή, το χρονοδιάγραμμα και το συνολικό κόστος γραπτώς. Χωρίς εκπλήξεις, χωρίς κρυφές χρεώσεις.
      icon: tabler:checks
    - title: 'Βήμα 3: <span class="font-medium">Παραγωγή</span>'
      description: Η παραγωγή ξεκινά στο συνεργείο μας. Στέλνουμε φωτογραφίες προόδου σε βασικά στάδια.
      icon: tabler:tool
    - title: 'Βήμα 4: <span class="font-medium">Παράδοση</span>'
      description: Συσκευασμένο σε ράφι, με θερμοσυρρίκνωση και αποστολή δια υφαντουργικόης ή αέρος. Τελωνειακός εκτελωνισμός πλήρως συμπεριλαμβανόμενος.
      icon: tabler:truck-loading
    - title: 'Βήμα 5: <span class="font-medium">Υποστήριξη</span>'
      description: Δύο χρόνια εγγύηση γάστρας συν ισόβια τεχνική υποστήριξη. Ανταλλακτικά αποστέλλονται εντός 48 ωρών.
      icon: tabler:headset
  image:
    src: /images/seekingtex/hero/production-dept.webp
    alt: Διαδικασία παραγωγής

blog_latest:
  title: Από το ιστολόγιο
  information: |
    Άρθρα, τεχνικές σημειώσεις και μελέτες περιπτώσεων από την ομάδα σχεδιασμού.
    Νέες αναρτήσεις εμφανίζονται όταν ένα έργο παραδίδεται, ένα πρότυπο ενημερώνεται ή όταν κάποιος έχει μια ιστορία που αξίζει να ειπωθεί.

faqs:
  title: Συχνές ερωτήσεις
  subtitle: Οι ερωτήσεις που ακούμε πιο συχνά. Αν η δική σας δεν είναι εδώ, γράψτε μας – θα απαντήσουμε γρήγορα.
  columns: 2
  items:
    - title: Ποιο μοντέλο να επιλέξω
      description: Εξαρτάται από το μέγεθος του πληρώματος, την περιοχή πλεύσης και τις προτεραιότητες – ταχύτητα, χωρητικότητα ή οικονομία καυσίμου. Στείλτε μια σύντομη περιγραφή και θα προτείνουμε 2–3 κατάλληλα μοντέλα.
      icon: tabler:anchor
    - title: Κάνετε διεθνείς παραδόσεις;
      description: Ναι – παραδίδουμε σε 40+ χώρες. Η υφαντουργικόια μεταφορά είναι η πιο οικονομική για ολόκληρα ύφασμα, η αεροπορική μεταφορά διαθέσιμη για επείγουσες παραγγελίες.
      icon: tabler:ship
    - title: Τι εγγύηση παρέχετε;
      description: Δύο χρόνια στη γάστρα, ένα χρόνο στα αξεσουάρ, ισόβια στις συγκολλήσεις μας. Η εγγραφή εγγύησης περιλαμβάνεται σε κάθε παράδοση.
      icon: tabler:shield
    - title: Μπορείτε να προσαρμόσετε υπάρχον μοντέλο;
      description: Σχεδόν πάντα. Η θέση κονσόλας, το χρώμα θαλάμων, η διάταξη καθισμάτων, τα ηλεκτρονικά και ο κινητήρας μπορούν να προσαρμοστούν. Ειδικές γάστρες κοστολογούνται ξεχωριστά.
      icon: tabler:palette
    - title: Προσφέρετε εκπαίδευση και πιστοποίηση;
      description: Για εμπορικούς χειριστές μπορούμε να οργανώσουμε εκπαίδευση στο νερό στην εγκατάστασή μας. Ιδιώτες πελάτες λαμβάνουν δωρεάν οδηγίες κατά την παραλαβή.
      icon: tabler:school
    - title: Πώς να προμηθευτώ ανταλλακτικά;
      description: Παραγγείλτε μέσω της σελίδας επικοινωνίας ή καλέστε τη γραμμή ανταλλακτικών. Τυπικά είδη (βαλβίδες, ιμάντες, αντλίες, κιτ επισκευής) αποστέλλονται σε 48 ώρες παγκοσμίως.
      icon: tabler:settings

cta:
  title: |
    Έτοιμος να διαμορφώσετε <br class="block sm:hidden" /><span class="sm:whitespace-nowrap">το επόμενο ύφασμας σας</span>;
  subtitle: Πείτε μας πώς θα χρησιμοποιείτε το ύφασμας και εντός μίας εργάσιμης ημέρας θα προτείνουμε μοντέλο, επιλογές και τιμή.
  actions:
    - variant: primary
      text: Ζητήστε τιμή
      href: /contact
      icon: tabler:message-circle
    - text: Περιηγηθείτε στον κατάλογο
      href: /products
