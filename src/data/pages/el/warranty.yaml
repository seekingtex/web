label: 'Εγγύηση'
headline: 'Περιορισμένη εγγύηση κατασκευαστή Seekingtex'
subtitle: 'Η Seekingtex εγγυάται την ποιότητα κάθε φουσκωτού υφαντουργικόιου προϊόντος που κατασκευάζουμε. Αυτή η περιορισμένη εγγύηση καθορίζει τους όρους και την κάλυψη για το προϊόν σας Seekingtex.'
seo:
  headline: 'Εγγύηση φουσκωτού ύφασμαυς Seekingtex — 5ετής περιορισμένη εγγύηση | Seekingtex'
  description: 'Η Seekingtex προσφέρει 5ετή περιορισμένη εγγύηση στην ακεραιότητα του κύριου υφάσματος σωλήνων, των ραφών και της δομικής ακεραιότητας του κύτους από υαλοβάμβακα. Καλύπτει επίσης βαλβίδες φουσκώματος και εργοστασιακά εγκατεστημένα αξεσουάρ. Πλήρεις όροι και προϋποθέσεις εγγύησης φουσκωτού ύφασμαυς Seekingtex.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Αυτή η περιορισμένη εγγύηση ισχύει για νέα φουσκωτά υφαντουργικόια προϊόντα της μάρκας Seekingtex που αγοράζονται απευθείας από την Seekingtex ή από εξουσιοδοτημένο αντιπρόσωπο ή λιανοπωλητή της Seekingtex. Η ημερομηνία έναρξης ισχύος είναι η επαληθεύσιμη ημερομηνία αρχικής αγοράς.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Κάλυψη εγγύησης και διάρκεια</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 χρόνια</h3>
        <p class="text-sm text-gray-600 mt-1">Ακεραιότητα κύριου υφάσματος σωλήνων (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 χρόνια</h3>
        <p class="text-sm text-gray-600 mt-1">Δομική ακεραιότητα κύτους υαλοβάμβακα</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 χρόνια</h3>
        <p class="text-sm text-gray-600 mt-1">Στεγανότητα ραφών φουσκωτών σωλήνων</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 χρόνια</h3>
        <p class="text-sm text-gray-600 mt-1">Λειτουργικότητα βαλβίδων φουσκώματος</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 χρόνος</h3>
        <p class="text-sm text-gray-600 mt-1">Εργοστασιακά εγκατεστημένα αξεσουάρ και βοηθητικά εξαρτήματα</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 χρόνος*</h3>
        <p class="text-sm text-gray-600 mt-1">Εμπορική χρήση, ενοικίαση ή στόλος — όλα τα εξαρτήματα</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Εμπορική, κρατική, ναύλωση, ενοικίαση ή εκπαιδευτική χρήση μειώνει την εγγύηση σε 1 χρόνο. Η χρήση σε αγώνες ή ανταγωνισμό ακυρώνει πλήρως την εγγύηση.</p>
  </div>

  <h2>Τι καλύπτεται</h2>
  <h3>Κύριο ύφασμα σωλήνων (5 χρόνια)</h3>
  <p>Η Seekingtex εγγυάται το κύριο ύφασμα σωλήνων έναντι φθοράς πορώδους που θέτει ουσιαστικά σε κίνδυνο την ικανότητα του προϊόντος να διατηρεί το επιχειρησιακό φούσκωμα. Αυτό ισχύει για ύφασμα επικαλυμμένο με CSM (Hypalon) και όλα τα άλλα υλικά σωλήνων που χρησιμοποιούνται στην κατασκευή.</p>

  <h3>Δομική ακεραιότητα κύτους υαλοβάμβακα (5 χρόνια)</h3>
  <p>Για προϊόντα με κύτος από πλαστικό ενισχυμένο με υαλοβάμβακα (GRP), η βασική σύνθετη δομή είναι εγγυημένη έναντι δομικής αστοχίας λόγω ελαττωμάτων στα υλικά ή στην κατασκευή.</p>

  <h3>Στεγανότητα ραφών φουσκωτών σωλήνων (5 χρόνια)</h3>
  <p>Οι ραφές των φουσκωτών σωλήνων είναι εγγυημένες έναντι κατασκευαστικών ελαττωμάτων που οδηγούν σε σημαντική διαρροή αέρα μέσω της ραφής. Η περιοδική επιθεώρηση και η διατήρηση των κατάλληλων πιέσεων φουσκώματος αποτελούν προϋποθέσεις κάλυψης.</p>

  <h3>Λειτουργικότητα βαλβίδων φουσκώματος (5 χρόνια)</h3>
  <p>Οι βαλβίδες φουσκώματος που εγκαθίστανται αρχικά από την Seekingtex είναι εγγυημένες έναντι ελαττωμάτων υλικών ή κατασκευής που εμποδίζουν τη βαλβίδα να συγκρατεί αέρα όπως έχει σχεδιαστεί.</p>

  <h3>Εργοστασιακά εγκατεστημένα αξεσουάρ (1 χρόνος)</h3>
  <p>Εξαρτήματα και εξαρτήματα που κατασκευάζονται από την Seekingtex και εγκαθίστανται αρχικά στο εργοστάσιο είναι εγγυημένα έναντι ελαττωμάτων υλικού και κατασκευής για ένα έτος. Αυτό εξαιρεί είδη τρίτων, τα οποία καλύπτονται μόνο από τις αντίστοιχες εγγυήσεις των κατασκευαστών τους.</p>

  <h2>Τι δεν καλύπτεται</h2>
  <ul>
    <li>Αισθητικές ατέλειες όπως αποχρωματισμός, λεκέδες, ξεθώριασμα, κιμωλίαση ή οποιαδήποτε αλλοίωση στην εμφάνιση</li>
    <li>Τρυπήματα, κοψίματα, σκισίματα ή άλλη φυσική ζημιά</li>
    <li>Ρωγμές, τριβή, γρατσουνιές ή φθορά από τριβή ή επαφή</li>
    <li>Υποβάθμιση από έκθεση σε υπεριώδη ακτινοβολία, καιρικές συνθήκες ή ατμοσφαιρικές συνθήκες</li>
    <li>Ζημιά από επαφή με καύσιμα, διαλύτες, οξέα, αλκάλια ή χημικά</li>
    <li>Ζημιά από αμέλεια, ακατάλληλη χρήση, κατάχρηση, ατύχημα ή κανονική φθορά</li>
    <li>Προβλήματα επιφάνειας gelcoat ή βαφής (φουσκάλες, ρωγμές, αποχρωματισμός, ξεθώριασμα)</li>
    <li>Ζημιά από κρούση, πίεση, ακατάλληλη στήριξη ή ρυμούλκηση</li>
    <li>Ζημιά από ακατάλληλο φούσκωμα/ξερούσκωμα ή χρήση μη εγκεκριμένων συσκευών φουσκώματος</li>
    <li>Εξοπλισμός, εξαρτήματα ή συστήματα τρίτων (καλύπτονται από τους αντίστοιχους κατασκευαστές)</li>
  </ul>

  <h2>Υποχρέωση και αποζημίωση κατασκευαστή</h2>
  <p>Η μοναδική και αποκλειστική υποχρέωση της Seekingtex είναι η επισκευή ή η αντικατάσταση, κατά την επιλογή της Seekingtex, οποιουδήποτε εξαρτήματος κριθεί ελαττωματικό σε υλικά ή κατασκευή και καλύπτεται από αυτήν την εγγύηση. Οι επισκευές ή αντικαταστάσεις εκτελούνται από την Seekingtex ή το εξουσιοδοτημένο κέντρο σέρβις της. Τα επισκευασμένα ή αντικατασταθέντα εξαρτήματα είναι εγγυημένα μόνο για το μη ληγμένο τμήμα της αρχικής περιόδου εγγύησης.</p>

  <h2>Όροι εγγύησης</h2>
  <ul>
    <li><strong>Εγγραφή:</strong> Το προϊόν πρέπει να είναι σωστά εγγεγραμμένο όπως απαιτείται από τους όρους εγγύησης.</li>
    <li><strong>Συντήρηση:</strong> Το προϊόν πρέπει να συντηρείται σύμφωνα με τις δημοσιευμένες οδηγίες της Seekingtex, συμπεριλαμβανομένης της περιοδικής επιθεώρησης και διατήρησης των κατάλληλων πιέσεων φουσκώματος.</li>
    <li><strong>Συνεργασία:</strong> Ο αγοραστής πρέπει να συνεργάζεται πλήρως και άμεσα με την Seekingtex σε όλα τα θέματα που αφορούν αξιώσεις εγγύησης.</li>
    <li><strong>Αρχικός αγοραστής:</strong> Αυτή η εγγύηση παρέχεται αποκλειστικά στον αρχικό τελικό χρήστη και δεν είναι μεταβιβάσιμη.</li>
  </ul>

  <h2>Εμπορική χρήση</h2>
  <p>Εάν το προϊόν χρησιμοποιείται για εμπορικούς, κρατικούς, μη κερδοσκοπικούς, ναύλωσης, ενοικίασης, εκπαιδευτικούς σκοπούς ή για οποιονδήποτε σκοπό άλλο από ιδιωτική ψυχαγωγία, η περίοδος εγγύησης για όλα τα εξαρτήματα μειώνεται σε ένα (1) έτος από την αρχική ημερομηνία αγοράς. Η χρήση σε αγώνες, ταχύτητας ή αντοχής ακυρώνει αμέσως και αμετάκλητα ολόκληρη την εγγύηση.</p>

  <h2>Πώς να υποβάλετε αξίωση εγγύησης</h2>
  <p>Επικοινωνήστε με την Seekingtex ή τον εξουσιοδοτημένο αντιπρόσωπό σας με απόδειξη αγοράς και λεπτομερή περιγραφή του προβλήματος. Η Seekingtex θα εξετάσει την αξίωση και θα παράσχει οδηγίες για επιθεώρηση και σέρβις.</p>
  <p>Για ερωτήματα σέρβις εγγύησης, επικοινωνήστε μαζί μας μέσω της <a href="/contact" class="text-sky-600 underline">σελίδας επικοινωνίας</a> με τον αριθμό παραγγελίας και τα στοιχεία του προϊόντος σας.</p>

  <h2>Είδη τρίτων</h2>
  <p>Εξοπλισμός, εξαρτήματα ή συστήματα που κατασκευάζονται από τρίτους (ακόμα και αν εγκατασταθούν από την Seekingtex) καλύπτονται αποκλειστικά από οποιαδήποτε εγγύηση προσφέρεται από τον αντίστοιχο κατασκευαστή τους. Η Seekingtex αποποιείται ρητά κάθε ευθύνη εγγύησης για τέτοια είδη τρίτων.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Αυτή η δήλωση εγγύησης είναι μια περίληψη της πλήρους περιορισμένης εγγύησης κατασκευαστή της Seekingtex. Το πλήρες νομικό έγγραφο εγγύησης διέπει όλους τους όρους εγγύησης. Οι προδιαγραφές υπόκεινται σε αλλαγές χωρίς προειδοποίηση. Η Seekingtex είναι μια μάρκα του Qingdao Vatrad Group.
  </p>
