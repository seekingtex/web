how_to_choose:
  title: How to Choose the Right Size
  cards:
    - title: functional fabric Boards
      description: Choose length based on your weight and intended use. Wider boards (32"+) offer more stability. Longer boards (11-12 ft) track better for touring. Heavier paddlers need higher volume boards.
    - title: performance textiles
      description: Single performance textiles (9 ft) are best for solo travel and rivers. Tandem performance textiles (12 ft) accommodate two paddlers or one adult with gear. Check weight capacity for total load including gear.
    - title: fabric products & RIBs
      description: Choose fabric products length by passenger count and intended use. Larger RIBs (4.5 m+) are suited for offshore and rescue. Smaller fabric products (2.7 m) work as tenders and fishing platforms.
