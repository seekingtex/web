how_to_choose:
  title: How to Choose the Right Fabric
  cards:
    - title: Woven Fabrics
      description: Choose woven fabrics for structural applications requiring dimensional stability, high tensile strength, and minimal stretch. Lighter weights (100–200 gsm) suit shirts and blouses; mid-weights (200–350 gsm) suit bottoms and outerwear; heavy weights (350+ gsm) suit workwear and industrial uses.
    - title: Knitted Fabrics
      description: Knitted fabrics offer stretch and recovery for activewear, sportswear, and comfort-oriented garments. Choose single jersey for lightweight tops, interlock for premium next-to-skin wear, and fleece for thermal insulation. Check stretch percentage and recovery rate specifications.
    - title: Functional Fabrics
      description: Performance fabrics with specialized finishes for specific environments. Waterproof fabrics specify hydrostatic head rating (mmH₂O). Breathable fabrics specify MVTR (g/m²/24h). UV-protective fabrics specify UPF rating. Anti-bacterial fabrics specify reduction rate (%) per ISO 20743 or AATCC 100.
