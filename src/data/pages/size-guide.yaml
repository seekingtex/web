hero:
  title: Size & Specs Guide
  subtitle: Dimensions, weights, and recommended applications for every Seekingtex fabric.

categories:
  woven: Woven fabrics constructed on rapier or air-jet looms for durability, dimensional stability, and tailored performance. Choose by weight, weft density, and finish type.
  knitted: Knitted fabrics produced on circular or flat-bed machines for stretch, comfort, and recovery. Match the right gauge and fiber blend to your end-use requirements.
  functional: Coated and laminated fabrics with waterproof, breathable, UV-protective, or anti-bacterial performance. Available in multiple base fabrics with custom finish specifications.

