    - year: '2015'
      title: Extindere
      description: Ne-am extins facilitățile la 12.000 m² și am adăugat linii de producție avansate.
      image: /images/seekingtex/factory/producing department.jpeg
    - year: '2018'
      title: Certificare
      description: Am obținut certificarea  și marcajul CE pentru toate liniile de produs.
      image: /images/seekingtex/factory/PVC material.jpeg
    - year: '2024'
      title: Centru de inovare
      description: Am înființat un centru dedicat de cercetare și dezvoltare cu facilități avansate de testare.
