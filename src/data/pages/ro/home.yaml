features:
  id: features
  tagline: De ce Seekingtex
  title: Ce primești cu Seekingtex
  subtitle: Zeci de ani de experiență în inginerie maritimă, distilată într-o linie de produs concentrată. Construită robust, testată pe mare, susținută pe viață.
  columns: 2
  items:
    - title: Materiale maritime
      description: PVC greu, Hypalon și carene din aluminiu alese pentru rezistență la UV, abraziune și apă sărată.
      icon: tabler:shield-check
    - title: Calitate gata de producție
      description: Fiecare carenă este testată la presiune, fiecare sudură este inspectată. Trimitem doar ceea ce am pune noi înșine pe apă.
      icon: tabler:certificate
    - title: Design modular
      description: Personalizează configurația furtunurilor, poziția consolei, capacitatea combustibilului și accesoriile pentru misiunea ta.
      icon: tabler:layout-grid
    - title: Specificații oneste
      description: Valori reale de sarcină, dimensiuni reale, greutate reală. Niciodată exagerări de marketing.
      icon: tabler:ruler-measure
    - title: Livrare rapidă și piese de schimb
      description: Modelele comune se expediază în câteva zile. Piese de schimb originale și consumabile în stoc tot anul.
      icon: tabler:truck-delivery
    - title: Suport pe viață
      description: Linie directă cu echipa noastră de ingineri pentru întrebări tehnice, reparații și consultanță pentru modernizări.
      icon: tabler:lifebuoy
featured_products:
  id: featured
  title: Produse recomandate
  subtitle: Selectate din catalogul nostru actual — cele mai populare modele din acest sezon.
  linkText: Vezi toate produsele
  linkUrl: /products
content_workshop:
  isReversed: true
  tagline: În atelier
  title: De la schița carenei până la livrare, fiecare pas rămâne intern
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Calitate pe care o poți vedea, simți și măsura</h3>
  items:
    - title: Proiectat de arhitecți navali
      description: Liniile carenei sunt desenate intern și iterate prin analiză CFD înainte ca primul prototip să ajungă pe apă.
    - title: Sudat și asamblat în propria noastră facilitate
      description: Sudarea furtunurilor, montarea consolei și echiparea au loc sub același acoperiș, astfel încât controlăm calitatea la fiecare pas.
    - title: Testat pe mare înainte de expediere
      description: Fiecare model efectuează un test maritim de mai multe ore, acoperind planare, viraje, viteză maximă și gestionarea sarcinii.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Atelierul de producție Seekingtex
steps:
  title: De la specificație la lansare în cinci pași
  items:
    - title: 'Pasul 1: <span class="font-medium">Configurează</span>'
      description: Alege un model, selectează opțiunile, solicită o ofertă online sau telefonic. Echipa noastră răspunde într-o zi lucrătoare.
      icon: tabler:list-numbers
    - title: 'Pasul 2: <span class="font-medium">Confirmă</span>'
      description: Confirmăm specificațiile, termenul de livrare și costul total în scris. Fără surprize, fără taxe ascunse.
      icon: tabler:checks
    - title: 'Pasul 3: <span class="font-medium">Construiește</span>'
      description: Producția începe în atelierul nostru. Trimitem fotografii cu progresul la reperele importante.
      icon: tabler:tool
    - title: 'Pasul 4: <span class="font-medium">Livrare</span>'
      description: Leagăn, ambalat în folie contractilă și expediat pe mare sau pe aer. Actele vamale sunt gestionate de la început până la sfârșit.
      icon: tabler:truck-loading
    - title: 'Pasul 5: <span class="font-medium">Suport</span>'
      description: Doi ani de garanție a carenei plus suport tehnic pe viață. Piesele de schimb se expediază în 48 de ore.
      icon: tabler:headset
blog_latest:
  title: Din jurnal
  information: |
    Articole, note tehnice și studii de caz de la echipa de ingineri.
    Postări noi sunt adăugate când un proiect este expediat, un standard este actualizat sau cineva are o poveste care merită spusă.
faqs:
  title: Întrebări frecvente
  subtitle: Întrebări comune despre bărcile gonflabile Seekingtex, garanții, transport și parteneriate OEM/ODM. Dacă nu găsești răspunsul aici, contactează-ne.
  columns: 2
  items:
    - title: Unde este depozitul Seekingtex în SUA și cât durează livrarea?
      description: "Depozitul nostru din SUA este în Montclair, CA. Coasta de Vest: 2-3 zile. Centrul SUA: 3-4 zile. Coasta de Est: 4-5 zile. Expedierea internațională este de asemenea disponibilă."
      icon: tabler:truck-delivery
    - title: Care este politica de garanție Seekingtex pentru bărcile gonflabile?
      description: Bărcile gonflabile Seekingtex beneficiază de 5 ani de garanție limitată pentru integritatea furtunurilor, cusături, carenă din fibră de sticlă și valve. Accesoriile instalate din fabrică beneficiază de 1 an garanție.
      icon: tabler:shield-check
    - title: Bărcile Seekingtex includ acte de înmatriculare?
      description: Da, fiecare barcă gonflabilă Seekingtex include documentele necesare pentru înmatriculare. Aprobat de US Coast Guard pentru producție.
      icon: tabler:file-text
cta:
  title: |
    Pregătit să începi <br class="block sm:hidden" /><span class="sm:whitespace-nowrap">proiectul tău OEM/ODM</span>?
  subtitle: Spune-ne cerințele tale și îți vom oferi o ofertă personalizată, detalii MOQ și termen de livrare într-o zi lucrătoare.
  actions:
    - variant: primary
      text: Solicită ofertă
      href: /contact
      icon: tabler:message-circle
    - text: Vizitează fabrica noastră
      href: /factory
