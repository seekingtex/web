hero:
  tagline: "Echipament"
  title: "Echipamente și Mașini de Fabricație"
  subtitle: "Echipamente industriale pentru tăiere, sudură, imprimare și asamblare"
  back_label: "Înapoi la Fabrica"
  back_link: /factory

categories:
  - title: "Tăiere și Pregătirea Materialelor"
    items:
      - name: "Mașină de Tăiat Automată PVC"
        spec: "Controlată CNC, 6.5 m × 2.5 m, precizie 0.1 mm"
        desc: "Mașină de tăiat automată controlată de calculator pentru țesături PVC, Hypalon și drop-stitch. Software-ul de imbricare optimizează utilizarea materialului sub 5% deșeu."
      - name: "Întinzător de Țesătură"
        spec: "Lățime max 3 m, alimentare cu tensiune controlată"
        desc: "Așază țesătura în straturi simple sau multiple cu tensiune controlată pentru a preveni deformarea înainte de tăiere."
  - title: "Sudura și Legarea Țevilor"
    items:
      - name: "Mașină de Etanșare Termică"
        spec: "Sudură cu aer cald, variabil 200–600 °C, 0.5–5 m/min"
        desc: "Mașină de etanșare termică cu aer cald pentru lipirea și sudarea cusăturilor de țeavă PVC și Hypalon. Folosită pentru fixare, etanșare și fuzionarea camerelor de țeavă și a îmbinărilor de flotare."
      - name: "Presă RF Dielectrică"
        spec: "15 kW, placă 2000 × 600 mm"
        desc: "Presă de sudură de înaltă frecvență pentru cusăturile longitudinale principale, îmbinările cadă-țeavă și fabricarea camerelor mari."
      - name: "Sudor RF Controlat CNC"
        spec: "8 kW, masă XY 2500 × 1200 mm"
        desc: "Sudură programabilă a cusăturilor curbe pentru geometrii complexe, embosare logo și petice de precizie."
  - title: "Fabricația Carenatei tesatura tehnica"
    items:
      - name: "Matrițe din Fibră de Sticlă prin Așezare Manuală"
        spec: "Mai multe matrițe pentru carcase tesatura tehnica până la 6 m LOA"
        desc: "Turnare tradițională din fibră de sticlă prin așezare manuală cu sisteme de rășină poliester și vinilestăr. Fiecare strat este rulat manual și vacuum-bag pentru calitate și rezistență constantă a laminatului."
      - name: "Cabină de Pulverizare Gelcoat"
        spec: "Temperatură controlată, ventilație cu aer filtrat"
        desc: "Aplicarea gelcoat pe carcasele tesatura tehnica. Oferă o finisare lucioasă, rezistentă la UV, cu control precis al grosimii."
      - name: "Router CNC (5 axe)"
        spec: "Volum 3 m × 2 m × 1 m, ax răcit cu apă"
        desc: "Prelucrarea inserturilor de carenă, matrițelor de consolă, bazelor de scaun și suporturilor personalizate."
  - title: "Imprimare și Decorațiune SUP"
    items:
      - name: "Imprimantă Digitală"
        spec: "Injet de înaltă rezoluție, lățime de imprimare până la 2 m"
        desc: "Imprimare digitală directă pe țesătură pentru grafice de punte SUP full-color. Imprimă modele personalizate, gradiente și imagini de calitate foto cu cerneluri pe bază de apă rezistente la UV."
      - name: "Mașină de Serigrafie"
        spec: "Manuală și semiautomată, înregistrare multicolor"
        desc: "Serigrafie pentru logo-uri de table SUP, mărci și modele repetitive. Oferă imprimări durabile, opace cu saturație vibrantă a culorii."
  - title: "Asamblare și Echipare"
    items:
      - name: "Macara pentru Motor"
        spec: "Capacitate 500 kg, bară de răspândire reglabilă"
        desc: "Montaj sigur al motoarelor outboard de la 2.5 la 60 cp."
      - name: "Cadru Mock-Up Consolă"
        spec: "Înălțime și unghi reglabile"
        desc: "Preamplasarea direcției, accelerației și panourilor de instrumente înainte de instalare."
      - name: "Crimper Furtun Hidraulic"
        spec: "Până la 1\" ID, manometru digital"
        desc: "Seturi de furtun de direcție hidraulică la lungime personalizată cu fitinguri presate."
      - name: "Panou Harnașamente Electrice"
        spec: "3 m × 1.5 m, diagrame de cablare preimprimate"
        desc: "Asamblarea și testarea harnașamentelor electrice complete în afara bărcii."
  - title: "Testare și Controlul Calității"
    items:
      - name: "Tester Universal de Tracțiune"
        spec: "50 kN, ASTM D751"
        desc: "Testarea forței de rupere, alungirii la rupere și propagării rupturii pentru loturi de țesătură."
      - name: "Stand de Testare a Retenției de Aer"
        spec: "Programabil, menținere presiune 30 min"
        desc: "Test automatizat de menținere a presiunii pentru fiecare cameră de țeavă înainte de asamblare."
      - name: "Tester de Decojire a Cusăturilor"
        spec: "Decojire motorizată 180° la 100 mm/min"
        desc: "Testarea rezistenței la decojire a cusăturilor sudate și lipite conform ISO 6185."
      - name: "Cameră de Îmbătrânire cu Arc de Xeno"
        spec: "2000 h expunere"
        desc: "Test de rezistență UV pentru schimbarea culorii și menținerea rezistenței."

