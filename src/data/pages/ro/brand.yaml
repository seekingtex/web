hero:
  tagline: Brand
  title: Brandul Seekingtex
  subtitle: Calitate, inovație și fiabilitate — asta este Seekingtex.
story:
  tagline: Povestea noastră
  title: Construind încredere din 2012
  body: |
    Seekingtex a fost fondată cu o viziune clară — să producă bărci gonflabile premium și echipamente sportive acvatice care rezistă în condiții reale. În peste un deceniu, am crescut de la un mic atelier la un producător recunoscut global.
mission:
  tagline: Misiune
  title: Misiunea noastră
  body: Să livrăm produse sportive acvatice de înaltă calitate, inovatoare și accesibile ca preț, care fac activitățile pe apă accesibile tuturor.
