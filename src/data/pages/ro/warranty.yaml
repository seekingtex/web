label: 'Garanție'
headline: 'Garanția limitată a producătorului Seekingtex'
subtitle: 'Seekingtex garantează calitatea fiecărui produs maritim pe care îl fabricăm.'
seo:
  headline: 'Garanție Seekingtex pentru bărci gonflabile — 5 ani garanție limitată | Seekingtex'
  description: 'Seekingtex oferă 5 ani de garanție limitată pentru materialul principal al furtunurilor, cusături și carenă din fibră de sticlă.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Această garanție limitată se aplică produselor maritime gonflabile noi marca Seekingtex.
  </p>
  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Acoperirea garanției și durata</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 ani</h3>
        <p class="text-sm text-gray-600 mt-1">Materialul principal al furtunurilor (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 ani</h3>
        <p class="text-sm text-gray-600 mt-1">Integritatea structurală a carenei din fibră de sticlă</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 ani</h3>
        <p class="text-sm text-gray-600 mt-1">Etanșeitatea cusăturilor</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 ani</h3>
        <p class="text-sm text-gray-600 mt-1">Funcționalitatea supapelor</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 an</h3>
        <p class="text-sm text-gray-600 mt-1">Accesorii instalate din fabrică</p>
      </div>
    </div>
  </div>
