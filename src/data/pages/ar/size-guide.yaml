how_to_choose:
  title: كيفية اختيار المقاس المناسب
  cards:
    - title: ألواح SUP
      description: اختر الطول بناءً على وزنك والاستخدام المقصود. الألواح الأعرض (32 بوصة+) توفر ثباتاً أكبر. الألواح الأطول (11-12 قدماً) تتبع بشكل أفضل للجولات. المجدفون الأثقل يحتاجون ألواحاً بحجم أكبر.
    - title: كاياك
      description: الكاياك الفردي (9 أقدام) أفضل للرحلات الفردية والأنهار. الكاياك المزدوج (12 قدماً) يتسع لمجدفين أو شخص بالغ مع معدات. تحقق من سعة الوزن للحمل الكلي بما في ذلك المعدات.
    - title: زوارق و قماش تقني
      description: اختر طول الزورق حسب عدد الركاب والاستخدام المقصود. قماش تقني الأكبر (4.5 م+) مناسب للبحر المفتوح والإنقاذ. الزوارق الأصغر (2.7 م) تعمل كقماش خدمة ومنصة صيد.
