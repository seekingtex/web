hero:
  tagline: أسلوب الحياة
  title: أسلوب حياة<br />Seekingtex
  subtitle: صُمم لأولئك الذين يعيشون على الماء — من المستكشفين في عطلة نهاية الأسبوع إلى المشغلين التجاريين الذين يعتمدون على معداتهم كل يوم.

values:
  - icon: 🌊
    title: مولود من الماء
    desc: كل تصميم يبدأ بفهم كيفية تصرف الماء. نصمم من حافة الظروف إلى الداخل — لأن المحيط هو معلمنا، وليس مكان عملنا.
  - icon: 🔧
    title: مبني ليدوم
    desc: المنتج الأكثر استدامة هو الذي لا يحتاج إلى استبدال. مواد من الدرجة النسيجية، قلوب drop-stitch مقدرة حتى 15 PSI، ودرزات تدوم لأكثر من موسم.
  - icon: '🏆'
    title: متاح بالتصميم
    desc: لا ينبغي أن تكون صناعة النسيج رفاهية. أداء احترافي بسعر معقول للعائلات والمرشدين والمشغلين الصغار — وليس فقط للأساطيل التجارية.
  - icon: 🌍
    title: مجتمع عالمي
    desc: "من ساحل تشينغداو إلى البحيرات في أوروبا، والأنهار في جنوب شرق آسيا، والخلجان في الأمريكتين — عملاؤنا يشتركون في شيء واحد: حب التواجد على الماء."
  - icon: ♻️
    title: تصنيع مسؤول
    desc: القطع المحسّن بـ CNC يقلل نفايات المواد إلى أقل من 5%. البناء المتين يقلل دورات الاستبدال. نبني لطول العمر لأن هذا هو الخيار الأكثر استدامة.
  - icon: 🤝
    title: دعم يدوم
    desc: هياكل عمرها عشرون عاماً لا تزال تتصل بنا لطلب قطع الغيار. متوسط وقت استجابة الضمان لدينا 24 ساعة. لا نختفي بعد البيع — نحن هنا طوال عمر المنتج.

