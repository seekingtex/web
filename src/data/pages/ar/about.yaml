hero:
  tagline: عن الشركة
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: مصنع Seekingtex ورشة العمل
  title: |
    هندسة نسيجية، <br />
    بطريقة <span class="text-accent dark:text-white">Seekingtex</span>
  subtitle: 'بدأنا في ورشة ساحلية بقماش واحد وإيمان راسخ: المنتجات النسيجية يجب أن تُهندس كما لو كانت مهمة، لأنها كذلك. اليوم نشحن إلى أكثر من 40 دولة، لكن كل هيكل لا يزال يمر عبر نفس الأيدي التي بدأت الشركة.'

stats:
  title: بالأرقام
  columns: 4
  stats:
    - title: هياكل تم تسليمها
      amount: '2,400+'
    - title: دول تم الشحن إليها
      amount: '40'
    - title: سنوات الخبرة المشتركة
      amount: '60'
    - title: متوسط وقت الاستجابة للضمان (ساعات)
      amount: '24'

features3_what_we_build:
  title: ما نبني
  subtitle: خط إنتاجي مركّز نعرفه تماماً — لا تجارب نصف مكتملة، ولا هندسة شعارات.
  columns: 3
  isBeforeContent: true
  items:
    - title: قوارب قماش تقني
      description: قوارب قماش تقني بهيكل ألومنيوم من 3.3 م إلى 7.5 م. مصممة للدوريات والغوص والصيد والاستخدام العائلي.
      icon: tabler:ship
    - title: أقمشة وظيفية
      description: زوارق قابلة للنفخ من PVC وهيبالون من 2.4 م إلى 4.2 م. خفيفة وقوية وسهلة التخزين.
      icon: tabler:speedboat
    - title: زوارق اليخوت الفاخرة
      description: قوارب قماش تقني مدمجة عالية المواصفات مصممة خصيصاً لتتناسب مع مظهر قماش فاخرك الرئيسي.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: الإكسسوارات
      description: مجاذيف، مضخات، أغطية، حقائب جافة، خزانات وقود وإلكترونيات. جميعها متوافقة مع قواربنا.
      icon: tabler:package
    - title: تجديد وإصلاح
      description: استبدال الأنابيب داخلياً، تحديث الإلكترونيات وترقية المحركات.
      icon: tabler:tool
    - title: تصنيع مخصص
      description: تصميم حسب المشروع للعملاء التجاريين والعلميين والعسكريين.
      icon: tabler:hammer
  image:
    src: /images/seekingtex/factory/design discuss2.jpeg
    alt: مناقشة تصميم وهندسة القوارب

steps2_values:
  title: قيمنا
  subtitle: ثلاثة مبادئ شكّلت كل منتج منذ اليوم الأول.
  items:
    - title: اصنع وكأنه يحمل عائلتك
      description: كل هيكل ولحام ومثبت يُعالج وكأن عائلاتنا هي من ستستخدمه.
      icon: tabler:heart
    - title: اهندس قبل أن تبيع
      description: إذا كانت المواصفة خاطئة، نغيّر المواصفة — وليس العميل.
      icon: tabler:settings
    - title: دعم يدوم أطول من الضمان
      description: هياكل عمرها عشرون عاماً لا تزال تتصل بنا لطلب قطع الغيار، وما زلنا نرد.
      icon: tabler:headset

steps2_milestones:
  title: محطات بارزة
  subtitle: نسخة مختصرة من قصة Seekingtex.
  isReversed: true
  items:
    - title: تأسست في ورشة ساحلية
      description: بدأها مهندسان نسيجيان بماكينة CNC وفكرة ثابتة.
      icon: tabler:building-factory
    - title: أول 1,000 هيكل تم تسليمها
      description: تحقق في عامنا السابع، معظمه عن طريق الكلام الشفهي والعملاء المتكررين.
      icon: tabler:circle-check
    - title: برنامج التصدير الدولي
      description: نشحن الآن إلى أكثر من 40 دولة مع شركاء دعم محليين في خمس قارات.
      icon: tabler:world

features2_locations:
  title: مواقعنا
  tagline: جدنا
  columns: 3
  items:
    - title: المقر الرئيسي والورشة
      description: مجمع صناعي ساحلي، مبنى 4 — مفتوح من الاثنين إلى الجمعة للزيارات بالموعد.
    - title: مركز الخدمة الأوروبي
      description: ميناء متوسطي — تجديد وإصلاح وخدمات ضمان للعملاء الأوروبيين.
    - title: شبكة شركاء آسيا والمحيط الهادئ
      description: شركاء خدمة معتمدون في أستراليا واليابان وسنغافورة وهونغ كونغ.
