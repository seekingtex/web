hero:
  tagline: Seekingtex Custom Lab
  title: صمم قماشك<br />الخاص
  subtitle: خدمات OEM و ODM و private label والعلامة التجارية المخصصة للشركات في جميع أنحاء العالم. من نموذج أولي واحد إلى دفعات إنتاج كاملة.
  cta: ابدأ مشروعك
  footer_link: /contact

steps_section:
  tagline: كيف يعمل
  title: من الفكرة إلى الإنتاج
  subtitle: أربع خطوات من فكرتك إلى قماش نهائي جاهز للبحر.
  steps:
    - num: '01'
      title: اختر لوحك
      desc: اختر من موديلاتنا الأساسية — SUP، كاياك، زورق، أو قماش تقني. حدد الحجم والمادة واللون.
    - num: '02'
      title: حمّل تصميمك
      desc: أرسل لنا شعارك أو أعمالك الفنية أو إرشادات علامتك التجارية. فريق التصميم لدينا يعد نموذجاً رقمياً أولياً.
    - num: '03'
      title: مراجعة النموذج بالذكاء الاصطناعي
      desc: شاهد نموذجاً واقعياً مولّداً بالذكاء الاصطناعي للوحك المخصص قبل بدء الإنتاج.
    - num: '04'
      title: الإنتاج والتسليم
      desc: بعد الموافقة، يدخل طلبك خط الإنتاج المعتمد ISO لدينا. مهلة التسليم من 30 يوماً.

services_section:
  tagline: الخدمات
  title: خدمات تصنيع للعلامات التجارية العالمية
  subtitle: نماذج شراكة مرنة — من التصنيع التعاقدي إلى بناء العلامة التجارية الكامل.
  items:
    - title: تصنيع OEM
      desc: ننتج تصاميمك حسب المواصفات — ملكيتك الفكرية، رسوماتك، معايير الجودة الخاصة بك. حماية كاملة بموجب NDA.
      icon: ⚙️
    - title: حلول ODM
      desc: اختر من أكثر من 50 منصة مثبتة وخصص الحجم واللون والرسومات والتغليف.
      icon: '🎨'
    - title: Private Label
      desc: علامتك التجارية على منتجاتنا — الشعار، التغليف، البطاقات، الكتيبات. جاهز للبيع بالتجزئة.
      icon: 🏷️
    - title: العلامة التجارية المخصصة
      desc: طباعة سطح اللوح، رسومات الهيكل، ملصقات الأنابيب، وملصقات مخصصة — تكامل كامل للعلامة التجارية.
      icon: ✨

capabilities_section:
  tagline: القدرات
  title: قدرات الإنتاج والتخصيص
  subtitle: كل ما تحتاج معرفته قبل تقديم طلبك.
  capabilities:
    - label: حجم الطلب
      value: MOQ 5–10 وحدات (SUP/كاياك)، 2–5 وحدات (قماش تقني)
    - label: مهلة التسليم
      value: 30–45 يوماً قياسي؛ 15–20 يوماً للنماذج الأولية
    - label: التخصيص
      value: الحجم، الشكل، اللون، الرسومات، التغليف، المعدات
    - label: المواد
      value: PVC، Hypalon، drop-stitch، ألياف زجاجية، ألومنيوم
    - label: الطباعة
      value: رقمية (CMYK)، طباعة حريرية، نقل حراري، تسامي
    - label: الشهادات
      value: CE، ، UKCA، FCC (دعم الامتثال العالمي)

