hero:
  tagline: عملية
  title: عملية التصنيع
  subtitle: من المواد الخام إلى قماش جاهز للبحر — كل خطوة تحت سيطرتنا
  back_label: العودة إلى المصنع
  back_link: /factory

intro: على عكس العلامات التجارية التي تستعين بمصانع خارجية لتنفيذ الإنتاج، تمتلك أكوافارر وتشغّل سلسلة التصنيع بأكملها. يتيح لنا هذا التكامل الرأسي الحفاظ على رقابة صارمة على الجودة في كل مرحلة، والاستجابة السريعة للمتطلبات المخصصة، وتقديم جودة منتج متسقة دفعة تلو الأخرى. إليك كيفية بناء القماش في منشأتنا.

steps:
  - step: '01'
    title: استلام و فحص المواد
    description: تُفحص كل دفعة واردة من أقمشة PVC وشبكات الألياف الزجاجية والراتنج والأجهزة وفق المواصفات. وتُختبر عينات الأقمشة من حيث القوة الشدّية وانتظام السماكة ومقاومة الأشعة فوق البنفسجية قبل الإفراج عنها للإنتاج. وتُعزل المواد غير المطابقة وتُعاد.
    duration: 1–2 يوم
  - step: '02'
    title: القطع التلقائي لـ PVC
    description: تُفرد الأقمشة المعتمدة على ماكينة القطع التلقائية CNC وتُقطع بدقة تقل عن المليمتر. ويقوم التعشيش المُحسَّن حاسوبياً بترتيب الألواح لتقليل الهدر — عادةً أقل من 5%. وتُوسم الألواح المقطوعة حسب طراز القماش والحجرة، ثم تُجمع لنقلها إلى ورشة اللحام.
    duration: 2–4 ساعات لكل حزمة قماش
  - step: '03'
    title: ختم الأنابيب بالحرارة واللحام
    description: تُثبّت الألواح وتُربط باستخدام ماكينات الختم الحراري مع لحام الهواء الساخن عند درجات حرارة مضبوطة تتراوح بين 200–600 °C. وتُعزز المفاصل الرئيسية بلحام RF ثنائي الاستقطاب لإنشاء وصلات محكمة الهواء عالية المتانة. وتُنفخ الحجرات المكتملة إلى 1.5× من ضغط العمل لمدة 30 دقيقة للتحقق من احتفاظها بالهواء.
    duration: 1–2 يوم لكل قماش
  - step: '04'
    title: قوالب هيكل قماش تقني من الألياف الزجاجية
    description: تُنتج هياكل قوارب قماش تقني باستخدام تقنية التشكيل اليدوي بالألياف الزجاجية. وتُدحرج طبقات شبكات الألياف الزجاجية والجريد المنسوج يدوياً مع راتنج بوليستر أو فينيل إستر في قوالب دقيقة. وتُغلّف كل طبقة بتقنية التفريغ لضمان جودة متسقة للطبقات. ويُنهى الهيكل بطلاء جلكوت لسطح نسيجي لامع ومقاوم للأشعة فوق البنفسجية.
    duration: 2–4 أيام لكل هيكل
  - step: '05'
    title: طباعة وتزيين لوحات SUP
    description: تُطبَّق رسومات سطح لوح SUP باستخدام الطباعة الرقمية للتصاميم الملونة بالكامل وبجودة الصورة، والطباعة بالشاشة للشعارات المتينة والأنماط المتكررة. وتُعالَج المطبوعات وتُغلَّف لمقاومة الأشعة فوق البنفسجية والبلى.
    duration: 1–2 يوم
  - step: '06'
    title: التجميع النهائي والتجهيز
    description: تُجمع هياكل الألياف الزجاجية مع تجميعات أنابيب PVC على خط التجميع. ويُركب المحرك، وتُوصَل أنظمة التوجيه والدفع، ويُركّب نظام الوقود، وتُوصَل منظومة الأسلاك الكهربائية بالكامل. ويتبع كل قماش قائمة تدقيق تجميع من 100 نقطة مع اعتماد إلزامي عند كل مرحلة.
    duration: 2–3 أيام
  - step: '07'
    title: اختبار الجودة والفحص
    description: 'يخضع كل قماش مكتمل لبوابة جودة إلزامية: اختبار احتفاظ الحجرة بالهواء، وفحص عمل الأنظمة، والتحقق من عزم البراغي، والفحص الجمالي. كما تخضع المشاريع المخصصة والنماذج الأولية لتجارب نسيجية في الماء تشمل السرعة والتعامل والاستقرار والتحمل.'
    duration: 1–2 يوم
  - step: '08'
    title: التغليف والشحن
    description: تُفرَّغ القوارب وتُطوى وفق الإجراء، وتُعبأ في أكياس منسوجة متينة أو صناديق خشبية، وتُحمَّل للشحن. ويُوسم كل طرد بطراز القماش والرقم التسلسلي والوجهة. كما ننسّق مع وكلاء الشحن لشحنات الحاويات FCL وLCL في جميع أنحاء العالم.
    duration: 1 يوم

