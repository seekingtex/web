tests:
  - title: اختبار الضغط
    description: تتعرض الغرف القابلة للنفخ لضغوط تتجاوز حدود التشغيل الموصى بها لفترات طويلة. يتحقق ذلك من إحكام الغلق والسلامة الهيكلية للمادة والدرزات، مما يضمن أن المنتج يمكنه تحمل الاستخدام المقصود والانتفاخ المحتمل دون فشل أو تسرب.
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: اختبار الصدمات
    description: تتعرض المنتجات لصدمات محكومة بأوزان وزوايا مختلفة. يقيم ذلك مقاومة المادة للثقب والتمزق والتلف الناتج عن الاصطدام بالعوائق في الماء، مما يدل على المتانة وطول العمر.
    image: /images/seekingtex/factory/producing department.jpeg
  - title: اختبار مقاومة الأشعة فوق البنفسجية
    description: تتعرض المنتجات النهائية لأشعة شمس محاكاة لفترات طويلة لتقييم مقاومة المادة للتدهور والبهتان والضعف الناجم عن التعرض الطويل للأشعة فوق البنفسجية —وهو أمر بالغ الأهمية للقوارب المستخدمة في البيئات الاستوائية وشديدة التعرض للشمس.
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: اختبار مقاومة التآكل
    description: يتم حك عينات المادة ضد أسطح كاشطة لعدد محدد من الدورات تحت ضغط محكوم. يقيس ذلك قدرة المادة على تحمل البلى الناتج عن الاستخدام المتكرر والتلامس مع الرمل أو الصخور أو الأسطح الأخرى، مما يضمن المتانة طويلة المدى.
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: اختبار الأداء في درجات الحرارة المنخفضة
    description: يتم اختبار المنتجات في بيئات باردة لتقييم الوظيفة والمتانة في ظروف درجات حرارة مختلفة، مما يمنع التيبس أو التشقق في المياه الباردة. ضروري للقوارب المخصصة للاستخدام الشتوي أو خطوط العرض العليا.
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: اختبار الطفو وسعة الحمولة
    description: يتم اختبار المنتجات بأوزان مختلفة لتحديد أقصى سعة تحميل وضمان دعم المستخدمين والمعدات بأمان. يتم التحقق من السعة المقدرة لكل نموذج قبل الإصدار.
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: اختبار القدرة على المناورة
    description: يتم اختبار المنتجات لاستجابتها للتجديف أو مدخلات المحرك، وتقييم نصف قطر الدوران وسهولة المناورة. تتحقق التجارب على الماء من أن التعامل الواقعي يطابق مواصفات التصميم.
    image: /images/seekingtex/factory/sup making.jpeg
  - title: اختبار إحكام الماء
    description: يتم غمر المنتجات المجمعة بالكامل أو تعريضها لرش الماء للتحقق من أي تسرب عبر الدرزات أو الصمامات أو المواد. يجتاز كل قماش فحصاً إلزامياً لإحكام الماء قبل الشحن.
    image: /images/seekingtex/factory/producing department2.jpeg

testing_section:
  tagline: إجراءات الاختبار
  title: اختبارات صارمة في كل مرحلة

commitment:
  title: التزامنا
  body: من خلال إجراءات الاختبار الصارمة هذه، يوفر {SITE} للعملاء الثقة بأن ألواح SUP والقوارب القابلة للنفخ لدينا ليست عالية الأداء فحسب، بل مبنية لتدوم —مما يضمن مغامرات لا حصر لها ممتعة وآمنة على الماء. يعمل مختبر الجودة لدينا بشكل مستقل عن الإنتاج ويقدم تقاريره مباشرة إلى الإدارة.
  cta: طلب وثائق الاختبار
  cta_link: /contact
