hero:
  tagline: "المعدات"
  title: "المعدات والآلات الصناعية"
  subtitle: "معدات صناعية لقطع واللحام والطباعة والتجميع"
  back_label: "العودة إلى المصنع"
  back_link: /factory

categories:
  - title: "القطع وتجهيز المواد"
    items:
      - name: "ماكينة قطع PVC أوتوماتيكية"
        spec: "تحكم CNC، 6.5 m × 2.5 m، دقة 0.1 mm"
        desc: "ماكينة قطع أوتوماتيكية يتحكم بها الحاسوب لأنسجة PVC وHypalon وdrop-stitch. يحسّن برنامج التعشيش استخدام المواد إلى أقل من 5% هدر."
      - name: "فارش الأقمشة"
        spec: "عرض أقصى 3 m، تغذية متحكم بها بالشد"
        desc: "يفرد القماش في طبقات مفردة أو متعددة بشد متحكم به لمنع التشوه قبل القطع."
  - title: "لحام الأنابيب والربط"
    items:
      - name: "ماكينة ختم بالحرارة"
        spec: "لحام هواء ساخن، متغير 200–600 °C، 0.5–5 m/min"
        desc: "ماكينة ختم حراري بالهواء الساخن لربط ولحام درزات أنابيب PVC وHypalon. تُستخدم للتثبيت والختم وصهر حجرات الأنابيب ومفاصل الطفو."
      - name: "مكبس RF عازل"
        spec: "15 kW، لوح 2000 × 600 mm"
        desc: "مكبس لحام بالتردد الراديوي للدرزات الطولية الرئيسية، ومفاصل الهيكل إلى الأنبوب، وتصنيع الحجرات الكبيرة."
      - name: "لحام RF بتحكم CNC"
        spec: "8 kW، طاولة XY 2500 × 1200 mm"
        desc: "لحام درزات منحنية قابل للبرمجة للأشكال المعقدة، وختم الشعارات، وترقيع دقيق."
  - title: "تصنيع هيكل قماش تقني"
    items:
      - name: "قوالب الألياف الزجاجية بالتشكيل اليدوي"
        spec: "قوالب متعددة لهياكل قماش تقني حتى 6 m LOA"
        desc: "تشكيل يدوي تقليدي بالألياف الزجاجية بأنظمة راتنج بوليستر وفينيل إستر. تُلف كل طبقة يدويًا وتُحزم بالشفط لجودة وثبات متسقة للطبقات."
      - name: "كابينة رش الجل كوت"
        spec: "متحكم بدرجة الحرارة، تهوية هواء مُرشّح"
        desc: "تطبيق الجل كوت لهياكل قماش تقني. يوفر تشطيبًا لامعًا مقاومًا للأشعة فوق البنفسجية مع تحكم دقيق في السماكة."
      - name: "موجه CNC (5 محاور)"
        spec: "مجال 3 m × 2 m × 1 m، محور مبرد بالماء"
        desc: "تشغيل إدراجات الهيكل وقوالب الكونسول وقواعد المقاعد والحوامل المخصصة."
  - title: "طباعة وتزيين SUP"
    items:
      - name: "طابعة رقمية"
        spec: "حبر بدقة عالية، عرض طباعة حتى 2 m"
        desc: "طباعة رقمية مباشرة على القماش لرسومات سطح SUP ملونة بالكامل. تطبع أنماطًا مخصصة وتدرجات وصورًا بجودة الصورة بأحبار نسيجية مقاومة للأشعة فوق البنفسجية."
      - name: "ماكينة طباعة بالشاشة"
        spec: "يدوي ونصف آلي، تسجيل متعدد الألوان"
        desc: "طباعة بالشاشة لشعارات ألواح SUP والعلامات التجارية والأنماط المتكررة. توفر طباعات متينة معتمة بتشبع لوني حيوي."
  - title: "التجميع والتركيب"
    items:
      - name: "رافعة محرك"
        spec: "سعة 500 kg، قضيب توزيع قابل للتعديل"
        desc: "تركيب آمن للمحركات الخارجية من 2.5 إلى 60 حصان."
      - name: "إطار تجهيز الكونسول"
        spec: "ارتفاع وزاوية قابلان للتعديل"
        desc: "التجهيز المسبق للتوجيه والخانق ولوحات الأدوات قبل التركيب."
      - name: "مكبس خرطوم هيدروليكي"
        spec: "حتى 1\" ID، مقياس ضغط رقمي"
        desc: "مجموعات خراطيم توجيه هيدروليكية بأطوال مخصصة مع وصلات مضغوطة."
      - name: "لوحة أسلاك كهربائية"
        spec: "3 m × 1.5 m، مخططات أسلاك مطبوعة مسبقًا"
        desc: "تجميع واختبار حُزم الأسلاك الكهربائية خارج القماش."
  - title: "الاختبار وضبط الجودة"
    items:
      - name: "مختبر الشد الشامل"
        spec: "50 kN، ASTM D751"
        desc: "اختبار قوة الكسر والاستطالة عند الكسر وانتشار التمزق لدفعات الأقمشة."
      - name: "جهاز اختبار الاحتفاظ بالهواء"
        spec: "قابل للبرمجة، احتفاظ ضغط 30 دقيقة"
        desc: "اختبار احتفاظ ضغط آلي لكل حجرة أنبوب قبل التجميع."
      - name: "مختبر قشر الدرزات"
        spec: "قشر كهربائي 180° عند 100 mm/min"
        desc: "اختبار قوة قشر الدرزات الملحومة والمُلصقة وفق ISO 6185."
      - name: "غرفة تعرية بقوس زينون"
        spec: "2000 h تعرض"
        desc: "اختبار مقاومة الأشعة فوق البنفسجية لتغير اللون والحفاظ على القوة."

