    </div>
    <p class="text-xs text-gray-500 mt-4">*الاستخدام التجاري أو الحكومي أو التأجير أو التعليمي يقلل الضمان إلى سنة واحدة. الاستخدام في السباقات أو المنافسات يبطل الضمان بالكامل.</p>
  </div>

  <h2>ما يشمله الضمان</h2>
  <h3>نسيج الأنبوب الرئيسي (5 سنوات)</h3>
  <p>تضمن Seekingtex نسيج الأنبوب الرئيسي ضد تدهور المسامية الذي يضر بشكل كبير بقدرة المنتج على الحفاظ على النفخ التشغيلي. ينطبق هذا على القماش المطلي بـ CSM (Hypalon) وجميع مواد الأنابيب الأخرى المستخدمة في التصنيع.</p>

  <h3>السلامة الهيكلية لهيكل الألياف الزجاجية (5 سنوات)</h3>
  <p>بالنسبة للمنتجات ذات الهيكل البلاستيكي المقوى بالألياف الزجاجية (GRP)، فإن الهيكل المركب الأساسي مضمون ضد الفشل الهيكلي بسبب عيوب في المواد أو التصنيع.</p>

  <h3>قدرة الدرزات الأنبوبية القابلة للنفخ على الاحتفاظ بالهواء (5 سنوات)</h3>
  <p>درزات الأنابيب القابلة للنفخ مضمونة ضد عيوب التصنيع التي تؤدي إلى تسرب هواء كبير عبر الدرزة. الفحص الدوري والحفاظ على ضغط النفخ المناسب هما شرطان للتغطية.</p>

  <h3>وظائف صمامات النفخ (5 سنوات)</h3>
  <p>صمامات النفخ المثبتة أصلاً من قبل Seekingtex مضمونة ضد عيوب المواد أو التصنيع التي تمنع الصمام من الاحتفاظ بالهواء كما هو مصمم.</p>

  <h3>الملحقات المثبتة في المصنع (سنة واحدة)</h3>
  <p>المكونات والتجهيزات المصنعة من قبل Seekingtex والمثبتة أصلاً في المصنع مضمونة ضد عيوب المواد والتصنيع لمدة عام واحد. يستثني ذلك عناصر الطرف الثالث، التي تغطيها فقط ضمانات الشركات المصنعة الخاصة بها.</p>

  <h2>ما لا يشمله الضمان</h2>
  <ul>
    <li>العيوب التجميلية بما في ذلك تغير اللون والبقع والبهتان والطباشير أو أي تغيير في المظهر</li>
    <li>الثقوب والجروح والتمزقات أو أي ضرر مادي آخر</li>
    <li>التشقق والتآكل والخدش أو التلف الناتج عن الاحتكاك أو التلامس</li>
    <li>التدهور الناتج عن التعرض للأشعة فوق البنفسجية أو الطقس أو الظروف الجوية</li>
    <li>الضرر الناتج عن التلامس مع الوقود أو المذيبات أو الأحماض أو القلويات أو المواد الكيميائية</li>
    <li>الضرر الناتج عن الإهمال أو الاستخدام غير السليم أو سوء الاستخدام أو الحادث أو البلى العادي</li>
    <li>مشاكل سطح الجلكوت أو الطلاء (التقرح والتشقق وتغير اللون والبهتان)</li>
    <li>الضرر الناتج عن الصدمة أو الضغط أو الدعم غير المناسب أو المقطورة</li>
    <li>الضرر الناتج عن النفخ أو التفريغ غير السليم أو استخدام أجهزة نفخ غير معتمدة</li>
    <li>معدات أو مكونات أو أنظمة الطرف الثالث (تغطيها الشركات المصنعة الخاصة بها)</li>
  </ul>

  <h2>التزام الشركة المصنعة والعلاج</h2>
  <p>الالتزام الوحيد والحصري لشركة Seekingtex هو إصلاح أو استبدال، حسب اختيار Seekingtex، أي مكون يتم تحديده على أنه معيب في المواد أو التصنيع ويشمله هذا الضمان. يتم إجراء الإصلاحات أو الاستبدالات بواسطة Seekingtex أو مركز الخدمة المعتمد المعين لديها. المكونات التي تم إصلاحها أو استبدالها مضمونة فقط للجزء غير المنقضي من فترة الضمان الأصلية.</p>

  <h2>شروط الضمان</h2>
  <ul>
    <li><strong>التسجيل:</strong> يجب تسجيل المنتج بشكل صحيح وفقًا لما تنص عليه شروط الضمان.</li>
    <li><strong>الصيانة:</strong> يجب صيانة المنتج وفقًا لإرشادات Seekingtex المنشورة، بما في ذلك الفحص الدوري والحفاظ على ضغط النفخ المناسب.</li>
    <li><strong>التعاون:</strong> يجب على المشتري التعاون بشكل كامل وسريع مع Seekingtex في جميع الأمور المتعلقة بمطالبات الضمان.</li>
    <li><strong>المشتري الأصلي:</strong> هذا الضمان ممنوح حصريًا للمشتري المستخدم النهائي الأصلي وغير قابل للتحويل.</li>
  </ul>

  <h2>الاستخدام التجاري</h2>
  <p>إذا تم استخدام المنتج لأغراض تجارية أو حكومية أو غير ربحية أو تأجير أو تعليمية أو أي غرض آخر غير الاستخدام الترفيهي الخاص، يتم تقليل فترة الضمان لجميع المكونات إلى سنة (1) واحدة من تاريخ الشراء الأصلي. الاستخدام في السباقات أو مسابقات السرعة أو التحمل يبطل الضمان فورًا وبشكل لا رجعة فيه بالكامل.</p>

  <h2>كيفية تقديم مطالبة ضمان</h2>
  <p>اتصل بـ Seekingtex أو الوكيل المعتمد لديك مع إثبات الشراء ووصف تفصيلي للمشكلة. ستقوم Seekingtex بمراجعة المطالبة وتقديم تعليمات للفحص والخدمة.</p>
  <p>لاستفسارات خدمة الضمان، يرجى الاتصال بنا عبر <a href="/contact" class="text-sky-600 underline">صفحة الاتصال</a> الخاصة بنا مع رقم طلبك وتفاصيل المنتج.</p>

  <h2>عناصر الطرف الثالث</h2>
  <p>المعدات أو المكونات أو الأنظمة المصنعة من قبل أطراف ثالثة (حتى إذا تم تركيبها بواسطة Seekingtex) يغطيها حصريًا أي ضمان تقدمه الشركة المصنعة الخاصة بها. تتنصل Seekingtex صراحةً من أي مسؤولية ضمان عن عناصر الطرف الثالث هذه.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    بيان الضمان هذا هو ملخص لضمان الشركة المصنعة المحدود الكامل من Seekingtex. وثيقة الضمان القانونية الكاملة تحكم جميع شروط وأحكام الضمان. المواصفات قابلة للتغيير دون إشعار. Seekingtex هي علامة تجارية لمجموعة Qingdao Vatrad.
  </p>
