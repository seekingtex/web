label: 'الضمان'
headline: 'ضمان الشركة المصنعة المحدود من Seekingtex'
subtitle: 'تقف Seekingtex خلف جودة كل منتج نسيجي قابل للنفخ نصنعه. يحدد هذا الضمان المحدود الشروط والتغطية لمنتج Seekingtex الخاص بك.'
seo:
  headline: 'ضمان القماش القابل للنفخ Seekingtex — ضمان محدود لمدة 5 سنوات | Seekingtex'
  description: 'تقدم Seekingtex ضمانًا محدودًا لمدة 5 سنوات على سلامة نسيج الأنبوب الرئيسي والدرزات والسلامة الهيكلية لهيكل الألياف الزجاجية. كما يغطي صمامات النفخ والملحقات المثبتة في المصنع. الشروط والأحكام الكاملة لضمان القماش القابل للنفخ Seekingtex.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    ينطبق هذا الضمان المحدود على المنتجات النسيجية القابلة للنفخ الجديدة ذات العلامة التجارية Seekingtex والتي يتم شراؤها مباشرة من Seekingtex أو من وكيل أو بائع تجزئة معتمد من Seekingtex. تاريخ السريان هو التاريخ القابل للتحقق من الشراء الأصلي.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">تغطية الضمان ومدته</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 سنوات</h3>
        <p class="text-sm text-gray-600 mt-1">سلامة نسيج الأنبوب الرئيسي (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 سنوات</h3>
        <p class="text-sm text-gray-600 mt-1">السلامة الهيكلية لهيكل الألياف الزجاجية</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 سنوات</h3>
        <p class="text-sm text-gray-600 mt-1">قدرة الدرزات الأنبوبية القابلة للنفخ على الاحتفاظ بالهواء</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 سنوات</h3>
        <p class="text-sm text-gray-600 mt-1">وظائف صمامات النفخ</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">سنة واحدة</h3>
        <p class="text-sm text-gray-600 mt-1">الملحقات المثبتة في المصنع والتجهيزات المساعدة</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">سنة واحدة*</h3>
        <p class="text-sm text-gray-600 mt-1">الاستخدام التجاري أو التأجير أو الأسطول — جميع المكونات</p>
