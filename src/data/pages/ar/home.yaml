  title: |
    مصنع القوارب القابلة للنفخ — <br class="hidden sm:inline" />
    OEM/ODM <span class="text-accent dark:text-white">مصنّع</span>
  subtitle: |
    <span class="hidden sm:inline"><span class="font-semibold">Seekingtex</span> هي شركة مصنّعة OEM/ODM في الصين للقوارب القابلة للنفخ وألواح التجديف (SUP) وقوارب الكاياك وقوارب قماش تقني ومعدات السلامة النسيجية الحاصلة على شهادات CE.</span>
