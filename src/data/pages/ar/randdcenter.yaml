intro:
  - 賲乇賰夭 丕賱亘丨孬 賵丕賱鬲胤賵賷乇 (R&D) 賱丿賶 兀賰賵丕賮丕乇乇 賴賵 丕賱賯賵丞 丕賱丿丕賮毓丞 賵乇丕亍 賲賴賲鬲賳丕 賱廿丨丿丕孬 孬賵乇丞 賮賷 賲毓丿丕鬲 氐賳丕毓丞 丕賱賳爻賷噩. 賳賲賰賾賳 毓卮丕賯 氐賳丕毓丞 丕賱賳爻賷噩 賮賷 噩賲賷毓 兀賳丨丕亍 丕賱毓丕賱賲 亘賲賳鬲噩丕鬲 兀賰孬乇 兀賲丕賳丕賸 賵乇丕丨丞 賵賲鬲毓丞 賲賳 禺賱丕賱 丕賱丕亘鬲賰丕乇 丕賱丿丐賵亘 賮賷 兀賱賵丕丨 丕賱鬲噩丿賷賮 丕賱賵賯賵賮 丕賱賯丕亘賱丞 賱賱賳賮禺 (textile productss) 賵丕賱賯賵丕乇亘. 賵賮乇賷賯賳丕 丕賱賲鬲賮丕賳賷 賲賳 丕賱賲賴賳丿爻賷賳 賵丕賱賲氐賲賲賷賳 賵禺亘乇丕亍 氐賳丕毓丞 丕賱賳爻賷噩 丕賱賲鬲丨賲爻賷賳 賷卮賰賾賱 賲爻鬲賯亘賱 丕賱氐賳丕毓丞貙 賵賷乇賮毓 亘丕爻鬲賲乇丕乇 爻賯賮 丕賱噩賵丿丞 賵丕賱兀丿丕亍 賵丕賱丕爻鬲丿丕賲丞.
  - 賷噩賲毓 賲乇賮賯 R&D 賱丿賷賳丕 亘賷賳 毓賱賲丕亍 丕賱賲賵丕丿 賵丕賱賲賴賳丿爻賷賳 丕賱賳爻賷噩賷賷賳 賵賲賴賳丿爻賷 丕賱廿賳鬲丕噩 鬲丨鬲 爻賯賮 賵丕丨丿. 賵賲賳 氐賷丕睾丞 丕賱兀賯賲卮丞 賵賲丨丕賰丕丞 丕賱賴賷賰賱 廿賱賶 鬲胤賵賷乇 毓賲賱賷丕鬲 丕賱賱丨丕賲 賵鬲噩丕乇亘 丕賱亘丨乇 亘丕賱丨噩賲 丕賱賰丕賲賱貙 鬲購賯丕丿 賰賱 賲乇丨賱丞 賲賳 鬲胤賵賷乇 丕賱賲賳鬲噩 亘丕賱亘賷丕賳丕鬲 賵鬲購鬲丨賯賯 賲賳賴丕 亘丕賱丕禺鬲亘丕乇.

