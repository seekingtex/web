stories:
  tagline: 'قصص المستكشفين'
  title: 'مغامرات حقيقية من أناس حقيقيين'
  subtitle: 'اسمع من المجدفين والعائلات والمحترفين الذين يستخدمون معدات أكوافارير على الماء.'
  items:
    - name: 'سارة ومايك'
      title: 'مالكا SUP Explorer 11، كندا'
      content: 'أخذنا لوحي Explorer 11 في رحلة لمدة أسبوع عبر منتزه ألجونكوين. تعاملا مع حمولات البر والعبور في البحيرات بشكل جميل. البناء بالخياطة المتساقطة يعني أننا نستطيع النفخ إلى 15 PSI والحصول على أداء اللوح الصلب من لوح قابل للحزم.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'منتزه ألجونكوين، كندا'
    - name: 'كارلوس ر.'
      title: 'راكب Cheetah Surge، إسبانيا'
      content: 'Cheetah Surge هو خياري الأول للجولات الساحلية. التصميم الحيوي يلفت الأنظار على الشاطئ، والثبات يمنحني الثقة في الأمواج الخفيفة. يتعامل بشكل رائع سواء كنت أتجول أو أستمتع بغروب الشمس.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'كوستا برافا، إسبانيا'
    - name: 'لينا والعائلة'
      title: 'مجدفو Flowing Lotus، السويد'
      content: 'مغامرات عائلية في عطلة نهاية الأسبوع على الأرخبيل. Flowing Lotus مستقر بما يكفي لابنتي لتقف عليه بينما أجدف. ينفخ في أقل من 10 دقائق — لا حاجة لمقطورة، فقط متعة عائلية نقية على الماء.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'أرخبيل ستوكهولم، السويد'
    - name: 'النقيب أندريس'
      title: 'مستكشف Ocean Voyager، الفلبين'
      content: 'أستخدم Ocean Voyager الخاص بي للجولات الساحلية لمسافات طويلة حول بالاوان. بعد أشهر من الاستخدام اليومي في الظروف الاستوائية، لا يزال اللوح يؤدي كالجديد. الشكل السياحي يقطع الأمواج التي قد توقف الألواح الأقل.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'بالاوان، الفلبين'
    - name: 'إيما تي.'
      title: 'مبتدئة Tropical Breeze، أستراليا'
      content: 'لم أكن قد ركبت SUP من قبل. Tropical Breeze مستقر جداً لدرجة أنني شعرت بالثقة في محاولتي الأولى. الآن أتجدول كل عطلة نهاية أسبوع. منحنى التعلم صفر تقريباً — واللوح يبدو رائعاً على الماء.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'غولد كوست، أستراليا'

