features:
  id: features
  tagline: Why Seekingtex
  title: What you get with Seekingtex
  subtitle: Decades of textile engineering experience, distilled into focused product lines. Quality tested, performance verified, globally trusted.
  columns: 2
  items:
    - title: Premium raw materials
      description: Sourcing the finest fibers and chemicals from leading global suppliers for consistent quality.
      icon: tabler:shield-check
    - title: Production-ready quality
      description: Every batch is tested for colorfastness, dimensional stability, and performance properties before shipping.
      icon: tabler:certificate
    - title: Customized solutions
      description: Develop custom fabric specifications — weight, composition, finish, color — to match your exact requirements.
      icon: tabler:layout-grid
    - title: Honest specifications
      description: Real performance data, real test results. No marketing inflation, ever.
      icon: tabler:ruler-measure
    - title: Fast sample delivery
      description: Sample orders processed within 3-5 days. Bulk production with reliable lead times.
      icon: tabler:truck-delivery
    - title: Lifetime technical support
      description: Direct line to our textile engineers for technical questions, development support, and after-sales service.
      icon: tabler:lifebuoy

