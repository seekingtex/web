content_workshop:
  isReversed: true
  tagline: Built different
  title: Every product tells a story of craftsmanship
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Quality you can see, feel and measure</h3>
  items:
    - title: Designed for real performance
      description: Every fabric is engineered for specific applications — sportswear, outdoor gear, or tactical apparel — so you get the right textile for your product.
    - title: Made with premium materials
      description: From polyester to nylon to specialty blends, every material is selected for performance, durability, and comfort.
    - title: Tested before it reaches you
      description: Every batch is tested for UPF rating, water resistance, tensile strength, and performance properties before leaving our facility.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Seekingtex textile production facility — quality craftsmanship in Kunshan workshop

steps:
  title: Your journey to the perfect fabric, simplified
  items:
    - title: 'Step 1: <span class="font-medium">Specify</span>'
      description: Define your fabric requirements — performance properties, weight, composition, finish, and target application.
      icon: tabler:search
    - title: 'Step 2: <span class="font-medium">Sample</span>'
      description: We develop samples matching your specifications with fast turnaround. Revisions included until perfect.
      icon: tabler:shopping-cart
    - title: 'Step 3: <span class="font-medium">Approve</span>'
      description: Approve the final sample and confirm your production quantity. We handle quality control and testing certification.
      icon: tabler:package
    - title: 'Step 4: <span class="font-medium">Produce</span>'
      description: Bulk production begins with rigorous in-process quality checks. Regular progress updates throughout.
      icon: tabler:engine
    - title: 'Step 5: <span class="font-medium">Deliver</span>'
      description: Your order ships from our facility with complete test reports and certification documents.
      icon: tabler:heart
  image:
    src: /images/seekingtex/hero/production-dept.webp
    alt: Seekingtex fabric quality testing process — performance textile production

