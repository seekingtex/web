hero_text:
  tagline: Contact
  title: GET IN TOUCH
contact_form:
  id: form
  title: Send us a message
  subtitle: For fabric specifications, bulk quotations or OEM/ODM enquiries, drop us a line. We reply within one business day.
  email_to: gzb@seekingtex.com
  submit_button: Send Inquiry
  success_message: Thanks! Your message has landed in our inbox. We will reply within one business day.
  error_message: Something went wrong sending your message. Please try again or email us directly.
  default_country_code: '+86'
  captcha:
    label: 'Anti-spam: please solve the following'
  fields:
    - name: firstName
      label: First Name
      row: 1
    - name: lastName
      label: Last Name
      row: 1
    - name: companyName
      label: Company Name
      row: 2
    - name: address
      label: Address
      row: 3
    - name: zip
      label: Zip / Postal Code
      row: 4
    - name: country
      label: Country
      row: 4
      type: select
      optionsKey: countries
    - name: email
      label: E-mail
      row: 5
      type: email
    - name: tel
      label: TEL
      row: 5
      type: tel
      withCountryCode: true
    - name: orderVolume
      label: Estimated Order Volume
      row: 6
      type: select
      options:
        - value: ''
          label: Select your estimated volume...
        - value: sample
          label: Samples / Prototypes only
        - value: '5-10'
          label: 5–10 units (Standard MOQ)
        - value: '100-500'
          label: 100–500 units
        - value: '500-plus'
          label: 500+ units (Volume pricing)
    - name: customization
      label: Customization Needed?
      row: 7
      type: select
      options:
        - value: ''
          label: Select customization type...
        - value: none
          label: Standard product (no customization)
        - value: logo
          label: Custom Logo / Branding only
        - value: full
          label: Full OEM (size, color, graphics, packaging)
        - value: consultation
          label: Not sure — need consultation
    - name: productInterest
      label: Product Categories of Interest
      row: 8
      type: select
      options:
        - value: ''
          label: Select fabric category...
        - value: all
          label: All products / Full catalog
        - value: upf
          label: Sun Protection / UPF 50+ Fabrics
        - value: waterproof
          label: Waterproof / Breathable Fabrics
        - value: quickdry
          label: Quick-Dry / Moisture-Wicking Fabrics
        - value: antibacterial
          label: Antibacterial / Antimicrobial Fabrics
        - value: stretch
          label: Stretch / 4-Way Stretch Fabrics
        - value: eco
          label: Eco-Friendly / Recycled Fabrics
    - name: subject
      label: Subject
      row: 9
    - name: message
      label: Message
      row: 10
      type: textarea
      rows: 6
features2_other_ways:
  title: Other ways to reach us
  columns: 3
  items:
    - title: Sales enquiries
      description: Bulk quotations, OEM/ODM projects and partnership applications.
      icon: tabler:shopping-bag
    - title: Technical support
      description: Fabric specifications, testing reports and production assistance.
      icon: tabler:tool
    - title: Press & partnerships
      description: Media kits, certifications and industry collaboration.
      icon: tabler:news
    - title: Phone
      description: 0512-50178907
      icon: tabler:headset
    - title: Email
      description: gzb@seekingtex.com
      icon: tabler:mail
    - title: Headquarters
      description: Room 1106, building 103, Baoyu Plaza, 335 Changjiang North Road, Kunshan, Suzhou, China
      icon: tabler:map-pin
map:
  title: Our Location
  subtitle: Visit us at our headquarters
