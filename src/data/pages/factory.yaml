material_traceability:
  tagline: Traceability
  title: Material Tracking & Batch Control
  description: Every batch of raw material is assigned a unique lot number in our ERP system. From arrival through production to the finished fabric roll, each batch's bill of materials links back to the original supplier lot. This enables full upstream traceability for any quality or compliance inquiry.
  system: ERP system + physical batch tags on each production order
  coverage: 100% of production materials — fibers, yarns, chemicals, dyes, auxiliaries, packaging
  records_retained: 10 years (per industry best practice)
  suppliers:
    - material: Polyester & Nylon Yarns
      source: Chinese and Taiwanese suppliers
      certified: OEKO-TEX, ISO 9001
    - material: Recycled Polyester Yarns
      source: GRS-certified suppliers
      certified: GRS, OEKO-TEX, ISO 9001
    - material: Chemical Dyes & Auxiliaries
      source: European and Chinese suppliers
      certified: REACH, BLUESIGN, ZDHC compliant
    - material: Functional Coating Chemicals
      source: Specialty chemical suppliers
      certified: REACH, BLUESIGN, OEKO-TEX

