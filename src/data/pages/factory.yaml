hero:
  tagline: Factory
  title: Factory & Manufacturing
  subtitle: Advanced textile manufacturing — from yarn to finished functional fabric

intro:
  - Kunshan Seeking Tex&Tech Co., Ltd controls every stage of textile production — from the arrival of raw fibers and yarns to the final inspection of finished fabric rolls. Our manufacturing facility in Kunshan, Suzhou houses dedicated workshops for knitting/weaving, dyeing, finishing, coating, lamination, and quality testing.
  - By integrating R&D, prototyping, manufacturing, and testing under one roof, we eliminate the inefficiencies of fragmented supply chains and maintain direct control over fabric quality, material selection, and delivery timelines. Every roll that leaves our workshop is made by our people, on our equipment, to our standards.

