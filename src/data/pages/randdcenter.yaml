capabilities:
  tagline: Capabilities
  title: R&D Capabilities
  subtitle: Four core disciplines that give us end-to-end control over product development —from raw material research to final certification.
  groups:
    - title: Material Science & Fabric Technology
      items:
        - PVC and Hypalon formulation analysis and optimisation
        - UV stabilisation, flame retardancy, and anti-microbial additive development
        - Multi-layer fabric lamination and adhesion engineering
        - Accelerated ageing testing (UV, thermal, humidity, salt spray)
    - title: Hull Engineering & Hydrodynamics
      items:
        - Parametric 3D hull design and CFD optimisation
        - Finite element analysis for structural and impact loads
        - Scale-model towing tank testing and performance validation
        - Custom hull development for special mission profiles
    - title: Welding & Joining Technology
      items:
        - RF dielectric welding process development and optimisation
        - Hot-air, hot-wedge, and ultrasonic welding methods
        - Adhesive bonding and seam tape qualification
        - Weld strength modelling and lifetime prediction
    - title: Testing, Certification & Compliance
      items:
        - Quality management and CE compliance testing
        - Independent third-party testing and certification support
        - Custom test protocol development for procurement qualification
        - In-service failure analysis and root-cause investigation

