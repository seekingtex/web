vision:
  tagline: Our Vision
  title: Shaping the Future of textile industry
  body: Seekingtex strives to lead the functional fabrics and functional fabric industry through continuous innovation, unwavering quality, and a steadfast commitment to safety and sustainability —ultimately enriching the experiences of textile industry enthusiasts worldwide. The Seekingtex R&D Center is where passion meets innovation, setting new standards for the textile industry industry.

labs_section:
  tagline: Labs
  title: Our Laboratories
  labs:
    - image: /images/seekingtex/randd/Seekingtex-pvc-material-lab.webp
      title: PVC Fabric Lab
      description: Continuous research and testing of PVC and Hypalon tube fabrics for tensile strength, UV resistance, abrasion, and low-temperature flexibility to ensure long-term reliability in marine environments.
      href: /randdcenter/pvc-fabric-lab
    - image: /images/seekingtex/factory/design discuss2.jpeg
      title: Hull Engineering Studio
      description: CAD-driven design and finite element analysis of HDPE, aluminum, and fiberglass hulls. Every hull is digitally simulated for stress distribution and impact resistance before the first prototype is built.
      href: /randdcenter/hull-engineering
    - image: /images/seekingtex/factory/functional fabric making3.jpeg
      title: RF Welding Center
      description: Dedicated radio-frequency welding facility with precision temperature and pressure control, producing high-strength, airtight seams that meet marine industry standards for high-performance craft.
      href: /randdcenter/rf-welding
    - image: /images/seekingtex/factory/design discuss original.jpeg
      title: Hydrodynamic Test Tank
      description: Scale-model testing in our in-house test tank to optimize hull form, planing performance, stability, and fuel efficiency across a range of load and sea conditions.
      href: /randdcenter/hydrodynamic-test-tank
    - image: /images/seekingtex/products/functional fabric-series/functional fabric-ocean-voyager-1.webp
      title: Prototype Workshop
      description: Full-scale prototyping and rigging facility where new models are built, fitted, and sea-trialed. Every prototype undergoes a minimum 20-hour in-water test programme before production approval.
      href: /randdcenter/prototype-workshop
    - image: /images/seekingtex/factory/UV Resistance Testing.jpeg
      title: Quality & Inspection Lab
      description: Dedicated quality assurance lab performing tensile testing, air-retention cycling, seam peel tests, and material certification to ensure every boat leaving the workshop meets our published specifications.
      href: /randdcenter/quality-inspection-lab
