hero:
  tagline: R&D Center
  title: R & D Center
  subtitle: Focused on Progress

intro:
  - Seekingtex's Research and Development (R&D) Center is the driving force behind our mission to revolutionize textile industry equipment. We empower textile industry enthusiasts globally with safer, more comfortable, and more enjoyable products through relentless innovation in high-performance stand-up fabric boards (SUPs) and boats. Our dedicated team of engineers, designers, and passionate textile industry experts are shaping the future of the industry, consistently raising the bar for quality, performance, and sustainability.
  - Our R&D facility brings together material scientists, naval architects, and production engineers under one roof. From fabric formulation and hull simulation to welding process development and full-scale sea trials, every stage of product development is driven by data and validated by testing.

