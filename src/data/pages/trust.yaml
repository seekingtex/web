faqs_textile:
  title: 'Woven Fabric FAQs'
  subtitle: 'Common questions about our woven fabric range.'
  columns: 2
  items:
    - title: 'What woven constructions does Seekingtex offer?'
      description: 'We produce plain, twill, satin, oxford, dobby, and jacquard weaves across a weight range of 80–500 gsm. Each construction is available in multiple fiber blends and finish options.'
    - title: 'What is the difference between a plain weave and a twill weave?'
      description: 'Plain weave is the simplest and most balanced construction — every weft thread passes over and under every warp thread, giving good stability and a flat surface. Twill weave has a diagonal rib pattern (e.g. 2/1 or 3/1), offering higher tear strength, better drape, and a softer hand feel.'
    - title: 'What fiber blends are available for woven fabrics?'
      description: 'We offer 100% polyester, 100% nylon, poly-cotton blends, poly-viscose blends, elastane stretch blends, and recycled variants. Custom blends can be developed for specific performance requirements.'
    - title: 'Are Seekingtex woven fabrics OEKO-TEX certified?'
      description: 'Yes. All woven fabric constructions are available with OEKO-TEX Standard 100 certification. We also offer GRS certification for recycled-content styles.'
    - title: 'What is the MOQ for custom woven fabrics?'
      description: 'Standard MOQ is 3,000 metres per color per construction. Lower MOQs may be available for stock-supported styles or sample development. Contact our sales team for specific requirements.'
    - title: 'What finishing options are available for woven fabrics?'
      description: 'Finishing options include anti-wrinkle, water-repellent, stain-release, anti-static, anti-bacterial, UV-protective, and mechanical stretch. Finishes are applied via pad-dry-cure or kiss-roll coating with lab-tested performance validation.'

faqs_fabric:
  title: 'Knitted Fabric FAQs'
  subtitle: 'Common questions about our knitted fabric range.'
  columns: 2
  items:
    - title: 'What knitted fabric types does Seekingtex produce?'
      description: 'We produce single jersey, interlock, rib, french terry, fleece, pique, pointelle, and jacquard knitted fabrics. Available in gauges from 12G to 44G depending on the construction.'
    - title: 'How long do knitted fabrics maintain their shape?'
      description: 'With proper care, our knitted fabrics maintain dimensional stability within 3–5% shrinkage after repeated laundering. We test all knitted styles for dimensional stability per AATCC 135 or ISO 6330.'
    - title: 'What maintenance is recommended for knitted fabrics?'
      description: 'Machine wash cold with like colours, tumble dry low, and avoid bleach or fabric softener that can degrade elastane content. Full care instructions are provided with each fabric specification sheet.'
    - title: 'Can knitted fabrics be used for activewear?'
      description: 'Yes. Our performance knits are engineered specifically for activewear — with moisture-wicking, 4-way stretch, anti-odour, and quick-dry properties. Yarn blends include recycled polyester, nylon, and organic cotton with elastane.'
    - title: 'What is the MOQ for custom knitted fabrics?'
      description: 'Standard MOQ is 500 kg per color per construction for circular knits, and 2,000 metres for flat-bed knits. Sample yardage is available for evaluation prior to bulk production.'
    - title: 'Do you offer custom fibre blends for knits?'
      description: 'Yes. We develop custom fiber blends including recycled polyester-cotton, Tencel-elastane, modal-nylon, and performance blends with moisture-management or thermal-regulating properties.'

faqs_performance:
  title: 'Functional Fabric FAQs'
  subtitle: 'Common questions about our coated and performance fabrics.'
  columns: 2
  items:
    - title: 'What functional fabric types does Seekingtex offer?'
      description: 'We offer waterproof (PU, PVC, TPU coated or laminated), breathable (hydrophilic PU and microporous), anti-bacterial (silver-ion and zinc-based), UV-protective (UPF 30–50+), and quick-dry (hydrophilic finish) fabrics.'
    - title: 'What is the difference between a coating and a lamination?'
      description: 'A coating is a polymer layer applied directly to the fabric surface via knife-over-roll or pad-dry-cure methods. A lamination bonds a pre-formed film or membrane to the fabric using adhesive. Laminates typically offer higher breathability while coatings are more cost effective for waterproof applications.'
    - title: 'What waterproof ratings are available?'
      description: 'Waterproof ratings range from 1,000 mmH₂O for light rain protection to 10,000+ mmH₂O for heavy-duty outdoor and technical apparel. Each rating is tested per AATCC 127 or ISO 811.'
    - title: 'What is the MOQ for functional coated fabrics?'
      description: 'Standard MOQ is 3,000 metres per finish type per colour. Lower MOQs available for select base fabrics from our stock-support program. Custom finish development typically requires 1,000 metres minimum.'
    - title: 'How do I choose between PU and PVC coating?'
      description: 'PU coating offers better breathability, softer hand feel, and is preferred for apparel and footwear. PVC coating offers higher waterproof durability, chemical resistance, and is preferred for industrial, protective, and heavy outdoor applications.'
    - title: 'Can functional fabrics be dyed after coating?'
      description: 'Most functional coatings are applied to pre-dyed fabrics. For specific requirements, we offer solution-dyed yarns or garment-dye-compatible finishes. Please consult our technical team for porous coating options that accept post-dyeing.'

