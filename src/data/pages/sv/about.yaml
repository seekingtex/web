hero:
  tagline: Om företaget
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: Seekingtex-verkstad
  title: |
    textil ingenjörskonst <br />
    i <span class="text-accent dark:text-white">Seekingtex</span>-stil
  subtitle: 'Vi började i en kustverkstad med en båt och en orubblig övertygelse: marina produkter bör vara designade som om livet hängde på dem – för det gör det. Idag levererar vi till 40+ länder, men varje skrov går fortfarande genom samma händer som grundade företaget.'

stats:
  title: I siffror
  columns: 4
  stats:
    - title: Levererade skrov
      amount: '2,400+'
    - title: Leveransländer
      amount: '40'
    - title: Total erfarenhet (år)
      amount: '60'
    - title: Genomsnittlig svarstid (h)
      amount: '24'

features3_what_we_build:
  title: Vad vi bygger
  subtitle: En fokuserad produktlinje vi kan utan och innan – inga genvägar eller badge engineering.
  columns: 3
  isBeforeContent: true
  items:
    - title: tekniskt tyg-båtar
      description: tekniskt tyg med aluminiumskrov från 3,3 m till 7,5 m. Designade för patrullering, dykning, fiske och familjebruk.
      icon: tabler:ship
    - title: funktionellt\ tygar
      description: PVC- och Hypalon-funktionellt\ tygar från 2,4 m till 4,2 m. Lätta, hållbara och lätta att förvara.
      icon: tabler:speedboat
    - title: Superyacht-tender
      description: Kompakta tekniskt tyg med höga specifikationer, anpassade till värdytans design.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Tillbehör
      description: Selar, pumpar, skydd, vattentäta väskor, bränsletankar och elektronik. Allt kompatibelt med våra båtar.
      icon: tabler:package
    - title: Modifieringar och reparationer
      description: Reparation av luftkammare, elektronikuppgraderingar och motorbyten.
      icon: tabler:tool
    - title: Skräddarsydda produkter
      description: Design för kommersiella, vetenskapliga och militära kunder.
      icon: tabler:hammer
  image:
    src: /images/seekingtex/factory/design discuss2.jpeg
    alt: Skräddarsydd båt

steps2_values:
  title: Våra värderingar
  subtitle: Tre principer som format varje produkt från dag ett.
  items:
    - title: Bygg som om din familj var i båten
      description: Varje skrov, varje svets och varje komponent behandlas som om de skulle användas av våra egna familjer.
      icon: tabler:heart
    - title: Ingenjörskonst före försäljning
      description: Om specifikationen är fel ändrar vi specifikationen – aldrig kunden.
      icon: tabler:settings
    - title: Support efter garantin
      description: Tjugo år gamla skrov ringer fortfarande efter delar – och vi svarar fortfarande.
      icon: tabler:headset

steps2_milestones:
  title: Milstolpar
  subtitle: Den korta versionen av Seekingtexs historia.
  isReversed: true
  items:
    - title: Grundad i en kustverkstad
      description: Två mariningenjörer med en CNC-fräs och en orubblig idé.
      icon: tabler:building-factory
    - title: Första 1 000 levererade skroven
      description: Uppnått under det sjunde året, främst genom mun-mot-mun-metoden och återkommande kunder.
      icon: tabler:circle-check
    - title: Internationellt exportprogram
      description: Leveranser till 40+ länder med lokala servicepartners på fem kontinenter.
      icon: tabler:world

features2_locations:
  title: Våra platser
  tagline: Var du hittar oss
  columns: 3
  items:
    - title: Huvudkontor och verkstad
      description: Kustnära industripark, byggnad 4 – öppet mån–fre för besök efter överenskommelse.
    - title: EU-servicecenter
      description: Medelhavshamn – modifieringar, reparationer och garantisupport för europeiska kunder.
    - title: APAC-partnernätverk
      description: Auktoriserade servicepartners i Australien, Japan, Singapore och Hongkong.
