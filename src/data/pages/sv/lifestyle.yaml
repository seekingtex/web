hero:
  tagline: Livsstil
  title: Livsstil<br />Seekingtex
  subtitle: Skapat för dem som lever på vattnet — från helgutforskare till kommersiella operatörer som förlitar sig på sin utrustning varje dag.

values:
  - icon: 🌊
    title: Födda ur vattnet
    desc: Varje projekt börjar med en förståelse för hur vatten beter sig. Vi designar från yttre förhållanden och inåt — för havet är vår lärare, inte vår arbetsplats.
  - icon: 🔧
    title: Byggda för att hålla
    desc: Den mest hållbara produkten är den som inte behöver bytas ut. Marina material, drop-stitch-kärnor som tål 15 PSI och sömmar som håller säsong efter säsong.
  - icon: '🏆'
    title: Tillgängliga av design
    desc: textilindustrier borde inte vara en lyx. Professionell prestanda till ett pris som passar familjer, instruktörer och små operatörer — inte bara kommersiella flottor.
  - icon: 🌍
    title: Global gemenskap
    desc: "Från Qingdaos kust till Europas sjöar, Sydostasiens floder och Amerikas vikar — våra kunder förenas av en sak: kärleken till att vara på vattnet."
  - icon: ♻️
    title: Ansvarsfull produktion
    desc: Optimerad CNC-skärning minskar materialspill till under 5%. Hållbar konstruktion minskar bytescykler. Vi bygger för lång livslängd, för det är det mest hållbara valet.
  - icon: 🤝
    title: Support som varar
    desc: Skrov som såldes för tjugo år sedan ringer fortfarande till oss för reservdelar. Vår garantisvarstid är i genomsnitt 24 timmar. Vi försvinner inte efter försäljningen — vi finns här under hela produktens livslängd.

