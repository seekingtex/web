label: 'Garanti'
headline: 'Seekingtexs begränsade tillverkargaranti'
subtitle: 'Seekingtex står bakom kvaliteten på varje uppblåsbar textil produkt vi tillverkar. Denna begränsade garanti anger villkoren och täckningen för din Seekingtex-produkt.'
seo:
  headline: 'Seekingtex uppblåsbar båtgaranti — 5 års begränsad garanti | Seekingtex'
  description: 'Seekingtex erbjuder en 5-årig begränsad garanti på integriteten hos primär slangväv, sömmar och glasfiber skrovstruktur. Täcker även uppblåsningsventiler och fabriksinstallerad tillbehör. Fullständiga villkor för Seekingtexs uppblåsbara båtgaranti.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Denna begränsade garanti gäller nya Seekingtex-märkta uppblåsbara marina produkter som köps direkt från Seekingtex eller från en auktoriserad Seekingtex-återförsäljare. Ikraftträdandedatumet är det verifierbara datumet för ursprungligt detaljhandelsköp.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Garantitäckning och varaktighet</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Integritet hos primär slangväv (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Strukturell integritet hos glasfiber skrov</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Lufttäthet hos uppblåsbara slangsömmar</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 år</h3>
        <p class="text-sm text-gray-600 mt-1">Funktionalitet hos uppblåsningsventiler</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 år</h3>
        <p class="text-sm text-gray-600 mt-1">Fabriksinstallerad tillbehör och hjälpbeslag</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 år*</h3>
        <p class="text-sm text-gray-600 mt-1">Kommersiell användning, uthyrning eller flotta — alla komponenter</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Kommersiell, statlig, charter-, uthyrnings- eller instruktionsanvändning reducerar garantin till 1 år. Användning i racing eller tävling ogiltigförklarar garantin helt.</p>
  </div>

  <h2>Vad som täcks</h2>
  <h3>Primär slangväv (5 år)</h3>
  <p>Seekingtex garanterar den primära slangväven mot porositetsförsämring som väsentligt äventyrar produktens förmåga att upprätthålla driftuppblåsning. Detta gäller CSM (Hypalon)-belagd väv och alla andra slangmaterial som används i tillverkningen.</p>

  <h3>Strukturell integritet hos glasfiber skrov (5 år)</h3>
  <p>För produkter med glasfiberförstärkt plastskrov (GFP) garanteras den grundläggande kompositstrukturen mot strukturellt fel på grund av defekter i material eller utförande.</p>

  <h3>Lufttäthet hos uppblåsbara slangsömmar (5 år)</h3>
  <p>Sömmarna på uppblåsbara slangar garanteras mot tillverkningsfel som resulterar i betydande luftläckage genom sömmen. Periodisk inspektion och upprätthållande av lämpliga uppblåsningstryck är villkor för täckning.</p>

  <h3>Funktionalitet hos uppblåsningsventiler (5 år)</h3>
  <p>Uppblåsningsventiler ursprungligen installerade av Seekingtex garanteras mot material- eller tillverkningsfel som hindrar ventilen från att hålla luft som avsett.</p>

  <h3>Fabriksinstallerad tillbehör (1 år)</h3>
  <p>Komponenter och beslag tillverkade av Seekingtex och ursprungligen installerade på fabriken garanteras mot material- och tillverkningsfel i ett år. Detta utesluter tredjepartsartiklar, som endast täcks av sina respektive tillverkargarantier.</p>

  <h2>Vad som inte täcks</h2>
  <ul>
    <li>Kosmetiska defekter inklusive missfärgning, fläckar, blekning, kritning eller andra förändringar i utseende</li>
    <li>Punkteringar, skärsår, revor eller annan fysisk skada</li>
    <li>Hårsprickor, sprickbildning, nötning, skav eller försämring från friktion eller kontakt</li>
    <li>Nedbrytning från UV-ljus, väderpåverkan eller atmosfäriska förhållanden</li>
    <li>Skada från kontakt med bränslen, lösningsmedel, syror, alkalier eller kemikalier</li>
    <li>Skada från försummelse, felaktig användning, missbruk, olycka eller normalt slitage</li>
    <li>Gelcoat- eller färgytproblem (blåsor, hårsprickor, missfärgning, blekning)</li>
    <li>Skada från stöt, belastning, felaktigt stöd eller transport på trailer</li>
    <li>Skada från felaktig uppblåsning/tömning eller användning av icke godkända uppblåsningsanordningar</li>
    <li>Tredjepartsutrustning, komponenter eller system (täcks av respektive tillverkare)</li>
  </ul>

  <h2>Tillverkarens skyldighet och rättsmedel</h2>
  <p>Seekingtexs enda och exklusiva skyldighet är reparation eller utbyte, efter Seekingtexs val, av varje komponent som bedöms vara defekt i material eller utförande och täcks av denna garanti. Reparationer eller utbyten utförs av Seekingtex eller dess utsedda auktoriserade servicecenter. Reparerade eller utbytta komponenter garanteras endast för den outnyttjade delen av den ursprungliga garantiperioden.</p>

  <h2>Garantivillkor</h2>
  <ul>
    <li><strong>Registrering:</strong> Produkten måste vara korrekt registrerad enligt garantivillkoren.</li>
    <li><strong>Underhåll:</strong> Produkten måste underhållas i enlighet med Seekingtexs publicerade riktlinjer, inklusive periodisk inspektion och upprätthållande av lämpliga uppblåsningstryck.</li>
    <li><strong>Samarbete:</strong> Köparen måste fullt ut och omedelbart samarbeta med Seekingtex i alla frågor som rör garantianspråk.</li>
    <li><strong>Ursprunglig köpare:</strong> Denna garanti ges uteslutande till den ursprungliga slutanvändaren och är inte överlåtbar.</li>
  </ul>

  <h2>Kommersiell användning</h2>
  <p>Om produkten används för kommersiella, statliga, ideella, charter-, uthyrnings-, instruktionsändamål eller annat än privat rekreation, reduceras garantiperioden för alla komponenter till ett (1) år från ursprungligt inköpsdatum. Användning i racing, hastighets- eller uthållighetstävling ogiltigförklarar omedelbart och oåterkalleligen hela garantin.</p>

  <h2>Så här gör du ett garantianspråk</h2>
  <p>Kontakta Seekingtex eller din auktoriserade återförsäljare med köpbevis och en detaljerad beskrivning av problemet. Seekingtex kommer att granska anspråket och ge instruktioner för inspektion och service.</p>
  <p>För garantiserviceförfrågningar, vänligen kontakta oss via vår <a href="/contact" class="text-sky-600 underline">kontaktsida</a> med ditt ordernummer och produktinformation.</p>

  <h2>Tredjepartsartiklar</h2>
  <p>Utrustning, komponenter eller system tillverkade av tredje part (även om de installeras av Seekingtex) täcks uteslutande av eventuell garanti som erbjuds av deras respektive tillverkare. Seekingtex frånsäger sig uttryckligen allt garantiansvar för sådana tredjepartsartiklar.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Denna garantiförklaring är en sammanfattning av den fullständiga begränsade tillverkargarantin från Seekingtex. Det fullständiga juridiska garantidokumentet styr alla garantivillkor. Specifikationer kan ändras utan föregående meddelande. Seekingtex är ett varumärke som tillhör Qingdao Vatrad Group.
  </p>
