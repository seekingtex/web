hero:
  tagline: "Utrustning"
  title: "Tillverkningsutrustning och Maskiner"
  subtitle: "Industriell utrustning för skärning, svetsning, tryck och montering"
  back_label: "Tillbaka till Fabriken"
  back_link: /factory

categories:
  - title: "Skärning och Materialförberedelse"
    items:
      - name: "Automatisk PVC-skärmaskin"
        spec: "CNC-styrd, 6.5 m × 2.5 m, 0.1 mm noggrannhet"
        desc: "Datorstyrd automatisk skärmaskin för PVC-, Hypalon- och drop-stitch-tyger. Nesting-programvara optimerar materialutnyttjandet till under 5 % avfall."
      - name: "Tygspridare"
        spec: "3 m max. bredd, spänningsstyrd matning"
        desc: "Lägger tyg i enkla eller flera lager med kontrollerad spänning för att förhindra förvridning före skärning."
  - title: "Rörsvetsning och Fogning"
    items:
      - name: "Värmekapslingsmaskin"
        spec: "Varmluftssvetsning, variabel 200–600 °C, 0.5–5 m/min"
        desc: "Varmluftsvärmekapslingsmaskin för sammanfogning och svetsning av PVC- och Hypalon-rörsömmar. Används för fastsättning, tätning och sammansmältning av rörkammare och flottfogar."
      - name: "Dielektrisk RF-press"
        spec: "15 kW, platta 2000 × 600 mm"
        desc: "Högfrekvent svetspress för huvudlängsgömmar, akterspegel-till-rör-fogar och tillverkning av stora kammare."
      - name: "CNC-styrd RF-svets"
        spec: "8 kW, XY-bord 2500 × 1200 mm"
        desc: "Programmerbar kurvad-söm-svetsning för komplexa geometrier, logo-prägling och precisionslappning."
  - title: "tekniskt tyg-skrovtillverkning"
    items:
      - name: "Glasfiberformar för handläggning"
        spec: "Flera formar för tekniskt tyg-skrov upp till 6 m LOA"
        desc: "Traditionell handläggning av glasfiber med polyester- och vinylesterhartsystem. Varje lager rullas för hand och vacuumförpackas för konsekvent laminatkvalitet och styrka."
      - name: "Gelcoat-sprutkabin"
        spec: "Temperaturstyrd, filtrerad luftventilation"
        desc: "Påföring av gelcoat på tekniskt tyg-skrov. Ger en högglansig, UV-resistent yta med precis tjocklekskontroll."
      - name: "CNC-fräs (5-axlig)"
        spec: "3 m × 2 m × 1 m arbetsområde, vattenkylt spindel"
        desc: "Bearbetning av skrovinsatser, konsollformar, sätesbaser och anpassade fästen."
  - title: "SUP-tryck och Dekoration"
    items:
      - name: "Digital skrivare"
        spec: "Högupplöst bläckstråle, tryckbredd upp till 2 m"
        desc: "Direkt-på-tyg digitaltryck för helfärgade SUP-däckgrafik. Skriver ut anpassade mönster, gradienter och fotokvalitetsbilder med UV-resistenta vattenbaserade bläck."
      - name: "Silketrycksmaskin"
        spec: "Manuell och halvautomatisk, flerfärgsregistrering"
        desc: "Silketryck för SUP-brädeslogotyper, varumärken och upprepade mönster. Ger hållbara, ogenomskinliga tryck med livfull färgmättnad."
  - title: "Montering och Rigging"
    items:
      - name: "Motorlyft"
        spec: "500 kg kapacitet, justerbar spridarstång"
        desc: "Säker montering av utombordsmotorer från 2.5 till 60 hk."
      - name: "Konsol-mock-up-ram"
        spec: "Justerbar höjd och vinkel"
        desc: "Förmontering av styrning, gas och instrumentpaneler före installation."
      - name: "Hydraulisk slangkrimmare"
        spec: "Upp till 1\" ID, digitalt tryckmätare"
        desc: "Hydrauliska styrningsslangsatser i anpassad längd med krimmade kopplingar."
      - name: "Elektriskt kabelbräde"
        spec: "3 m × 1.5 m, förutskrivna kabeldiagram"
        desc: "Montering och test av kompletta elektriska kabelsatser utanför båten."
  - title: "Testning och Kvalitetskontroll"
    items:
      - name: "Universell Dragtestare"
        spec: "50 kN, ASTM D751"
        desc: "Brottkraft, förlängning vid brott och rivningsspridningstest för tygpartier."
      - name: "Luftretentionsteststativ"
        spec: "Programmerbar, 30 min. tryckhållning"
        desc: "Automatiserat tryckhållningstest för varje rörkammare före montering."
      - name: "Söm-avskalningstestare"
        spec: "Motoriserad 180° avskalning vid 100 mm/min"
        desc: "Svetsade och limmade sömmars avskalningshållfasthetstest enligt ISO 6185."
      - name: "Xenon-båge-åldringskammare"
        spec: "2000 h exponering"
        desc: "UV-motståndstest för färgförändring och styrkebevarande."

