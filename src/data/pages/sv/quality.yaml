    label: Begränsad garanti

tests:
  - title: Trycktest
    description: Luftkammare utsätts för tryck över rekommenderade driftsgränser under längre tid. Detta verifierar lufttäthet och strukturell integritet hos material och sömmar, vilket säkerställer att produkten tål avsedd användning och potentiell överpumpning utan fel eller läckor.
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: Stöttest
    description: Produkter utsätts för kontrollerade stötar med olika vikter och vinklar. Bedömning av materialets motståndskraft mot punkteringar, revor och skador orsakade av kollisioner med hinder i vattnet, vilket påvisar hållbarhet och lång livslängd.
    image: /images/seekingtex/factory/producing department.jpeg
  - title: UV-beständighetstest
    description: Färdiga produkter exponeras för simulerat solljus under längre tid för att bedöma materialets motståndskraft mot nedbrytning, blekning och försvagning orsakad av långvarig UV-exponering —avgörande för båtar som används i tropiska och starkt soliga miljöer.
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: Nötningsbeständighetstest
    description: Materialprover gnids mot slipande ytor under ett visst antal cykler med kontrollerat tryck. Detta mäter materialets förmåga att motstå slitage från upprepad användning, kontakt med sand, stenar eller andra ytor, vilket säkerställer långsiktig hållbarhet.
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: Lågtemperaturprestandatest
    description: Produkter testas i kalla miljöer för att utvärdera funktionalitet och hållbarhet under olika temperaturförhållanden, vilket förhindrar stelhet eller sprickbildning i kallare vatten. Nödvändigt för båtar avsedda för vinterbruk eller på höga breddgrader.
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: Flytkrafts- och lastkapacitetstest
    description: Produkter testas med olika laster för att fastställa maximal lastkapacitet och säkerställa säkert stöd för användare och utrustning. Varje modell får sin lastkapacitet verifierad innan den släpps till försäljning.
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: Manövrerbarhetstest
    description: Produkter testas för respons vid paddling eller motorstyrning, vilket bedömer svängradie och lätthet att hantera. Vattentester bekräftar att den faktiska hanteringen överensstämmer med designspecifikationerna.
    image: /images/seekingtex/factory/sup making.jpeg
  - title: Vattentäthetstest
    description: Fullt monterade produkter sänks ned eller utsätts för vatten för att kontrollera eventuella läckor genom sömmar, ventiler eller material. Varje båt genomgår obligatorisk vattentäthetskontroll före leverans.
    image: /images/seekingtex/factory/producing department2.jpeg

