features:
  id: features
  tagline: Varför Seekingtex
  title: Vad du får med Seekingtex
  subtitle: Årtionden av varvserfarenhet komprimerat i en fokuserad produktlinje. Solid konstruktion, sjötestad, livslångt stöd.
  columns: 2
  items:
    - title: Marina material i premiumklass
      description: Högstyrka PVC, Hypalon och aluminiumskrov valda för UV-beständighet, nötningsmotstånd och saltvattenstålighet.
      icon: tabler:shield-check
    - title: Tillverkningskvalitet
      description: Varje skrov genomgår trycktest, varje svets inspekteras. Vi skickar bara det vi själva skulle sjösätta.
      icon: tabler:certificate
    - title: Modulär design
      description: Anpassa layout på fack, konsolposition, bränslekapacitet och tillbehör efter dina behov.
      icon: tabler:layout-grid
    - title: Ärliga specifikationer
      description: Verklig lastkapacitet, verkliga mått, verklig vikt. Inga marknadsföringsuppskruvningar. Aldrig.
      icon: tabler:ruler-measure
    - title: Snabb leverans och delar
      description: Standardmodeller skickas inom dagar. Originaldelar och förbrukningsartiklar i lager året runt.
      icon: tabler:truck-delivery
    - title: Livslångt stöd
      description: Direktlinje till vårt designteam för teknisk rådgivning, reparationer och uppgraderingar.
      icon: tabler:lifebuoy

featured_products:
  id: featured
  title: Utvalda produkter
  subtitle: Utvalda från vår aktuella katalog —?säsongens mest populära modeller.
  linkText: Se alla produkter
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: Inne i verkstaden
  title: Från skrovdesign till leverans —?varje steg internt
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Kvalitet du ser, känner och kan mäta</h3>
  items:
    - title: Designade av mariningenjörer
      description: Skrovlinjer ritas internt och itereras genom CFD-analys före första prototypen.
    - title: Svetsade och monterade i egen anläggning
      description: Svetsning av luftfack, montering av konsol och tillbehör sker under ett tak.
    - title: Sjöprov före leverans
      description: Varje modell genomgår flera timmars sjöprov som kontrollerar planing, svängar, toppfart och beteende under last.
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Verkstad

steps:
  title: Från specifikation till sjösättning i fem steg
  items:
    - title: 'Steg 1: <span class="font-medium">Konfiguration</span>'
      description: Välj modell, specificera alternativ och begär offert online eller via telefon. Teamet svarar inom en arbetsdag.
      icon: tabler:list-numbers
    - title: 'Steg 2: <span class="font-medium">Bekräftelse</span>'
      description: Vi bekräftar specifikation, leveranstid och totalkostnad skriftligt. Inga överraskningar, inga dolda avgifter.
      icon: tabler:checks
    - title: 'Steg 3: <span class="font-medium">Produktion</span>'
      description: Produktionen startar i vår verkstad. Vi skickar framstegsbilder vid viktiga milstolpar.
      icon: tabler:tool
    - title: 'Steg 4: <span class="font-medium">Leverans</span>'
      description: Packad på pall, krympplastad och skickad med sjö- eller luftfrakt. Tullklarering helt inkluderad.
      icon: tabler:truck-loading
    - title: 'Steg 5: <span class="font-medium">Support</span>'
      description: Två års garanti på skrov plus livslång teknisk support. Delar skickas inom 48 timmar.
      icon: tabler:headset
  image:
    src: /images/seekingtex/hero/production-dept.webp
    alt: Produktionsprocess

blog_latest:
  title: Från bloggen
  information: |
    Artiklar, tekniska noteringar och fallstudier från designteamet.
    Nya inlägg publiceras när ett projekt levereras, en standard uppdateras eller när någon har en historia värd att berätta.

faqs:
  title: Vanliga frågor
  subtitle: Frågor vi hör oftast. Om din inte finns här, skriv till oss —?vi svarar snabbt.
  columns: 2
  items:
    - title: Vilken modell ska jag välja
      description: Beror på besättningsstorlek, vattenområde och prioriteringar —?hastighet, lastkapacitet eller bränsleekonomi. Skicka en kort beskrivning så rekommenderar vi 2—? lämpliga modeller.
      icon: tabler:anchor
    - title: Levererar ni internationellt?
      description: Ja —?vi levererar till 40+ länder. Sjöfrakt är mest ekonomiskt för hela båtar; flygfrakt finns för brådskande beställningar.
      icon: tabler:ship
    - title: Vilken garanti ger ni?
      description: Två år på skrov, ett år på tillbehör, livstid på våra svetsar. Garantiregistrering medföljer varje leverans.
      icon: tabler:shield
    - title: Kan man anpassa en befintlig modell?
      description: Nästan alltid. Konsolposition, fackfärg, sittlayout, elektronik och motor kan anpassas. Specialskrov prissätts individuellt.
      icon: tabler:palette
    - title: Erbjuder ni utbildning och certifiering?
      description: För kommersiella operatörer kan vi ordna utbildning på vatten i vår anläggning. Privatkunder får kostnadsfria instruktioner vid leverans.
      icon: tabler:school
    - title: Hur får jag reservdelar?
      description: Beställ via kontaktsidan eller ring vår dellinje. Typiska artiklar (ventiler, remmar, pumpar, reparationssatser) skickas inom 48 timmar över hela världen.
      icon: tabler:settings

cta:
  title: |
    Redo att konfigurera <br class="block sm:hidden" /><span class="sm:whitespace-nowrap">din nästa båt</span>?
  subtitle: Berätta hur du ska använda båten, så föreslår vi inom en arbetsdag modell, alternativ och pris.
  actions:
    - variant: primary
      text: Begär offert
      href: /contact
      icon: tabler:message-circle
    - text: Bläddra i katalogen
      href: /products
