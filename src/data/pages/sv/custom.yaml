hero:
  tagline: Seekingtex Skräddarsydd Lab
  title: Designa din egen<br />båt
  subtitle: OEM-, ODM-, private label- och anpassade brandingtjänster för företag världen över. Från en enstaka prototyp till full produktionsserie.
  cta: Påbörja ditt projekt
  footer_link: /contact

steps_section:
  tagline: Hur det fungerar
  title: Från koncept till produktion
  subtitle: Fyra steg från din idé till en färdig, sjöklar båt.
  steps:
    - num: '01'
      title: Välj en bräda
      desc: Välj från våra basmodeller — SUP, kajak, textilprodukt eller tekniskt tyg. Välj storlek, material och färg.
    - num: '02'
      title: Skicka in din design
      desc: Skicka oss din logotyp, grafik eller varumärkesriktlinjer. Vårt designteam förbereder ett digitalt korrektur.
    - num: '03'
      title: AI-mockup-granskning
      desc: Se en fotorealistisk AI-genererad mockup av din anpassade bräda innan produktionen startar.
    - num: '04'
      title: Produktion och leverans
      desc: Efter godkännande går din beställning till vår ISO-certifierade produktionslinje. Ledtid från 30 dagar.

services_section:
  tagline: Tjänster
  title: Produktionstjänster för globala varumärken
  subtitle: Flexibla samarbetsmodeller — från kontraktstillverkning till komplett varumärkesbyggande.
  items:
    - title: OEM-produktion
      desc: Vi tillverkar enligt dina specifikationer — din immateriella egendom, dina ritningar, dina kvalitetsstandarder. Fullt NDA-skydd.
      icon: ⚙️
    - title: ODM-lösningar
      desc: Välj från över 50 beprövade plattformar och anpassa storlek, färg, grafik och förpackning.
      icon: '🎨'
    - title: Private Label
      desc: Ditt varumärke på våra produkter — logotyp, förpackning, etiketter, instruktioner. Klart att sälja direkt ur kartongen.
      icon: 🏷️
    - title: Anpassad branding
      desc: Tryck på däck, skrovgrafik, tubdekal och anpassade etiketter — full varumärkesintegration.
      icon: ✨

capabilities_section:
  tagline: Kapacitet
  title: Produktions- och anpassningskapacitet
  subtitle: Allt du behöver veta innan du lägger en beställning.
  capabilities:
    - label: Beställningsvolym
      value: MOQ 5–10 st (SUP/kajak), 2–5 st (tekniskt tyg)
    - label: Ledtid
      value: 30–45 dagar standard; 15–20 dagar för prototyper
    - label: Anpassning
      value: Storlek, form, färg, grafik, förpackning, tillbehör
    - label: Material
      value: PVC, Hypalon, drop-stitch, glasfiber, aluminium
    - label: Tryck
      value: Digitalt (CMYK), screentryck, värmeöverföring, sublimering
    - label: Certifiering
      value: CE, UKCA, FCC (stöd för global efterlevnad)

why_section:
  tagline: Varför Seekingtex
  title: En fabrik. En standard. Noll kompromisser.
  points:
    - text: Integrerad produktionsanläggning på 12 000 m²
      highlight: 12 000 m²
    - text: Över 200 kvalificerade arbetare och ingenjörer
      highlight: 200+
    - text: Över 15 000 båtar producerade årligen
      highlight: 15 000+
    - text: -certifierat kvalitetsledningssystem
      highlight: ISO 9001
    - text: CE-certifierade produkter för EU-marknaden
      highlight: CE
  cta: Se fabriksdetaljer
  cta_link: /factory
  contact:
    title: Redo att diskutera ditt projekt?
    desc: Vårt team svarar inom 24 timmar med en preliminär offert.
