hero:
  tagline: Resurser
  title: Mediecenter
  subtitle: Ladda ner varumärkesmaterial, produktbilder, kataloger och videor

sections:
  - id: product-images
    title: Produktbilder
    desc: Högupplösta produktbilder för webb, tryck och detaljhandel.
    items:
      - SUP-brädgalleri
      - tekniskt tyg-båtgalleri
      - Uppblåsbara kajakgalleri
      - Tillbehör och säkerhetsutrustning
  - id: logo-brand-kit
    title: Logotyp och varumärkeskit
    desc: Officiella Seekingtex-logofiler, färgpalett, typografi och varumärkesriktlinjer.
    items:
      - Primär logotyp (PNG/SVG/EPS)
      - Ikonmärke
      - Färgpalett
      - Typografispecifikation
      - Varumärkesriktlinjer PDF
  - id: catalogs
    title: PDF-kataloger
    desc: Produktkataloger, specifikationsblad och teknisk dokumentation för nedladdning.
    items:
      - Produktkatalog 2026
      - OEM/ODM kapacitetspresentation
      - tekniskt tyg-serie broschyr
      - Tekniska specifikationer
  - id: videos
    title: Videor
    desc: Produktpresentationer, fabriksrundturer, varumärkesfilmer och kundreferenser.
    items:
      - Produktpresentationer
      - Fabriksrundtur
      - Varumärkesfilm
      - Kundberättelser
      - Guider

