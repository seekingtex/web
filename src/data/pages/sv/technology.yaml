hero:
  tagline: Teknologi
  title: Vår teknologi
  subtitle: Seekingtex-produkter är designade med avancerade material och innovativ ingenjörskonst för att leverera exceptionell prestanda, hållbarhet och portabilitet.

features:
  - title: Militärklass PVC
    description: Våra funktionellt\ tygar och SUP:ar använder UV- och nötningsbeständigt PVC-tyg med hög draghållfasthet och punkteringsmotstånd.
  - title: Drop-Stitch-konstruktion
    description: Tusentals högtäthetsfibrer förbinder övre och nedre ytan och skapar en styv, högtrycksdäck – vilket ger uppblåsbara SUP:ar prestanda nära styva brädor.
  - title: Värme svetsning
    description: Fogarna är värme svetsade, inte limmade, vilket ger varaktig bindningsstyrka vid kritiska stresspunkter.
  - title: Automatisk uppblåsningsteknik
    description: Pro-flytvästarna använder en automatisk uppblåsningsmekanism som aktiveras omedelbart vid nedsänkning, vilket ger pålitlig flytkraft.
