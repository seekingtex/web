how_to_choose:
  title: Så här väljer du rätt storlek
  cards:
    - title: SUP-brädor
      description: Välj längd baserat på din vikt och användningsområde. Bredare brädor (32"+) ger större stabilitet. Längre brädor (11–12 fot) håller kursen bättre vid turer. Tyngre paddlare behöver brädor med större volym.
    - title: tekniska tyger
      description: Enkelkajaker (9 fot) är bäst för soloäventyr och floder. Tandemkajaker (12 fot) rymmer två paddlare eller en vuxen med utrustning. Kontrollera lastkapaciteten för total vikt inklusive utrustning.
    - title: Båtar och tekniskt tyg:ar
      description: Välj båtlängd efter antal passagerare och användningsområde. Större tekniskt tyg:ar (4,5 m+) lämpar sig för offshore och räddningstjänst. Mindre båtar (2,7 m) fungerar som tender och fiskebåtar.
