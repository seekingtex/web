stories:
  tagline: 'Upptäckarberättelser'
  title: 'Riktiga äventyr från riktiga människor'
  subtitle: 'Hör från paddlare, familjer och professionella som använder Seekingtex-utrustning på vattnet.'
  items:
    - name: 'Sarah & Mike'
      title: 'SUP Explorer 11-ägare, Kanada'
      content: 'Vi tog våra Explorer 11 på en veckolång resa genom Algonquin Park. De hanterade bärningar och sjöövergångar vackert. Drop-stitch-konstruktionen innebar att vi kunde pumpa upp till 15 PSI och få hardboard-prestanda från ett packbart bräde.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Algonquin Park, Kanada'
    - name: 'Carlos R.'
      title: 'Cheetah Surge-ryttare, Spanien'
      content: 'Cheetah Surge är mitt val för kustcruising. Den livfulla designen väcker uppmärksamhet på stranden, och stabiliteten ger mig självförtroende i lätt sjö. Den hanterar vackert, vare sig jag turar eller bara njuter av solnedgången.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Spanien'
    - name: 'Lina och familj'
      title: 'Flowing Lotus-paddlare, Sverige'
      content: 'Helgens familjeäventyr i skärgården. Flowing Lotus är stabil nog för att min dotter ska kunna stå på den medan jag paddlar. Pumpas upp på under 10 minuter —ingen trailer behövs, bara ren familjelycka på vattnet.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Stockholms skärgård, Sverige'
    - name: 'Lt. Cmdr. Andres'
      title: 'Ocean Voyager-utforskare, Filippinerna'
      content: 'Jag använder min Ocean Voyager för långdistans kustturer runt Palawan. Efter månader av daglig användning i tropiska förhållanden fungerar brädet fortfarande som nytt. Turingsformen skär genom sjö som skulle stoppa mindre bräden.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filippinerna'
    - name: 'Emma T.'
      title: 'Tropical Breeze-förstagångsanvändare, Australien'
      content: 'Jag hade aldrig varit på ett SUP förut. Tropical Breeze är så stabil att jag kände mig trygg på första försöket. Nu paddlar jag varje helg. Inlärningskurvan är i princip noll —och brädet ser fantastiskt ut på vattnet.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Australien'

