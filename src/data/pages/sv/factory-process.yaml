intro: Till skillnad från märken som lägger ut produktion på tredjepartsfabriker äger och driver Seekingtex hela sin produktionskedja. Denna vertikala integration gör att vi kan upprätthålla strikt kvalitetskontroll i varje steg, snabbt reagera på anpassade krav och leverera jämn produktkvalitet batch efter batch. Så här byggs en båt i vår anläggning.

steps:
  - step: '01'
    title: Materialmottagning och inspektion
    description: Varje inkommande batch av PVC-tyg, glasfibermatta, harts och tillbehör inspekteras enligt specifikation. Tygprover testas för draghållfasthet, tjockleksenhetlighet och UV-beständighet innan de släpps till produktion. Material som inte uppfyller kraven karantänsätts och returneras.
    duration: 1–2 dagar
  - step: '02'
    title: Automatisk PVC-skärning
    description: Godkända tyger läggs ut på en automatisk CNC-skärmaskin och skärs med submillimeterprecision. Datoroptimerad layout placerar paneler för att minimera spill — typiskt under 5 %. Skurna paneler märks med båtmodell och kammare, packas och överförs till svetsverkstaden.
    duration: 2–4 timmar per båtsats
  - step: '03'
    title: Rörsvetsning och fogning
    description: Paneler tråcklas och fogas med varmluftsvetsmaskiner  vid kontrollerade temperaturer 200–600 °C. Huvudsömmar förstärks med dielektrisk RF-försegling för lufttäta, höghållfasta fogar. Färdiga kammare blåses upp till 1,5× arbetstryck i 30 minuter för validering av lufttäthet.
    duration: 1–2 dagar per båt
  - step: '04'
    title: Gjutning av tekniskt tyg-skrov i glasfiber
    description: tekniskt tyg-båtars skrov tillverkas med handuppläggning av glasfiber. Lager av glasfibermatta och väv rullas för hand med polyester- eller vinylesterharts i precisionsformar. Varje lager vakuumpackas för jämn laminatkvalitet. Skrovet ytbehandlas med gelcoat för en högglansig, UV-beständig marina yta.
    duration: 2–4 dagar per skrov
  - step: '05'
    title: SUP-tryck och dekor
    description: Grafiken på SUP-brädans däck appliceras med digitaltryck  för fullfärgsmönster av fotografisk kvalitet och screentryck  för hållbara logotyper och återkommande mönster. Trycken härdas och förseglas för UV- och nötningsbeständighet.
    duration: 1–2 dagar
  - step: '06'
    title: Slutmontering och utrustning
    description: Glasfiberskrov och PVC-rörsatser sammanfogas på monteringslinjen. Motorn monteras, styr- och kontrollsystem ansluts, bränslesystemet installeras och hela elsystemet kopplas. Varje båt genomgår en 100-punkts monteringskontrolllista med obligatoriskt godkännande i varje steg.
    duration: 2–3 dagar
  - step: '07'
    title: Kvalitetstestning och inspektion
    description: "Varje färdig båt genomgår en obligatorisk kvalitetsgrind: lufttäthetstest av kammare, funktionell systemkontroll, verifiering av fästmoment och kosmetisk inspektion. Anpassade och prototypkonstruktioner genomgår även sjöprov på vatten som omfattar hastighet, manövrering, stabilitet och hållbarhet."
    duration: 1–2 dagar
  - step: '08'
    title: Packning och frakt
    description: Båtar töms på luft, viks enligt procedur, packas i slitstarka tygpåsar eller plywoodlådor och lastas för frakt. Varje paket märks med modell, serienummer och destination. Vi samordnar med transportörer för FCL- och LCL-frakt över hela världen.
    duration: 1 dag

