tests:
  - title: Испытание давлением
    description: функциональные камеры подвергаются давлению, превышающему рекомендуемые рабочие пределы, в течение длительного времени. Это проверяет герметичность и структурную целостность материала и швов, гарантируя, что изделие выдерживает предполагаемое использование и возможное перекачивание без отказов или утечек.
    image: /images/seekingtex/factory/Pressure Testing.jpeg
  - title: Испытание на удар
    description: Изделия подвергаются контролируемым ударам различными грузами и под разными углами. Это оценивает устойчивость материала к проколам, разрывам и повреждениям от столкновений с препятствиями в воде, демонстрируя долговечность.
    image: /images/seekingtex/factory/producing department.jpeg
  - title: Испытание на стойкость к УФ-излучению
    description: Готовые изделия подвергаются воздействию симулированного солнечного света в течение длительного времени для оценки устойчивости материала к деградации, выцветанию и ослаблению, вызванным длительным воздействием УФ —критически важно для лодок, используемых в тропических и солнечных регионах.
    image: /images/seekingtex/factory/UV Resistance Testing.jpeg
  - title: Испытание на истирание
    description: Образцы материала трутся об абразивные поверхности в течение заданного количества циклов под контролируемым давлением. Это измеряет способность материала выдерживать износ от многократного использования, контакта с песком, камнями или другими поверхностями, обеспечивая долгосрочную прочность.
    image: /images/seekingtex/factory/PVC material.jpeg
  - title: Испытание при низких температурах
    description: Изделия тестируются в холодных условиях для оценки функциональности и долговечности в различных температурных режимах, предотвращая жесткость или растрескивание в холодной воде. Необходимо для лодок, предназначенных для зимнего использования или высоких широт.
    image: /images/seekingtex/factory/Seekingtex-factory-exterior.webp
  - title: Испытание плавучести и грузоподъемности
    description: Изделия тестируются с различными грузами для определения максимальной грузоподъемности и обеспечения безопасной поддержки пользователей и снаряжения. Номинальная грузоподъемность каждой модели проверяется перед выпуском.
    image: /images/seekingtex/factory/Stock Boat.webp
  - title: Испытание маневренности
    description: Изделия тестируются на реакцию на греблю или управление мотором, оценивая радиус поворота и легкость управления. Натурные испытания на воде подтверждают, что реальные характеристики соответствуют проектным спецификациям.
    image: /images/seekingtex/factory/sup making.jpeg
  - title: Испытание на водонепроницаемость
    description: Полностью собранные изделия погружаются в воду или подвергаются воздействию водяного распыла для проверки на наличие утечек через швы, клапаны или материалы. Каждая ткана проходит обязательную проверку водонепроницаемости перед отправкой.
    image: /images/seekingtex/factory/producing department2.jpeg

