hero:
  tagline: Образ жизни
  title: Образ жизни<br />Seekingtex
  subtitle: Создано для тех, кто живет на воде — от отпускников-исследователей до коммерческих операторов, которые полагаются на свое снаряжение каждый день.

values:
  - icon: 🌊
    title: Рожденные на воде
    desc: Каждый дизайн начинается с понимания того, как ведет себя вода. Мы проектируем от границ условий внутрь — потому что океан — наш учитель, а не рабочее место.
  - icon: 🔧
    title: Создано, чтобы служить
    desc: Самый устойчивый продукт — тот, который не требует замены. Материалы текстильного класса, сердечники drop-stitch, рассчитанные на 15 PSI, и швы, которые переживают сезон.
  - icon: '🏆'
    title: Доступность по дизайну
    desc: текстильная\ промышленность не должны быть роскошью. Профессиональная производительность по цене, которая имеет смысл для семей, гидов и малых операторов — не только для коммерческих флотов.
  - icon: 🌍
    title: Глобальное сообщество
    desc: "От побережья Циндао до озер в Европе, рек в Юго-Восточной Азии и заливов в Америке — наших клиентов объединяет одно: любовь к пребыванию на воде."
  - icon: ♻️
    title: Ответственное производство
    desc: Оптимизированный CNC-раскрой снижает отходы материала до 5%. Прочная конструкция сокращает циклы замены. Мы строим на долговечность, потому что это самый устойчивый выбор.
  - icon: 🤝
    title: Поддержка, которая длится
    desc: Двадцатилетние корпуса все еще звонят нам за запчастями. Наше время реакции на гарантийные случаи составляет в среднем 24 часа. Мы не исчезаем после продажи — мы здесь на весь срок службы продукта.

