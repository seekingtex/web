      icon: 'tabler:certificate'
    - title: ''
      description: '袧邪褕械 锌芯屑械褖械薪懈械 胁 笑懈薪写邪芯 锌谢芯褖邪写褜褞 12 000 屑虏 褉邪斜芯褌邪械褌 锌芯 褋懈褋褌械屑械 屑械薪械写卸屑械薪褌邪 泻邪褔械褋褌胁邪 . 袣邪卸写邪褟 锌褉芯懈蟹胁芯写褋褌胁械薪薪邪褟 锌邪褉褌懈褟 芯褌褋谢械卸懈胁邪械屑邪, 写芯泻褍屑械薪褌懈褉芯胁邪薪邪 懈 锌褉芯胁械褉械薪邪.'
