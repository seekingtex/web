testimonials:
  tagline: '袛芯胁械褉懈械 泻谢懈械薪褌芯胁'
  title: '效褌芯 谐芯胁芯褉褟褌 薪邪褕懈 泻谢懈械薪褌褘'
  subtitle: '袨褌 谐褉械斜褑芯胁-薪芯胁懈褔泻芯胁 写芯 锌褉芯褎械褋褋懈芯薪邪谢褜薪褘褏 芯锌械褉邪褌芯褉芯胁 褎谢芯褌邪 鈥?褍蟹薪邪泄褌械, 锌芯褔械屑褍 芯薪懈 写芯胁械褉褟褞褌 Seekingtex.'
  items:
    - content: '袦褘 芯褋薪邪褋褌懈谢懈 胁械褋褜 薪邪褕 锌褉芯泻邪褌薪褘泄 褎谢芯褌 褌械褏薪懈褔械褋泻邪褟 褌泻邪薪褜 Seekingtex. 袛胁邪 褋械蟹芯薪邪 鈥?薪芯谢褜 芯褌泻邪蟹芯胁. 小械褉褌懈褎懈泻邪褑懈褟 CE 褋写械谢邪谢邪 芯写芯斜褉械薪懈械 褋褌褉邪褏芯胁泻懈 seamless.'
      name: '袦邪褉泻芯 袙.'
      title: '孝褍褉芯锌械褉邪褌芯褉, 啸芯褉胁邪褌懈褟'
    - content: '袣邪泻 锌芯泻褍锌邪褌械谢褜-薪芯胁懈褔芯泻, 褟 锌械褉械卸懈胁邪谢 芯 泻邪褔械褋褌胁械. 袛芯泻褍屑械薪褌邪褑懈褟 ISO 懈 芯褌褔械褌褘 芯斜 懈褋锌褘褌邪薪懈褟褏, 泻芯褌芯褉褘屑懈 芯薪懈 锌芯写械谢懈谢懈褋褜, 写邪谢懈 屑薪械 锌芯谢薪褍褞 褍胁械褉械薪薪芯褋褌褜.'
      name: '袛卸械泄屑褋 孝.'
      title: '袙谢邪写械谢械褑 Fabric Explorer 11, 袣邪薪邪写邪'
    - content: '袦褘 褉邪斜芯褌邪械屑 褋 Seekingtex 写谢褟 薪邪褕懈褏 锌褉懈斜褉械卸薪褘褏 锌邪褌褉褍谢褜薪褘褏 锌芯写褉邪蟹写械谢械薪懈泄. 袠褏 锌褉芯褑械褋褋 QC 锌芯褋谢械写芯胁邪褌械谢械薪 胁 泻邪卸写芯泄 锌邪褉褌懈懈 鈥?褝褌邪 薪邪写械卸薪芯褋褌褜 懈屑械械褌 蟹薪邪褔械薪懈械 胁 泻褉懈褌懈褔械褋泻懈 胁邪卸薪褘褏 芯锌械褉邪褑懈褟褏.'
      name: '袣邪锌懈褌邪薪-谢械泄褌械薪邪薪褌 袗薪写褉械褋'
      title: '袙芯械薪薪芯-褌械泻褋褌懈谢褜薪懈械 蟹邪泻褍锌泻懈, 肖懈谢懈锌锌懈薪褘'

