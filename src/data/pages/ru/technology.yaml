hero:
  tagline: Технологии
  title: Наши технологии
  subtitle: Продукты Seekingtex разработаны с использованием передовых материалов и инновационной инженерии для обеспечения исключительной производительности, долговечности и портативности.

features:
  - title: ПВХ военного класса
    description: Наши функциональные ткани и SUP используют устойчивую к УФ-излучению и истиранию ткань ПВХ с высокой прочностью на разрыв и прокол.
  - title: Конструкция Drop-Stitch
    description: Тысячи высокоплотных волоконных нитей соединяют верхнюю и нижнюю поверхности, создавая жесткую палубу высокого давления – что дает надувным SUP производительность, близкую к жестким доскам.
  - title: Термосварные швы
    description: Швы термосвариваются, а не склеиваются, обеспечивая долговечную прочность соединения в критических точках напряжения.
  - title: Технология автоматического надувания
    description: Спасательные жилеты Pro используют механизм автоматического надувания, который срабатывает немедленно при погружении, обеспечивая надежную плавучесть.
