how_to_choose:
  title: Как выбрать правильный размер
  cards:
    - title: SUP-доски
      description: Выбирайте длину в зависимости от вашего веса и предполагаемого использования. Более широкие доски (32"+) обеспечивают большую устойчивость. Более длинные доски (11-12 футов) лучше держат курс для туринга. Более тяжелым гребцам нужны доски большего объема.
    - title: Байдарки
      description: Одиночные байдарки (9 футов) лучше всего подходят для одиночных путешествий и рек. Двухместные байдарки (12 футов) вмещают двух гребцов или одного взрослого с снаряжением. Проверьте грузоподъемность для общего груза, включая снаряжение.
    - title: текстильное\ изделие и техническая ткань
      description: Выбирайте длину текстильное изделие по количеству пассажиров и предполагаемому использованию. Более крупные техническая ткань (4,5 м+) подходят для открытого моря и спасательных работ. Меньшие текстильное изделие (2,7 м) используются как тендеры и рыболовные платформы.
