      icon: tabler:ship
    - title: 褎褍薪泻褑懈芯薪邪谢褜薪褘械 褌泻邪薪懈
      description: 褎褍薪泻褑懈芯薪邪谢褜薪褘械 褌泻邪薪懈 懈蟹 袩袙啸 懈 Hypalon 芯褌 2,4 写芯 4,2 屑. 袥褢谐泻懈械, 锌褉芯褔薪褘械 懈 褍写芯斜薪褘械 胁 褏褉邪薪械薪懈懈.
      icon: tabler:speedboat
    - title: 孝械薪写械褉褘 写谢褟 褋褍锌械褉褗锌褉械屑懈邪谢褜薪邪褟 褌泻邪薪
      description: 袣芯屑锌邪泻褌薪褘械 褌械褏薪懈褔械褋泻邪褟 褌泻邪薪褜 褋 胁褘褋芯泻懈屑懈 褏邪褉邪泻褌械褉懈褋褌懈泻邪屑懈, 懈蟹谐芯褌芯胁谢械薪薪褘械 锌芯写 褋褌懈谢褜 胁邪褕械泄 锌褉械屑懈邪谢褜薪邪褟 褌泻邪薪褘.
