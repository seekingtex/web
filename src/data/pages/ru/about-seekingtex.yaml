features3_what_we_build:
  title: 效褌芯 屑褘 褋褌褉芯懈屑
  subtitle: 小褎芯泻褍褋懈褉芯胁邪薪薪邪褟 谢懈薪械泄泻邪 锌褉芯写褍泻褑懈懈, 泻芯褌芯褉褍褞 屑褘 蟹薪邪械屑 写芯褋泻芯薪邪谢褜薪芯 鈥?薪懈泻邪泻懈褏 薪械写芯褉邪斜芯褌邪薪薪褘褏 褝泻褋锌械褉懈屑械薪褌芯胁 懈 褔褍卸懈褏 斜褉械薪写芯胁.
  columns: 3
  isBeforeContent: true
  items:
    - title: 褌械褏薪懈褔械褋泻邪褟 褌泻邪薪褜-褌泻邪薪懈
