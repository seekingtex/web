stories:
  tagline: 'Истории исследователей'
  title: 'Реальные приключения реальных людей'
  subtitle: 'Узнайте от гребцов, семей и профессионалов, использующих снаряжение Seekingtex на воде.'
  items:
    - name: 'Сара и Майк'
      title: 'Владельцы SUP Explorer 11, Канада'
      content: 'Мы взяли наши Explorer 11 в недельное путешествие по парку Алгонкин. Они отлично справились с волоками и пересечением озер. Конструкция drop-stitch позволила накачать до 15 PSI и получить производительность жесткой доски из упаковываемой доски.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Парк Алгонкин, Канада'
    - name: 'Карлос Р.'
      title: 'Райдер Cheetah Surge, Испания'
      content: 'Cheetah Surge — моя основная доска для прибрежных прогулок. Яркий дизайн привлекает внимание на пляже, а устойчивость дает уверенность в легкую волну. Она прекрасно ведет себя как в турах, так и на закате.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Коста-Брава, Испания'
    - name: 'Лина и семья'
      title: 'Гребцы Flowing Lotus, Швеция'
      content: 'Семейные приключения по выходным на архипелаге. Flowing Lotus достаточно стабильна, чтобы моя дочь могла стоять, пока я гребу. Надувается менее чем за 10 минут — никакого прицепа, только чистое семейное веселье на воде.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Стокгольмский архипелаг, Швеция'
    - name: 'Капитан-лейтенант Андрес'
      title: 'Исследователь Ocean Voyager, Филиппины'
      content: 'Я использую свой Ocean Voyager для дальних прибрежных туров вокруг Палавана. После месяцев ежедневного использования в тропических условиях доска все еще работает как новая. Туринговая форма рассекает волны, которые остановили бы доски послабее.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Палаван, Филиппины'
    - name: 'Эмма Т.'
      title: 'Новичок Tropical Breeze, Австралия'
      content: 'Я никогда раньше не стояла на SUP. Tropical Breeze настолько стабильна, что я почувствовала уверенность с первой попытки. Теперь гребу каждые выходные. Кривая обучения практически нулевая — и доска выглядит потрясающе на воде.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Золотой Берег, Австралия'

