hero:
  tagline: Seekingtex Custom Lab
  title: Спроектируйте Свою<br />Лодку
  subtitle: Услуги OEM, ODM, private label и индивидуального брендинга для компаний по всему миру. От единичного прототипа до полной производственной серии.
  cta: Начать проект
  footer_link: /contact

steps_section:
  tagline: Как это работает
  title: От концепции до производства
  subtitle: Четыре шага от вашей идеи до готовой, готовой к морю ткани.
  steps:
    - num: '01'
      title: Выберите доску
      desc: Выберите из наших основных моделей — SUP, байдарка, тузик или техническая ткань. Укажите размер, материал и цвет.
    - num: '02'
      title: Загрузите дизайн
      desc: Отправьте нам ваш логотип, графику или бренд-гайд. Наша команда дизайнеров подготовит цифровой пробник.
    - num: '03'
      title: Просмотр AI-макета
      desc: Посмотрите фотореалистичный макет вашей индивидуальной доски, сгенерированный AI, до начала производства.
    - num: '04'
      title: Производство и доставка
      desc: После утверждения ваш заказ поступает на нашу сертифицированную ISO производственную линию. Сроки от 30 дней.

services_section:
  tagline: Услуги
  title: Производственные услуги для глобальных брендов
  subtitle: Гибкие модели сотрудничества — от контрактного производства до полного построения бренда.
  items:
    - title: Производство OEM
      desc: Мы производим ваши дизайны по спецификации — ваша ИС, ваши чертежи, ваши стандарты качества. Полная защита NDA.
      icon: ⚙️
    - title: Решения ODM
      desc: Выберите из более чем 50 проверенных платформ и настройте размер, цвет, графику и упаковку.
      icon: '🎨'
    - title: Private Label
      desc: Ваш бренд на наших продуктах — логотип, упаковка, бирки, инструкции. Готово к розничной продаже.
      icon: 🏷️
    - title: Индивидуальный брендинг
      desc: Печать на деке, графика корпуса, наклейки на трубы и индивидуальные этикетки — полная интеграция бренда.
      icon: ✨

capabilities_section:
  tagline: Возможности
  title: Производственные возможности и возможности настройки
  subtitle: Все, что вам нужно знать перед размещением заказа.
  capabilities:
    - label: Объем заказа
      value: MOQ 5–10 шт. (SUP/байдарка), 2–5 шт. (техническая ткань)
    - label: Срок поставки
      value: 30–45 дней стандартно; 15–20 дней для прототипов
    - label: Настройка
      value: Размер, форма, цвет, графика, упаковка, фурнитура
    - label: Материалы
      value: PVC, Hypalon, drop-stitch, стеклопластик, алюминий
    - label: Печать
      value: Цифровая (CMYK), шелкография, термоперенос, сублимация
    - label: Сертификация
      value: CE, UKCA, FCC (поддержка глобального соответствия)

