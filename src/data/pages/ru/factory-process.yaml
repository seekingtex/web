  tagline: Процесс
  title: Производственный процесс
  subtitle: От сырья до готовой к морю ткани — каждый шаг под нашим контролем
  back_label: Назад на фабрику
  back_link: /factory

intro: В отличие от брендов, которые передают производство сторонним фабрикам, Seekingtex владеет и управляет всей своей производственной цепочкой. Эта вертикальная интеграция позволяет нам поддерживать строгий контроль качества на каждом этапе, быстро реагировать на индивидуальные требования и обеспечивать стабильное качество продукции партия за партией. Вот как строится ткана на нашем предприятии.

steps:
  - step: '01'
    title: Приемка и входной контроль материалов
    description: Каждая поступающая партия PVC-ткани, стекломата, смолы и фурнитуры проверяется на соответствие спецификации. Образцы ткани тестируются на прочность на растяжение, равномерность толщины и стойкость к УФ перед допуском в производство. Несоответствующие материалы помещаются в карантин и возвращаются.
    duration: 1–2 дня
  - step: '02'
    title: Автоматическая резка PVC
    description: Одобренные ткани укладываются на автоматическую раскройную машину CNC и режутся с субмиллиметровой точностью. Компьютерно-оптимизированный расклад располагает панели для минимизации отходов — обычно ниже 5%. Вырезанные панели маркируются по модели ткани и камере, затем комплектуются для передачи в сварочный цех.
    duration: 2–4 часа на комплект ткани
  - step: '03'
    title: Термосварка и сварка труб
    description: Панели прихватываются и соединяются с помощью машин термосварки с горячим воздухом при контролируемых температурах 200–600 °C. Основные швы усиливаются RF-диэлектрической сваркой для герметичных высокопрочных соединений. Готовые камеры надуваются до 1,5× рабочего давления для 30-минутной проверки воздухонепроницаемости.
    duration: 1–2 дня на ткану
  - step: '04'
    title: Формовка стеклопластикового корпуса техническая ткань
    description: Корпуса лодок техническая ткань производятся методом ручной формовки стеклопластика. Слои стекломата и ровинга вручную прикатываются с полиэфирной или винилэфирной смолой в прецизионных формах. Каждый слой вакуумируется для обеспечения стабильного качества ламината. Корпус финишируется гелькоутом для высокоглянцевой, УФ-стойкой текстильной поверхности.
    duration: 2–4 дня на корпус
  - step: '05'
    title: Печать SUP и декорирование
    description: Графика дека доски SUP наносится с помощью цифровой печати для полноцветных дизайнов фотографического качества и шелкографии для прочных логотипов и повторяющихся узоров. Отпечатки отверждаются и герметизируются для стойкости к УФ и истиранию.
    duration: 1–2 дня
  - step: '06'
    title: Финальная сборка и оснащение
    description: Стеклопластиковые корпуса и PVC-трубные сборки соединяются на сборочной линии. Устанавливается двигатель, подключаются рулевое управление и дроссель, монтируется топливная система, выполняется проводка полного электрического жгута. Каждая ткана проходит 100-точечный сборочный контрольный список с обязательной подписью на каждом этапе.
    duration: 2–3 дня
  - step: '07'
    title: Контроль качества и инспекция
    description: "Каждая готовая ткана проходит обязательный контроль качества: испытание камер на воздухонепроницаемость, проверка функционирования систем, проверка момента затяжки крепежа и косметическая инспекция. Индивидуальные и прототипные сборки также проходят натурные ходовые испытания на воде, включая скорость, управляемость, устойчивость и выносливость."
    duration: 1–2 дня
  - step: '08'
    title: Упаковка и отгрузка
    description: Лодки спускаются, складываются по процедуре, упаковываются в прочные тканевые мешки или фанерные ящики и загружаются для отгрузки. Каждая упаковка маркируется моделью, серийным номером и пунктом назначения. Мы координируем с экспедиторами FCL и LCL контейнерные перевозки по всему миру.
    duration: 1 день

