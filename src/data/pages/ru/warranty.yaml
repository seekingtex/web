label: 'Гарантия'
headline: 'Ограниченная гарантия производителя Seekingtex'
subtitle: 'Компания Seekingtex гарантирует качество каждого надувного текстильного изделия, которое мы производим. Настоящая ограниченная гарантия устанавливает условия и объем покрытия для вашего продукта Seekingtex.'
seo:
  headline: 'Гарантия на надувную ткану Seekingtex — 5-летняя ограниченная гарантия | Seekingtex'
  description: 'Seekingtex предоставляет 5-летнюю ограниченную гарантию на целостность основного тканевого материала баллонов, швов и структуру корпуса из стеклопластика. Также покрываются клапаны надувания и заводские аксессуары. Полные условия гарантии на надувную ткану Seekingtex.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Настоящая ограниченная гарантия распространяется на новые функциональный текстильние изделия марки Seekingtex, приобретенные непосредственно у Seekingtex или у авторизованного дилера или продавца Seekingtex. Датой вступления в силу является подтверждаемая дата первоначальной розничной покупки.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Объем и срок гарантии</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 лет</h3>
        <p class="text-sm text-gray-600 mt-1">Целостность основного тканевого материала баллонов (CSM/ПВХ)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 лет</h3>
        <p class="text-sm text-gray-600 mt-1">Структурная целостность корпуса из стеклопластика</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 лет</h3>
        <p class="text-sm text-gray-600 mt-1">Воздухонепроницаемость швов надувных баллонов</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 лет</h3>
        <p class="text-sm text-gray-600 mt-1">Работоспособность клапанов надувания</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 год</h3>
        <p class="text-sm text-gray-600 mt-1">Заводские аксессуары и вспомогательная арматура</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 год*</h3>
        <p class="text-sm text-gray-600 mt-1">Коммерческое использование, аренда или флот — все компоненты</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*Коммерческое, государственное, чартерное, арендное или учебное использование сокращает гарантию до 1 года. Использование в гонках или соревнованиях полностью аннулирует гарантию.</p>
  </div>

  <h2>Что покрывается гарантией</h2>
  <h3>Основной тканевый материал баллонов (5 лет)</h3>
  <p>Seekingtex гарантирует, что основной тканевый материал баллонов не подвергнется ухудшению пористости, которое существенно нарушит способность изделия поддерживать рабочее надувание. Это относится к ткани с покрытием CSM (Hypalon) и всем другим материалам баллонов, используемым в производстве.</p>

  <h3>Структурная целостность корпуса из стеклопластика (5 лет)</h3>
  <p>Для изделий с корпусом из стеклопластика (GRP) основная композитная структура гарантируется от структурного разрушения из-за дефектов материалов или изготовления.</p>

  <h3>Воздухонепроницаемость швов надувных баллонов (5 лет)</h3>
  <p>Швы надувных баллонов гарантируются от производственных дефектов, приводящих к существенной утечке воздуха через шов. Периодический осмотр и поддержание соответствующего давления надувания являются условиями покрытия.</p>

  <h3>Работоспособность клапанов надувания (5 лет)</h3>
  <p>Клапаны надувания, первоначально установленные Seekingtex, гарантируются от дефектов материалов или изготовления, которые препятствуют удержанию воздуха клапаном в соответствии с конструкцией.</p>

  <h3>Заводские аксессуары (1 год)</h3>
  <p>Компоненты и арматура, произведенные Seekingtex и первоначально установленные на заводе, гарантируются от дефектов материалов и изготовления в течение одного года. Это исключает изделия третьих лиц, которые покрываются только соответствующими гарантиями производителей.</p>

  <h2>Что не покрывается гарантией</h2>
  <ul>
    <li>Косметические дефекты, включая обесцвечивание, пятна, выцветание, меление или любые изменения внешнего вида</li>
    <li>Проколы, порезы, разрывы или другие физические повреждения</li>
    <li>Трещины, истирание, потертости или ухудшение от трения или контакта</li>
    <li>Ухудшение от воздействия УФ-излучения, атмосферных воздействий</li>
    <li>Повреждения от контакта с топливом, растворителями, кислотами, щелочами или химикатами</li>
    <li>Повреждения из-за небрежности, неправильного использования, злоупотребления, несчастного случая или нормального износа</li>
    <li>Проблемы с поверхностью гелькоута или краски (вздутие, растрескивание, обесцвечивание, выцветание)</li>
    <li>Повреждения от удара, нагрузки, неправильной поддержки или буксировки</li>
    <li>Повреждения от неправильного надувания/сдувания или использования неодобренных устройств для надувания</li>
    <li>Оборудование, компоненты или системы третьих лиц (покрываются соответствующими производителями)</li>
  </ul>

  <h2>Обязательства производителя и средства правовой защиты</h2>
  <p>Единственным и исключительным обязательством Seekingtex является ремонт или замена, по выбору Seekingtex, любого компонента, признанного дефектным по материалам или изготовлению и покрываемого настоящей гарантией. Ремонт или замена выполняются Seekingtex или назначенным авторизованным сервисным центром. Отремонтированные или замененные компоненты гарантируются только на неистекшую часть первоначального гарантийного срока.</p>

  <h2>Условия гарантии</h2>
  <ul>
    <li><strong>Регистрация:</strong> Изделие должно быть надлежащим образом зарегистрировано в соответствии с условиями гарантии.</li>
    <li><strong>Обслуживание:</strong> Изделие должно обслуживаться в соответствии с опубликованными руководствами Seekingtex, включая периодический осмотр и поддержание соответствующего давления надувания.</li>
    <li><strong>Сотрудничество:</strong> Покупатель должен полностью и своевременно сотрудничать с Seekingtex по всем вопросам, касающимся гарантийных претензий.</li>
    <li><strong>Первоначальный покупатель:</strong> Настоящая гарантия предоставляется исключительно первоначальному конечному пользователю и не подлежит передаче.</li>
  </ul>

  <h2>Коммерческое использование</h2>
  <p>Если изделие используется в коммерческих, государственных, некоммерческих, чартерных, арендных, учебных или иных целях, кроме частного рекреационного использования, гарантийный срок для всех компонентов сокращается до одного (1) года с даты первоначальной розничной покупки. Использование в гонках, соревнованиях на скорость или выносливость немедленно и безотзывно полностью аннулирует гарантию.</p>

  <h2>Как подать гарантийную претензию</h2>
  <p>Свяжитесь с Seekingtex или вашим авторизованным дилером, предоставив доказательство покупки и подробное описание проблемы. Seekingtex рассмотрит претензию и предоставит инструкции по осмотру и обслуживанию.</p>
  <p>Для запросов гарантийного обслуживания свяжитесь с нами через <a href="/contact" class="text-sky-600 underline">страницу контактов</a> с номером вашего заказа и данными о продукте.</p>

  <h2>Изделия третьих лиц</h2>
  <p>Оборудование, компоненты или системы, произведенные третьими лицами (даже если установлены Seekingtex), покрываются исключительно любой гарантией, предлагаемой соответствующим производителем. Seekingtex прямо отказывается от любой гарантийной ответственности за такие изделия третьих лиц.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Настоящее заявление о гарантии является кратким изложением полной ограниченной гарантии производителя Seekingtex. Полный юридический документ гарантии регулирует все условия гарантии. Спецификации могут быть изменены без уведомления. Seekingtex является брендом Qingdao Vatrad Group.
  </p>
