hero:
  tagline: Seekingtex Academy
  title: Учебный центр
  subtitle: Руководства и учебные пособия для любого уровня подготовки — от основ SUP до продвинутых техник спасения

categories:
  - level: Начинающий
    color: from-green-500 to-emerald-600
    badge: bg-green-100 text-green-700
    guides:
      - title: Основы SUP
        desc: Изучите основы гребли стоя — стойка, техника гребка и равновесие.
        slug: sup-basics
      - title: Техники гребли
        desc: Гребок вперед, отводящий гребок, подтягивающий гребок и низкий упор — освойте основные движения веслом.
        slug: paddle-techniques
      - title: Безопасность прежде всего
        desc: Основные правила безопасности, включая проверку погоды, использование PFD, правила использования лиша и самоспасение.
        slug: safety-first
  - level: Средний
    color: from-blue-500 to-indigo-600
    badge: bg-blue-100 text-blue-700
    guides:
      - title: Основы турпоходов
        desc: Планирование многочасовых сплавов — навигация, гидратация, темп и чтение прогнозов ветра.
        slug: touring-essentials
      - title: Чтение погоды
        desc: Интерпретируйте текстильние прогнозы, определяйте типы облаков и понимайте влияние ветра на воду.
        slug: weather-reading
      - title: Основы навигации
        desc: Чтение карт, использование компаса, GPS-путевые точки и планирование маршрутов для прибрежного плавания.
        slug: navigation-basics
      - title: Понимание приливов
        desc: Понимание циклов приливов, течений и их влияния на время старта и маршрут.
        slug: tidal-awareness
  - level: Продвинутый
    color: from-purple-500 to-violet-600
    badge: bg-purple-100 text-purple-700
    guides:
      - title: Планирование многодневных походов
        desc: Логистика экспедиции — выбор снаряжения, планирование питания, протоколы безопасности и аварийные контакты.
        slug: multi-day-trip-planning
      - title: Техники спасения
        desc: Самоспасение, T-спасение, эскимосское спасение для байдарок и протоколы буксировки на открытой воде.
        slug: rescue-techniques
      - title: Ночная гребля
        desc: Навигация в темноте — требования к освещению, память маршрута, групповая коммуникация и осведомленность об опасностях.
        slug: night-paddling
  - level: Обслуживание
    color: from-amber-500 to-orange-600
    badge: bg-amber-100 text-amber-700
    guides:
      - title: Чистка и уход
        desc: Промывка пресной водой, защита от УФ, предотвращение плесени и правильные методы сушки после каждого использования.
        slug: cleaning-and-care
      - title: Руководство по хранению
        desc: Лучшие практики хранения надувных досок и лодок — спуск воздуха, складывание, контроль температуры и срок службы.
        slug: storage-guide
      - title: Основы ремонта
        desc: Устранение мелких проколов, утечек в швах и проблем с клапанами с помощью ремкомплектов PVC и техник заплат.
        slug: repair-basics
      - title: Обслуживание клапанов
        desc: Определение типов клапанов (Halkey-Roberts, Boston, Leafield), очистка от мусора и замена неисправных штоков.
        slug: valve-maintenance

