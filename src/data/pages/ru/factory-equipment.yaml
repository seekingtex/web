hero:
  tagline: "Оборудование"
  title: "Производственное Оборудование и Машины"
  subtitle: "Промышленное оборудование для резки, сварки, печати и сборки"
  back_label: "Назад на Завод"
  back_link: /factory

categories:
  - title: "Резка и Подготовка Материалов"
    items:
      - name: "Автоматическая Резальная Машина PVC"
        spec: "Управление CNC, 6.5 m × 2.5 m, точность 0.1 mm"
        desc: "Управляемая компьютером автоматическая резальная машина для тканей PVC, Hypalon и drop-stitch. Программное обеспечение раскроя оптимизирует использование материала менее чем до 5% отходов."
      - name: "Раскладчик Ткани"
        spec: "Ширина макс. 3 m, подача с контролем натяжения"
        desc: "Укладывает ткань в один или несколько слоёв с контролируемым натяжением для предотвращения деформации перед резкой."
  - title: "Сварка Труб и Соединение"
    items:
      - name: "Машина Термосварки"
        spec: "Сварка горячим воздухом, переменная 200–600 °C, 0.5–5 m/min"
        desc: "Машина термосварки горячим воздухом для соединения и сварки швов труб PVC и Hypalon. Используется для фиксации, герметизации и сплавления камер труб и поплавковых соединений."
      - name: "Диэлектрический RF-пресс"
        spec: "15 kW, плита 2000 × 600 mm"
        desc: "Пресс высокочастотной сварки для основных продольных швов, соединений транца с трубой и изготовления больших камер."
      - name: "RF-сварочный Аппарат с CNC"
        spec: "8 kW, стол XY 2500 × 1200 mm"
        desc: "Программируемая сварка криволинейных швов для сложных геометрий, тиснения логотипов и точной заплатки."
  - title: "Производство Корпусов техническая ткань"
    items:
      - name: "Формы из Стекловолокна Ручной Выкладки"
        spec: "Несколько форм для корпусов техническая ткань до 6 m LOA"
        desc: "Традиционная ручная выкладка стекловолокна с полиэфирными и винилэфирными смолами. Каждый слой прокатывается вручную и вакуумируется для стабильного качества и прочности ламината."
      - name: "Камера Нанесения Гелькоута"
        spec: "Контроль температуры, фильтрованная вентиляция"
        desc: "Нанесение гелькоута на корпуса техническая ткань. Обеспечивает глянцевую, устойчивую к УФ отделку с точным контролем толщины."
      - name: "CNC-фрезер (5 осей)"
        spec: "Объём 3 m × 2 m × 1 m, шпиндель с водяным охлаждением"
        desc: "Обработка вставок корпуса, форм консоли, оснований сидений и индивидуальных кронштейнов."
  - title: "Печать и Декорирование SUP"
    items:
      - name: "Цифровой Принтер"
        spec: "Струйная печать высокого разрешения, ширина печати до 2 m"
        desc: "Прямая цифровая печать по ткани для полноцветной графики палубы SUP. Печатает индивидуальные узоры, градиенты и изображения фотографического качества водными стойкими к УФ чернилами."
      - name: "Машина Шелкографии"
        spec: "Ручная и полуавтоматическая, многокрасочная регистрация"
        desc: "Шелкография для логотипов досок SUP, торговых марок и повторяющихся узоров. Обеспечивает долговечные, непрозрачные отпечатки с яркой насыщенностью цвета."
  - title: "Сборка и Оснастка"
    items:
      - name: "Моторный Подъёмник"
        spec: "Грузоподъёмность 500 kg, регулируемая раздвижная штанга"
        desc: "Безопасная установка подвесных моторов от 2.5 до 60 л.с."
      - name: "Каркас Макета Консоли"
        spec: "Регулируемая высота и угол"
        desc: "Предварительная оснастка рулевого управления, газа и приборных панелей перед установкой."
      - name: "Гидравлический Обжимной Пресс для Шлангов"
        spec: "До 1\" ID, цифровой манометр"
        desc: "Комплекты гидравлических рулевых шлангов индивидуальной длины с опрессованными фитингами."
      - name: "Плата Электрожгутов"
        spec: "3 m × 1.5 m, заранее напечатанные схемы проводки"
        desc: "Сборка и тестирование полных электрических жгутов вне ткани."
  - title: "Тестирование и Контроль Качества"
    items:
      - name: "Универсальная Разрывная Машина"
        spec: "50 kN, ASTM D751"
        desc: "Испытание разрывной нагрузки, удлинения при разрыве и распространения разрыва для партий ткани."
      - name: "Стенд Испытания Герметичности Воздуха"
        spec: "Программируемый, удержание давления 30 мин"
        desc: "Автоматизированное испытание удержания давления для каждой камеры трубы перед сборкой."
      - name: "Тестер Отслаивания Швов"
        spec: "Моторизованное отслаивание 180° при 100 mm/min"
        desc: "Испытание прочности на отслаивание сваренных и склеенных швов согласно ISO 6185."
      - name: "Камера Старения Ксеноновой Дугой"
        spec: "2000 h воздействие"
        desc: "Испытание стойкости к УФ для изменения цвета и сохранения прочности."

