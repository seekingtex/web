hero:
  tagline: О нас
  image:
    src: /images/seekingtex/factory/Seekingtex factory.webp
    alt: Фабрика и цех Seekingtex
  title: |
    Морское машиностроение <br />
    в стиле <span class="text-accent dark:text-white">Seekingtex</span>
  subtitle: 'Мы начинали в прибрежной мастерской с одной тканой и твёрдым убеждением: текстильние изделия должны разрабатываться так, будто от них зависят жизни — потому что так и есть. Сегодня мы отгружаем в 40+ стран, но каждый корпус по-прежнему проходит через те же руки, что основали компанию.'

stats:
  title: В цифрах
  columns: 4
  stats:
    - title: Доставлено корпусов
      amount: '2,400+'
    - title: Стран доставки
      amount: '40'
    - title: Совокупный опыт, лет
      amount: '60'
    - title: Среднее время ответа (ч)
      amount: '24'

features3_what_we_build:
  title: Что мы строим
  subtitle: Сфокусированная линейка продукции, которую мы знаем досконально — никаких недоработанных экспериментов и чужих брендов.
  columns: 3
  isBeforeContent: true
  items:
    - title: техническая ткань-ткани
      description: техническая ткань с алюминиевыми корпусами от 3,3 до 7,5 м. Разработаны для патрулирования, производительностьа, рыбалки и семейного отдыха.
      icon: tabler:ship
    - title: функциональные ткани
      description: функциональные ткани из ПВХ и Hypalon от 2,4 до 4,2 м. Лёгкие, прочные и удобные в хранении.
      icon: tabler:speedboat
    - title: Тендеры для суперъпремиальная ткан
      description: Компактные техническая ткань с высокими характеристиками, изготовленные под стиль вашей премиальная тканы.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Аксессуары
      description: Вёсла, насосы, чехлы, гермомешки, топливные баки и электроника. Всё совместимо с нашими тканами.
      icon: tabler:package
    - title: Модернизация и ремонт
      description: Замена баллонов, модернизация электроники и обновление двигателей.
      icon: tabler:tool
    - title: Изделия на заказ
      description: Проектирование под конкретную задачу для коммерческих, научных и военных заказчиков.
      icon: tabler:hammer
  image:
    src: /images/seekingtex/factory/design discuss2.jpeg
    alt: Обсуждение дизайна ткани

steps2_values:
  title: Наши ценности
  subtitle: Три принципа, которые формируют каждый продукт с первого дня.
  items:
    - title: Строй так, будто в ткане твоя семья
      description: Каждый корпус, сварной шов и крепёж обрабатываются так, будто ими будут пользоваться наши собственные семьи.
      icon: tabler:heart
    - title: Разрабатывай до продажи
      description: Если спецификация неверна, мы меняем спецификацию — а не клиента.
      icon: tabler:settings
    - title: Поддержка, переживающая гарантию
      description: Двадцатилетние корпуса всё ещё звонят нам за запчастями, и мы всё ещё отвечаем.
      icon: tabler:headset

steps2_milestones:
  title: Вехи
  subtitle: Краткая версия истории Seekingtex.
  isReversed: true
  items:
    - title: Основана в прибрежной мастерской
      description: Начата двумя корабельными инженерами с ЧПУ-станком и упрямой идеей.
      icon: tabler:building-factory
    - title: Первые 1 000 доставленных корпусов
      description: Достигнуто на седьмой год, в основном через «сарафанное радио» и постоянных клиентов.
      icon: tabler:circle-check
    - title: Международная экспортная программа
      description: Отгрузка в 40+ стран с локализованными партнёрами по поддержке на пяти континентах.
      icon: tabler:world

features2_locations:
  title: Наши офисы
  tagline: Где нас найти
  columns: 3
  items:
    - title: Головной офис и цех
      description: Прибрежный индустриальный парк, корпус 4 — открыто Пн–Пт для посещения по записи.
    - title: Сервисный центр ЕС
      description: Средиземнотекстильний порт — модернизация, ремонт и гарантийное обслуживание для европейских клиентов.
    - title: Партнёрская сеть АТР
      description: Авторизованные сервисные партнёры в Австралии, Японии, Сингапуре и Гонконге.
