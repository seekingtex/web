content_workshop:
  isReversed: true
  tagline: Внутри производства
  title: От чертежа корпуса до отгрузки — каждый этап остаётся на предприятии
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Качество, которое можно увидеть, потрогать и измерить</h3>
  items:
    - title: Разработано корабельными инженерами
      description: Обводы корпуса создаются внутри компании и проходят CFD-анализ ещё до постройки первого прототипа.
    - title: Сварено и собрано на собственном заводе
      description: Сварка баллонов, оснащение консоли и такелаж выполняются под одной крышей — мы контролируем качество на каждом этапе.
    - title: Испытано в море перед отгрузкой
      description: "Каждая модель проходит многочасовые ходовые испытания: глиссирование, повороты, максимальная скорость и работа с нагрузкой."
  image:
    src: /images/seekingtex/hero/production-workshop.webp
    alt: Производственный цех Seekingtex

steps:
  title: От спецификации до спуска на воду за пять шагов
  items:
    - title: 'Шаг 1: <span class="font-medium">Конфигурация</span>'
      description: Выберите модель, опции и запросите цену онлайн или по телефону. Наша команда отвечает в течение одного рабочего дня.
      icon: tabler:list-numbers
    - title: 'Шаг 2: <span class="font-medium">Подтверждение</span>'
      description: Мы письменно подтверждаем спецификацию, сроки и полную стоимость. Никаких сюрпризов и скрытых платежей.
      icon: tabler:checks
    - title: 'Шаг 3: <span class="font-medium">Производство</span>'
      description: Производство начинается в нашем цеху. Мы отправляем фото прогресса на ключевых этапах.
      icon: tabler:tool
    - title: 'Шаг 4: <span class="font-medium">Доставка</span>'
      description: Укладка в ложемент, термоусадочная упаковка и отправка морем или авиацией. Таможенное оформление под ключ.
      icon: tabler:truck-loading
    - title: 'Шаг 5: <span class="font-medium">Поддержка</span>'
      description: Двухлетняя гарантия на корпус и пожизненная техническая поддержка. Запчасти отправляются в течение 48 часов.
      icon: tabler:headset
  image:
    src: /images/seekingtex/hero/production-dept.webp
    alt: Производственный процесс Seekingtex

blog_latest:
  title: Из журнала
  information: |
    Статьи, технические заметки и практические примеры от инженерной команды.
    Новые записи добавляются каждый раз, когда отгружается проект, обновляется стандарт или у кого-то есть история, которой стоит поделиться.

faqs:
  title: Часто задаваемые вопросы
  subtitle: Распространённые вопросы о надувных тканах Seekingtex, гарантиях, доставке и партнёрстве OEM/ODM. Если вашего вопроса нет — напишите нам.
  columns: 2
  items:
    - title: Где находится склад Seekingtex в США и сколько времени занимает доставка?
      description: "Наш склад в США расположен в Монтклэре, Калифорния. Западное побережье: 2–3 дня. Центральные штаты: 3–4 дня. Восточное побережье: 4–5 дней. Также доступна международная доставка — свяжитесь с нами для индивидуального расчёта."
      icon: tabler:truck-delivery
    - title: Какая гарантийная политика Seekingtex на функциональные ткани?
      description: "функциональные текстильние изделия Seekingtex покрываются 5-летней ограниченной гарантией на целостность ткани баллонов, герметичность швов, корпус из стеклопластика и клапаны надува. Заводские аксессуары — 1 год. Коммерческое использование: 1 год ограниченной гарантии. Полные условия доступны на нашей странице гарантии."
      icon: tabler:shield-check
    - title: Входят ли в комплект лодок Seekingtex регистрационные документы?
      description: Да, каждая надувная ткана Seekingtex сопровождается необходимыми документами для регистрации. Сертификат происхождения от производителя находится на последней странице руководства пользователя; копию можно скачать по запросу. Одобрено Береговой охраной США для производства.
      icon: tabler:file-text
    - title: Одобрены ли ткани Seekingtex Береговой охраной США?
      description: "Да, функциональные ткани Seekingtex одобрены Береговой охраной США (USCG) для производства. Наша фабрика также имеет сертификацию CE для доступа на рынок ЕС и ."
      icon: tabler:flag
    - title: Что делать, если упаковка товара прибыла повреждённой?
      description: Если упаковка вашего изделия Seekingtex прибыла повреждённой, пожалуйста, откажитесь от получения и верните посылку отправителю. Свяжитесь с нашей службой поддержки, и мы оперативно отправим вам замену.
      icon: tabler:package
    - title: Что делать, если товар не прибыл в расчётный срок доставки?
      description: Сроки доставки, указанные Seekingtex, являются оценочными и не гарантируются. После отправки получение посылки является обязанностью клиента. Если посылка оставлена по указанному адресу доставки, право собственности переходит в момент доставки.
      icon: tabler:calendar-clock

