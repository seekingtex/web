features:
  id: features
  tagline: Почему Seekingtex
  title: Что вы получаете с Seekingtex
  subtitle: Десятилетия текстильного инженерного опыта, воплощённые в сфокусированной линейке продукции. Прочная конструкция, испытана в море, поддерживается всю жизнь.
  columns: 2
  items:
    - title: Морские материалы
      description: Прочный ПВХ, Hypalon и алюминиевые корпуса, устойчивые к УФ-излучению, истиранию и солёной воде.
      icon: tabler:shield-check
    - title: Качество готовое к производству
      description: Каждый корпус проходит проверку давлением, каждый сварной шов inspected. Мы отгружаем только то, что сами спустили бы на воду.
      icon: tabler:certificate
    - title: Модульная конструкция
      description: Настройте расположение баллонов, консоли, объём топлива и аксессуары под свою задачу.
      icon: tabler:layout-grid
    - title: Честные характеристики
      description: Реальные грузоподъёмность, размеры и вес. Никаких маркетинговых преувеличений.
      icon: tabler:ruler-measure
    - title: Быстрая доставка и запчасти
      description: Популярные модели отгружаются за дни. Оригинальные запчасти и расходники в наличии круглый год.
      icon: tabler:truck-delivery
    - title: Пожизненная поддержка
      description: Прямая линия с нашей инженерной командой для технических вопросов, ремонта и модернизации.
      icon: tabler:lifebuoy

