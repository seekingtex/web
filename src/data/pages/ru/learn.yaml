hero:
  tagline: '袟薪邪薪懈褟 芯斜 懈褋褋谢械写芯胁邪薪懈懈 胁芯写褘'
  title: '袨斜褍褔械薪懈械'
  subtitle: |
    袪褍泻芯胁芯写褋褌胁邪, 褍褔械斜薪懈泻懈 懈 谐谢褍斜芯泻懈械 锌芯谐褉褍卸械薪懈褟 鈥?胁褋褢, 褔褌芯 薪褍卸薪芯 写谢褟 褍胁械褉械薪薪芯谐芯<br />
    懈褋褋谢械写芯胁邪薪懈褟 胁芯写褘. 袨褌 胁褘斜芯褉邪 锌械褉胁芯谐芯 SUP 写芯 芯褋胁芯械薪懈褟 锌褉芯写胁懈薪褍褌褘褏 褌械褏薪懈泻.
  taglineSection: '袟薪邪薪懈褟 写谢褟 泻邪卸写芯谐芯 谐褉械斜褑邪. 袨褌 薪芯胁懈褔泻邪 写芯 锌褉芯褎械褋褋懈芯薪邪谢邪.'

featured:
  tagline: '袪械泻芯屑械薪写褍械屑褘械 褌械屑褘'
  title: '袧邪褔薪懈褌械 褋胁芯泄 锌褍褌褜 芯斜褍褔械薪懈褟'
  subtitle: '袧芯胁懈褔芯泻 胁褘 胁 胁芯写薪褘褏 胁懈写邪褏 褋锌芯褉褌邪 懈谢懈 褏芯褌懈褌械 锌芯胁褘褋懈褌褜 褍褉芯胁械薪褜 鈥?薪邪褕懈 褉褍泻芯胁芯写褋褌胁邪 胁邪褋 芯褏胁邪褌褟褌.'
  items:
    - title: '袨褋薪芯胁褘 SUP'
      description: '袙褋褢, 褔褌芯 薪褍卸薪芯 蟹薪邪褌褜 薪芯胁懈褔泻褍 鈥?褌懈锌褘 写芯褋芯泻, 褉邪蟹屑械褉 胁械褋谢邪, 褋褌芯泄泻邪 懈 褋芯胁械褌褘 写谢褟 锌械褉胁芯谐芯 写薪褟.'
      icon: 'tabler:lifebuoy'
      href: '/learn/fabrics'
    - title: '袧邪写褍胁薪芯泄 vs 袞械褋褌泻邪褟 写芯褋泻邪'
      description: '效褌芯 锌芯写褏芯写懈褌 胁邪屑? 小褉邪胁薪懈胁邪械屑 锌芯褉褌邪褌懈胁薪芯褋褌褜, 锌褉芯懈蟹胁芯写懈褌械谢褜薪芯褋褌褜, 写芯谢谐芯胁械褔薪芯褋褌褜 懈 褋褌芯懈屑芯褋褌褜.'
      icon: 'tabler:arrows-left-right'
      href: '/compare/inflatable-vs-hardboard'
    - title: '袘械蟹芯锌邪褋薪芯褋褌褜 薪邪 胁芯写械'
      description: '袨褋薪芯胁薪褘械 蟹薪邪薪懈褟 锌芯 斜械蟹芯锌邪褋薪芯褋褌懈 写谢褟 泻邪卸写芯谐芯 谐褉械斜褑邪 鈥?锌芯谐芯写邪, PFD, 褋邪屑芯褋锌邪褋械薪懈械 懈 屑薪芯谐芯械 写褉褍谐芯械.'
      icon: 'tabler:shield'
      href: '/learn/quality-standards'
    - title: '袪褍泻芯胁芯写褋褌胁芯 锌芯 屑邪褌械褉懈邪谢邪屑'
      description: '袩袙啸 vs Hypalon, 褌械褏薪芯谢芯谐懈褟 drop-stitch, 褉械泄褌懈薪谐 写械薪褜械 鈥?锌芯泄屑懈褌械, 懈蟹 褔械谐芯 褋写械谢邪薪芯 胁邪褕械 褋薪邪褉褟卸械薪懈械.'
      icon: 'tabler:molecules'
      href: '/learn/materials'
    - title: '袪褍泻芯胁芯写褋褌胁芯 锌芯 褉邪蟹屑械褉邪屑 SUP'
      description: '袧邪泄写懈褌械 锌褉邪胁懈谢褜薪褍褞 写谢懈薪褍, 褕懈褉懈薪褍 懈 芯斜褗械屑 写芯褋泻懈 写谢褟 胁邪褕械谐芯 胁械褋邪, 薪邪胁褘泻芯胁 懈 褋褌懈谢褟 谐褉械斜谢懈.'
      icon: 'tabler:ruler'
      href: '/size-guide'
    - title: '袩褉芯写胁懈薪褍褌褘械 褌械褏薪懈泻懈'
      description: '袩芯胁褘褋褜褌械 褍褉芯胁械薪褜 谐褉械斜谢懈 褋 锌芯屑芯褖褜褞 锌褉芯写胁懈薪褍褌褘褏 谐褉械斜泻芯胁, 褌械褏薪懈泻 锌芯胁芯褉芯褌邪 懈 褉邪斜芯褌褘 薪邪 胁芯谢薪械.'
      icon: 'tabler:waves'
      href: '/v2/intermediate-techniques'

