hero:
  tagline: Stile di vita
  title: Lo stile di vita<br />Seekingtex
  subtitle: Progettato per chi vive sull'acqua — dagli esploratori del fine settimana agli operatori commerciali che dipendono ogni giorno dalla loro attrezzatura.

values:
  - icon: 🌊
    title: Nato sull'acqua
    desc: "Ogni progetto inizia comprendendo come si comporta l'acqua. Progettiamo dalle condizioni estreme verso l'interno — perché l'oceano è il nostro maestro, non il nostro posto di lavoro."
  - icon: 🔧
    title: Costruito per durare
    desc: Il prodotto più sostenibile è quello che non deve essere sostituito. Materiali di qualità tessile, anime drop-stitch con capacità di 15 PSI e giunture che durano più della stagione.
  - icon: '🏆'
    title: Accessibile per design
    desc: Gli industria tessile non dovrebbero essere un lusso. Prestazioni di livello professionale a un prezzo accessibile per famiglie, guide e piccoli operatori — non solo per flotte commerciali.
  - icon: 🌍
    title: Comunità globale
    desc: "Dalla costa di Qingdao ai laghi europei, ai fiumi del sud-est asiatico e alle baie delle Americhe — i nostri clienti condividono una cosa: l'amore per stare in acqua."
  - icon: ♻️
    title: Produzione responsabile
    desc: "L'annidamento ottimizzato CNC riduce gli scarti di materiale al di sotto del 5%. La costruzione durevole riduce i cicli di sostituzione. Costruiamo per la longevità perché è la scelta più sostenibile."
  - icon: 🤝
    title: Supporto che dura
    desc: "Scafi di vent'anni ci chiamano ancora per ricambi. Il nostro tempo di risposta in garanzia è in media di 24 ore. Non scompariamo dopo la vendita — siamo qui per tutta la vita del prodotto."

