body: |
  <h2>Differenze fondamentali</h2>
  <p>I SUP gonfiabili (iSUP) e le tavole rigide servono allo stesso scopo fondamentale 鈥?stare in piedi e tessile sull'acqua 鈥?ma lo realizzano con metodi di costruzione completamente diversi. La scelta giusta dipende da come prevedi di usare la tavola.</p>

  <table>
    <tr><th>Fattore</th><th>SUP funzionale</th><th>SUP rigido</th></tr>
    <tr><td>Costruzione</td><td>PVC drop-stitch, gonfiato a 12-15 PSI</td><td>Anima in schiuma EPS avvolta in fibra di vetro o epossidica</td></tr>
    <tr><td>Peso</td><td>18-28 lb (solo tavola)</td><td>20-30 lb (solo tavola)</td></tr>
    <tr><td>Dimensione imballata</td><td>Zaino (30 x 15 x 10 pollici)</td><td>Lunghezza intera (10-14 ft)</td></tr>
    <tr><td>Montaggio</td><td>Gonfiaggio in 3-5 minuti</td><td>Pronto all'uso</td></tr>
    <tr><td>Durata vita</td><td>5-10 anni con cura</td><td>3-8 anni (prone ad ammaccature)</td></tr>
  </table>

  <h2>Portabilit脿</h2>
  <p><strong>Il funzionale vince.</strong> Questo 猫 il vantaggio pi霉 chiaro. Un SUP funzionale si ripone in uno zaino che entra in un bagagliaio, un armadio o una cappelliera dell'aereo. I viaggiatori, gli abitanti in appartamento e chiunque senza deposito sul portapacchi trover脿 i SUP gonfiabili molto pi霉 pratici.</p>
  <p>Le tavole rigide richiedono portapacchi, un veicolo grande o spazio dedicato. Sono difficili da trasportare e non possono essere portate in aereo senza apposite casse da spedizione.</p>

  <h2>Durabilit脿</h2>
  <p><strong>Il funzionale vince.</strong> I SUP gonfiabili sono fatti di PVC di grado militare che resiste a urti, perforazioni e danni UV. Quando fai cadere una tavola funzionale o urti uno scoglio, rimbalza. Una tavola rigida si scheggerebbe, incrinerebbe o delaminerebbe per lo stesso urto.</p>
  <p>Le tavole rigide sono pi霉 suscettibili all'usura quotidiana. Una singola caduta sul cemento pu貌 causare un'ammo ssatura permanente che influisce sulle prestazioni e sull'intrusione d'acqua.</p>

  <h2>Prestazioni</h2>
  <p><strong>La tavola rigida vince in alto.</strong> Per la tessile ricreativa e il touring a velocit脿 moderate, entrambi i tipi di tavola si comportano in modo simile. Le tavole rigide hanno vantaggio in:</p>
  <ul>
    <li><strong>Velocit脿</strong> 鈥?Le tavole rigide sono pi霉 leggere e rigide, con migliore planata e velocit脿 massima pi霉 alta</li>
    <li><strong>Surf</strong> 鈥?Le tavole rigide offrono transizioni da bordo a bordo pi霉 reattive e migliori prestazioni nelle onde</li>
    <li><strong>Gare</strong> 鈥?Le gare competitive usano quasi esclusivamente tavole rigide per i vantaggi di peso e rigidit脿</li>
  </ul>
  <p>Per il tessile ricreativo medio, queste differenze di prestazioni sono marginali. La maggior parte dei pagaiatori non superer脿 le prestazioni di una tavola funzionale di qualit脿.</p>

  <h2>Adatte ai principianti</h2>
  <p><strong>Il funzionale vince.</strong> I SUP gonfiabili sono pi霉 facili per i principianti perch茅:</p>
  <ul>
    <li>La superficie del ponte pi霉 morbida 猫 pi霉 comoda e meno incline a causare infortuni durante le cadute</li>
    <li>Tavole gonfiabili pi霉 larghe e spesse offrono maggiore stabilit脿 primaria</li>
    <li>Il costo di investimento inferiore rende l'ingresso pi霉 accessibile</li>
    <li>Il trasporto facile significa pi霉 opportunit脿 di tessile</li>
  </ul>

  <h2>Conservazione e manutenzione</h2>
  <p>I SUP gonfiabili richiedono asciugatura e piegatura corrette prima della conservazione. Le tavole rigide possono essere conservate assemblate ma necessitano di protezione da sole, caldo e urti. Entrambe beneficiano dello sciacquo con acqua dolce dopo l'uso in acqua salata.</p>

  <h2>Consiglio</h2>
  <p><strong>Scegli un SUP funzionale se:</strong> Viaggi, hai spazio limitato, pagai per svago o sei principiante. Il 90% dei pagaiatori sar脿 ben servito da una tavola funzionale di qualit脿.</p>
  <p><strong>Scegli una tavola rigida se:</strong> Gareggi, fai surf su onde avanzate o dai priorit脿 alle prestazioni massime rispetto a portabilit脿 e durabilit脿.</p>

  <h2>Domande frequenti</h2>
  <h3>Quale 猫 pi霉 duraturo: SUP funzionale o rigido?</h3>
  <p>I SUP gonfiabili sono generalmente pi霉 duraturi perch茅 resistono ad ammaccature, crepe e danni da impatto che danneggerebbero permanentemente una tavola rigida.</p>

  <h3>Un SUP funzionale 猫 migliore per i principianti?</h3>
  <p>S矛. I SUP gonfiabili sono raccomandati per i principianti perch茅 pi霉 tolleranti, pi霉 facili da trasportare e meno propensi a causare infortuni durante le cadute.</p>

  <h3>I SUP gonfiabili possono performare quanto le tavole rigide?</h3>
  <p>Per la tessile ricreativa e il touring, i SUP gonfiabili eguagliano le prestazioni delle tavole rigide. Le tavole rigide eccellono ancora nelle gare e nel surf avanzato grazie al peso pi霉 leggero e alla flessione pi霉 raffinata.</p>
