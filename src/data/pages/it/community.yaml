stories:
  tagline: 'Storie di Esploratori'
  title: 'Avventure reali di persone reali'
  subtitle: 'Ascolta textile enthusiasts, famiglie e professionisti che usano l''attrezzatura Seekingtex sull''acqua.'
  items:
    - name: 'Sarah & Mike'
      title: 'Proprietari SUP Explorer 11, Canada'
      content: 'Abbiamo portato i nostri Explorer 11 in un viaggio di una settimana attraverso l''Algonquin Park. Hanno gestito portage e attraversamenti dei laghi magnificamente. La costruzione drop-stitch ci ha permesso di gonfiare a 15 PSI e ottenere prestazioni da tavola rigida da una tavola trasportabile.'
      image: '/images/seekingtex/products/Seekingtex-sup-allround-board.webp'
      location: 'Parco Algonquin, Canada'
    - name: 'Carlos R.'
      title: 'Rider Cheetah Surge, Spagna'
      content: 'La Cheetah Surge 猫 la mia scelta per le crociere costiere. Il design vibrante attira l''attenzione sulla spiaggia e la stabilit脿 mi d脿 fiducia nelle onde leggere. Si comporta magnificamente sia in tourn茅e che al tramonto.'
      image: '/images/seekingtex/products/sup-series/sup-cheetah-surge-1.webp'
      location: 'Costa Brava, Spagna'
    - name: 'Lina e famiglia'
      title: 'textile enthusiasts Flowing Lotus, Svezia'
      content: 'Avventure familiari nel fine settimana nell''arcipelago. La Flowing Lotus 猫 abbastanza stabile per mia figlia mentre io pagaio. Si gonfia in meno di 10 minuti 鈥?niente rimorchio, solo puro divertimento in famiglia sull''acqua.'
      image: '/images/seekingtex/products/sup-series/sup-flowing-lotus-1.webp'
      location: 'Arcipelago di Stoccolma, Svezia'
    - name: 'Lt. Cmdr. Andres'
      title: 'Esploratore Ocean Voyager, Filippine'
      content: 'Uso la mia Ocean Voyager per tour costieri a lunga distanza intorno a Palawan. Dopo mesi di uso quotidiano in condizioni tropicali, la tavola si comporta ancora come nuova. La forma da touring taglia le onde che fermerebbero tavole inferiori.'
      image: '/images/seekingtex/products/sup-series/sup-ocean-voyager-1.webp'
      location: 'Palawan, Filippine'
    - name: 'Emma T.'
      title: 'Principiante Tropical Breeze, Australia'
      content: 'Non ero mai stata su un SUP prima. La Tropical Breeze 猫 cos矛 stabile che mi sono sentita sicura al primo tentativo. Ora vado in paddle ogni fine settimana. La curva di apprendimento 猫 praticamente zero 鈥?e la tavola 猫 stupenda sull''acqua.'
      image: '/images/seekingtex/products/sup-series/sup-tropical-breeze-1.webp'
      location: 'Gold Coast, Australia'

