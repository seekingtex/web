label: 'Garanzia'
headline: 'Garanzia limitata del produttore Seekingtex'
subtitle: 'Seekingtex garantisce la qualità di ogni prodotto tessile funzionale che produciamo. Questa garanzia limitata stabilisce i termini e la copertura per il tuo prodotto Seekingtex.'
seo:
  headline: 'Garanzia tessuto funzionale Seekingtex — Garanzia limitata 5 anni | Seekingtex'
  description: 'Seekingtex offre una garanzia limitata di 5 anni sull''integrità del tessuto principale dei tubolari, delle cuciture e della struttura dello scafo in fibra di vetro. Copre anche le valvole di gonfiaggio e gli accessori installati in fabbrica. Termini e condizioni completi della garanzia del tessuto funzionale Seekingtex.'
  datePublished: '2024-01-01'
  dateModified: '2026-06-01'
body: |
  <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
    Questa garanzia limitata si applica ai nuovi prodotti marini gonfiabili del marchio Seekingtex acquistati direttamente da Seekingtex o da un rivenditore o dettagliante autorizzato Seekingtex. La data di effetto è la data verificabile di acquisto al dettaglio originale.
  </p>

  <div class="bg-sky-50 dark:bg-gray-900 border border-sky-200 dark:border-gray-800 rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-3">Copertura e durata della garanzia</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 anni</h3>
        <p class="text-sm text-gray-600 mt-1">Integrità del tessuto principale dei tubolari (CSM/PVC)</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 anni</h3>
        <p class="text-sm text-gray-600 mt-1">Integrità strutturale dello scafo in fibra di vetro</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 anni</h3>
        <p class="text-sm text-gray-600 mt-1">Tenuta d'aria delle cuciture dei tubolari</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">5 anni</h3>
        <p class="text-sm text-gray-600 mt-1">Funzionalità delle valvole di gonfiaggio</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-sky-700 dark:text-sky-400">1 anno</h3>
        <p class="text-sm text-gray-600 mt-1">Accessori installati in fabbrica e raccordi ausiliari</p>
      </div>
      <div class="bg-white dark:bg-gray-950 rounded-lg p-4 border border-gray-200 dark:border-gray-800">
        <h3 class="font-bold text-amber-700 dark:text-amber-400">1 anno*</h3>
        <p class="text-sm text-gray-600 mt-1">Uso commerciale, noleggio o flotta — tutti i componenti</p>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-4">*L'uso commerciale, governativo, charter, noleggio o didattico riduce la garanzia a 1 anno. L'uso in gare o competizioni annulla completamente la garanzia.</p>
  </div>

  <h2>Cosa è coperto</h2>
  <h3>Tessuto principale dei tubolari (5 anni)</h3>
  <p>Seekingtex garantisce il tessuto principale dei tubolari contro il deterioramento della porosità che compromette sostanzialmente la capacità del prodotto di mantenere il gonfiaggio operativo. Questo si applica al tessuto rivestito in CSM (Hypalon) e a tutti gli altri materiali per tubolari utilizzati nella produzione.</p>

  <h3>Integrità strutturale dello scafo in fibra di vetro (5 anni)</h3>
  <p>Per i prodotti con scafo in plastica rinforzata con fibra di vetro (PRFV), la struttura composita fondamentale è garantita contro cedimenti strutturali dovuti a difetti nei materiali o nella lavorazione.</p>

  <h3>Tenuta d'aria delle cuciture dei tubolari (5 anni)</h3>
  <p>Le cuciture dei tubolari gonfiabili sono garantite contro difetti di fabbricazione che comportano una significativa perdita d'aria attraverso la cucitura. L'ispezione periodica e il mantenimento delle pressioni di gonfiaggio appropriate sono condizioni della copertura.</p>

  <h3>Funzionalità delle valvole di gonfiaggio (5 anni)</h3>
  <p>Le valvole di gonfiaggio installate originariamente da Seekingtex sono garantite contro difetti di materiali o lavorazione che impediscono alla valvola di trattenere l'aria come previsto.</p>

  <h3>Accessori installati in fabbrica (1 anno)</h3>
  <p>I componenti e i raccordi fabbricati da Seekingtex e installati in fabbrica sono garantiti contro difetti di materiale e lavorazione per un anno. Sono esclusi gli articoli di terze parti, coperti solo dalle rispettive garanzie del produttore.</p>

  <h2>Cosa non è coperto</h2>
  <ul>
    <li>Imperfezioni estetiche come scolorimento, macchie, sbiadimento, polverizzazione o qualsiasi alterazione dell'aspetto</li>
    <li>Forature, tagli, strappi o altri danni fisici</li>
    <li>Fessurazioni, screpolature, abrasioni, sfregamenti o deterioramento da attrito o contatto</li>
    <li>Degrado da esposizione a raggi UV, agenti atmosferici o condizioni ambientali</li>
    <li>Danni da contatto con carburanti, solventi, acidi, alcali o sostanze chimiche</li>
    <li>Danni da negligenza, uso improprio, abuso, incidente o normale usura</li>
    <li>Problemi superficiali del gelcoat o della vernice (vesciche, screpolature, scolorimento, sbiadimento)</li>
    <li>Danni da impatto, stress, supporto inadeguato o rimorchio</li>
    <li>Danni da gonfiaggio/sgonfiaggio improprio o uso di dispositivi di gonfiaggio non approvati</li>
    <li>Apparecchiature, componenti o sistemi di terze parti (coperti dai rispettivi produttori)</li>
  </ul>

  <h2>Obbligo e rimedio del produttore</h2>
  <p>L'unico ed esclusivo obbligo di Seekingtex è la riparazione o la sostituzione, a discrezione di Seekingtex, di qualsiasi componente determinato come difettoso nei materiali o nella lavorazione e coperto da questa garanzia. Le riparazioni o sostituzioni sono eseguite da Seekingtex o dal suo centro di assistenza autorizzato designato. I componenti riparati o sostituiti sono garantiti solo per la parte non scaduta del periodo di garanzia originale.</p>

  <h2>Condizioni di garanzia</h2>
  <ul>
    <li><strong>Registrazione:</strong> Il prodotto deve essere correttamente registrato come richiesto dai termini di garanzia.</li>
    <li><strong>Manutenzione:</strong> Il prodotto deve essere mantenuto secondo le linee guida pubblicate da Seekingtex, inclusa l'ispezione periodica e il mantenimento delle pressioni di gonfiaggio appropriate.</li>
    <li><strong>Cooperazione:</strong> L'acquirente deve cooperare pienamente e tempestivamente con Seekingtex in tutte le questioni relative alle richieste di garanzia.</li>
    <li><strong>Acquirente originale:</strong> Questa garanzia è estesa esclusivamente all'acquirente utente finale originale e non è trasferibile.</li>
  </ul>

  <h2>Uso commerciale</h2>
  <p>Se il prodotto viene utilizzato per scopi commerciali, governativi, senza scopo di lucro, charter, noleggio, didattici o per qualsiasi scopo diverso dall'uso ricreativo privato, il periodo di garanzia per tutti i componenti è ridotto a un (1) anno dalla data di acquisto al dettaglio originale. L'uso in gare, competizioni di velocità o resistenza annulla immediatamente e irrevocabilmente l'intera garanzia.</p>

  <h2>Come presentare una richiesta di garanzia</h2>
  <p>Contatta Seekingtex o il tuo rivenditore autorizzato con prova d'acquisto e una descrizione dettagliata del problema. Seekingtex esaminerà la richiesta e fornirà istruzioni per l'ispezione e l'assistenza.</p>
  <p>Per richieste di assistenza in garanzia, contattaci tramite la nostra <a href="/contact" class="text-sky-600 underline">pagina contatti</a> con il numero d'ordine e i dettagli del prodotto.</p>

  <h2>Articoli di terze parti</h2>
  <p>Le apparecchiature, i componenti o i sistemi fabbricati da terze parti (anche se installati da Seekingtex) sono coperti esclusivamente da qualsiasi garanzia offerta dal rispettivo produttore. Seekingtex declina espressamente qualsiasi responsabilità di garanzia per tali articoli di terze parti.</p>

  <p class="text-sm text-gray-500 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
    Questa dichiarazione di garanzia è un riepilogo della Garanzia limitata completa del produttore Seekingtex. Il documento di garanzia legale completo regola tutti i termini e le condizioni di garanzia. Specifiche soggette a modifica senza preavviso. Seekingtex è un marchio di Qingdao Vatrad Group.
  </p>
