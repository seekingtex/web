labs_section:
  tagline: Laboratori
  title: I nostri laboratori
  labs:
    - image: /images/seekingtex/randd/Seekingtex-pvc-material-lab.webp
      title: Laboratorio tessuti PVC
      description: Ricerca e test continui dei tessuti per tubi PVC e Hypalon per resistenza a trazione, resistenza ai UV, abrasione e flessibilit脿 a bassa temperatura per garantire affidabilit脿 a lungo termine in ambienti marini.
      href: /randdcenter/pvc-fabric-lab
    - image: /images/seekingtex/factory/design discuss2.jpeg
      title: Studio ingegneria scafo
      description: Progettazione CAD e analisi agli elementi finiti di scafi in HDPE, alluminio e fibra di vetro. Ogni scafo viene simulato digitalmente per distribuzione delle sollecitazioni e resistenza all'impatto prima della costruzione del primo prototipo.
      href: /randdcenter/hull-engineering
    - image: /images/seekingtex/factory/textile products making3.jpeg
      title: Centro saldatura RF
      description: Struttura di saldatura a radiofrequenza dedicata con controllo preciso di temperatura e pressione, che produce giunti ermetici ad alta resistenza che textile productserano gli standard  per textile products.
      href: /randdcenter/rf-welding
    - image: /images/seekingtex/factory/design discuss original.jpeg
      title: Vasca prove idrodinamiche
      description: Test su modello nella nostra vasca prove interna per ottimizzare la forma dello scafo, le prestazioni di planata, la stabilit脿 e l'efficienza del carburante in una gamma di condizioni di carico e mare.
      href: /randdcenter/hydrodynamic-test-tank
    - image: /images/seekingtex/products/textile products-series/textile products-ocean-voyager-1.webp
      title: Officina prototipi
      description: Struttura di prototipazione e rigging a grandezza naturale dove i nuovi modelli vengono costruiti, allestiti e provati in mare. Ogni prototipo viene sottoposto a un programma minimo di 20 ore di test in acqua prima dell'approvazione alla produzione.
      href: /randdcenter/prototype-workshop
    - image: /images/seekingtex/factory/UV Resistance Testing.jpeg
      title: Laboratorio qualit脿 & ispezione
      description: Laboratorio di garanzia qualit脿 dedicato che esegue test di trazione, cicli di ritenzione d'aria, test di pelatura delle giunture e certificazione dei materiali per garantire che ogni imbarcazione che lascia l'officina soddisfi le nostre specifiche pubblicate.
      href: /randdcenter/quality-inspection-lab
