hero:
  tagline: Seekingtex Laboratorio Personalizzazioni
  title: Progetta la tua<br />imbarcazione
  subtitle: Servizi OEM, ODM, private label e branding personalizzato per aziende in tutto il mondo. Da un singolo prototipo a serie di produzione complete.
  cta: Avvia il tuo progetto
  footer_link: /contact

steps_section:
  tagline: Come funziona
  title: Dal concept alla produzione
  subtitle: Quattro passi dalla vostra idea a un prodotto finito, pronto per il mare.
  steps:
    - num: '01'
      title: Scegli la tua tavola
      desc: Seleziona tra i nostri modelli principali — SUP, tessuti tecnici, prodotto tessile o tessuto tecnico. Scegli dimensioni, materiale e colore.
    - num: '02'
      title: Carica il tuo design
      desc: Inviaci il tuo logo, grafica o linee guida del marchio. Il nostro team di design prepara una bozza digitale.
    - num: '03'
      title: Revisione mockup IA
      desc: Visualizza un mockup fotorealistico generato dall'IA della tua tavola personalizzata prima dell'inizio della produzione.
    - num: '04'
      title: Produzione & consegna
      desc: Una volta approvato, il tuo ordine entra nella nostra linea di produzione certificata ISO. Tempi di consegna da 30 giorni.

services_section:
  tagline: Servizi
  title: Servizi di produzione per marchi globali
  subtitle: Modelli di impegno flessibili — dalla produzione a contratto alla costruzione di marchio chiavi in mano.
  items:
    - title: Produzione OEM
      desc: Produciamo i tuoi progetti secondo specifica — la tua PI, i tuoi disegni, i tuoi standard di qualità. Protezione NDA completa.
      icon: ⚙️
    - title: Soluzioni ODM
      desc: Scegli tra oltre 50 piattaforme collaudate e personalizza dimensioni, colore, grafica e imballaggio.
      icon: '🎨'
    - title: Private Label
      desc: Il tuo marchio sui nostri prodotti — logo, imballaggio, cartellini, manuali. Pronto per la vendita.
      icon: 🏷️
    - title: Branding personalizzato
      desc: Stampa del deck, grafica dello scafo, decalcomanie per tubi ed etichette personalizzate — piena integrazione del marchio.
      icon: ✨

capabilities_section:
  tagline: Capacità
  title: Capacità di produzione & personalizzazione
  subtitle: Tutto quello che dovete sapere prima di ordinare.
  capabilities:
    - label: Volume d'ordine
      value: MOQ 5–10 unità (SUP/tessuti tecnici), 2–5 unità (tessuto tecnico)
    - label: Tempo di consegna
      value: 30–45 giorni standard; 15–20 giorni per prototipi
    - label: Personalizzazione
      value: Dimensioni, forma, colore, grafica, imballaggio, ferramenta
    - label: Materiali
      value: PVC, Hypalon, drop-stitch, fibra di vetro, alluminio
    - label: Stampa
      value: Digitale (CMYK), serigrafia, transfer termico, sublimazione
    - label: Certificazione
      value: CE, UKCA, FCC (supporto per conformità globale)

