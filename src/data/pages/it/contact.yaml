contact_form:
  id: form
  title: Inviaci un messaggio
  subtitle: Per preventivi, domande tecniche o richieste di partnership, scrivici. Rispondiamo entro un giorno lavorativo.
  email_to: gzb@seekingtex.com
  submit_button: Invia messaggio
