  error_message: Si 猫 verificato un errore durante l'invio. Riprova o scrivici direttamente via email.
  default_country_code: '+1'
  captcha:
    label: 'Anti-spam: risolvi il seguente problema'
  fields:
    - name: firstName
      label: Nome
      row: 1
    - name: lastName
      label: Cognome
      row: 1
    - name: companyName
      label: Azienda
      row: 2
    - name: address
      label: Indirizzo
      row: 3
    - name: zip
