      row: 4
    - name: country
      label: Paese
      row: 4
      type: select
      optionsKey: countries
    - name: email
      label: Email
      row: 5
      type: email
    - name: tel
      label: Telefono
      row: 5
      type: tel
      withCountryCode: true
    - name: orderVolume
      label: Volume d'ordine stimato
      row: 6
      type: select
      options:
