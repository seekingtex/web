          label: Solo campioni / prototipi
        - value: '5-10'
          label: 50鈥?00 unit脿 (MOQ standard)
        - value: '100-500'
          label: 100鈥?00 unit脿
        - value: '500-plus'
          label: 500+ unit脿 (prezzi per volume)
    - name: customization
      label: Necessita personalizzazione?
      row: 7
      type: select
      options:
        - value: ''
          label: Seleziona il tipo di personalizzazione...
        - value: none
          label: Prodotto standard (senza personalizzazione)
        - value: logo
          label: Solo logo / branding personalizzato
        - value: full
