qc_section:
  tagline: Controllo Qualit脿
  title: Processo di Test e Garanzia Qualit脿
  subtitle: Ogni imbarcazione subisce test obbligatori prima della spedizione. Il nostro laboratorio qualit脿 opera indipendentemente dalla produzione e riporta direttamente alla direzione.
  steps:
    - step: '1'
      title: Ispezione Materie Prime
      desc: I tessuti PVC, Hypalon e technical subiscono test di trazione (), propagazione strappo e verifica resistenza UV prima che qualsiasi lotto entri in produzione.
    - step: '2'
      title: Test Ritenzione Aria 48 Ore
      desc: Ogni camera tubolare 猫 gonfiata al 125% della pressione nominale e mantenuta per 48 ore. Un calo di pressione sotto il 5% attiva il rigetto automatico e la reispezione delle giunture.
    - step: '3'
      title: Test Carico e Bilanciamento
      desc: Le imbarcazioni finite sono caricate alla massima capacit脿 nominale e testate per stabilit脿, bordo libero e manovrabilit脿. Ogni imbarcazione 猫 testata in acqua prima dell''ispezione finale.

oem_section:
  tagline: Progetti OEM
  title: Casi Studio Partnership Marchio e OEM
  subtitle: Dal concept al container 鈥?come aiutiamo i marchi globali a lanciare e scalare le loro linee di imbarcazioni gonfiabili.
  cases:
    - challenge: Un rivenditore europeo di outdoor necessitava di una linea SUP a marchio private label con grafica ponte unica, PVC ecologico e imballaggio pronto per la vendita al dettaglio 鈥?tutto consegnato in 60 giorni.
      solution: Sviluppo di file stampa digitale personalizzati, approvvigionamento PVC conforme REACH e compressione della campionatura da 3 turni a 1 co-localizzando il team di design nella nostra fabbrica di Qingdao.
      result: 55 giorni dall''ordine firmato al FOB. 2.400 unit脿 su 4 SKU. Ordine ripetuto prima dell''arrivo del primo container.
    - challenge: Una startup americana di industria tessile necessitava di un tessuti tecnici technical ad alte prestazioni con forma scafo personalizzata, imballaggio co-branded e certificazione BSCI per il posizionamento al dettaglio.
      solution: Adattamento dello stampo tessuti tecnici technical esistente con profilo rocker modificato, sviluppo grafica imballaggio co-branded e fornitura documentazione completa audit BSCI.
      result: Elencato con successo in 3 grandi catene outdoor USA. 5.000+ unit脿 nel primo anno con 98% tasso di sell-through.
    - challenge: Un distributore australiano richiedeva una gamma tessuto tecnico certificata CE con colori tubolari personalizzati, opzione upgrade Hypalon e conformit脿 allo standard australiano AS 1799.
      solution: Produzione campioni pre-produzione con 4 varianti colore tubolari, approvvigionamento Hypalon CSM da fornitore giapponese e coordinamento test conformit脿 AS 1799 di terze parti.
      result: Gamma tessuto tecnico di 3 modelli lanciata sul mercato AU/NZ. Seguita da vincita gara d''appalto governativa per 12 tessuto tecnico da pattuglia.

