workshops_section:
  tagline: Officine
  title: Officine di Produzione
  workshops:
    - title: Taglio PVC & Preparazione Materiali
      description: Macchine di taglio CNC automatiche lavorano tessuti PVC, Hypalon e technical con precisione submillimetrica. L''annidamento ottimizzato al computer minimizza lo scarto di materiale e garantisce che ogni pannello rispetti le specifiche dimensionali prima della saldatura.
      image: /images/seekingtex/hero/production-dept.webp
    - title: Saldatura Tubolari & Termosaldatura
      description: Officina saldatura dedicata con macchine termosaldatrici  e presse dielettriche RF. Le termosaldatrici ad aria calda legano e fondono le camere dei tubolari PVC, mentre le saldature RF producono giunture ermetiche ad alta resistenza che superano i requisiti .
      image: /images/seekingtex/hero/production-workshop.webp
    - title: Produzione Scafi tessuto tecnico 鈥?Fibra di Vetro
      description: Gli scafi dei tessuto tecnico sono prodotti mediante stampaggio in fibra di vetro a stratificazione manuale con sistemi resina poliestere e vinylestere. Ogni strato 猫 rullato a mano e insaccato sottovuoto per qualit脿 costante. La cabina di spruzzatura gelcoat fornisce una finitura tessile lucida e resistente ai UV.
      image: /images/seekingtex/factory/Seekingtex-warehouse-storage.webp
    - title: Stampa & Decorazione SUP
      description: Le tavole SUP sono decorate mediante stampa digitale  per grafica a colori e serigrafia  per loghi e motivi ripetuti. Le stampanti digitali producono design ponte fotorealistici, mentre la serigrafia offre marchi di marca durevoli e vivaci.
      image: /images/seekingtex/products/sup-series/sup-medusa-glow-1.webp
    - title: Assemblaggio Finale & Allestimento
      description: Linea di assemblaggio dove gli scafi in fibra di vetro e i tubolari PVC sono accoppiati, i motori sono montati, la sterzata e i comandi sono collegati e i sistemi elettrici sono cablati. Ogni imbarcazione segue una checklist di assemblaggio in 100 punti firmata dal caposquadra.
      image: /images/seekingtex/hero/factory-gate.webp
    - title: Test Qualit脿 & Ispezione
      description: Ogni imbarcazione finita subisce test obbligatorio di ritenzione aria, verifica pelatura giunture e controllo completo sistemi prima della spedizione. Il nostro laboratorio qualit脿 opera indipendentemente dalla produzione e riporta direttamente alla direzione.
