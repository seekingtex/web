hero:
  tagline: Processo
  title: Processo di produzione
  subtitle: Dalla materia prima all'imbarcazione pronta per il mare — ogni passo sotto il nostro controllo
  back_label: Torna alla fabbrica
  back_link: /factory

intro: A differenza dei marchi che esternalizzano la produzione a fabbriche terze, Seekingtex possiede e gestisce l'intera catena di produzione. Questa integrazione verticale ci consente di mantenere uno stretto controllo qualità in ogni fase, rispondere rapidamente a requisiti personalizzati e fornire una qualità di prodotto costante lotto dopo lotto. Ecco come viene costruita un'imbarcazione nel nostro impianto.

steps:
  - step: '01'
    title: Ricevimento & ispezione materiali
    description: Ogni lotto in entrata di tessuto PVC, mat di fibra di vetro, resina e ferramenta viene ispezionato secondo specifica. I campioni di tessuto vengono testati per resistenza a trazione, uniformità di spessore e resistenza ai UV prima del rilascio in produzione. I materiali non conformi vengono messi in quarantena e restituiti.
    duration: 1–2 giorni
  - step: '02'
    title: Taglio PVC automatico
    description: "I tessuti approvati vengono posizionati sulla macchina da taglio CNC automatica e tagliati con precisione submillimetrica. L'annidamento ottimizzato dal computer dispone i pannelli per minimizzare gli scarti — tipicamente inferiori al 5%. I pannelli tagliati sono etichettati per modello di imbarcazione e camera, quindi raggruppati per il trasferimento all'officina di saldatura."
    duration: 2–4 ore per kit imbarcazione
  - step: '03'
    title: Termosaldatura & saldatura tubi
    description: "I pannelli vengono imbastiti e uniti utilizzando macchine termosaldanti  con saldatura ad aria calda a temperature controllate di 200–600 °C. Le giunture principali vengono rinforzate con saldatura dielettrica RF per giunti ermetici ad alta resistenza. Le camere completate vengono gonfiate a 1,5× la pressione di esercizio per 30 minuti per la convalida della ritenzione d'aria."
    duration: 1–2 giorni per imbarcazione
  - step: '04'
    title: Stampaggio scafo tessuto tecnico in fibra di vetro
    description: Gli scafi dei tessuto tecnico sono prodotti mediante stampaggio manuale in fibra di vetro. Strati di mat e tessuto di vetro vengono rullati a mano con resina poliestere o vinylestere in stampi di precisione. Ogni strato viene insaccato sottovuoto per una qualità di laminato costante. Lo scafo viene rifinito con gelcoat per una superficie nautica lucida e resistente ai UV.
    duration: 2–4 giorni per scafo
  - step: '05'
    title: Stampa & decorazione SUP
    description: "Le grafiche del deck delle tavole SUP vengono applicate mediante stampa digitale  per disegni a colori di qualità fotografica e serigrafia  per loghi durevoli e motivi ripetuti. Le stampe vengono polimerizzate e sigillate per resistenza ai UV e all'abrasione."
    duration: 1–2 giorni
  - step: '06'
    title: Assemblaggio finale & rigging
    description: "Gli scafi in fibra di vetro e i gruppi di tubi PVC vengono accoppiati sulla linea di assemblaggio. Il motore viene montato, lo sterzo e i comandi dell'acceleratore vengono collegati, il sistema di alimentazione viene installato e l'intero cablaggio elettrico viene cablato. Ogni imbarcazione segue una checklist di assemblaggio di 100 punti con convalida obbligatoria in ogni fase."
    duration: 2–3 giorni
  - step: '07'
    title: Test qualità & ispezione
    description: "Ogni imbarcazione completata viene sottoposta a un controllo qualità obbligatorio: test di ritenzione d'aria delle camere, controllo funzionale dei sistemi, verifica della coppia dei fissaggi e ispezione estetica. Le costruzioni personalizzate e i prototipi ricevono anche prove in acqua che coprono velocità, manovrabilità, stabilità e resistenza."
    duration: 1–2 giorni
  - step: '08'
    title: Imballaggio & spedizione
    description: Le imbarcazioni vengono sgonfiate, piegate secondo procedura, imballate in sacchetti di tessuto resistente o casse di compensato e caricate per la spedizione. Ogni pacco è etichettato con modello, numero di serie e destinazione. Coordiniamo con gli spedizionieri per spedizioni container FCL e LCL in tutto il mondo.
    duration: 1 giorno

