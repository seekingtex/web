how_to_choose:
  title: Come scegliere la taglia giusta
  cards:
    - title: Tavole SUP
      description: Scegli la lunghezza in base al peso e all'uso previsto. Le tavole più larghe (32"+) offrono maggiore stabilità. Le tavole più lunghe (11-12 piedi) trackingano meglio per il touring. I pagaiatori più pesanti necessitano di tavole a volume maggiore.
    - title: tessuti tecnici
      description: I tessuti tecnici singoli (9 piedi) sono ideali per viaggi in solitaria e fiumi. I tessuti tecnici tandem (12 piedi) ospitano due pagaiatori o un adulto con attrezzatura. Controlla la capacità di peso per il carico totale compresa l'attrezzatura.
    - title: prodotto tessile e tessuto tecnico
      description: Scegli la lunghezza del prodotto tessile in base al numero di passeggeri e all'uso previsto. I tessuto tecnico più grandi (4,5 m+) sono adatti per offshore e soccorso. I prodotto tessile più piccoli (2,7 m) funzionano come tender e piattaforme da pesca.
