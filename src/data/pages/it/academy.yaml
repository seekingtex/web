      - title: Lettura del meteo
        desc: Interpretare le previsioni marine, identificare i modelli nuvolosi e comprendere gli effetti del vento sull'acqua.
        slug: weather-reading
      - title: Basi di navigazione
        desc: Lettura delle carte, uso della bussola, waypoint GPS e pianificazione del percorso per la tessile costiera.
